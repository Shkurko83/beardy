            </button>
            <div class="editor-pane" id="markdown-pane">
                <textarea id="markdown-textarea" lang="en" autocorrect="off" autocomplete="off" autocapitalize="off" spellcheck="false" data-gramm="false" style="
                width: 100%; height: 100%; border: none; outline: none;
                font-family: 'SF Mono', Monaco, monospace; font-size: 14px;
                padding: 40px 60px; background: transparent;
                resize: none; color: inherit; line-height: 1.6;
            "></textarea>
            </div>
            <div class="editor-pane" id="preview-pane">
                <div id="preview-content"></div>
            </div>
        </div>
        
        <!-- marked.js -->
        <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.min.js"></script>
        
        <script>
            console.log('🎉 Загрузка скрипта');
            
            let isSyncing = false;
            let isApplyingHistory = false;
            let currentContent = '';
            let isInitialized = false;
            let syncScroll = true;
            let isSwapped = false;
            let isLiveMode = false;
            let lastScrollTime = { markdown: 0, preview: 0 };
            let scrollDebounce = null;
            let documentBasePath = null;
            let showCodeLineNumbers = false;
            let linkReferenceMap = {};
            let anchorHighlightTimer = null;
            let loadedCodeThemeURLs = new Set();
            let focusModeActive = false;
            let focusDimLines = false;
            let currentCodeBlockBg = '#f6f8fa';
            let currentCodeBlockBorder = '#d0d7de';

            function debounce(fn, ms) {
                let timer;
                const debounced = function(...args) {
                    clearTimeout(timer);
                    timer = setTimeout(() => fn(...args), ms);
                };
                debounced.flush = function(...args) {
                    clearTimeout(timer);
                    fn(...args);
                };
                debounced.cancel = function() {
                    clearTimeout(timer);
                };
                return debounced;
            }

            const SMART_DOUBLE_QUOTES = /[\u201C\u201D\u201E\u201F\u2033\u2036\u00AB\u00BB]/g;
            const SMART_SINGLE_QUOTES = /[\u2018\u2019\u201A\u201B\u2032\u2035]/g;

            function normalizeSmartQuotes(text) {
                return String(text || '')
                    .replace(SMART_DOUBLE_QUOTES, '"')
                    .replace(SMART_SINGLE_QUOTES, "'");
            }

            function configurePlainTextTyping(el) {
                if (!el) return;
                el.setAttribute('autocorrect', 'off');
                el.setAttribute('autocomplete', 'off');
                el.setAttribute('autocapitalize', 'off');
                el.setAttribute('spellcheck', 'false');
                el.setAttribute('data-gramm', 'false');
                el.setAttribute('data-gramm_editor', 'false');
                el.setAttribute('data-enable-grammarly', 'false');
            }

            let isNormalizingQuotes = false;

            function insertPlainTextAtSelection(el, text) {
                if (el.isContentEditable) {
                    const sel = window.getSelection();
                    if (!sel || sel.rangeCount === 0) return false;
                    const range = sel.getRangeAt(0);
                    if (!el.contains(range.commonAncestorContainer)) return false;
                    range.deleteContents();
                    range.insertNode(document.createTextNode(text));
                    range.collapse(false);
                    sel.removeAllRanges();
                    sel.addRange(range);
                    return true;
                }
                if (typeof el.setRangeText === 'function' && el.selectionStart != null) {
                    const start = el.selectionStart;
                    const end = el.selectionEnd ?? start;
                    el.setRangeText(text, start, end, 'end');
                    return true;
                }
                return false;
            }

            function attachPlainTextTyping(el) {
                if (!el || el.dataset.plainTextTyping === 'true') return;
                el.dataset.plainTextTyping = 'true';
                configurePlainTextTyping(el);

                const isTextarea = el.tagName === 'TEXTAREA';

                el.addEventListener('beforeinput', (e) => {
                    if (isNormalizingQuotes || isApplyingHistory || e.isComposing) return;
                    const data = e.data;
                    if (!data) return;
                    const normalized = normalizeSmartQuotes(data);
                    if (normalized === data) return;
                    e.preventDefault();
                    isNormalizingQuotes = true;
                    try {
                        insertPlainTextAtSelection(el, normalized);
                    } finally {
                        isNormalizingQuotes = false;
                    }
                }, true);

                el.addEventListener('paste', (e) => {
                    if (isNormalizingQuotes || isApplyingHistory) return;
                    const raw = e.clipboardData?.getData('text/plain');
                    if (!raw) return;
                    const normalized = normalizeSmartQuotes(raw);
                    if (normalized === raw) return;
                    e.preventDefault();
                    isNormalizingQuotes = true;
                    try {
                        insertPlainTextAtSelection(el, normalized);
                    } finally {
                        isNormalizingQuotes = false;
                    }
                });

                if (isTextarea) {
                    el.addEventListener('input', () => {
                        if (isNormalizingQuotes || isApplyingHistory || isSyncing) return;
                        const start = el.selectionStart ?? 0;
                        const end = el.selectionEnd ?? start;
                        const value = el.value;
                        const normalized = normalizeSmartQuotes(value);
                        if (normalized === value) return;
                        isNormalizingQuotes = true;
                        try {
                            const before = value.slice(0, start);
                            const fixedBefore = normalizeSmartQuotes(before);
                            const delta = fixedBefore.length - before.length;
                            el.value = normalized;
                            const nextStart = Math.max(0, start + delta);
                            const nextEnd = Math.max(0, end + delta);
                            el.setSelectionRange(nextStart, nextEnd);
                        } finally {
                            isNormalizingQuotes = false;
                        }
                    });
                }
            }

            function isPreviewActive() {
                return document.body.classList.contains('mode-split')
                    || document.body.classList.contains('mode-preview');
            }

            function isLiveActive() {
                return document.body.classList.contains('mode-live');
            }

            function updateCodeBlockChromeStyle(bg, border) {
                if (bg) currentCodeBlockBg = bg;
                if (border) currentCodeBlockBorder = border;
                document.documentElement.style.setProperty('--md-code-bg', currentCodeBlockBg);
                document.documentElement.style.setProperty('--md-code-border', currentCodeBlockBorder);

                let el = document.getElementById('code-block-chrome-style');
                if (!el) {
                    el = document.createElement('style');
                    el.id = 'code-block-chrome-style';
                    document.head.appendChild(el);
                }
                el.textContent = `
                    #preview-content pre.hljs,
                    #live-editor pre.hljs {
                        background-color: ${currentCodeBlockBg} !important;
                        border-color: ${currentCodeBlockBorder} !important;
                    }
                    #preview-content pre.hljs code,
                    #preview-content pre.hljs .hljs,
                    #preview-content pre.hljs code *,
                    #live-editor pre.hljs code,
                    #live-editor pre.hljs .hljs,
                    #live-editor pre.hljs code * {
                        background: transparent !important;
                        background-color: transparent !important;
                    }
                `;
            }

            function applyCodeBlockChrome(container) {
                if (!container) return;
                container.querySelectorAll('.code-fence-wrap').forEach((wrap) => {
                    wrap.style.setProperty('background-color', currentCodeBlockBg, 'important');
                    wrap.style.setProperty('border-color', currentCodeBlockBorder, 'important');
                });
                container.querySelectorAll('pre.hljs').forEach((pre) => {
                    const wrap = pre.closest('.code-fence-wrap');
                    if (wrap) {
                        pre.style.setProperty('background-color', 'transparent', 'important');
                        pre.style.setProperty('border-color', 'transparent', 'important');
                    } else {
                        pre.style.setProperty('background-color', currentCodeBlockBg, 'important');
                        pre.style.setProperty('border-color', currentCodeBlockBorder, 'important');
                    }
                    pre.querySelectorAll('code, .hljs, span').forEach((node) => {
                        node.style.setProperty('background', 'transparent', 'important');
                        node.style.setProperty('background-color', 'transparent', 'important');
                    });
                });
            }

            const schedulePreviewRender = debounce((text) => {
                if (isPreviewActive()) {
                    renderPreview(text, { preserveScroll: true });
                }
            }, 280);

            const scheduleLiveRebuild = debounce((text) => {
                if (isLiveActive()) {
                    initLiveEditor(text);
                }
            }, 320);

            const scheduleContentSync = debounce((text) => {
                if (isApplyingHistory) return;
                if (window.webkit?.messageHandlers?.contentChanged) {
                    isSyncing = true;
                    window.webkit.messageHandlers.contentChanged.postMessage(text);
                    setTimeout(() => { isSyncing = false; }, 400);
                }
            }, 180);

            function getEditorSnapshotForUndo() {
                if (isLiveActive() && liveBlocks.length) {
                    currentContent = liveBlocks.map((block) => blockToMarkdownSource(block)).join('\n');
                    textarea.value = currentContent;
                } else {
                    flushPendingEditorUpdates();
                }
                scheduleContentSync.cancel();
                return textarea.value || currentContent || '';
            }

            function handleGlobalUndoRedoKeydown(e) {
                const key = (e.key || '').toLowerCase();
                if (!(e.metaKey || e.ctrlKey) || key !== 'z') return;
                if (!window.webkit?.messageHandlers?.editorUndoRedo) return;

                e.preventDefault();
                e.stopPropagation();

                const snapshot = getEditorSnapshotForUndo();
                const action = e.shiftKey ? 'redo' : 'undo';
                window.webkit.messageHandlers.editorUndoRedo.postMessage({ action, snapshot });
            }

            function flushPendingEditorUpdates() {
                const text = textarea.value;
                schedulePreviewRender.flush(text);
                if (isLiveActive()) {
                    scheduleLiveRebuild.cancel();
                } else {
                    scheduleLiveRebuild.flush(text);
                }
                scheduleContentSync.flush(text);
            }

            function captureScrollState() {
                return {
                    markdown: markdownPane ? markdownPane.scrollTop : 0,
                    preview: previewPane ? previewPane.scrollTop : 0,
                    live: liveEditor ? liveEditor.scrollTop : 0,
                    textarea: textarea ? textarea.scrollTop : 0,
                };
            }

            function restoreScrollState(state) {
                if (!state) return;
                requestAnimationFrame(() => {
                    if (markdownPane) markdownPane.scrollTop = state.markdown;
                    if (previewPane) previewPane.scrollTop = state.preview;
                    if (liveEditor) liveEditor.scrollTop = state.live;
                    if (textarea) textarea.scrollTop = state.textarea;
                });
            }

            function updateCustomThemeCSS(themeCSS) {
                let oldStyle = document.getElementById('custom-theme-style');
                if (oldStyle) oldStyle.remove();
                const style = document.createElement('style');
                style.id = 'custom-theme-style';
                style.textContent = themeCSS;
                document.head.appendChild(style);
            }

            function extractCodeText(pre, code) {
                const table = pre.querySelector('table.hljs-ln');
                if (table) {
                    const lines = [];
                    table.querySelectorAll('td.hljs-ln-code').forEach((cell) => {
                        lines.push((cell.textContent || '').replace(/\u00a0/g, ' '));
                    });
                    return dedentUniformLeadingWhitespace(lines.join('\n'));
                }
                return dedentUniformLeadingWhitespace(code?.textContent || pre.textContent || '');
            }

            function restoreCodeBlock(pre) {
                const existingCode = pre.querySelector('code');
                const langMatch = existingCode?.className?.match(/language-(\w+)/);
                const lang = langMatch ? langMatch[1] : existingCode?.getAttribute('data-language');
                const text = extractCodeText(pre, existingCode || pre);

                pre.innerHTML = '';
                pre.className = 'hljs';

                const code = document.createElement('code');
                if (lang) {
                    code.className = `language-${lang}`;
                    code.setAttribute('data-language', lang);
                }
                code.textContent = text;
                pre.appendChild(code);
                return code;
            }

            function highlightCodeBlocks(container) {
                if (!container) return;
                container.querySelectorAll('.code-fence-wrap pre.hljs').forEach((pre) => {
                    const placeholder = pre.querySelector('.code-fence-placeholder');
                    const code = pre.querySelector('code');
                    const raw = (code?.textContent || '')
                        .replace(/\u00a0/g, ' ')
                        .replace(/\u200b/g, '')
                        .trimEnd();

                    if (!raw) {
                        pre.classList.add('is-empty');
                        if (!placeholder) {
                            const hint = document.createElement('div');
                            hint.className = 'code-fence-placeholder';
                            hint.textContent = 'Click to edit code…';
                            pre.appendChild(hint);
                        }
                        if (code) code.textContent = '';
                        return;
                    }

                    pre.classList.remove('is-empty');
                    if (placeholder) placeholder.remove();

                    if (!window.hljs || !code) return;

                    const restored = restoreCodeBlock(pre);
                    const text = (restored.textContent || '').trimEnd();
                    if (!text) return;

                    restored.removeAttribute('data-highlighted');
                    restored.classList.remove('hljs');
                    pre.classList.add('hljs');

                    try {
                        hljs.highlightElement(restored);
                    } catch (e) {
                        console.warn('hljs.highlightElement failed', e);
                    }

                    pre.classList.remove('has-line-numbers');
                    if (showCodeLineNumbers && typeof hljs.lineNumbersBlock === 'function') {
                        try {
                            hljs.lineNumbersBlock(restored);
                            pre.classList.add('has-line-numbers');
                        } catch (e) {
                            console.warn('lineNumbersBlock failed', e);
                        }
                    }
                });
                applyCodeBlockChrome(container);
            }

            function rehighlightCodeBlocks() {
                highlightCodeBlocks(preview);
                if (liveEditor) highlightCodeBlocks(liveEditor);
            }

            function toBeardyURL(filePath) {
                if (!filePath) return filePath;
                if (filePath.startsWith('beardy://')) return filePath;
                const encoded = filePath.split('/').map(part => encodeURIComponent(part)).join('/');
                return 'beardy://localhost' + encoded;
            }

            function unwrapMarkdownURL(src) {
                let s = (src || '').trim();
                s = s.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
                if (s.startsWith('<') && s.endsWith('>')) {
                    s = s.slice(1, -1).trim();
                }
                return s;
            }

            function buildResolvedImageTag(alt, src) {
                const resolved = resolveImageSrc(unwrapMarkdownURL(src.trim()));
                const safeAlt = (alt || '').replace(/"/g, '&quot;');
                return `<img src="${resolved}" alt="${safeAlt}" style="max-width:100%;height:auto;">`;
            }

            function normalizeMarkdownImages(text) {
                return (text || '').replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, url) => {
                    const trimmed = url.trim();
                    if (trimmed.startsWith('<') && trimmed.endsWith('>')) return match;
                    if (trimmed.includes(' ') || /[^\x00-\x7F]/.test(trimmed)) {
                        return `![${alt}](<${trimmed}>)`;
                    }
                    return match;
                });
            }

            function resolveImageSrc(src) {
                if (!src) return src;
                src = unwrapMarkdownURL(src);
                if (/^(https?:|data:|beardy:)/i.test(src)) return src;

                let absolutePath;
                if (src.startsWith('./') && documentBasePath) {
                    absolutePath = documentBasePath + '/' + src.slice(2);
                } else if (src.startsWith('/') && !src.startsWith('//')) {
                    absolutePath = src;
                } else if (documentBasePath && !src.includes('://')) {
                    absolutePath = documentBasePath + '/' + src.replace(/^\.\//, '');
                } else {
                    return src;
                }
                return toBeardyURL(absolutePath);
            }

            function rewriteImagesInContainer(container) {
                if (!container) return;
                container.querySelectorAll('img').forEach(img => {
                    const src = img.getAttribute('src');
                    if (src) img.setAttribute('src', resolveImageSrc(src));
                });
            }

            function syncLiveToTextarea() {
                if (isLiveMode && liveBlocks.length) {
                    currentContent = liveBlocks.map((b) => blockToMarkdownSource(b)).join('\n');
                    textarea.value = currentContent;
                }
            }

            async function handleImageFiles(files) {
                for (const file of files) {
                    if (!file.type.startsWith('image/')) continue;
                    const reader = new FileReader();
                    reader.onload = () => {
                        const dataURL = reader.result;
                        const base64 = String(dataURL).split(',')[1];
                        if (!base64 || !window.webkit?.messageHandlers?.processImageFile) return;
                        window.webkit.messageHandlers.processImageFile.postMessage({
                            base64,
                            filename: file.name || 'image.png',
                            mimeType: file.type
                        });
                    };
                    reader.readAsDataURL(file);
                }
            }

            let lastTextareaSelection = { start: 0, end: 0 };

            function rememberTextareaSelection() {
                lastTextareaSelection = {
                    start: textarea.selectionStart,
                    end: textarea.selectionEnd
                };
            }

            const textarea = document.getElementById('markdown-textarea');
            const preview = document.getElementById('preview-content');
            const markdownPane = document.getElementById('markdown-pane');
            const previewPane = document.getElementById('preview-pane');
            const editorContainer = document.getElementById('editor-container');
            const swapButton = document.getElementById('swap-button');
            
            // Проверка наличия элементов
            console.log('🔍 Проверка элементов:');
            console.log('markdownPane:', markdownPane);
            console.log('previewPane:', previewPane);
            console.log('syncScroll:', syncScroll);
            
            const markedRenderer = new marked.Renderer();
            const defaultImageRenderer = markedRenderer.image.bind(markedRenderer);
            markedRenderer.image = function(hrefOrToken, title, text) {
                let href, alt, titleAttr;
                if (hrefOrToken && typeof hrefOrToken === 'object') {
                    href = hrefOrToken.href;
                    alt = hrefOrToken.text || '';
                    titleAttr = hrefOrToken.title || '';
                } else {
                    href = hrefOrToken;
                    alt = text || '';
                    titleAttr = title || '';
                }
                const src = resolveImageSrc(href);
                if (defaultImageRenderer.length <= 1) {
                    return defaultImageRenderer({ href: src, title: titleAttr, text: alt });
                }
                let html = defaultImageRenderer(src, titleAttr, alt);
                return html.replace(/<img /, '<img style="max-width:100%;height:auto;" ');
            };

            marked.setOptions({
                breaks: true,
                gfm: true,
                sanitize: false,
                renderer: markedRenderer,
            });

            function renderPreview(text, options = {}) {
                const scroll = options.preserveScroll ? captureScrollState() : null;
                try {
                    mountDocumentBlocks(preview, text || '', { readOnly: true });
                } catch (e) {
                    console.error('Preview render error:', e);
                    preview.textContent = text;
                }
                if (scroll) restoreScrollState(scroll);
            }

            const LINK_REF_DEF_RE = /^\s*\[([^\]]+)\]:\s*(?:<([^>]+)>|(\S+))(?:\s+(?:"([^"]*)"|'([^']*)'))?\s*$/;

            function isLinkReferenceDefinitionLine(line) {
                return /^\s*\[[^\]]+\]:/.test(line || '');
            }

            function parseReferenceDefRemainder(remainder) {
                const trimmed = (remainder || '').trim();
                if (!trimmed) return null;
                const angle = trimmed.match(/^<([^>]+)>(?:\s+(?:"([^"]*)"|'([^']*)'))?$/);
                if (angle) {
                    return { url: angle[1].trim(), title: (angle[2] || angle[3] || '').trim() };
                }
                const plain = trimmed.match(/^(\S+)(?:\s+(?:"([^"]*)"|'([^']*)'))?$/);
                if (plain) {
                    return { url: plain[1], title: (plain[2] || plain[3] || '').trim() };
                }
                return null;
            }

            function consumeReferenceDefinitionLines(lines, startIndex) {
                const line = lines[startIndex];
                const m = line.match(/^\s*\[([^\]]+)\]:\s*(.*)$/);
                if (!m) return null;

                const id = m[1].trim().toLowerCase();
                const first = parseReferenceDefRemainder(m[2]);
                if (first?.url) {
                    return { consumed: 1, id, url: first.url, title: first.title || '' };
                }

                const chunks = [];
                if (m[2].trim()) chunks.push(m[2].trim());

                let consumed = 1;
                let j = startIndex + 1;
                while (j < lines.length) {
                    const cont = lines[j];
                    if (cont.trim() === '') {
                        consumed = j - startIndex + (chunks.length ? 1 : 0);
                        if (!chunks.length) consumed = j - startIndex + 1;
                        break;
                    }
                    if (/^\s*\[[^\]]+\]:/.test(cont)) break;

                    const joinedBefore = chunks.join(' ');
                    if (chunks.length && joinedBefore && !/^\s+/.test(cont)) {
                        const maybeUrl = parseReferenceDefRemainder(cont.trim());
                        if (maybeUrl?.url) {
                            chunks.push(cont.trim());
                            consumed = j - startIndex + 1;
                            j++;
                            break;
                        }
                        break;
                    }

                    chunks.push(cont.trim());
                    const parsed = parseReferenceDefRemainder(chunks.join(' '));
                    if (parsed?.url) {
                        consumed = j - startIndex + 1;
                        return { consumed, id, url: parsed.url, title: parsed.title || '' };
                    }
                    j++;
                    consumed = j - startIndex;
                }

                const finalParsed = parseReferenceDefRemainder(chunks.join(' '));
                if (finalParsed?.url) {
                    return { consumed, id, url: finalParsed.url, title: finalParsed.title || '' };
                }
                return { consumed, id, url: '', title: '' };
            }

            function applyLinkReferenceEntry(refs, entry) {
                if (!entry?.url) return;
                refs[entry.id] = { url: entry.url, title: entry.title || '' };
            }

            function extractLinkReferenceDefinitions(text) {
                const lines = (text || '').split('\n');
                const refs = {};
                const out = [];
                const lineMap = [];
                let i = 0;

                while (i < lines.length) {
                    if (isLinkReferenceDefinitionLine(lines[i])) {
                        const entry = consumeReferenceDefinitionLines(lines, i);
                        if (entry) {
                            applyLinkReferenceEntry(refs, entry);
                            i += entry.consumed;
                            continue;
                        }
                    }
                    lineMap[out.length] = i;
                    out.push(lines[i]);
                    i++;
                }
                return { text: out.join('\n'), refs, lineMap };
            }

            function getEditorSource() {
                if (document.body.classList.contains('mode-live')) {
                    if (liveBlocks.length) {
                        return liveBlocks.map((b) => b.source).join('\n');
                    }
                    return liveContent || '';
                }
                return currentContent || textarea.value || '';
            }

            function ensureLinkReferenceMap() {
                linkReferenceMap = extractLinkReferenceDefinitions(getEditorSource()).refs;
            }

            function parseLinkTarget(raw) {
                const trimmed = (raw || '').trim();
                const angle = trimmed.match(/^<([^>]+)>\s*(?:"([^"]*)"|'([^']*)')?$/);
                if (angle) {
                    return { url: angle[1].trim(), title: (angle[2] || angle[3] || '').trim() };
                }
                const plain = trimmed.match(/^(\S+?)(?:\s+(?:"([^"]*)"|'([^']*)'))?\s*$/);
                if (plain) {
                    return { url: plain[1], title: (plain[2] || plain[3] || '').trim() };
                }
                return { url: trimmed, title: '' };
            }

            function escapeHtmlAttr(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/"/g, '&quot;')
                    .replace(/</g, '&lt;');
            }

            function escapeInlineText(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            function headingPlainText(text) {
                return String(text || '')
                    .replace(/!\[[^\]]*\]\([^)]*\)/g, '')
                    .replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
                    .replace(/[*_~`]/g, '')
                    .trim();
            }

            function headingSlug(text) {
                return headingPlainText(text)
                    .toLowerCase()
                    .replace(/\s+/g, '-');
            }

            function buildAnchorTag(href, label, title) {
                const safeHref = escapeHtmlAttr(href);
                const safeLabel = escapeInlineText(label);
                const titleAttr = title ? ` title="${escapeHtmlAttr(title)}"` : '';
                const externalAttrs = href.startsWith('#')
                    ? ''
                    : ' target="_blank" rel="noopener noreferrer"';
                return `<a href="${safeHref}"${titleAttr}${externalAttrs}>${safeLabel}</a>`;
            }

            function getLinkNavigationRoot() {
                if (document.body.classList.contains('mode-live')) {
                    return document.getElementById('live-editor');
                }
                if (document.body.classList.contains('mode-preview')
                    || document.body.classList.contains('mode-split')) {
                    return document.getElementById('preview-content');
                }
                return null;
            }

            function getLinkScrollContainer(root) {
                if (!root) return null;
                if (root.id === 'live-editor') return root;
                return root.closest('.editor-pane') || document.getElementById('preview-pane');
            }

            function findAnchorTarget(id) {
                const root = getLinkNavigationRoot();
                if (root) {
                    try {
                        const scoped = root.querySelector(`#${CSS.escape(id)}`);
                        if (scoped) return scoped;
                    } catch (_) {
                        const scoped = Array.from(root.querySelectorAll('[id]'))
                            .find((node) => node.id === id);
                        if (scoped) return scoped;
                    }
                }
                return document.getElementById(id);
            }

            function flashAnchorHighlight(el) {
                if (!el) return;
                el.classList.remove('anchor-flash');
                void el.offsetWidth;
                el.classList.add('anchor-flash');
                clearTimeout(anchorHighlightTimer);
                anchorHighlightTimer = setTimeout(() => {
                    el.classList.remove('anchor-flash');
                }, 2000);
            }

            function focusLiveBlockForAnchor(target) {
                const blockEl = target?.closest?.('.live-block');
                if (!blockEl) return false;
                const index = parseInt(blockEl.getAttribute('data-index'), 10);
                if (Number.isNaN(index) || !liveBlocks[index]) return false;

                if (activeBlockIndex === index && blockEl.classList.contains('is-source')) {
                    blockEl.focus();
                    placeCaretAtTextOffset(blockEl, 0);
                    return true;
                }

                activateBlockAtOffset(index, 0);
                return true;
            }

            const OUTLINE_SCROLL_DURATION_MS = 340;
            const OUTLINE_SCROLL_TOP_INSET = 8;

            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            function smoothScrollToTop(scrollContainer, targetTop, duration = OUTLINE_SCROLL_DURATION_MS) {
                if (!scrollContainer) return;
                const maxScroll = Math.max(0, scrollContainer.scrollHeight - scrollContainer.clientHeight);
                const nextTop = Math.max(0, Math.min(targetTop, maxScroll));
                const startTop = scrollContainer.scrollTop;
                const delta = nextTop - startTop;
                if (Math.abs(delta) < 1) {
                    scrollContainer.scrollTop = nextTop;
                    return;
                }
                const startTime = performance.now();
                function step(now) {
                    const elapsed = now - startTime;
                    const t = Math.min(1, elapsed / duration);
                    scrollContainer.scrollTop = startTop + delta * easeOutCubic(t);
                    if (t < 1) {
                        requestAnimationFrame(step);
                    }
                }
                requestAnimationFrame(step);
            }

            function smoothScrollElementToTop(scrollContainer, element, topInset = OUTLINE_SCROLL_TOP_INSET) {
                if (!scrollContainer || !element) return;
                const targetTop = element.getBoundingClientRect().top;
                const containerTop = scrollContainer.getBoundingClientRect().top;
                const nextScroll = scrollContainer.scrollTop + (targetTop - containerTop) - topInset;
                smoothScrollToTop(scrollContainer, nextScroll);
            }

            function getOutlineSourceText() {
                return textarea.value || currentContent || '';
            }

            function collectOutlineHeadings(text) {
                const normalized = normalizeMarkdownImages(text || '');
                const lines = normalized.split('\n');
                const headings = [];
                let inFence = false;
                let i = 0;

                while (i < lines.length) {
                    const line = lines[i];
                    const trimmed = line.trim();

                    if (trimmed.startsWith('```')) {
                        inFence = !inFence;
                        i++;
                        continue;
                    }
                    if (inFence) {
                        i++;
                        continue;
                    }

                    if (isLinkReferenceDefinitionLine(line)) {
                        const entry = consumeReferenceDefinitionLines(lines, i);
                        i += entry ? entry.consumed : 1;
                        continue;
                    }

                    const hMatch = line.match(/^(#{1,6})\s+(.+)/);
                    if (hMatch && hMatch[2].trim()) {
                        headings.push({
                            lineNumber: i,
                            level: hMatch[1].length,
                            title: hMatch[2].trim(),
                        });
                    }
                    i++;
                }

                return headings;
            }

            function findRenderedHeadingByLineNumber(root, lineNumber) {
                if (!root || lineNumber < 0) return null;
                const direct = root.querySelector(
                    `.live-block[data-source-line="${lineNumber}"][data-type^="h"]`
                );
                if (direct) return direct;

                const headings = collectOutlineHeadings(getOutlineSourceText());
                const match = headings.find((item) => item.lineNumber === lineNumber);
                if (!match) return null;

                const blocks = [...root.querySelectorAll('.live-block[data-type^="h"]')];
                const index = headings.findIndex((item) => item.lineNumber === lineNumber);
                return index >= 0 ? (blocks[index] || null) : null;
            }

            function getMarkdownScrollElement() {
                if (!textarea) return markdownPane;
                if (textarea.scrollHeight > textarea.clientHeight + 1) return textarea;
                if (markdownPane && markdownPane.scrollHeight > markdownPane.clientHeight + 1) return markdownPane;
                return textarea;
            }

            function scrollSourceToLine(lineNumber) {
                const ta = textarea;
                if (!ta || lineNumber < 0) return false;

                const lines = ta.value.split('\n');
                let offset = 0;
                for (let i = 0; i < lineNumber && i < lines.length; i++) {
                    offset += lines[i].length + 1;
                }

                const style = window.getComputedStyle(ta);
                let lineHeight = parseFloat(style.lineHeight);
                if (!lineHeight || Number.isNaN(lineHeight)) {
                    lineHeight = (parseFloat(style.fontSize) || 14) * 1.6;
                }
                const padTop = parseFloat(style.paddingTop) || 0;
                const targetScroll = Math.max(0, lineNumber * lineHeight - padTop + OUTLINE_SCROLL_TOP_INSET);

                const scrollEl = getMarkdownScrollElement();
                smoothScrollToTop(scrollEl, targetScroll);

                requestAnimationFrame(() => {
                    ta.focus({ preventScroll: true });
                    ta.setSelectionRange(offset, offset);
                });
                return true;
            }

            function scrollRenderedHeadingToLine(root, lineNumber) {
                const target = findRenderedHeadingByLineNumber(root, lineNumber);
                if (!target) return false;

                const scrollContainer = getLinkScrollContainer(root);
                if (scrollContainer) {
                    smoothScrollElementToTop(scrollContainer, target);
                } else {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                flashAnchorHighlight(target);
                return true;
            }

            function scrollToOutlineHeading(options = {}) {
                const lineNumber = Number(options.lineNumber);
                if (!Number.isFinite(lineNumber) || lineNumber < 0) return false;

                const modeClass = [...document.body.classList].find((name) => name.startsWith('mode-'));
                const mode = modeClass ? modeClass.replace('mode-', '') : 'edit';

                if (mode === 'edit') {
                    return scrollSourceToLine(lineNumber);
                }

                if (mode === 'preview') {
                    const previewRoot = document.getElementById('preview-content');
                    return scrollRenderedHeadingToLine(previewRoot, lineNumber);
                }

                if (mode === 'live') {
                    const liveRoot = document.getElementById('live-editor');
                    return scrollRenderedHeadingToLine(liveRoot, lineNumber);
                }

                if (mode === 'split') {
                    const previewRoot = document.getElementById('preview-content');
                    const sourceOk = scrollSourceToLine(lineNumber);
                    const previewOk = scrollRenderedHeadingToLine(previewRoot, lineNumber);
                    return sourceOk || previewOk;
                }

                return scrollSourceToLine(lineNumber);
            }

            function scrollToDocumentAnchor(href) {
                const id = decodeURIComponent((href || '').replace(/^#/, ''));
                if (!id) return false;

                const target = findAnchorTarget(id);
                if (!target) return false;

                const root = getLinkNavigationRoot();
                const scrollContainer = getLinkScrollContainer(root);
                if (scrollContainer) {
                    smoothScrollElementToTop(scrollContainer, target);
                } else {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }

                if (document.body.classList.contains('mode-live')) {
                    requestAnimationFrame(() => focusLiveBlockForAnchor(target));
                } else {
                    flashAnchorHighlight(target);
                }
                return true;
            }

            function isModifiedLinkClick(e) {
                return !!(e.metaKey || e.ctrlKey);
            }

            function handleDocumentLinkClick(e) {
                const link = e.target.closest('a');
                if (!link) return;

                const href = link.getAttribute('href');
                if (!href) return;

                if (href.startsWith('#')) {
                    e.preventDefault();
                    e.stopPropagation();
                    scrollToDocumentAnchor(href);
                    return;
                }

                if (/^(https?:\/\/|mailto:)/i.test(href)) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (isModifiedLinkClick(e) && window.webkit?.messageHandlers?.openURL) {
                        window.webkit.messageHandlers.openURL.postMessage(href);
                    }
                }
            }

            function mountDocumentBlocks(container, text, options = {}) {
                const readOnly = !!options.readOnly;
                const incremental = options.incremental !== false && readOnly;
                const normalized = normalizeMarkdownImages(text || '');
                const { text: withoutRefs, refs, lineMap } = extractLinkReferenceDefinitions(normalized);
                linkReferenceMap = refs;
                let blocks = parseMarkdownBlocks(withoutRefs, lineMap);
                blocks = coalesceHTMLBlocks(blocks);

                if (incremental) {
                    const existing = [...container.querySelectorAll(':scope > .live-block')];
                    if (existing.length === blocks.length
                        && existing.every((el, i) => el.getAttribute('data-type') === blocks[i].type)) {
                        let anyChange = false;
                        blocks.forEach((block, index) => {
                            const el = existing[index];
                            const prevSource = el.dataset.blockSource ?? '';
                            const nextSource = block.source || '';
                            if (prevSource === nextSource) return;
                            anyChange = true;
                            const newEl = createBlockEl(block, index, { readOnly });
                            el.replaceWith(newEl);
                            if (block.type === 'code-fence') {
                                highlightCodeBlocks(newEl);
                            }
                            if (block.type === 'mermaid' && isElementVisibleForLayout(newEl)) {
                                scheduleMermaidRenderAfterLayout([newEl]);
                            }
                        });
                        if (anyChange) {
                            rewriteImagesInContainer(container);
                        }
                        return;
                    }
                }

                container.innerHTML = '';
                blocks.forEach((block, index) => {
                    const el = createBlockEl(block, index, { readOnly });
                    container.appendChild(el);
                });
                highlightCodeBlocks(container);
                rewriteImagesInContainer(container);
                if (isElementVisibleForLayout(container)) {
                    scheduleMermaidRenderAfterLayout([container]);
                }
            }
            
            window.cmEditor = {
                updateContent(text) {
                    if (isSyncing || isApplyingHistory) return;
                    const incoming = text ?? '';
                    if (incoming === currentContent) return;
                    currentContent = incoming;
                    textarea.value = incoming;
                    schedulePreviewRender.cancel();
                    scheduleLiveRebuild.cancel();
                    scheduleContentSync.cancel();
                    if (isPreviewActive()) {
                        renderPreview(incoming, { preserveScroll: true });
                    }
                    if (isLiveActive()) {
                        initLiveEditor(incoming);
                    }
                },

                setTheme(isDark) {
                    document.body.classList.toggle('dark', !!isDark);
                    textarea.style.backgroundColor = 'transparent';
                    textarea.style.color = 'inherit';
                    const markdownPane = document.getElementById('markdown-pane');
                    const previewPane = document.getElementById('preview-pane');
                    const liveEditor = document.getElementById('live-editor');
                    [textarea, markdownPane, previewPane, liveEditor].forEach((el) => {
                        if (!el) return;
                        el.style.backgroundColor = 'transparent';
                        el.style.color = 'inherit';
                    });
                    rethemeAllMermaidInApp();
                },

                setViewMode(mode) {
                    const modeDebug = document.getElementById("mode-debug");
                    if (modeDebug) {
                        modeDebug.textContent = `MODE: ${mode}`;
                    }

                    isLiveMode = (mode === 'live');

                    const keepDark = document.body.classList.contains('dark');
                    document.body.className = document.body.className
                        .replace(/mode-\w+/g, '')
                        .trim();
                    if (keepDark) {
                        document.body.classList.add('dark');
                    }
                    document.body.classList.add(`mode-${mode}`);

                    flushPendingEditorUpdates();
                    if (mode === 'live') {
                        const previewEl = document.getElementById('preview-content');
                        if (previewEl) previewEl.innerHTML = '';
                        initLiveEditor(currentContent);
                        attachLiveCaretTracking();
                    } else {
                        const liveEditor = document.getElementById('live-editor');
                        if (liveEditor) {
                            liveEditor.innerHTML = '';
                            liveBlocks = [];
                            activeBlockIndex = -1;
                        }
                        if (mode === 'preview' || mode === 'split') {
                            renderPreview(currentContent);
                        }
                    }
                    requestAnimationFrame(() => {
                        scheduleMermaidRenderAfterLayout(getActiveMermaidRoots());
                    });
                },

                setSyncScroll(enabled) {
                    syncScroll = enabled;
                },

                setSwapped(swapped) {
                    isSwapped = swapped;
                    if (swapped) {
                        editorContainer.classList.add('swapped');
                    } else {
                        editorContainer.classList.remove('swapped');
                    }
                },

                setPreviewTheme(themeName, themeCSS) {
                    const scroll = captureScrollState();
                    updateCustomThemeCSS(themeCSS);
                    rehighlightCodeBlocks();
                    restoreScrollState(scroll);
                },

                setCodeBlockTheme(themeName, cdnURL, codeBlockBg, codeBlockBorder) {
                    if (codeBlockBg) {
                        updateCodeBlockChromeStyle(codeBlockBg, codeBlockBorder);
                    }
                    const scroll = captureScrollState();
                    const finish = () => {
                        rehighlightCodeBlocks();
                        restoreScrollState(scroll);
                    };

                    const existing = document.getElementById('highlight-theme');
                    if (existing && existing.href === cdnURL) {
                        finish();
                        return;
                    }

                    if (loadedCodeThemeURLs.has(cdnURL) && existing) {
                        existing.href = cdnURL;
                        finish();
                        return;
                    }

                    if (existing) existing.remove();

                    const link = document.createElement('link');
                    link.id = 'highlight-theme';
                    link.rel = 'stylesheet';
                    link.href = cdnURL;
                    link.onload = () => {
                        loadedCodeThemeURLs.add(cdnURL);
                        finish();
                    };
                    link.onerror = finish;
                    document.head.appendChild(link);
                },

                setShowLineNumbers(enabled) {
                    showCodeLineNumbers = !!enabled;
                    rehighlightCodeBlocks();
                },

                setFocusMode(active, dimLines, hideToolbar) {
                    focusModeActive = !!active;
                    focusDimLines = !!dimLines;
                    document.body.classList.toggle('editor-focus-mode', focusModeActive);
                    document.body.classList.toggle('focus-dim-lines', focusModeActive && focusDimLines);
                },

                applyAppearance(options) {
                    const scroll = captureScrollState();

                    if (typeof options.isDark === 'boolean') {
                        document.body.classList.toggle('dark', options.isDark);
                        [textarea, markdownPane, previewPane, liveEditor].forEach((el) => {
                            if (!el) return;
                            el.style.backgroundColor = 'transparent';
                            el.style.color = 'inherit';
                        });
                        rethemeAllMermaidInApp();
                    }

                    if (options.themeCSS) {
                        updateCustomThemeCSS(options.themeCSS);
                    }

                    if (options.codeBlockBg) {
                        updateCodeBlockChromeStyle(options.codeBlockBg, options.codeBlockBorder);
                    }

                    if (options.showLineNumbers !== undefined) {
                        showCodeLineNumbers = !!options.showLineNumbers;
                    }

                    if (options.focusActive !== undefined) {
                        this.setFocusMode(options.focusActive, options.focusDimLines, options.focusHideToolbar);
                    }

                    const finish = () => {
                        rehighlightCodeBlocks();
                        restoreScrollState(scroll);
                    };

                    const url = options.codeThemeURL;
                    if (!url) {
                        finish();
                        return;
                    }

                    const existing = document.getElementById('highlight-theme');
                    if (existing && existing.href === url) {
                        finish();
                        return;
                    }

                    if (loadedCodeThemeURLs.has(url) && existing) {
                        existing.href = url;
                        finish();
                        return;
                    }

                    if (existing) existing.remove();

                    const link = document.createElement('link');
                    link.id = 'highlight-theme';
                    link.rel = 'stylesheet';
                    link.href = url;
                    link.onload = () => {
                        loadedCodeThemeURLs.add(url);
                        finish();
                    };
                    link.onerror = finish;
                    document.head.appendChild(link);
                },

                setDocumentPath(path) {
                    documentBasePath = path || null;
                    renderPreview(currentContent);
                    if (isLiveMode) {
                        initLiveEditor(currentContent);
                    }
                },
                
                insertFormatting(prefix, suffix) {
                    if (isLiveActive()) syncLiveCaretToTextarea();
                    const ta = textarea;
                    const start = ta.selectionStart;
                    const end = ta.selectionEnd;
                    const selected = ta.value.substring(start, end);
                    const replacement = prefix + (selected || 'text') + suffix;
                    ta.setRangeText(replacement, start, end, 'end');
                    ta.dispatchEvent(new Event('input'));
                    // Если не было выделения — ставим курсор между prefix и suffix
                    if (start === end) {
                        const pos = start + prefix.length + (selected || 'text').length;
                        ta.setSelectionRange(start + prefix.length, pos);
                    }
                    if (isLiveMode) initLiveEditor(ta.value);
                    ta.focus();
                },

                insertAtLineStart(prefix) {
                    if (isLiveActive()) syncLiveCaretToTextarea();
                    const ta = textarea;
                    const start = ta.selectionStart;
                    const lineStart = ta.value.lastIndexOf('\n', start - 1) + 1;
                    ta.setRangeText(prefix, lineStart, lineStart, 'end');
                    ta.dispatchEvent(new Event('input'));
                    if (isLiveMode) initLiveEditor(ta.value);
                    ta.focus();
                },

                toggleList(kind) {
                    toggleMarkdownList(kind);
                },

                insertText(text) {
                    if (isLiveActive()) syncLiveCaretToTextarea();
                    const ta = textarea;
                    ta.focus();
                    let start = ta.selectionStart;
                    let end = ta.selectionEnd;
                    if (start === end && lastTextareaSelection.start !== lastTextareaSelection.end) {
                        start = lastTextareaSelection.start;
                        end = lastTextareaSelection.end;
                    }
                    ta.setRangeText(text, start, end, 'end');
                    lastTextareaSelection = {
                        start: start + text.length,
                        end: start + text.length
                    };
                    ta.dispatchEvent(new Event('input'));
                    if (isLiveActive()) {
                        initLiveEditor(ta.value);
                        if ((text || '').includes('```')) {
                            requestAnimationFrame(() => activateCodeBlockAtCursor());
                        }
                    }
                    ta.focus();
                },

                insertCodeBlock() {
                    insertMarkdownCodeFenceAtSelection();
                },

                insertLink(clipboardUrl) {
                    if (isLiveActive()) syncLiveCaretToTextarea();
                    const ta = textarea;
                    const start = ta.selectionStart;
                    const end = ta.selectionEnd;
                    const selected = ta.value.substring(start, end).trim();
                    const url = clipboardUrl || 'url';

                    let markdown;
                    if (selected.length > 0) {
                        // Есть выделение — оно становится текстом ссылки

            function plainLenFromMarkdownSource(markdown, blockType) {

            function isGFMTableRow(line) {
                const t = (line || '').trim();
                return t.startsWith('|') && t.includes('|', 1);
            }

            function isGFMTableSeparator(line) {
                const t = (line || '').trim();
                if (!t.startsWith('|')) return false;
                // Строки вида "| | |" без дефисов — это пустые ячейки, не разделитель.
                if (!/-/.test(t)) return false;

                let inner = t;
                if (inner.startsWith('|')) inner = inner.slice(1);
                if (inner.endsWith('|')) inner = inner.slice(0, -1);

                const cells = inner.split('|').map((cell) => cell.trim());
                if (!cells.length) return false;

                return cells.every((cell) => cell === '' || /^:?-{1,}:?$/.test(cell));
            }

            function lineStartOffsetInText(text, lineIndex) {
                const lines = text.split('\n');
                let offset = 0;
                for (let i = 0; i < lineIndex; i++) {
                    offset += lines[i].length + 1;
                }
                return offset;
            }

            function findTableContextAtOffset(text, offset) {
                const lines = text.split('\n');
                let char = 0;
                let currentLineIndex = -1;

                for (let i = 0; i < lines.length; i++) {
                    const lineEnd = char + lines[i].length;
                    if (offset >= char && offset <= lineEnd) {
                        currentLineIndex = i;
                        break;
                    }
                    char = lineEnd + 1;
                }

                if (currentLineIndex < 0 || !isGFMTableRow(lines[currentLineIndex])) {
                    return null;
                }

                let tableStartLine = currentLineIndex;
                let tableEndLine = currentLineIndex;
                while (tableStartLine > 0 && isGFMTableRow(lines[tableStartLine - 1])) {
                    tableStartLine--;
                }
                while (tableEndLine < lines.length - 1 && isGFMTableRow(lines[tableEndLine + 1])) {
                    tableEndLine++;
                }

                const tableLines = lines.slice(tableStartLine, tableEndLine + 1);
                const tableStart = lineStartOffsetInText(text, tableStartLine);
                const lineStart = lineStartOffsetInText(text, currentLineIndex);

                return {
                    lines,
                    tableStartLine,
                    tableEndLine,
                    tableLines,
                    tableStart,
                    currentLineIndex,
                    line: lines[currentLineIndex],
                    lineStart,
                };
            }

            function cellRangesInTableLine(line, lineStartOffset) {
                const ranges = [];
                let pipe = line.indexOf('|');
                while (pipe !== -1) {
                    const nextPipe = line.indexOf('|', pipe + 1);
                    if (nextPipe === -1) break;
                    let innerStart = pipe + 1;
                    let innerEnd = nextPipe;
                    while (innerStart < innerEnd && /\s/.test(line[innerStart])) innerStart++;
                    while (innerEnd > innerStart && /\s/.test(line[innerEnd - 1])) innerEnd--;
                    ranges.push({
                        start: lineStartOffset + innerStart,
                        end: lineStartOffset + innerEnd,
                    });
                    pipe = nextPipe;
                }
                return ranges;

            function currentCellIndexForOffset(cells, offset) {
                for (let i = 0; i < cells.length; i++) {
                    if (offset >= cells[i].start && offset <= cells[i].end) return i;

                for (let i = cells.length - 1; i >= 0; i--) {
                    if (offset > cells[i].start) return i;
                }
                return 0;

            function moveTextareaTableCell(textarea, forward) {
                const text = textarea.value;
                const offset = textarea.selectionStart;
                const ctx = findTableContextAtOffset(text, offset);
                if (!ctx) return false;

                const cells = cellRangesInTableLine(ctx.line, ctx.lineStart);
                if (!cells.length) return false;

                let cellIndex = currentCellIndexForOffset(cells, offset);
                cellIndex += forward ? 1 : -1;

                if (cellIndex >= 0 && cellIndex < cells.length) {
                    textarea.setSelectionRange(cells[cellIndex].start, cells[cellIndex].end);
                    return true;
                }

                const deltaLine = forward ? 1 : -1;
                let nextLine = ctx.currentLineIndex + deltaLine;
                while (nextLine >= ctx.tableStartLine && nextLine <= ctx.tableEndLine) {
                    const nextLineText = ctx.lines[nextLine];
                    if (isGFMTableSeparator(nextLineText)) {
                        nextLine += deltaLine;
                        continue;
                    }
                    const nextLineStart = lineStartOffsetInText(text, nextLine);
                    const nextCells = cellRangesInTableLine(nextLineText, nextLineStart);
                    if (!nextCells.length) {
                        nextLine += deltaLine;
                        continue;
                    }
                    const targetIndex = forward ? 0 : nextCells.length - 1;
                    const target = nextCells[targetIndex];
                    textarea.setSelectionRange(target.start, target.end);
                    return true;
                }

                return false;
            }

            function moveTextareaTableRow(textarea, down) {
                const text = textarea.value;
                const offset = textarea.selectionStart;
                const ctx = findTableContextAtOffset(text, offset);
                if (!ctx) return false;

                const cells = cellRangesInTableLine(ctx.line, ctx.lineStart);
                if (!cells.length) return false;

                const cellIndex = currentCellIndexForOffset(cells, offset);
                const deltaLine = down ? 1 : -1;
                let nextLine = ctx.currentLineIndex + deltaLine;

                while (nextLine >= ctx.tableStartLine && nextLine <= ctx.tableEndLine) {
                    const nextLineText = ctx.lines[nextLine];
                    if (isGFMTableSeparator(nextLineText)) {
                        nextLine += deltaLine;
                        continue;
                    }
                    const nextLineStart = lineStartOffsetInText(text, nextLine);
                    const nextCells = cellRangesInTableLine(nextLineText, nextLineStart);
                    if (nextCells.length) {
                        const target = nextCells[Math.min(cellIndex, nextCells.length - 1)];
                        textarea.setSelectionRange(target.start, target.end);
                        return true;
                    }
                    nextLine += deltaLine;
                }

                return false;

            function handleEditModeTableKeydown(e) {
                if (isLiveActive()) return false;

                const offset = textarea.selectionStart;
                const ctx = findTableContextAtOffset(textarea.value, offset);
                if (!ctx) return false;

                if (e.key === 'Tab') {
                    e.preventDefault();
                    moveTextareaTableCell(textarea, !e.shiftKey);
                    return true;
                }

                if (e.key === 'Enter' && !e.shiftKey && !e.metaKey && !e.ctrlKey && !e.altKey) {
                    e.preventDefault();
                    moveTextareaTableRow(textarea, true);
                    return true;
                }

                if (e.key === 'ArrowUp' && e.altKey) {
                    e.preventDefault();
                    moveTextareaTableRow(textarea, false);
                    return true;
                }

                if (e.key === 'ArrowDown' && e.altKey) {
                    e.preventDefault();
                    moveTextareaTableRow(textarea, true);
                    return true;
                }

                return false;
            }

            function parseGFMTableAlignmentCell(cell) {
                const c = (cell || '').trim();
                if (!/^:?-{1,}:?$/.test(c)) return 'left';
                const left = c.startsWith(':');
                const right = c.endsWith(':');
                if (left && right) return 'center';
                if (right) return 'right';
                return 'left';
            }

            function parseGFMTableSource(source) {
                const rows = [];
                let alignments = null;
                for (const line of (source || '').split('\n')) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;
                    if (isGFMTableSeparator(trimmed)) {
                        let inner = trimmed;
                        if (inner.startsWith('|')) inner = inner.slice(1);
                        if (inner.endsWith('|')) inner = inner.slice(0, -1);
                        alignments = inner.split('|').map((cell) => parseGFMTableAlignmentCell(cell.trim()));
                        continue;
                    }
                    if (!trimmed.startsWith('|')) continue;
                    let inner = trimmed;
                    if (inner.startsWith('|')) inner = inner.slice(1);
                    if (inner.endsWith('|')) inner = inner.slice(0, -1);
                    rows.push(inner.split('|').map((cell) => cell.trim()));
                }
                return { rows, alignments };
            }

            function tableCellAlignAttr(alignments, colIndex) {
                const align = alignments?.[colIndex] || 'left';
                return ` style="text-align:${align}"`;
            }

            function tableRowsToMarkdown(rows) {
                if (!rows.length) return '';
                const colCount = Math.max(1, ...rows.map(row => row.length));
                const normalize = (row) => {
                    const copy = [...row];
                    while (copy.length < colCount) copy.push('');
                    return copy;
                };
                let md = `| ${normalize(rows[0]).join(' | ')} |\n`;
                md += `| ${Array(colCount).fill('---').join(' | ')} |\n`;
                for (let i = 1; i < rows.length; i++) {
                    md += `| ${normalize(rows[i]).join(' | ')} |\n`;
                }
                return md.trimEnd();
            }

            function applyTableColumnCount(table, rows) {
                const colCount = Math.max(1, rows[0]?.length || 1);
                table.style.setProperty('--md-table-columns', String(colCount));
                table.dataset.columns = String(colCount);
            }

            const CODE_LANG_FALLBACK = [
                'plaintext', 'javascript', 'typescript', 'python', 'swift', 'bash', 'shell',
                'json', 'html', 'xml', 'css', 'sql', 'rust', 'go', 'java', 'c', 'cpp',
                'csharp', 'kotlin', 'ruby', 'php', 'yaml', 'markdown'
            ];

            function listHighlightLanguages() {
                if (window.hljs && typeof hljs.listLanguages === 'function') {
                    return hljs.listLanguages().sort();
                }
                return CODE_LANG_FALLBACK;
            }

            function parseCodeFenceSource(source) {
                const lines = (source || '').split('\n');
                const open = lines[0] || '```';
                const langMatch = open.match(/^```([\w-]*)/);
                const lang = langMatch ? (langMatch[1] || '').trim().toLowerCase() : '';
                let inner = '';
                if (lines.length > 2) {
                    inner = lines.slice(1, lines.length - 1).join('\n');
                } else if (lines.length === 2) {
                    inner = lines[1] === '```' ? '' : lines[1];
                }
                inner = dedentUniformLeadingWhitespace(inner);
                return { lang, inner };
            }

            function buildCodeFenceSource(lang, inner) {
                const fenceLang = (lang || '').trim().toLowerCase();
                const open = fenceLang ? `\`\`\`${fenceLang}` : '```';
                const cleaned = dedentUniformLeadingWhitespace(inner || '');
                return `${open}\n${cleaned}\n\`\`\``;
            }

            function measureLeadingWhitespace(line) {
                const m = (line || '').match(/^(\s*)/);
                if (!m) return 0;
                return [...m[1]].reduce((n, ch) => n + (ch === '\t' ? 4 : 1), 0);
            }

            function stripLeadingWhitespaceColumns(line, columns) {
                let remaining = columns;
                let index = 0;
                while (remaining > 0 && index < line.length) {
                    if (line[index] === '\t') {
                        remaining -= 4;
                        index++;
                    } else if (line[index] === ' ') {
                        remaining--;
                        index++;
                    } else {
                        break;
                    }
                }
                return line.slice(index);
            }

            /** Убирает одинаковый «левый мусор» (часто после бага сохранения с номерами строк). */
            function dedentUniformLeadingWhitespace(text) {
                if (!text) return '';
                const lines = text.replace(/\r\n/g, '\n').split('\n');
                const nonEmpty = lines.filter((line) => line.trim().length > 0);
                if (nonEmpty.length === 0) return text.replace(/\r\n/g, '\n');

                const indents = nonEmpty.map(measureLeadingWhitespace);
                const minIndent = Math.min(...indents);
                if (minIndent < 4) return text.replace(/\r\n/g, '\n');
                if (!indents.every((n) => n === minIndent)) return text.replace(/\r\n/g, '\n');

                return lines.map((line) => {
                    if (!line.trim()) return line;
                    return stripLeadingWhitespaceColumns(line, minIndent);
                }).join('\n');
            }

            function normalizeCodeFenceBlockSource(source) {
                const parsed = parseCodeFenceSource(source);
                const cleaned = dedentUniformLeadingWhitespace(parsed.inner);
                if (cleaned === parsed.inner) return source;
                return buildCodeFenceSource(parsed.lang, cleaned);
            }

            function readCodeFenceInner(preEl) {
                if (!preEl) return '';
                let text;
                if (preEl.classList.contains('code-fence-edit-input')
                    || preEl.classList.contains('code-fence-edit-area')) {
                    const raw = preEl.value != null ? preEl.value : (preEl.textContent || '');
                    text = raw
                        .replace(/\u00a0/g, ' ')
                        .replace(/\r\n/g, '\n')
                        .replace(/\r/g, '\n');
                } else if (preEl.isContentEditable
                    || preEl.getAttribute('contenteditable') === 'true') {
                    text = getTextFromContentEditable(preEl);
                } else {
                    const code = preEl.querySelector('code');
                    text = extractCodeText(preEl, code || preEl);
                }
                return dedentUniformLeadingWhitespace(text);
            }

            let codeFenceHighlightTimer = null;

            function clearCodeFenceHighlightTimer() {
                if (codeFenceHighlightTimer) {
                    clearTimeout(codeFenceHighlightTimer);
                    codeFenceHighlightTimer = null;
                }
            }

            function refreshCodeFenceLiveHighlight(block, pre) {
                if (!pre || !block) return;

                const offset = getCaretOffsetInEditable(pre);
                const text = getTextFromContentEditable(pre);
                const lang = block._codeFenceLang != null
                    ? block._codeFenceLang
                    : parseCodeFenceSource(block.source).lang;

                block.source = buildCodeFenceSource(lang, text);

                pre.querySelector('.code-fence-placeholder')?.remove();
                pre.classList.toggle('is-empty', !text.trim());

                let code = pre.querySelector('code');
                if (!code) {
                    code = document.createElement('code');
                }

                paintCodeFenceHighlight(pre, code, lang, text);

                pre.setAttribute('contenteditable', 'true');
                pre.setAttribute('spellcheck', 'false');
                attachPlainTextTyping(pre);

                requestAnimationFrame(() => {
                    placeCaretAtTextOffset(pre, offset);
                });
            }

            function scheduleCodeFenceLiveHighlight(block, pre) {
                clearCodeFenceHighlightTimer();
                codeFenceHighlightTimer = setTimeout(() => {
                    codeFenceHighlightTimer = null;
                    refreshCodeFenceLiveHighlight(block, pre);
                }, 100);
            }

            function softUpdateCodeFenceHighlight(preEl, lang, text) {
                const raw = (text || '')
                    .replace(/\u00a0/g, ' ')
                    .replace(/\r\n/g, '\n')
                    .replace(/\r/g, '\n');
                const codeEl = preEl?.querySelector('code');
                if (!codeEl || !window.hljs) return false;

                const lineEls = [...preEl.querySelectorAll('.hljs-ln-line')];
                if (lineEls.length) {
                    const lines = raw.split('\n');
                    if (lineEls.length !== lines.length) return false;
                    lineEls.forEach((lineEl, i) => {
                        lineEl.textContent = lines[i];
                    });
                    return true;
                }

                codeEl.textContent = raw;
                codeEl.removeAttribute('data-highlighted');
                if (lang) {
                    codeEl.className = `language-${lang}`;
                    codeEl.setAttribute('data-language', lang);
                }

                try {
                    hljs.highlightElement(codeEl);
                } catch (e) {
                    console.warn('hljs.highlightElement failed', e);
                    return false;
                }
                return true;
            }

            function syncCodeFenceStackHeights(editArea, highlightPre) {
                const contentHeight = Math.max(
                    highlightPre.scrollHeight,
                    editArea.scrollHeight,
                    highlightPre.offsetHeight,
                    72
                );
                highlightPre.style.minHeight = `${contentHeight}px`;
                editArea.style.height = `${contentHeight}px`;
            }

            function paintCodeFenceHighlight(preEl, codeEl, lang, text) {
                const raw = (text || '')
                    .replace(/\u00a0/g, ' ')
                    .replace(/\r\n/g, '\n')
                    .replace(/\r/g, '\n');

                preEl.innerHTML = '';
                preEl.className = 'hljs';
                codeEl.textContent = raw;
                codeEl.removeAttribute('data-highlighted');

                if (lang) {
                    codeEl.className = `language-${lang}`;
                    codeEl.setAttribute('data-language', lang);
                } else {
                    codeEl.className = '';
                    codeEl.removeAttribute('data-language');
                }

                preEl.appendChild(codeEl);
                preEl.classList.toggle('is-empty', !raw.trim());

                if (!raw.trim() || !window.hljs) return;

                try {
                    hljs.highlightElement(codeEl);
                } catch (e) {
                    console.warn('hljs.highlightElement failed', e);
                }

                preEl.classList.remove('has-line-numbers');
                const skipLineNumbers = preEl.closest('.code-fence-wrap.is-editing');
                if (showCodeLineNumbers && !skipLineNumbers && typeof hljs.lineNumbersBlock === 'function') {
                    try {
                        hljs.lineNumbersBlock(codeEl);
                        preEl.classList.add('has-line-numbers');
                    } catch (e) {
                        console.warn('lineNumbersBlock failed', e);
                    }
                }
            }

            function getFirstTextNodeInElement(el) {
                if (!el) return null;
                const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
                return walker.nextNode();
            }

            function measureCodeColumnOffset(pre) {
                const codeCell = pre.querySelector('td.hljs-ln-code');
                if (!codeCell) return null;
                const preRect = pre.getBoundingClientRect();
                const textNode = getFirstTextNodeInElement(codeCell.querySelector('.hljs-ln-line') || codeCell);
                if (textNode) {
                    const range = document.createRange();
                    try {
                        range.setStart(textNode, 0);
                        range.setEnd(textNode, 0);
                        const caretRect = range.getBoundingClientRect();
                        return Math.max(0, Math.round(caretRect.left - preRect.left));
                    } catch (err) {
                        /* fall through */
                    }
                }
                return Math.max(0, Math.round(codeCell.getBoundingClientRect().left - preRect.left));
            }

            function measureHighlightTextInsets(pre) {
                const preStyle = window.getComputedStyle(pre);
