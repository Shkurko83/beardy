                if (!table) return;
                const rows = [];
                table.querySelectorAll('tr').forEach((tr) => {
                    const cells = [];
                    tr.querySelectorAll('th, td').forEach((cell) => {
                        cells.push(readTableCellText(cell));
                    });
                    if (cells.length) rows.push(cells);
                });
                block.source = tableRowsToMarkdown(rows);
                syncLiveContentToModel();
            }

            const scheduleTableSync = debounce((index) => {
                syncTableBlockFromDOM(index);
            }, 200);

            function setupTableBlock(el, block, index, readOnly) {
                const { rows, alignments } = parseGFMTableSource(block.source);
                const table = document.createElement('table');
                table.className = 'md-table';
                const thead = document.createElement('thead');
                const tbody = document.createElement('tbody');

                rows.forEach((row, rowIndex) => {
                    const tr = document.createElement('tr');
                    row.forEach((cellText, colIndex) => {
                        const cell = document.createElement(rowIndex === 0 ? 'th' : 'td');
                        setTableCellContent(cell, cellText, alignments, colIndex);
                        if (!readOnly) {
                            cell.contentEditable = 'true';
                            cell.addEventListener('focus', () => {
                                lastLiveInteraction = { blockIndex: index, offsetInBlock: null };
                                if (isTableCellVisuallyEmpty(cell)) {
                                    cell.textContent = '';
                                }
                            });
                            cell.addEventListener('blur', () => {
                                if (isTableCellVisuallyEmpty(cell)) {
                                    setTableCellContent(cell, '');
                                }
                            });
                        }
                        tr.appendChild(cell);
                    });
                    if (rowIndex === 0) {
                        thead.appendChild(tr);
                    } else {
                        tbody.appendChild(tr);
                    }
                });

                if (thead.childElementCount) table.appendChild(thead);
                if (tbody.childElementCount) table.appendChild(tbody);

                applyTableColumnCount(table, rows);

                el.innerHTML = '';
                const scroll = document.createElement('div');
                scroll.className = 'md-table-scroll';
                scroll.appendChild(table);
                el.appendChild(scroll);
                el.classList.add('live-block-table');

                if (readOnly) return;

                table.addEventListener('mousedown', (e) => e.stopPropagation());
                table.addEventListener('input', () => scheduleTableSync(index));

                table.addEventListener('keydown', (e) => {
                    const cell = e.target.closest('th, td');
                    if (!cell) return;
                    const allCells = [...table.querySelectorAll('th, td')];
                    const cellIndex = allCells.indexOf(cell);
                    const colCount = table.rows[0]?.cells.length || 1;

                    if (e.key === 'Tab') {
                        e.preventDefault();
                        const nextIndex = e.shiftKey ? cellIndex - 1 : cellIndex + 1;
                        if (allCells[nextIndex]) {
                            allCells[nextIndex].focus();
                        }
                        return;
                    }

                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        const rowIndex = Math.floor(cellIndex / colCount);
                        const colIndex = cellIndex % colCount;
                        const nextRow = table.rows[rowIndex + 1];
                        if (nextRow?.cells[colIndex]) {
                            nextRow.cells[colIndex].focus();
                        }
                    }
                });
            }

            // ============================================================
            // MARKDOWN LISTS (Typora-like)
            // ============================================================

            function parseListLine(line) {
                const task = (line || '').match(/^(\s*)[-*+]\s+\[([ xX])\]\s*(.*)$/);
                if (task) {
                    return {
                        kind: 'task',
                        indent: task[1],
                        checked: task[2].toLowerCase() === 'x',
                        content: task[3],
                    };
                }
                const ordered = (line || '').match(/^(\s*)(\d+)\.\s+(.*)$/);
                if (ordered) {
                    return {
                        kind: 'ordered',
                        indent: ordered[1],
                        number: parseInt(ordered[2], 10),
                        content: ordered[3],
                    };
                }
                const bullet = (line || '').match(/^(\s*)[-*+]\s+(.*)$/);
                if (bullet) {
                    return {
                        kind: 'bullet',
                        indent: bullet[1],
                        content: bullet[2],
                    };
                }
                return null;
            }

            function formatListLine(item, lineIndex) {
                const indent = item.indent || '';
                if (item.kind === 'task') {
                    const mark = item.checked ? 'x' : ' ';
                    return `${indent}- [${mark}] ${item.content || ''}`;
                }
                if (item.kind === 'ordered') {
                    const n = item.number ?? (lineIndex + 1);
                    return `${indent}${n}. ${item.content || ''}`;
                }
                return `${indent}- ${item.content || ''}`;
            }

            function markerLength(item, lineIndex) {
                return formatListLine({ ...item, content: '' }, lineIndex).length;
            }

            function enterListItemSourceEdit(body, item, itemIndex, blockIndex, caretOffsetInContent) {
                if (!body || body.dataset.sourceEdit === '1') return;
                const line = formatListLine(item, itemIndex);
                body.dataset.sourceEdit = '1';
                body.textContent = line;
                const li = body.closest('li');
                if (li) li.classList.add('is-source-edit');

                const markerLen = markerLength(item, itemIndex);
                let caret = markerLen + Math.max(0, caretOffsetInContent ?? 0);
                caret = Math.min(caret, line.length);
                requestAnimationFrame(() => {
                    body.focus();
                    placeCaretAtTextOffset(body, caret);
                });
            }

            let listSourceEditFinishing = false;

            function finishActiveListSourceEdit(exceptBody) {
                const body = document.querySelector('.list-item-body[data-source-edit="1"]');
                if (!body || body === exceptBody) return;
                const blockIndex = parseInt(body.dataset.listBlockIndex, 10);
                const itemIndex = parseInt(body.dataset.listItemIndex, 10);
                if (Number.isNaN(blockIndex) || Number.isNaN(itemIndex)) return;
                finishListItemSourceEdit(body, blockIndex, itemIndex);
            }

            function finishListItemSourceEdit(body, blockIndex, itemIndex) {
                if (!body || body.dataset.sourceEdit !== '1' || listSourceEditFinishing) return;
                const block = liveBlocks[blockIndex];
                if (!block || block.type !== 'list') return;

                listSourceEditFinishing = true;
                body.dataset.sourceEdit = '0';
                body.closest('li')?.classList.remove('is-source-edit');

                const fullText = (body.textContent || '').replace(/\u00a0/g, ' ');
                const lines = block.source.split('\n');
                lines[itemIndex] = fullText;
                block.source = lines.join('\n');

                setupListBlock(block.el, block, blockIndex, false);
                syncLiveContentToModel();
                listSourceEditFinishing = false;
            }

            function syncListSourceLineFromBody(blockIndex, itemIndex, body) {
                const block = liveBlocks[blockIndex];
                if (!block || block.type !== 'list') return;
                const lines = block.source.split('\n');
                lines[itemIndex] = (body.textContent || '').replace(/\u00a0/g, ' ');
                block.source = lines.join('\n');
                currentContent = liveBlocks.map((b) => blockToMarkdownSource(b)).join('\n');
                textarea.value = currentContent;
            }

            function listIndentDepth(indent) {
                const normalized = (indent || '').replace(/\t/g, '    ');
                return Math.floor(normalized.length / 2);
            }

            function listIndentString(depth) {
                return '  '.repeat(Math.max(0, depth));
            }

            function createListItemElement(item, itemIndex, block, blockIndex, readOnly, listKind) {
                const li = document.createElement('li');
                const isTask = listKind === 'task';
                const row = isTask ? document.createElement('div') : li;

                if (isTask) {
                    row.className = 'task-list-item-main';
                }

                if (isTask) {
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.checked = !!item.checked;
                    if (!readOnly) {
                        cb.addEventListener('mousedown', (ev) => ev.stopPropagation());
                        cb.addEventListener('change', () => {
                            syncListBlockFromDOM(blockIndex);
                        });
                    } else {
                        cb.disabled = true;
                    }
                    row.appendChild(cb);
                }

                const body = document.createElement('span');
                body.className = 'list-item-body';
                body.dataset.listBlockIndex = String(blockIndex);
                body.dataset.listItemIndex = String(itemIndex);
                if (item.content.trim()) {
                    body.innerHTML = renderInline(item.content);
                } else if (!readOnly) {
                    body.innerHTML = '<br>';
                }

                if (!readOnly) {
                    body.contentEditable = 'true';
                    attachPlainTextTyping(body);
                    body.addEventListener('mousedown', (ev) => ev.stopPropagation());
                    body.addEventListener('focus', () => {
                        if (listSourceEditFinishing || body.dataset.sourceEdit === '1') return;
                        const block = liveBlocks[blockIndex];
                        if (!block || block.type !== 'list') return;
                        const lines = block.source.split('\n');
                        const parsed = parseListLine(lines[itemIndex]);
                        if (!parsed) return;
                        let contentOffset = 0;
                        const sel = window.getSelection();
                        if (sel && sel.rangeCount && body.contains(sel.anchorNode)) {
                            contentOffset = getCaretOffsetInEditable(body);
                        }
                        enterListItemSourceEdit(body, parsed, itemIndex, blockIndex, contentOffset);
                    });
                    body.addEventListener('blur', () => {
                        if (body.dataset.sourceEdit !== '1') return;
                        requestAnimationFrame(() => {
                            if (body.dataset.sourceEdit !== '1') return;
                            if (document.activeElement === body) return;
                            finishListItemSourceEdit(body, blockIndex, itemIndex);
                        });
                    });
                    body.addEventListener('input', () => {
                        if (body.dataset.sourceEdit === '1') {
                            syncListSourceLineFromBody(blockIndex, itemIndex, body);
                            return;
                        }
                        scheduleListSync(blockIndex);
                    });
                    body.addEventListener('keydown', (ev) => {
                        if (body.dataset.sourceEdit !== '1' && ev.key === 'Backspace') {
                            const offset = getCaretOffsetInEditable(body);
                            if (offset === 0) {
                                const block = liveBlocks[blockIndex];
                                const lines = block?.source?.split('\n') || [];
                                const parsed = parseListLine(lines[itemIndex]);
                                if (parsed) {
                                    ev.preventDefault();
                                    enterListItemSourceEdit(body, parsed, itemIndex, blockIndex, 0);
                                    return;
                                }
                            }
                        }
                        if (body.dataset.sourceEdit === '1' && ev.key === 'Backspace') {
                            const fullText = (body.textContent || '').replace(/\u00a0/g, ' ');
                            const parsed = parseListLine(fullText);
                            const offset = getCaretOffsetInEditable(body);
                            if (parsed && offset <= markerLength(parsed, itemIndex) && !(parsed.content || '').length) {
                                ev.preventDefault();
                                const block = liveBlocks[blockIndex];
                                const lines = block.source.split('\n');
                                lines.splice(itemIndex, 1);
                                block.source = lines.join('\n');
                                body.dataset.sourceEdit = '0';
                                body.closest('li')?.classList.remove('is-source-edit');
                                const parts = liveBlocks.map((b, i) => (i === blockIndex ? blockToMarkdownSource(block) : blockToMarkdownSource(b)));
                                let focusBlockIndex = blockIndex;
                                let focusItemIndex = Math.max(0, itemIndex - 1);
                                let focusCaret = 9999;
                                if (block.source.trim() === '') {
                                    parts.splice(blockIndex, 0, '');
                                    focusBlockIndex = blockIndex + 1;
                                    focusItemIndex = 0;
                                    focusCaret = 0;
                                } else if (itemIndex > 0) {
                                    const prev = parseListLine(block.source.split('\n')[focusItemIndex]);
                                    focusCaret = prev ? (prev.content || '').length : 0;
                                } else {
                                    focusBlockIndex = blockIndex;
                                    focusItemIndex = 0;
                                    focusCaret = 0;
                                }
                                rebuildLiveDocumentAndFocus(parts, focusBlockIndex);
                                if (block.source.trim() !== '') {
                                    focusLiveListItemAfterRebuild(blockIndex, focusItemIndex, focusCaret);
                                }
                                syncLiveContentToModel();
                                return;
                            }
                        }
                        handleLiveListItemKeydown(ev, blockIndex, itemIndex, body);
                    });
                }

                row.appendChild(body);

                if (isTask) {
                    li.appendChild(row);
                }

                return li;
            }

            function listTagForKind(kind) {
                return kind === 'ordered' ? 'ol' : 'ul';
            }

            function buildNestedListElement(items, defaultListKind, block, blockIndex, readOnly) {
                const rootKind = defaultListKind || items[0]?.kind || 'bullet';
                const root = document.createElement(listTagForKind(rootKind));
                if (rootKind === 'task') root.className = 'task-list';

                const stack = [{ depth: 0, listEl: root, kind: rootKind }];

                items.forEach((item, itemIndex) => {
                    const depth = listIndentDepth(item.indent);
                    const itemKind = item.kind || rootKind;

                    while (stack.length > 1 && stack[stack.length - 1].depth > depth) {
                        stack.pop();
                    }

                    while (stack[stack.length - 1].depth < depth) {
                        const parent = stack[stack.length - 1];
                        let parentLi = parent.listEl.lastElementChild;
                        if (!parentLi) {
                            parentLi = createListItemElement(
                                { kind: itemKind, indent: listIndentString(parent.depth), content: '', checked: false, number: 1 },
                                itemIndex,
                                block,
                                blockIndex,
                                readOnly,
                                itemKind
                            );
                            parent.listEl.appendChild(parentLi);
                        }
                        const nested = document.createElement(listTagForKind(itemKind));
                        if (itemKind === 'task') nested.className = 'task-list';
                        parentLi.appendChild(nested);
                        stack.push({
                            depth: stack[stack.length - 1].depth + 1,
                            listEl: nested,
                            kind: itemKind,
                        });
                    }

                    const li = createListItemElement(item, itemIndex, block, blockIndex, readOnly, itemKind);
                    stack[stack.length - 1].listEl.appendChild(li);
                });

                return root;
            }

            function flattenListItemElements(listRoot) {
                const flat = [];
                function walk(listEl) {
                    [...listEl.children].forEach((li) => {
                        if (li.tagName !== 'LI') return;
                        flat.push(li);
                        const nested = li.querySelector(':scope > ul, :scope > ol');
                        if (nested) walk(nested);
                    });
                }
                walk(listRoot);
                return flat;
            }

            function serializeListElementToLines(listEl) {
                const lines = [];

                function walk(listEl, depth) {
                    const isOrdered = listEl.tagName === 'OL';
                    let order = 1;

                    [...listEl.children].forEach((li) => {
                        if (li.tagName !== 'LI') return;

                        const body = li.querySelector(':scope > .list-item-body, :scope > .task-list-item-main .list-item-body');
                        const checkbox = li.querySelector(':scope > .task-list-item-main input[type="checkbox"], :scope > input[type="checkbox"]');
                        const content = (body?.textContent || '').replace(/\u00a0/g, ' ');
                        const indent = listIndentString(depth);
                        const kind = checkbox ? 'task' : (isOrdered ? 'ordered' : 'bullet');

                        lines.push(formatListLine({
                            kind,
                            indent,
                            content,
                            checked: checkbox ? checkbox.checked : false,
                            number: order,
                        }, order - 1));

                        if (isOrdered) order += 1;

                        const nested = li.querySelector(':scope > ul, :scope > ol');
                        if (nested) walk(nested, depth + 1);
                    });
                }

                walk(listEl, 0);
                return lines;
            }

            function getLineRangeForSelection(ta) {
                const start = ta.selectionStart;
                const end = ta.selectionEnd;
                const rangeStart = ta.value.lastIndexOf('\n', Math.max(0, start - 1)) + 1;
                let rangeEnd;
                if (start === end) {
                    const lineEnd = ta.value.indexOf('\n', start);
                    rangeEnd = lineEnd === -1 ? ta.value.length : lineEnd;
                } else {
                    rangeEnd = ta.value.indexOf('\n', end);
                    if (rangeEnd === -1) rangeEnd = ta.value.length;
                }
                return { rangeStart, rangeEnd };
            }

            function toggleMarkdownList(kind) {
                const live = isLiveActive();
                if (live) syncLiveCaretToTextarea();
                const ta = textarea;
                if (!live) ta.focus();

                const { rangeStart, rangeEnd } = getLineRangeForSelection(ta);
                const selectedText = ta.value.slice(rangeStart, rangeEnd);
                const lines = selectedText.split('\n');

                const parsedLines = lines.map((line) => ({ line, parsed: parseListLine(line) }));
                const allMatchKind = parsedLines.length > 0
                    && parsedLines.every(({ parsed }) => parsed && parsed.kind === kind);

                const hasNonEmptyLine = parsedLines.some(({ line }) => line.trim() !== '');
                let orderedIndex = 0;
                const newLines = parsedLines.map(({ line, parsed }) => {
                    if (allMatchKind && parsed) {
                        return parsed.indent + parsed.content;
                    }
                    // Пустая строка: только разделитель между абзацами в многострочном выделении
                    if (line.trim() === '' && !parsed && parsedLines.length > 1 && hasNonEmptyLine) {
                        return line;
                    }
                    const indent = parsed?.indent || '';
                    const content = parsed ? parsed.content : line.trim();
                    const number = kind === 'ordered' ? (++orderedIndex) : 1;
                    return formatListLine({
                        kind,
                        indent,
                        content,
                        checked: false,
                        number,
                    }, number - 1);
                });

                const replacement = newLines.join('\n');
                ta.setRangeText(replacement, rangeStart, rangeEnd, 'end');

                if (ta.selectionStart === ta.selectionEnd) {
                    const first = parseListLine(newLines[0]);
                    if (first) {
                        const pos = rangeStart + markerLength(first, 0);
                        ta.setSelectionRange(pos, pos);
                    }
                }

                rememberTextareaSelection();

                const caretPos = ta.selectionStart;
                if (live) {
                    currentContent = ta.value;
                    scheduleLiveRebuild.cancel();
                    initLiveEditor(ta.value);
                    scheduleContentSync(ta.value);
                    const blockIdx = blockIndexAtTextareaOffset(caretPos);
                    if (liveBlocks[blockIdx]?.type === 'list') {
                        focusLiveListItemAfterRebuild(blockIdx, 0, 0);
                    }
                } else {
                    ta.dispatchEvent(new Event('input'));
                }
            }

            function toggleMarkdownBlockquote() {
                const live = isLiveActive();
                if (live) syncLiveCaretToTextarea();
                const ta = textarea;
                if (!live) ta.focus();

                const { rangeStart, rangeEnd } = getLineRangeForSelection(ta);
                const selectedText = ta.value.slice(rangeStart, rangeEnd);
                const lines = selectedText.split('\n');

                const parsedLines = lines.map((line) => ({
                    line,
                    parsed: parseBlockquoteEditingLine(line),
                }));
                const nonEmptyLines = parsedLines.filter(({ line }) => line.trim() !== '');
                const allQuoted = nonEmptyLines.length > 0
                    && nonEmptyLines.every(({ parsed }) => !!parsed);
                const hasNonEmptyLine = nonEmptyLines.length > 0;

                const newLines = parsedLines.map(({ line, parsed }) => {
                    if (line.trim() === '' && parsedLines.length > 1 && hasNonEmptyLine) {
                        return line;
                    }
                    if (allQuoted && parsed) {
                        return `${parsed.indent}${parsed.content}`;
                    }
                    if (!allQuoted && !parsed) {
                        const match = line.match(/^(\s*)(.*)$/);
                        const indent = match ? match[1] : '';
                        const content = match ? match[2] : line;
                        return `${indent}> ${content}`;
                    }
                    return line;
                });

                const replacement = newLines.join('\n');
                ta.setRangeText(replacement, rangeStart, rangeEnd, 'end');

                if (ta.selectionStart === ta.selectionEnd) {
                    const first = parseBlockquoteEditingLine(newLines[0]);
                    if (first) {
                        const pos = rangeStart + first.prefixLength;
                        ta.setSelectionRange(pos, pos);
                    }
                }

                rememberTextareaSelection();

                const caretPos = ta.selectionStart;
                if (live) {
                    currentContent = ta.value;
                    scheduleLiveRebuild.cancel();
                    initLiveEditor(ta.value);
                    scheduleContentSync(ta.value);
                    const blockIdx = blockIndexAtTextareaOffset(caretPos);
                    if (liveBlocks[blockIdx]?.type === 'blockquote') {
                        activateBlock(blockIdx, 0);
                    }
                } else {
                    ta.dispatchEvent(new Event('input'));
                }
            }

            function parseBlockquoteEditingLine(line) {
                const match = (line || '').match(/^(\s*)((?:>\s*)+)(.*)$/);
                if (!match) return null;
                return {
                    indent: match[1],
                    markers: match[2],
                    content: match[3],
                    prefixLength: match[1].length + match[2].length,
                };
            }

            function handleBlockquoteKeydown(e) {
                if (!typingPrefs.continueBlockquoteOnEnter) return false;
                if (e.key !== 'Enter' || e.shiftKey || e.metaKey || e.ctrlKey || e.altKey) return false;

                const ta = textarea;
                const pos = ta.selectionStart;
                if (pos !== ta.selectionEnd) return false;

                const lineStart = ta.value.lastIndexOf('\n', pos - 1) + 1;
                const lineEnd = ta.value.indexOf('\n', pos);
                const lineEndPos = lineEnd === -1 ? ta.value.length : lineEnd;
                const line = ta.value.slice(lineStart, lineEndPos);
                const parsed = parseBlockquoteEditingLine(line);
                if (!parsed) return false;

                e.preventDefault();
                const cursorInLine = pos - lineStart;
                const prefixLen = parsed.prefixLength;
                const textBefore = line.slice(prefixLen, cursorInLine);
                const textAfter = line.slice(cursorInLine);

                if (parsed.content.trim() === '' && cursorInLine >= prefixLen) {
                    ta.setRangeText(parsed.indent + '\n', lineStart, lineEndPos, 'end');
                    const newPos = lineStart + parsed.indent.length + 1;
                    ta.setSelectionRange(newPos, newPos);
                    rememberTextareaSelection();
                    ta.dispatchEvent(new Event('input', { bubbles: true }));
                    if (isLiveActive()) initLiveEditor(ta.value);
                    return true;
                }

                const currentLine = `${parsed.indent}${parsed.markers}${textBefore}`;
                const nextLine = `${parsed.indent}${parsed.markers}${textAfter}`;
                ta.setRangeText(currentLine + '\n' + nextLine, lineStart, lineEndPos, 'end');
                const newPos = lineStart + currentLine.length + 1 + prefixLen;
                ta.setSelectionRange(newPos, newPos);
                rememberTextareaSelection();
                ta.dispatchEvent(new Event('input', { bubbles: true }));
                if (isLiveActive()) initLiveEditor(ta.value);
                return true;
            }

            function handleListKeydown(e) {
                if (!typingPrefs.continueListsOnEnter) return false;
                if (e.key !== 'Enter' || e.shiftKey || e.metaKey || e.ctrlKey || e.altKey) return false;

                const ta = textarea;
                const pos = ta.selectionStart;
                if (pos !== ta.selectionEnd) return false;

                const lineStart = ta.value.lastIndexOf('\n', pos - 1) + 1;
                const lineEnd = ta.value.indexOf('\n', pos);
                const lineEndPos = lineEnd === -1 ? ta.value.length : lineEnd;
                const line = ta.value.slice(lineStart, lineEndPos);
                const parsed = parseListLine(line);
                if (!parsed) return false;

                const prefixLen = markerLength(parsed, 0);
                const cursorInLine = pos - lineStart;
                const contentStart = prefixLen;
                const textBefore = line.slice(contentStart, cursorInLine);
                const textAfter = line.slice(cursorInLine);

                if (parsed.content.trim() === '' && cursorInLine >= contentStart) {
                    e.preventDefault();
                    const emptyLine = parsed.indent;
                    ta.setRangeText(emptyLine + '\n', lineStart, lineEndPos, 'end');
                    const newPos = lineStart + emptyLine.length + 1;
                    ta.setSelectionRange(newPos, newPos);
                    rememberTextareaSelection();
                    ta.dispatchEvent(new Event('input'));
                    if (isLiveActive()) initLiveEditor(ta.value);
                    return true;
                }

                e.preventDefault();
                const currentLine = formatListLine({ ...parsed, content: textBefore }, parsed.number);
                const nextNumber = parsed.kind === 'ordered'
                    ? (parsed.number || 1) + 1
                    : 1;
                const nextLine = formatListLine({
                    kind: parsed.kind,
                    indent: parsed.indent,
                    content: textAfter,
                    checked: false,
                    number: nextNumber,
                }, nextNumber - 1);

                ta.setRangeText(currentLine + '\n' + nextLine, lineStart, lineEndPos, 'end');
                const newPos = lineStart + currentLine.length + 1 + markerLength({
                    kind: parsed.kind,
                    indent: parsed.indent,
                    checked: false,
                    number: nextNumber,
                }, nextNumber - 1);
                ta.setSelectionRange(newPos, newPos);
                rememberTextareaSelection();
                ta.dispatchEvent(new Event('input'));
                if (isLiveActive()) initLiveEditor(ta.value);
                return true;
            }

            function syncListBlockFromDOM(index) {
                const block = liveBlocks[index];
                if (!block || block.type !== 'list') return;

                const listEl = block.el.querySelector('ul, ol');
                if (!listEl) return;

                block.source = serializeListElementToLines(listEl).join('\n');
                syncLiveContentToModel();
            }

            const scheduleListSync = debounce((index) => {
                syncListBlockFromDOM(index);
            }, 200);

            function blockIndexAtTextareaOffset(offset) {
                let cursor = 0;
                for (let i = 0; i < liveBlocks.length; i++) {
                    const source = liveBlocks[i]?.source ?? '';
                    const blockEnd = cursor + source.length;
                    if (offset <= blockEnd) return i;
                    cursor = blockEnd + 1;
                }
                return Math.max(liveBlocks.length - 1, 0);
            }

            function focusLiveListItemAfterRebuild(blockIndex, itemIndex, caretOffset) {
                const placeCaret = () => {
                    const block = liveBlocks[blockIndex];
                    if (!block?.el || block.type !== 'list') return false;

                    const listRoot = block.el.querySelector('ul, ol');
                    if (!listRoot) return false;

                    const flatItems = flattenListItemElements(listRoot);
                    const li = flatItems[itemIndex];
                    if (!li) return false;

                    const body = li.querySelector('.list-item-body');
                    if (!body) return false;

                    if (body.innerHTML === '<br>' || body.textContent === '\u00a0') {
                        body.textContent = '';
                    }

                    body.focus();
                    placeCaretAtTextOffset(body, caretOffset ?? 0);
                    lastLiveInteraction = { blockIndex, offsetInBlock: null };
                    return true;
                };

                requestAnimationFrame(() => {
                    if (placeCaret()) return;
                    requestAnimationFrame(placeCaret);
                });
            }

            function rebuildLiveDocumentAndFocus(parts, focusBlockIndex) {
                applyLiveDocumentParts(parts, focusBlockIndex, 0);
            }

            function handleLiveListItemKeydown(e, blockIndex, itemIndex, bodyEl) {
                if (!typingPrefs.continueListsOnEnter) return;
                if (e.key !== 'Enter' || e.shiftKey) return;
                e.preventDefault();

                const block = liveBlocks[blockIndex];
                if (!block || block.type !== 'list') return;

                const lines = block.source.split('\n');
                const sel = window.getSelection();
                if (!sel || sel.rangeCount === 0) return;

                const range = sel.getRangeAt(0);
                const pre = document.createRange();
                pre.selectNodeContents(bodyEl);
                pre.setEnd(range.endContainer, range.endOffset);
                const offsetInBody = pre.toString().length;

                if (bodyEl.dataset.sourceEdit === '1') {
                    const fullText = (bodyEl.textContent || '').replace(/\u00a0/g, ' ');
                    const parsed = parseListLine(fullText);
                    if (!parsed) return;

                    const markerLen = markerLength(parsed, itemIndex);
                    const content = parsed.content || '';
                    const contentOffset = Math.max(0, Math.min(offsetInBody - markerLen, content.length));

                    if (content.trim() === '' && contentOffset <= 0) {
                        lines.splice(itemIndex, 1);
                        block.source = lines.join('\n');
                        bodyEl.dataset.sourceEdit = '0';
                        bodyEl.closest('li')?.classList.remove('is-source-edit');
                        const parts = liveBlocks.map((b, i) => (i === blockIndex ? blockToMarkdownSource(block) : blockToMarkdownSource(b)));
                        let focusBlockIndex = blockIndex;
                        if (block.source.trim() === '') {
                            parts.splice(blockIndex, 0, '');
                            focusBlockIndex = blockIndex + 1;
                        }
                        rebuildLiveDocumentAndFocus(parts, focusBlockIndex);
                        return;
                    }

                    const before = content.slice(0, contentOffset);
                    const after = content.slice(contentOffset);
                    const newItemIndex = itemIndex + 1;

                    lines[itemIndex] = formatListLine({ ...parsed, content: before }, parsed.number);
                    const nextNumber = parsed.kind === 'ordered'
                        ? (parsed.number || itemIndex + 1) + 1
                        : itemIndex + 2;
                    lines.splice(newItemIndex, 0, formatListLine({
                        kind: parsed.kind,
                        indent: parsed.indent,
                        content: after,
                        checked: false,
                        number: nextNumber,
                    }, newItemIndex));

                    block.source = lines.join('\n');
                    const parts = liveBlocks.map((b, i) => (i === blockIndex ? blockToMarkdownSource(block) : blockToMarkdownSource(b)));
                    const newText = parts.join('\n');
                    currentContent = newText;
                    textarea.value = newText;
                    scheduleLiveRebuild.cancel();
                    initLiveEditor(newText);
                    scheduleContentSync(newText);
                    focusLiveListItemAfterRebuild(blockIndex, newItemIndex, 0);
                    return;
                }

                const parsed = parseListLine(lines[itemIndex]);
                if (!parsed) return;

                const text = (bodyEl.textContent || '').replace(/\u00a0/g, ' ');

                if (text.trim() === '') {
                    lines.splice(itemIndex, 1);
                    block.source = lines.join('\n');

                    const parts = [];
                    let focusBlockIndex = blockIndex;

                    for (let i = 0; i < liveBlocks.length; i++) {
                        if (i !== blockIndex) {
                            parts.push(blockToMarkdownSource(liveBlocks[i]));
                            continue;
                        }
                        if (block.source.trim() === '') {
                            parts.push('');
                            focusBlockIndex = parts.length - 1;
                        } else {
                            parts.push(block.source);
                            parts.push('');
                            focusBlockIndex = blockIndex + 1;
                        }
                    }

                    rebuildLiveDocumentAndFocus(parts, focusBlockIndex);
                    return;
                }

                const before = text.slice(0, offsetInBody);
                const after = text.slice(offsetInBody);
                const newItemIndex = itemIndex + 1;

                lines[itemIndex] = formatListLine({ ...parsed, content: before }, parsed.number);
                const nextNumber = parsed.kind === 'ordered'
                    ? (parsed.number || itemIndex + 1) + 1
                    : itemIndex + 2;
                lines.splice(newItemIndex, 0, formatListLine({
                    kind: parsed.kind,
                    indent: parsed.indent,
                    content: after,
                    checked: false,
                    number: nextNumber,
                }, newItemIndex));

                block.source = lines.join('\n');
                const parts = liveBlocks.map((b, i) => (i === blockIndex ? blockToMarkdownSource(block) : blockToMarkdownSource(b)));
                const newText = parts.join('\n');
                currentContent = newText;
                textarea.value = newText;
                scheduleLiveRebuild.cancel();
                initLiveEditor(newText);
                scheduleContentSync(newText);
                focusLiveListItemAfterRebuild(blockIndex, newItemIndex, 0);
            }

            function setupListBlock(el, block, index, readOnly) {
                const lines = block.source.split('\n');
                const items = lines.map((line, i) => parseListLine(line)).filter(Boolean);
                if (!items.length) {
                    el.innerHTML = '<br>';
                    return;
                }

                const listKind = block.listKind || items[0].kind;
                const list = buildNestedListElement(items, listKind, block, index, readOnly);

                el.innerHTML = '';
                el.appendChild(list);
            }

            const HTML_BLOCK_CONTAINER_TAGS = new Set([
                'details', 'div', 'section', 'article', 'aside', 'header', 'footer',
                'figure', 'main', 'nav', 'center',
            ]);

            const HTML_ALLOWED_TAGS = new Set([
                ...HTML_BLOCK_CONTAINER_TAGS,
                'summary', 'figcaption', 'span', 'p', 'br', 'hr', 'mark', 'sub', 'sup',
                'kbd', 'abbr', 'strong', 'em', 'del', 'code', 'ul', 'ol', 'li', 'a', 'img',
            ]);

            function isAllowedHTMLTag(tag) {
                const m = (tag || '').match(/^<\/?([a-z][a-z0-9]*)\b/i);
                if (!m) return false;
                if (!HTML_ALLOWED_TAGS.has(m[1].toLowerCase())) return false;
                return !/javascript:|on\w+\s*=/i.test(tag);
            }

            function sanitizeHTMLTag(tag) {
                if (!isAllowedHTMLTag(tag)) {
                    return (tag || '')
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                }
                if ((tag || '').match(/^<img\b/i)) {
                    return tag.replace(/\ssrc=(["'])(.*?)\1/i, (_, quote, src) => {
                        return ` src=${quote}${resolveImageSrc(src)}${quote}`;
                    });
                }
                return tag.replace(/\s+on\w+\s*=\s*("[^"]*"|'([^']*)'|[^\s>]+)/gi, '');
            }

            function tryParseHTMLBlock(rawLines, startIndex) {
                const trimmed = rawLines[startIndex].trim();
                if (/^<br\s*\/?>$/i.test(trimmed)) {
                    return { consumed: 1, source: trimmed };
                }

                const open = trimmed.match(/^<([a-z][a-z0-9]*)\b/i);
                if (!open) return null;
                const tag = open[1].toLowerCase();
                if (!HTML_BLOCK_CONTAINER_TAGS.has(tag)) return null;

                const closeRe = new RegExp(`</${tag}\\s*>`, 'i');
                const lines = [rawLines[startIndex]];
                let i = startIndex;
                if (closeRe.test(trimmed)) {
                    return { consumed: 1, source: lines.join('\n') };
                }

                i++;
                while (i < rawLines.length) {
                    lines.push(rawLines[i]);
                    if (closeRe.test(rawLines[i].trim())) {
                        i++;
                        break;
                    }
                    i++;
                }
                return { consumed: i - startIndex, source: lines.join('\n') };
            }

            function shouldCoalesceHTMLBlock(block) {
                if (!block || block.type !== 'p') return false;
                const trimmed = (block.source || '').trim();
                return /^<(details|div|section|article|aside|header|footer|figure|main|nav|center|br)\b/i.test(trimmed);
            }

            function coalesceHTMLBlocks(blocks) {
                const out = [];
                let i = 0;

                while (i < blocks.length) {
                    if (!shouldCoalesceHTMLBlock(blocks[i])) {
                        out.push(blocks[i]);
                        i++;
                        continue;
                    }

                    const firstTrimmed = blocks[i].source.trim();
                    const open = firstTrimmed.match(/^<([a-z][a-z0-9]*)\b/i);
                    if (!open) {
                        out.push(blocks[i]);
                        i++;
                        continue;
                    }

                    const tag = open[1].toLowerCase();
                    if (/^<br\s*\/?>$/i.test(firstTrimmed)) {
                        out.push({ type: 'html', source: firstTrimmed });
                        i++;
                        continue;
                    }

                    const closeRe = new RegExp(`</${tag}\\s*>`, 'i');
                    const lines = [];
                    let j = i;

                    while (j < blocks.length) {
                        if (blocks[j].type === 'empty') {
                            lines.push('');
                            j++;
                            continue;
                        }
                        if (blocks[j].type !== 'p') break;
                        lines.push(blocks[j].source);
                        if (closeRe.test((blocks[j].source || '').trim())) {
                            j++;
                            break;
                        }
                        j++;
                    }

                    out.push({ type: 'html', source: lines.join('\n') });
                    i = j;
                }

                return out;
            }

            function renderHTMLBlockTextSegment(text) {
                const lines = (text || '').split('\n');
                const parts = [];
                let i = 0;

                while (i < lines.length) {
                    while (i < lines.length && !lines[i].trim()) i++;
                    if (i >= lines.length) break;

                    if (parseListLine(lines[i])) {
                        const listLines = [];
                        while (i < lines.length && parseListLine(lines[i])) {
                            listLines.push(lines[i]);
                            i++;
                        }
                        parts.push(renderListHTMLFromSourceLines(listLines));
                        continue;
                    }

                    const paraLines = [];
                    while (i < lines.length) {
                        const line = lines[i];
                        if (!line.trim()) break;
                        if (parseListLine(line)) break;
                        paraLines.push(line.trim());
                        i++;
                    }
                    if (paraLines.length) {
                        parts.push(`<p>${paraLines.map((line) => renderInline(line)).join('<br>')}</p>`);
                    }
                }

                return parts.join('\n');
            }

            function protectInlineCodeInHTMLSource(source) {
                const placeholders = [];
                const protectedSource = (source || '').replace(/`([^`\n]+)`/g, (match) => {
                    placeholders.push(match);
                    return `\x00CODE${placeholders.length - 1}\x00`;
                });
                return { protectedSource, placeholders };
            }

            function restoreInlineCodePlaceholders(html, placeholders) {
                if (!placeholders.length) return html;
                return html.replace(/\x00CODE(\d+)\x00/g, (_, index) => {
                    const raw = placeholders[+index] || '';
                    return renderInline(raw);
                });
            }

            function renderHTMLBlockContentCustom(source) {
                const { protectedSource, placeholders } = protectInlineCodeInHTMLSource(source);
                const tagRe = /<\/?[a-z][a-z0-9]*\b[^>]*>|<br\s*\/?>/gi;
                let html = '';
                let lastIndex = 0;
                let match;

                while ((match = tagRe.exec(protectedSource)) !== null) {
                    const textBefore = protectedSource.slice(lastIndex, match.index);
                    if (textBefore) {
                        html += renderHTMLBlockTextSegment(textBefore);
                    }
                    html += sanitizeHTMLTag(match[0]);
                    lastIndex = tagRe.lastIndex;
                }

                const rest = protectedSource.slice(lastIndex);
                if (rest) html += renderHTMLBlockTextSegment(rest);
                return restoreInlineCodePlaceholders(html, placeholders);
            }

            function renderHTMLBlockContent(source) {
                if (typeof marked !== 'undefined' && typeof marked.parse === 'function') {
                    try {
                        const parsed = marked.parse(source || '');
                        if (typeof parsed === 'string' && parsed.trim()) {
                            const wrapper = document.createElement('div');
                            wrapper.innerHTML = parsed;
                            rewriteImagesInContainer(wrapper);
                            return wrapper.innerHTML;
                        }
                    } catch (err) {
                        console.warn('marked HTML block render failed:', err);
                    }
                }
                return renderHTMLBlockContentCustom(source || '');
            }

            function parseMarkdownBlocks(text, lineMap) {
                const rawLines = (text || '').split('\n');
                const blocks = [];
                let i = 0;
                const sourceLineFor = (parseIndex) => (
                    lineMap && lineMap[parseIndex] != null ? lineMap[parseIndex] : parseIndex
                );

                while (i < rawLines.length) {
                    const line = rawLines[i];
                    const sourceLine = sourceLineFor(i);

                    if (line.trim() === '') {
                        blocks.push({ type: 'empty', source: '', sourceLine });
                        i++;
                        continue;
                    }

                    if (isLinkReferenceDefinitionLine(line)) {
                        const entry = consumeReferenceDefinitionLines(rawLines, i);
                        if (entry) {
                            applyLinkReferenceEntry(linkReferenceMap, entry);
                            i += entry.consumed;
                            continue;
                        }
                    }

                    const listParsed = parseListLine(line);
                    if (listParsed) {
                        const listLines = [line];
                        const listKind = listParsed.kind;
                        i++;
                        while (i < rawLines.length) {
                            const next = parseListLine(rawLines[i]);
                            if (!next) break;
                            listLines.push(rawLines[i]);
                            i++;
                        }
                        blocks.push({
                            type: 'list',
                            listKind,
                            source: listLines.join('\n'),
                            sourceLine,
                        });
                        continue;
                    }

                    if (line.trim().startsWith('```')) {
                        let fenceLines = [line];
                        i++;
                        while (i < rawLines.length && !rawLines[i].trim().startsWith('```')) {
                            fenceLines.push(rawLines[i]);
                            i++;
                        }
                        if (i < rawLines.length) {
                            fenceLines.push(rawLines[i]);
                            i++;
                        }
                        const fenceSource = fenceLines.join('\n');
                        const fenceLang = (fenceLines[0] || '').trim().match(/^```+([\w-]*)/);
                        const lang = fenceLang ? (fenceLang[1] || '').trim().toLowerCase() : '';
                        if (lang === 'mermaid') {
                            blocks.push({ type: 'mermaid', source: fenceSource, sourceLine });
                        } else {
                            blocks.push({ type: 'code-fence', source: fenceSource, sourceLine });
                        }
                        continue;
                    }

                    const hMatch = line.match(/^(#{1,6})\s+(.+)/);
                    if (hMatch) {
                        blocks.push({ type: `h${hMatch[1].length}`, source: line, sourceLine });
                        i++;
                        continue;
                    }

                    if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(line.trim())) {
                        blocks.push({ type: 'hr', source: line, sourceLine });
                        i++;
                        continue;
                    }

                    if (line.startsWith('>')) {
                        const quoteLines = [line];
                        i++;
                        while (i < rawLines.length && rawLines[i].startsWith('>')) {
                            quoteLines.push(rawLines[i]);
                            i++;
                        }
                        blocks.push({ type: 'blockquote', source: quoteLines.join('\n'), sourceLine });
                        continue;
                    }

                    if (isGFMTableRow(line)) {
                        const tableLines = [];
                        while (i < rawLines.length && isGFMTableRow(rawLines[i])) {
                            tableLines.push(rawLines[i]);
                            i++;
                        }
                        blocks.push({ type: 'table', source: tableLines.join('\n'), sourceLine });
                        continue;
                    }

                    const trimmed = line.trim();
                    if (/^<img\s/i.test(trimmed) || /^!\[[^\]]*\]\([^)]+\)/.test(trimmed)) {
                        blocks.push({ type: 'image', source: line, sourceLine });
                        i++;
                        continue;
                    }

                    const htmlBlock = tryParseHTMLBlock(rawLines, i);
                    if (htmlBlock) {
                        blocks.push({ type: 'html', source: htmlBlock.source, sourceLine });
                        i += htmlBlock.consumed;
                        continue;
                    }

                    if (trimmed === '$$') {
                        const mathLines = [];
                        i++;
                        while (i < rawLines.length && rawLines[i].trim() !== '$$') {
                            mathLines.push(rawLines[i]);
                            i++;
                        }
                        if (i < rawLines.length) i++;
                        blocks.push({ type: 'math', source: mathLines.join('\n'), sourceLine });
                        continue;
                    }

                    if (trimmed.startsWith('$$') && trimmed.endsWith('$$') && trimmed.length > 4) {
                        blocks.push({ type: 'math', source: trimmed.slice(2, -2).trim(), sourceLine });
                        i++;
                        continue;
                    }

                    if (isLikelyDisplayMathLine(line)) {
                        const collected = collectDisplayMathBlock(rawLines, i);
                        if (collected.latex.trim()) {
                            blocks.push({ type: 'math', source: collected.latex.trim(), sourceLine });
                            i = collected.nextIndex;
                            continue;
                        }
                    }

                    blocks.push({ type: 'p', source: line, sourceLine });
                    i++;
                }

                return blocks;
            }

            function detectBlockFromSource(source) {
                const text = source || '';

                if (text.trim() === '') {
                    return { type: 'empty', source: '' };
                }

                if (text.trim().startsWith('```')) {
                    const { lang } = parseCodeFenceSource(text);
                    if (lang === 'mermaid') {
                        return { type: 'mermaid', source: text };
                    }
                    return { type: 'code-fence', source: text };
                }

                const hMatch = text.match(/^(#{1,6})\s+(.+)/);
                if (hMatch) {
                    return { type: `h${hMatch[1].length}`, source: text };
                }

                if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(text.trim())) {
                    return { type: 'hr', source: text };
                }

                if (text.startsWith('>')) {
                    return { type: 'blockquote', source: text };
                }

                const firstLine = text.split('\n')[0] || '';
                if (isGFMTableRow(firstLine)) {
                    return { type: 'table', source: text };
                }

                const trimmed = text.trim();
                if (/^<img\s/i.test(trimmed) || /^!\[[^\]]*\]\([^)]+\)/.test(trimmed)) {
                    return { type: 'image', source: text };
                }

                const lines = text.split('\n');
                const htmlBlock = tryParseHTMLBlock(lines, 0);
                if (htmlBlock && htmlBlock.consumed === lines.length) {
                    return { type: 'html', source: text };
                }

                const trimmedMath = text.trim();
                if (trimmedMath.startsWith('$$') && trimmedMath.endsWith('$$') && trimmedMath.length > 4) {
                    return { type: 'math', source: trimmedMath.slice(2, -2).trim() };
                }

                const mathLines = text.split('\n').map((l) => l.trim()).filter(Boolean);
                if (mathLines.length && mathLines.every(isLikelyDisplayMathLine)) {
                    return { type: 'math', source: mathLines.join('\n') };
                }

                const firstListLine = text.split('\n')[0] || '';
                const listInfo = parseListLine(firstListLine);
                if (listInfo) {
                    return { type: 'list', listKind: listInfo.kind, source: text };
                }

                return { type: 'p', source: text };
            }

            function isMathAvailable() {
                return typeof katex !== 'undefined' && typeof katex.renderToString === 'function';
            }

            function renderLatexToHtml(latex, displayMode) {
                if (!isMathAvailable()) return null;
                try {
                    return katex.renderToString(latex, {
                        displayMode: !!displayMode,
                        throwOnError: false,
                        strict: 'ignore',
                        trust: true,
                    });
                } catch (err) {
                    console.warn('KaTeX render failed:', err);
                    return null;
                }
            }

            function renderMathBlock(latex) {
                const trimmed = (latex || '').trim();
                if (!trimmed) return '<br>';
                const html = renderLatexToHtml(trimmed, true);
                if (html) return `<div class="math-display">${html}</div>`;
                return `<pre class="math-fallback">${escapeInlineText(trimmed)}</pre>`;
            }

            function applyMathToText(text) {
                const mathPlaceholders = [];
                const codePlaceholders = [];
                let s = text || '';

                s = s.replace(/`([^`]+)`/g, (match) => {
                    codePlaceholders.push(match);
                    return `\x00MATHCODE${codePlaceholders.length - 1}\x00`;
                });

                s = s.replace(/\$\$([\s\S]+?)\$\$/g, (match, latex) => {
                    const html = renderLatexToHtml(latex, true);
                    if (!html) return match;
                    mathPlaceholders.push(`<span class="math-display math-inline-block">${html}</span>`);
                    return `\x00MATH${mathPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/(^|[^\\$])\$(?!\$)((?:\\.|[^$\n\\])+?)\$(?!\$)/g, (match, prefix, latex) => {
                    const html = renderLatexToHtml(latex, false);
                    if (!html) return match;
                    mathPlaceholders.push(`<span class="math-inline">${html}</span>`);
                    return `${prefix}\x00MATH${mathPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/\\\(([\s\S]+?)\\\)/g, (match, latex) => {
                    const html = renderLatexToHtml(latex, false);
                    if (!html) return match;
                    mathPlaceholders.push(`<span class="math-inline">${html}</span>`);
                    return `\x00MATH${mathPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/\\\[([\s\S]+?)\\\]/g, (match, latex) => {
                    const html = renderLatexToHtml(latex, true);
                    if (!html) return match;
                    mathPlaceholders.push(`<span class="math-display math-inline-block">${html}</span>`);
                    return `\x00MATH${mathPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/\x00MATHCODE(\d+)\x00/g, (_, index) => codePlaceholders[+index]);

                return { text: s, mathPlaceholders };
            }

            function restoreMathPlaceholders(text, mathPlaceholders) {
                if (!mathPlaceholders.length) return text;
                return text.replace(/\x00MATH(\d+)\x00/g, (_, index) => mathPlaceholders[+index] || '');
            }

            function renderInline(text) {
                ensureLinkReferenceMap();

                const imgPlaceholders = [];
                const mdImgPlaceholders = [];
                const inlineHtmlPlaceholders = [];
                const linkPlaceholders = [];

                const mathPrepared = applyMathToText(text || '');
                let s = mathPrepared.text;

                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) => {
                    mdImgPlaceholders.push(buildResolvedImageTag(alt, src));
                    return `\x00MDIMG${mdImgPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/\[\^([^\]]+)\]/g, (match, id) => {
                    const trimmed = id.trim();
                    const slug = footnoteSlug(trimmed);
                    const escaped = trimmed
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                    inlineHtmlPlaceholders.push(`<sup class="footnote-ref"><a href="#fn-${slug}" id="fnref-${slug}">${escaped}</a></sup>`);
                    return `\x00HTML${inlineHtmlPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/<img\s[^>]*>/gi, (match) => {
                    const resolved = match.replace(/\ssrc=(["'])(.*?)\1/i, (_, quote, src) => {
                        return ` src=${quote}${resolveImageSrc(src)}${quote}`;
                    });
                    imgPlaceholders.push(resolved);
                    return `\x00IMG${imgPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/<br\s*\/?>/gi, () => {
                    inlineHtmlPlaceholders.push('<br>');
                    return `\x00HTML${inlineHtmlPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/<(\/?)(sub|sup|mark|kbd|var|abbr|span|strong|em|del|code)(\s[^>]*)?>/gi, (match) => {
                    if (!isAllowedHTMLTag(match)) return match;
                    inlineHtmlPlaceholders.push(sanitizeHTMLTag(match));
                    return `\x00HTML${inlineHtmlPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/<((?:https?:\/\/)[^\s<>]+)>/gi, (_, url) => {
                    linkPlaceholders.push(buildAnchorTag(url, url, ''));
                    return `\x00LINK${linkPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/<([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,})>/gi, (_, email) => {
                    linkPlaceholders.push(buildAnchorTag(`mailto:${email}`, email, ''));
                    return `\x00LINK${linkPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/\[([^\]]+)\]\[([^\]]*)\]/g, (match, label, id) => {
                    const key = (id.trim() || label.trim()).toLowerCase();
                    const ref = linkReferenceMap[key];
                    if (!ref || !ref.url) return match;
                    linkPlaceholders.push(buildAnchorTag(ref.url, label, ref.title || ''));
                    return `\x00LINK${linkPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, label, targetRaw) => {
                    const { url, title } = parseLinkTarget(targetRaw);
                    if (!url) return match;
                    linkPlaceholders.push(buildAnchorTag(url, label, title));
                    return `\x00LINK${linkPlaceholders.length - 1}\x00`;
                });

                s = s
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');

                s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
                s = s.replace(/\*(?!\*)(.+?)\*(?!\*)/g, '<em>$1</em>');
                s = s.replace(/_(?!_)(.+?)_(?!_)/g, '<em>$1</em>');
                s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');
                s = s.replace(/`([^`]+)`/g, '<code>$1</code>');

                s = s.replace(/\x00LINK(\d+)\x00/g, (_, i) => linkPlaceholders[+i]);
                s = s.replace(/\x00MDIMG(\d+)\x00/g, (_, i) => mdImgPlaceholders[+i]);
                s = s.replace(/\x00IMG(\d+)\x00/g, (_, i) => imgPlaceholders[+i]);
                s = s.replace(/\x00HTML(\d+)\x00/g, (_, i) => inlineHtmlPlaceholders[+i]);

                return restoreMathPlaceholders(s, mathPrepared.mathPlaceholders);
            }


            function parseBlockquoteLine(line) {
                const m = (line || '').match(/^((?:>\s*)+)(.*)$/);
                if (!m) return { depth: 1, content: line || '' };
                return {
                    depth: (m[1].match(/>/g) || []).length,
                    content: m[2],
                };
            }

            function renderListHTMLFromSourceLines(listLines) {
                const items = listLines
                    .map((line) => parseListLine(line))
                    .filter(Boolean);
                if (!items.length) return '';
                const list = buildNestedListElement(items, items[0].kind, { type: 'list' }, -1, true);
                return list.outerHTML;
            }

            function renderBlockquoteSegment(segmentLines) {
                let i = 0;
                const parts = [];

                while (i < segmentLines.length) {
                    const content = segmentLines[i].content;
                    if (parseListLine(content)) {
                        const listSourceLines = [];
                        while (i < segmentLines.length && parseListLine(segmentLines[i].content)) {
                            listSourceLines.push(segmentLines[i].content);
                            i++;
                        }
                        parts.push(renderListHTMLFromSourceLines(listSourceLines));
                        continue;
                    }

                    if (!content.trim()) {
                        parts.push('<br>');
                        i++;
                        continue;
                    }

                    const paragraphLines = [];
                    while (i < segmentLines.length) {
                        const lineContent = segmentLines[i].content;
                        if (!lineContent.trim()) break;
                        if (parseListLine(lineContent)) break;
                        paragraphLines.push(lineContent);
                        i++;
                    }
                    parts.push(paragraphLines.map((line) => renderInline(line)).join('<br>'));
                }

                return parts.join('');
            }

            function renderBlockquoteHTML(source) {
                const parsed = (source || '').split('\n').map(parseBlockquoteLine);
                let html = '';
                let openDepth = 0;
                let i = 0;

                function closeToDepth(targetDepth) {
                    while (openDepth > targetDepth) {
                        if (openDepth > 1) html += '</blockquote>';
                        openDepth--;
                    }
                }

                function openToDepth(targetDepth) {
                    while (openDepth < targetDepth) {
                        if (openDepth >= 1) html += '<blockquote class="bq-nested">';
                        openDepth++;
                    }
                }

                while (i < parsed.length) {
                    const depth = parsed[i].depth;
                    closeToDepth(depth);
                    openToDepth(depth);

                    const segmentLines = [];
                    while (i < parsed.length && parsed[i].depth === depth) {
                        segmentLines.push(parsed[i]);
                        i++;
                    }
                    html += renderBlockquoteSegment(segmentLines);
                }

                closeToDepth(0);
                return html;
            }

            function renderBlock(block) {
                if (block.type === 'empty') return '<br>';
                if (block.type === 'hr') return '';

                if (block.type === 'image') {
                    const trimmed = block.source.trim();
                    if (trimmed.startsWith('<img')) {
                        return trimmed.replace(/\ssrc=(["'])(.*?)\1/i, (_, quote, src) => {
                            return ` src=${quote}${resolveImageSrc(src)}${quote}`;
                        });
                    }
                    return renderInline(trimmed);
                }

                if (block.type === 'code-fence') {
                    return '';
                }

                if (block.type === 'table') {
                    const { rows, alignments } = parseGFMTableSource(block.source);
                    return renderTableHTMLFromRows(rows, alignments);
                }

                if (block.type === 'list') {
                    return '';
                }

                if (block.type.startsWith('h')) {
                    const textMatch = block.source.match(/^#{1,6}\s+(.+)/);
                    return textMatch ? renderInline(textMatch[1]) : renderInline(block.source);
                }

                if (block.type === 'blockquote') {
                    return renderBlockquoteHTML(block.source);
                }

                if (block.type === 'html') {
                    return renderHTMLBlockContent(block.source);
                }

                if (block.type === 'math') {
                    return renderMathBlock(block.source);
                }

                if (block.type === 'mermaid') {
                    const { inner } = parseCodeFenceSource(block.source);
                    if (!inner.trim()) return '<div class="mermaid-diagram is-empty"><div class="mermaid-placeholder">Empty diagram</div></div>';
                    const src = inner.trim();
                    return `<div class="mermaid mermaid-diagram" data-mermaid-source="${escapeInlineText(src)}" data-mermaid-pending="1">${escapeInlineText(src)}</div>`;
                }

                const trimmedSource = (block.source || '').trim();
                if (block.type === 'p' && /^<[a-z][a-z0-9]*\b/i.test(trimmedSource)) {
                    const lines = block.source.split('\n');
                    const htmlBlock = tryParseHTMLBlock(lines, 0);
                    if (htmlBlock) {
                        return renderHTMLBlockContent(htmlBlock.source);
                    }
                    if (/^<br\s*\/?>$/i.test(trimmedSource)) {
                        return '<br>';
                    }
                }

                return renderInline(block.source);
            }

            function createBlockEl(block, index, options = {}) {
                const readOnly = !!options.readOnly;
                const el = document.createElement('div');
                el.className = 'live-block is-rendered';
                el.setAttribute('data-type', block.type);
                el.setAttribute('data-index', index);
                el.dataset.blockSource = block.source || '';
                if (block.sourceLine != null) {
                    el.setAttribute('data-source-line', String(block.sourceLine));
                }

                if (block.type === 'empty') {
                    el.innerHTML = '<br>';
                    el.style.minHeight = '1.2em';
                } else if (block.type === 'hr') {
                    el.innerHTML = '';
                } else if (block.type === 'table') {
                    setupTableBlock(el, block, index, readOnly);
                } else if (block.type === 'code-fence') {
                    setupCodeFenceBlock(el, block, index, readOnly);
                } else if (block.type === 'list') {
                    setupListBlock(el, block, index, readOnly);
                } else if (block.type.startsWith('h')) {
                    const textMatch = block.source.match(/^#{1,6}\s+(.+)/);
                    const headingText = textMatch ? textMatch[1] : block.source;
                    el.id = headingSlug(headingText);
                    el.innerHTML = renderInline(headingText);
                } else if (block.type === 'html') {
                    el.innerHTML = renderHTMLBlockContent(block.source);
                } else if (block.type === 'math') {
                    setupMathBlock(el, block, index, readOnly);
                } else if (block.type === 'mermaid') {
                    setupMermaidBlock(el, block, index, readOnly);
                } else {
                    el.innerHTML = renderBlock(block);
                }

                if (!readOnly && block.type !== 'table' && block.type !== 'code-fence' && block.type !== 'list' && block.type !== 'html' && block.type !== 'math' && block.type !== 'mermaid') {
                    el.addEventListener('mousedown', (e) => {
                        if (e.target.closest('a')) return;
                        if (activeBlockIndex === index) return;

                        const textOffset = getTextOffsetFromPoint(el, e.clientX, e.clientY);
                        e.preventDefault();
                        activateBlock(index, textOffset);
                    });
                }

                return el;
            }

            function initLiveEditor(text) {
                liveEditor.innerHTML = '';
                liveBlocks = [];
                activeBlockIndex = -1;
                const normalized = normalizeMarkdownImages(text || '');
                const { text: withoutRefs, refs, footnotes, lineMap } = extractLinkReferenceDefinitions(normalized);
                linkReferenceMap = refs;
                footnoteMap = footnotes;
                liveContent = withoutRefs;

                let blocks = parseMarkdownBlocks(liveContent, lineMap);
                let repairedSource = false;

                blocks = blocks.map((block) => {
                    if (block.type !== 'code-fence') return block;
                    const normalized = normalizeCodeFenceBlockSource(block.source);
                    if (normalized !== block.source) {
                        repairedSource = true;
                        return { ...block, source: normalized };
                    }
                    return block;
                });

                if (repairedSource) {
                    const repairedText = blocks.map((b) => blockToMarkdownSource(b)).join('\n');
                    liveContent = repairedText;
                    currentContent = repairedText;
                    textarea.value = repairedText;
                    scheduleContentSync(repairedText);
                }

                blocks.forEach((block, index) => {
                    const el = createBlockEl(block, index, { readOnly: false });
                    const item = {
                        type: block.type,
                        source: block.source,
                        el
                    };
                    liveBlocks.push(item);
                    liveEditor.appendChild(el);
                });

                highlightCodeBlocks(liveEditor);
                rewriteImagesInContainer(liveEditor);
                scheduleMermaidRenderAfterLayout([liveEditor]);
                appendFootnotesSection(liveEditor, footnotes);

                lastLiveInteraction = {
                    blockIndex: Math.max(liveBlocks.length - 1, 0),
                    offsetInBlock: null
                };
                attachLiveCaretTracking();
                if (findState.active) scheduleFindRefresh();
            }

            function placeCaretAtEnd(el) {
                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(el);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }

            function getTextOffsetFromPoint(container, clientX, clientY) {
                let range = null;

                if (document.caretRangeFromPoint) {
                    range = document.caretRangeFromPoint(clientX, clientY);
                } else if (document.caretPositionFromPoint) {
                    const pos = document.caretPositionFromPoint(clientX, clientY);
                    if (pos) {
                        range = document.createRange();
                        range.setStart(pos.offsetNode, pos.offset);
                        range.collapse(true);
                    }
                }

                if (!range) return null;
                if (!container.contains(range.startContainer)) return null;

                const preRange = document.createRange();
                preRange.selectNodeContents(container);
                preRange.setEnd(range.startContainer, range.startOffset);

                return preRange.toString().length;
            }

            function placeCaretAtTextOffset(container, offset) {
