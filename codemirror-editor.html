<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
            <link id="highlight-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
                <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
                <script src="https://cdnjs.cloudflare.com/ajax/libs/highlightjs-line-numbers.js/2.9.0/highlightjs-line-numbers.min.js"></script>
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    body {
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        height: 100vh;
                        overflow: hidden;
                        background: #fff;
                        color: #24292e;
                    }
                    body.dark {
                        background: #0d1117;
                        color: #c9d1d9;
                    }
                    
                    #swap-button {
                        position: absolute;
                        top: 2px;
                        left: 50%;
                        transform: translateX(-50%);
                        z-index: 1000;
                        background: #fff;
                        border: 1px solid #d0d7de;
                        border-radius: 6px;
                        padding: 6px 10px;
                        cursor: pointer;
                        font-size: 14px;
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                        transition: all 0.2s;
                        pointer-events: auto;
                    }
                    body.dark #swap-button {
                        background: #21262d;
                        border-color: #30363d;
                        color: #c9d1d9;
                    }
                    #swap-button:hover {
                        background: #f6f8fa;
                        border-color: #b0b7be;
                        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
                    }
                    body.dark #swap-button:hover {
                        background: #30363d;
                        border-color: #484f58;
                    }
                    
                    #editor-container {
                        display: flex;
                        width: 100vw;
                        height: 100vh;
                        position: relative;
                    }
                    
                    #editor-container.swapped {
                        flex-direction: row-reverse;
                    }
                    
                    .editor-pane {
                        flex: 1 1 0;
                        min-width: 0;
                        height: 100%;
                        overflow: auto;
                        position: relative;
                    }
                    
                    /* Border для markdown-панели когда она слева */
                    #markdown-pane {
                        width: 50% !important;
                        padding: 0;
                        border: 1px solid gray;
                    }
                    
                    body.dark #markdown-pane {
                        border-right-color: #30363d;
                    }
                    
                    #preview-pane {
                        width: 50% !important;
                        box-sizing: border-box;
                        border: 1px solid gray;
                    }
                    
                    /* Режимы отображения */
                    body.mode-edit #live-editor { display: none; }
                    body.mode-edit #editor-container { display: flex; }
                    body.mode-edit #markdown-pane {
                        display: block;
                        width: 100% !important;
                        border-right: none;
                        border-left: none;
                    }
                    body.mode-edit #preview-pane { display: none; }
                    body.mode-edit #swap-button { display: none; }

                    body.mode-preview #live-editor { display: none; }
                    body.mode-preview #editor-container { display: flex; }
                    body.mode-preview #markdown-pane { display: none; }
                    body.mode-preview #preview-pane {
                        display: block;
                        width: 100% !important;
                        border-left: none;
                        border-right: none;
                    }
                    body.mode-preview #swap-button { display: none; }

                    body.mode-split #live-editor { display: none; }
                    body.mode-split #editor-container { display: flex; }
                    body.mode-split #markdown-pane {
                        display: block;
                        width: 50% !important;
                    }
                    body.mode-split #preview-pane {
                        display: block;
                        width: 50% !important;
                    }

                    body.mode-live #live-editor { display: block; }
                    body.mode-live #editor-container { display: none; }
                    body.mode-live #markdown-pane { display: none; }
                    body.mode-live #preview-pane { display: none; }
                    body.mode-live #swap-button { display: none; }

                    body.editor-focus-mode #editor-container {
                        box-shadow: inset 0 40px 60px -40px rgba(0,0,0,0.18), inset 0 -40px 60px -40px rgba(0,0,0,0.18);
                    }
                    body.editor-focus-mode.focus-dim-lines #markdown-textarea {
                        opacity: 0.92;
                    }
                    body.editor-focus-mode.focus-dim-lines #preview-content,
                    body.editor-focus-mode.focus-dim-lines #live-editor {
                        opacity: 0.96;
                    }

                    /* Стили превью */
                    #preview-content {
                        line-height: 1.7;
                        font-size: 16px;
                        padding: 40px 80px;
                        box-sizing: border-box;
                    }
                    #preview-content .live-block-table { cursor: default; }
                    .live-block.live-block-table {
                        white-space: normal;
                        max-width: 100%;
                    }
                    .md-table-scroll {
                        display: block;
                        max-width: 100%;
                        overflow-x: auto;
                        overflow-y: hidden;
                        margin: 0.5em 0;
                        -webkit-overflow-scrolling: touch;
                        scrollbar-width: thin;
                    }
                    body.dark .md-table-scroll {
                        scrollbar-color: #484f58 transparent;
                    }
                    .md-table {
                        border-collapse: collapse;
                        width: max-content;
                        min-width: max(
                            100%,
                            calc(var(--md-table-columns, 1) * var(--md-table-cell-min, 88px))
                        );
                        margin: 0;
                        table-layout: auto;
                    }
                    .md-table th,
                    .md-table td {
                        border: 1px solid #8b949e;
                        padding: 8px 12px;
                        min-width: var(--md-table-cell-min, 88px);
                        max-width: 360px;
                        min-height: 2.25em;
                        vertical-align: top;
                        box-sizing: border-box;
                        line-height: 1.5;
                        word-wrap: break-word;
                        overflow-wrap: anywhere;
                    }
                    body.dark .md-table th,
                    body.dark .md-table td {
                        border-color: #6e7681;
                    }
                    .md-table th {
                        background: #f0f3f6;
                        font-weight: 600;
                    }
                    .md-table td {
                        background: #ffffff;
                    }
                    body.dark .md-table th {
                        background: #21262d;
                    }
                    body.dark .md-table td {
                        background: #161b22;
                    }
                    .live-block-table [contenteditable="true"] {
                        cursor: text;
                        outline: none;
                        display: table-cell;
                    }
                    .live-block-table [contenteditable="true"]:focus {
                        box-shadow: inset 0 0 0 2px rgba(9, 105, 218, 0.45);
                    }
                    body.dark .live-block-table [contenteditable="true"]:focus {
                        box-shadow: inset 0 0 0 2px rgba(56, 139, 253, 0.55);
                    }
                    #preview-content h1 { font-size: 2em; margin: 0.67em 0; }
                    #preview-content h2 { font-size: 1.6em; margin: 0.75em 0; }
                    #preview-content h3 { font-size: 1.3em; margin: 0.83em 0; }
                    #preview-content code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: #f6f8fa;
                        padding: 2px 6px;
                        border-radius: 3px;
                        color: #cf222e;
                    }
                    body.dark #preview-content code {
                        background: #161b22;
                        color: #ff7b72;
                    }
                    /* Инлайн код (не в блоках) */
                    #preview-content :not(pre) > code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: #f6f8fa;
                        padding: 2px 6px;
                        border-radius: 3px;
                        color: #cf222e;
                    }
                    body.dark #preview-content :not(pre) > code {
                        background: #161b22;
                        color: #ff7b72;
                    }
                    
                    /* Блоки кода - используем стили highlight.js */
                    #preview-content pre {
                        border-radius: 8px;
                        overflow: auto;
                        margin: 1em 0;
                        padding: 0;
                    }
                    #preview-content pre code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: transparent !important;
                        background-color: transparent !important;
                        padding: 0;
                        display: block;
                    }

                    /* Code blocks: single background, no zebra striping */
                    #preview-content pre.hljs,
                    #live-editor pre.hljs {
                        background-color: var(--md-code-bg, #f6f8fa) !important;
                        border: 1px solid var(--md-border, #d0d7de);
                        padding: 14px 16px !important;
                    }
                    #preview-content pre.hljs code,
                    #live-editor pre.hljs code,
                    #preview-content pre.hljs code *,
                    #live-editor pre.hljs code *,
                    #preview-content pre.hljs .hljs,
                    #live-editor pre.hljs .hljs {
                        background: transparent !important;
                        background-color: transparent !important;
                    }
                    #preview-content .hljs-ln,
                    #live-editor .hljs-ln,
                    #preview-content .hljs-ln tr,
                    #live-editor .hljs-ln tr,
                    #preview-content .hljs-ln td,
                    #live-editor .hljs-ln td {
                        background: transparent !important;
                    }
                    #preview-content .hljs-ln td.hljs-ln-numbers,
                    #live-editor .hljs-ln td.hljs-ln-numbers {
                        color: var(--md-secondary, #6a737d);
                        border-right: 1px solid var(--md-border, #d0d7de);
                        padding-right: 10px !important;
                        user-select: none;
                        vertical-align: top;
                    }
                    #preview-content .hljs-ln td.hljs-ln-code,
                    #live-editor .hljs-ln td.hljs-ln-code {
                        padding-left: 12px !important;
                    }
                    #preview-content table:not(.md-table):not(.hljs-ln) {
                        border-collapse: collapse;
                        margin: 1em 0;
                        width: 100%;
                    }
                    #preview-content table:not(.md-table):not(.hljs-ln) th,
                    #preview-content table:not(.md-table):not(.hljs-ln) td {
                        padding: 6px 13px;
                        border: 1px solid #8b949e;
                    }
                    body.dark #preview-content table:not(.md-table):not(.hljs-ln) th,
                    body.dark #preview-content table:not(.md-table):not(.hljs-ln) td {
                        border-color: #6e7681;
                    }
                    #preview-content table:not(.md-table):not(.hljs-ln) thead {
                        background: #f6f8fa;
                    }
                    body.dark #preview-content table:not(.md-table):not(.hljs-ln) thead {
                        background: #161b22;
                    }
                    #preview-content blockquote {
                        margin: 0;
                        padding-left: 1em;
                        border-left: 4px solid #d0d7de;
                        color: #57606a;
                    }
                    #preview-content ul,
                    #preview-content ol {
                        padding-left: 2em;
                        margin: 0.5em 0;
                    }
                    #preview-content li {
                        margin: 0.25em 0;
                    }
                    #preview-content hr {
                        border: none;
                        border-top: 1px solid #d0d7de;
                        margin: 2em 0;
                    }
                    body.dark #preview-content hr {
                        border-top-color: #30363d;
                    }
                    body.dark #preview-content blockquote {
                        border-left-color: #30363d;
                        color: #8b949e;
                    }
                    
                    /* === LIVE MODE === */
                    #live-editor {
                        display: none;
                        width: 100%;
                        height: 100%;
                        overflow-y: auto;
                        padding: 40px 80px;
                        box-sizing: border-box;
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        font-size: 16px;
                        line-height: 1.7;
                        outline: none;
                    }
                    
                    body.mode-live #live-editor { display: block; }
                    body.mode-live #markdown-pane { display: none; }
                    body.mode-live #preview-pane { display: none; }
                    body.mode-live #swap-button { display: none; }
                    
                    /* Блоки в live-режиме */
                    .live-block {
                        min-height: 1.7em;
                        padding: 2px 0;
                        outline: none;
                        border-radius: 3px;
                        transition: background 0.1s;
                        white-space: pre-wrap;
                        word-break: break-word;
                        cursor: text;
                    }
                    
                    .live-block::after {
                        content: "";
                        display: table;
                        clear: both;
                    }

                    .live-block img {
                        max-width: 100%;
                        height: auto;
                    }
                    
                    .live-block:focus { outline: none; }
                    
                    /* Активный блок — показываем исходник */
                    .live-block.is-source {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        font-size: 14px;
                        color: inherit;
                        background: rgba(0,0,0,0.03);
                        border-radius: 4px;
                        padding: 2px 6px;
                    }
                    body.dark .live-block.is-source {
                        background: rgba(255,255,255,0.05);
                    }
                    
                    /* Рендеренные блоки */
                    .live-block.is-rendered { font-family: inherit; }
                    
                    /* Заголовки */
                    .live-block[data-type="h1"] { font-size: 2em; font-weight: 700; margin: 0.4em 0 0.2em; }
                    .live-block[data-type="h2"] { font-size: 1.6em; font-weight: 700; margin: 0.4em 0 0.2em; }
                    .live-block[data-type="h3"] { font-size: 1.3em; font-weight: 600; margin: 0.3em 0 0.2em; }
                    .live-block[data-type="h4"] { font-size: 1.1em; font-weight: 600; margin: 0.3em 0 0.1em; }
                    .live-block[data-type="h5"] { font-size: 1em; font-weight: 600; margin: 0.2em 0 0.1em; }
                    .live-block[data-type="h6"] { font-size: 0.9em; font-weight: 600; margin: 0.2em 0 0.1em; color: #57606a; }
                    body.dark .live-block[data-type="h6"] { color: #8b949e; }
                    
                    /* Цитата */
                    .live-block[data-type="blockquote"] {
                        border-left: 4px solid #d0d7de;
                        padding-left: 1em;
                        color: #57606a;
                        margin: 0.3em 0;
                    }
                    body.dark .live-block[data-type="blockquote"] {
                        border-left-color: #30363d;
                        color: #8b949e;
                    }
                    
                    /* Горизонтальная линия */
                    .live-block[data-type="hr"] {
                        border: none;
                        border-top: 2px solid #d0d7de;
                        margin: 1em 0;
                        height: 2px;
                    }
                    body.dark .live-block[data-type="hr"] { border-top-color: #30363d; }
                    
                    /* Код блок — одна рамка через .code-fence-wrap */
                    .live-block[data-type="code-fence"] {
                        margin: 0.5em 0;
                        padding: 0;
                        background: transparent;
                        white-space: normal;
                    }
                    .code-fence-wrap {
                        border-radius: 8px;
                        overflow: hidden;
                        border: 1px solid var(--md-code-border, #d0d7de);
                        background-color: var(--md-code-bg, #f6f8fa);
                    }
                    .code-fence-lang-bar {
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        padding: 5px 12px;
                        border-bottom: 1px solid var(--md-code-border, #d0d7de);
                        background: rgba(0, 0, 0, 0.04);
                        font-size: 12px;
                        line-height: 1.2;
                    }
                    body.dark .code-fence-lang-bar {
                        background: rgba(255, 255, 255, 0.05);
                    }
                    .code-fence-lang-label {
                        color: #57606a;
                        font-weight: 500;
                        white-space: nowrap;
                    }
                    body.dark .code-fence-lang-label {
                        color: #8b949e;
                    }
                    .code-fence-lang-select {
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        font-size: 12px;
                        padding: 2px 6px;
                        border: 1px solid #d0d7de;
                        border-radius: 4px;
                        background: #ffffff;
                        color: inherit;
                        cursor: pointer;
                        min-width: 140px;
                        max-width: 100%;
                    }
                    body.dark .code-fence-lang-select {
                        background: #0d1117;
                        border-color: #30363d;
                        color: #c9d1d9;
                    }
                    .code-fence-wrap pre.hljs {
                        border: none !important;
                        border-radius: 0 !important;
                        margin: 0 !important;
                        background-color: transparent !important;
                        padding: 14px 16px !important;
                        min-height: 4.5em;
                        cursor: text;
                    }
                    .code-fence-wrap pre.hljs.is-empty {
                        display: flex;
                        align-items: flex-start;
                    }
                    .code-fence-placeholder {
                        color: #6a737d;
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        font-size: 13px;
                        font-style: italic;
                        line-height: 1.5;
                        user-select: none;
                        pointer-events: none;
                    }
                    body.dark .code-fence-placeholder {
                        color: #8b949e;
                    }
                    /* Нумерация строк — не как markdown-таблица */
                    #preview-content table.hljs-ln,
                    #live-editor table.hljs-ln {
                        border-collapse: collapse;
                        width: 100%;
                        margin: 0;
                        border: none !important;
                    }
                    #preview-content table.hljs-ln td,
                    #live-editor table.hljs-ln td,
                    #preview-content table.hljs-ln th,
                    #live-editor table.hljs-ln th {
                        border: none !important;
                        padding: 0 !important;
                        background: transparent !important;
                    }
                    
                    /* Списки */
                    .live-block[data-type="list"] ul,
                    .live-block[data-type="list"] ol,
                    #preview-content .live-block[data-type="list"] ul,
                    #preview-content .live-block[data-type="list"] ol {
                        margin: 0.35em 0;
                        padding-left: 1.6em;
                    }
                    .live-block[data-type="list"] .task-list,
                    #preview-content .live-block[data-type="list"] .task-list {
                        list-style: none;
                        padding-left: 0.35em;
                    }
                    .live-block[data-type="list"] .task-list li,
                    #preview-content .live-block[data-type="list"] .task-list li {
                        display: flex;
                        align-items: flex-start;
                        gap: 8px;
                        margin: 0.2em 0;
                    }
                    .live-block[data-type="list"] .task-list input[type="checkbox"],
                    #preview-content .live-block[data-type="list"] .task-list input[type="checkbox"] {
                        margin-top: 0.35em;
                        flex-shrink: 0;
                        cursor: pointer;
                    }
                    .live-block[data-type="list"] .list-item-body,
                    #preview-content .live-block[data-type="list"] .list-item-body {
                        flex: 1;
                        min-width: 0;
                        outline: none;
                    }
                    .live-block[data-type="list"] .list-item-body[contenteditable="true"]:focus {
                        outline: none;
                    }

                    /* Параграф */
                    .live-block[data-type="p"] { margin: 0.1em 0; }
                    
                    /* Inline стили внутри rendered блоков */
                    .live-block.is-rendered strong { font-weight: 700; }
                    .live-block.is-rendered em { font-style: italic; }
                    .live-block.is-rendered code {
                        font-family: 'SF Mono', Monaco, monospace;
                        background: #f6f8fa;
                        padding: 2px 5px;
                        border-radius: 3px;
                        font-size: 0.88em;
                        color: #cf222e;
                    }
                    body.dark .live-block.is-rendered code {
                        background: #161b22;
                        color: #ff7b72;
                    }
                    .live-block.is-rendered a { color: #0969da; text-decoration: underline; }
                    body.dark .live-block.is-rendered a { color: #58a6ff; }
                    .live-block.is-rendered del { text-decoration: line-through; color: #57606a; }
                    
                    /* Курсор в live-mode */
                    #live-editor:focus-within .live-block.is-source { caret-color: currentColor; }
                </style>
    </head>
    <body class="mode-edit">
        
        <!-- Live mode editor -->
        <div id="live-editor" tabindex="0"></div>
        
        <div id="editor-container">
            <button id="swap-button" title="Поменять панели местами">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M2 4h12M2 12h12M4 2L2 4l2 2M12 10l2 2-2 2"/>
                </svg>
            </button>
            <div class="editor-pane" id="markdown-pane">
                <textarea id="markdown-textarea" style="
                width: 100%; height: 100%; border: none; outline: none;
                font-family: 'SF Mono', Monaco, monospace; font-size: 14px;
                padding: 40px 60px; background: transparent;
                resize: none; color: inherit; line-height: 1.6;
            "></textarea>
            </div>
            <div class="editor-pane" id="preview-pane">
                <div id="preview-content"></div>
            </div>
        </div>
        
        <!-- marked.js -->
        <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.min.js"></script>
        
        <script>
            console.log('🎉 Загрузка скрипта');
            
            let isSyncing = false;
            let currentContent = '';
            let isInitialized = false;
            let syncScroll = true;
            let isSwapped = false;
            let isLiveMode = false;
            let lastScrollTime = { markdown: 0, preview: 0 };
            let scrollDebounce = null;
            let documentBasePath = null;
            let showCodeLineNumbers = false;
            let loadedCodeThemeURLs = new Set();
            let focusModeActive = false;
            let focusDimLines = false;
            let currentCodeBlockBg = '#f6f8fa';
            let currentCodeBlockBorder = '#d0d7de';

            function debounce(fn, ms) {
                let timer;
                const debounced = function(...args) {
                    clearTimeout(timer);
                    timer = setTimeout(() => fn(...args), ms);
                };
                debounced.flush = function(...args) {
                    clearTimeout(timer);
                    fn(...args);
                };
                debounced.cancel = function() {
                    clearTimeout(timer);
                };
                return debounced;
            }

            function isPreviewActive() {
                return document.body.classList.contains('mode-split')
                    || document.body.classList.contains('mode-preview');
            }

            function isLiveActive() {
                return document.body.classList.contains('mode-live');
            }

            function updateCodeBlockChromeStyle(bg, border) {
                if (bg) currentCodeBlockBg = bg;
                if (border) currentCodeBlockBorder = border;
                document.documentElement.style.setProperty('--md-code-bg', currentCodeBlockBg);
                document.documentElement.style.setProperty('--md-code-border', currentCodeBlockBorder);

                let el = document.getElementById('code-block-chrome-style');
                if (!el) {
                    el = document.createElement('style');
                    el.id = 'code-block-chrome-style';
                    document.head.appendChild(el);
                }
                el.textContent = `
                    #preview-content pre.hljs,
                    #live-editor pre.hljs {
                        background-color: ${currentCodeBlockBg} !important;
                        border-color: ${currentCodeBlockBorder} !important;
                    }
                    #preview-content pre.hljs code,
                    #preview-content pre.hljs .hljs,
                    #preview-content pre.hljs code *,
                    #live-editor pre.hljs code,
                    #live-editor pre.hljs .hljs,
                    #live-editor pre.hljs code * {
                        background: transparent !important;
                        background-color: transparent !important;
                    }
                `;
            }

            function applyCodeBlockChrome(container) {
                if (!container) return;
                container.querySelectorAll('.code-fence-wrap').forEach((wrap) => {
                    wrap.style.setProperty('background-color', currentCodeBlockBg, 'important');
                    wrap.style.setProperty('border-color', currentCodeBlockBorder, 'important');
                });
                container.querySelectorAll('pre.hljs').forEach((pre) => {
                    const wrap = pre.closest('.code-fence-wrap');
                    if (wrap) {
                        pre.style.setProperty('background-color', 'transparent', 'important');
                        pre.style.setProperty('border-color', 'transparent', 'important');
                    } else {
                        pre.style.setProperty('background-color', currentCodeBlockBg, 'important');
                        pre.style.setProperty('border-color', currentCodeBlockBorder, 'important');
                    }
                    pre.querySelectorAll('code, .hljs, span').forEach((node) => {
                        node.style.setProperty('background', 'transparent', 'important');
                        node.style.setProperty('background-color', 'transparent', 'important');
                    });
                });
            }

            const schedulePreviewRender = debounce((text) => {
                if (isPreviewActive()) {
                    renderPreview(text, { preserveScroll: true });
                }
            }, 280);

            const scheduleLiveRebuild = debounce((text) => {
                if (isLiveActive()) {
                    initLiveEditor(text);
                }
            }, 320);

            const scheduleContentSync = debounce((text) => {
                if (window.webkit?.messageHandlers?.contentChanged) {
                    window.webkit.messageHandlers.contentChanged.postMessage(text);
                }
            }, 180);

            function flushPendingEditorUpdates() {
                const text = textarea.value;
                schedulePreviewRender.flush(text);
                if (isLiveActive()) {
                    scheduleLiveRebuild.cancel();
                } else {
                    scheduleLiveRebuild.flush(text);
                }
                scheduleContentSync.flush(text);
            }

            function captureScrollState() {
                return {
                    markdown: markdownPane ? markdownPane.scrollTop : 0,
                    preview: previewPane ? previewPane.scrollTop : 0,
                    live: liveEditor ? liveEditor.scrollTop : 0,
                    textarea: textarea ? textarea.scrollTop : 0,
                };
            }

            function restoreScrollState(state) {
                if (!state) return;
                requestAnimationFrame(() => {
                    if (markdownPane) markdownPane.scrollTop = state.markdown;
                    if (previewPane) previewPane.scrollTop = state.preview;
                    if (liveEditor) liveEditor.scrollTop = state.live;
                    if (textarea) textarea.scrollTop = state.textarea;

            function extractCodeText(pre, code) {
                const table = pre.querySelector('table.hljs-ln');
                if (table) {
                    const lines = [];
                    table.querySelectorAll('td.hljs-ln-code').forEach((cell) => {
                        lines.push(cell.textContent || '');
                    });
                    return lines.join('\n');
                }
                return code.textContent || pre.textContent || '';
            }

            function restoreCodeBlock(pre) {
                const existingCode = pre.querySelector('code');
                const langMatch = existingCode?.className?.match(/language-(\w+)/);
                const lang = langMatch ? langMatch[1] : existingCode?.getAttribute('data-language');
                const text = extractCodeText(pre, existingCode || pre);

                pre.innerHTML = '';
                pre.className = 'hljs';

                const code = document.createElement('code');
                if (lang) {
                    code.className = `language-${lang}`;
                    code.setAttribute('data-language', lang);
                }
                code.textContent = text;
                pre.appendChild(code);
                return code;
            }

            function highlightCodeBlocks(container) {
                if (!container) return;
                container.querySelectorAll('.code-fence-wrap pre.hljs').forEach((pre) => {
                    const placeholder = pre.querySelector('.code-fence-placeholder');
                    const code = pre.querySelector('code');
                    const raw = (code?.textContent || '')
                        .replace(/\u00a0/g, ' ')
                        .replace(/\u200b/g, '')
                        .trimEnd();

                    if (!raw) {
                        pre.classList.add('is-empty');
                        if (!placeholder) {
                            const hint = document.createElement('div');
                            hint.className = 'code-fence-placeholder';
                            hint.textContent = 'Click to edit code…';
                            pre.appendChild(hint);
                        }
                        if (code) code.textContent = '';
                        return;
                    }

                    pre.classList.remove('is-empty');
                    if (placeholder) placeholder.remove();

                    if (!window.hljs || !code) return;

                    const restored = restoreCodeBlock(pre);
                    const text = (restored.textContent || '').trimEnd();
                    if (!text) return;

                    restored.removeAttribute('data-highlighted');
                    restored.classList.remove('hljs');
                    pre.classList.add('hljs');

                    try {
                        hljs.highlightElement(restored);
                    } catch (e) {
                        console.warn('hljs.highlightElement failed', e);
                    }

                    if (showCodeLineNumbers && typeof hljs.lineNumbersBlock === 'function') {
                        try {
                            hljs.lineNumbersBlock(restored);
                        } catch (e) {
                            console.warn('lineNumbersBlock failed', e);
                        }

                });
                applyCodeBlockChrome(container);
            }

            function rehighlightCodeBlocks() {

            function toBeardyURL(filePath) {
                if (!filePath) return filePath;
                if (filePath.startsWith('beardy://')) return filePath;
                const encoded = filePath.split('/').map(part => encodeURIComponent(part)).join('/');
                return 'beardy://localhost' + encoded;
            }

            function unwrapMarkdownURL(src) {
                let s = (src || '').trim();
                s = s.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
                if (s.startsWith('<') && s.endsWith('>')) {
                    s = s.slice(1, -1).trim();
                }
                return s;
            }

            function buildResolvedImageTag(alt, src) {
                const resolved = resolveImageSrc(unwrapMarkdownURL(src.trim()));
                const safeAlt = (alt || '').replace(/"/g, '&quot;');
                return `<img src="${resolved}" alt="${safeAlt}" style="max-width:100%;height:auto;">`;
            }

            function normalizeMarkdownImages(text) {
                return (text || '').replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, url) => {
                    const trimmed = url.trim();
                    if (trimmed.startsWith('<') && trimmed.endsWith('>')) return match;
                    if (trimmed.includes(' ') || /[^\x00-\x7F]/.test(trimmed)) {
                        return `![${alt}](<${trimmed}>)`;
                    }
                    return match;
                });
            }

            function resolveImageSrc(src) {
                if (!src) return src;
                src = unwrapMarkdownURL(src);
                if (/^(https?:|data:|beardy:)/i.test(src)) return src;

                let absolutePath;
                if (src.startsWith('./') && documentBasePath) {
                    absolutePath = documentBasePath + '/' + src.slice(2);
                } else if (src.startsWith('/') && !src.startsWith('//')) {
                    absolutePath = src;
                } else if (documentBasePath && !src.includes('://')) {
                    absolutePath = documentBasePath + '/' + src.replace(/^\.\//, '');
                } else {
                    return src;
                }
                return toBeardyURL(absolutePath);
            }

            function rewriteImagesInContainer(container) {
                if (!container) return;
                container.querySelectorAll('img').forEach(img => {
                    const src = img.getAttribute('src');
                    if (src) img.setAttribute('src', resolveImageSrc(src));
                });
            }

            async function handleImageFiles(files) {
                for (const file of files) {
                    if (!file.type.startsWith('image/')) continue;
                    const reader = new FileReader();
                    reader.onload = () => {
                        const dataURL = reader.result;
                        const base64 = String(dataURL).split(',')[1];
                        if (!base64 || !window.webkit?.messageHandlers?.processImageFile) return;
                        window.webkit.messageHandlers.processImageFile.postMessage({
                            base64,
                            filename: file.name || 'image.png',
                            mimeType: file.type
                        });
                    };
                    reader.readAsDataURL(file);
                }
            }

            const markedRenderer = new marked.Renderer();
            const defaultImageRenderer = markedRenderer.image.bind(markedRenderer);
            markedRenderer.image = function(hrefOrToken, title, text) {
                let href, alt, titleAttr;
                if (hrefOrToken && typeof hrefOrToken === 'object') {
                    href = hrefOrToken.href;
                    alt = hrefOrToken.text || '';
                    titleAttr = hrefOrToken.title || '';
                } else {
                    href = hrefOrToken;
                    alt = text || '';
                    titleAttr = title || '';
                }
                const src = resolveImageSrc(href);
                if (defaultImageRenderer.length <= 1) {
                    return defaultImageRenderer({ href: src, title: titleAttr, text: alt });
                }
                let html = defaultImageRenderer(src, titleAttr, alt);
                return html.replace(/<img /, '<img style="max-width:100%;height:auto;" ');

            marked.setOptions({

                    }

                    const finish = () => {

                        restoreScrollState(scroll);
                    };

                    const url = options.codeThemeURL;
                    if (!url) {
                        finish();
                        return;
                    }

                    const existing = document.getElementById('highlight-theme');
                    if (existing && existing.href === url) {

                        return;

                    if (loadedCodeThemeURLs.has(url) && existing) {

                        finish();
                        return;

                    const link = document.createElement('link');
                    link.id = 'highlight-theme';
                    link.rel = 'stylesheet';
                    link.href = url;
                    link.onload = () => {
                        loadedCodeThemeURLs.add(url);
                        finish();
                    };
                    link.onerror = finish;
                    document.head.appendChild(link);
                },

                setDocumentPath(path) {
                    documentBasePath = path || null;
                    renderPreview(currentContent);
                    if (isLiveMode) {
                        initLiveEditor(currentContent);
                    }
                },
                
                insertFormatting(prefix, suffix) {
                    if (isLiveActive()) syncLiveCaretToTextarea();
                    const ta = textarea;
                    const start = ta.selectionStart;
                    const end = ta.selectionEnd;
                    const selected = ta.value.substring(start, end);
                    const replacement = prefix + (selected || 'text') + suffix;
                    ta.setRangeText(replacement, start, end, 'end');
                    ta.dispatchEvent(new Event('input'));
                    // Если не было выделения — ставим курсор между prefix и suffix
                    if (start === end) {

                            ta.setSelectionRange(urlStart, urlStart + 3); // выделяем 'url'

                },

                    // ===== SCROLL SYNC (процентная синхронизация) =====
                    let isInternalScroll = false;

                    function syncScrollPercent(source, target) {
                        if (isInternalScroll) return;
                        isInternalScroll = true;

                        const maxScrollSource = source.scrollHeight - source.clientHeight;
                        const maxScrollTarget = target.scrollHeight - target.clientHeight;

                        if (maxScrollSource <= 0 || maxScrollTarget <= 0) {
                            isInternalScroll = false;
                            return;
                        }

                        const scrollPercent = source.scrollTop / maxScrollSource;
                        target.scrollTop = scrollPercent * maxScrollTarget;

                        setTimeout(() => { isInternalScroll = false; }, 20);
                    }

                    textarea.addEventListener('scroll', () => {
                        if (!syncScroll) return;
                        const now = Date.now();
                        if (now - lastScrollTime.preview < 50) return;
                        lastScrollTime.markdown = now;
                        syncScrollPercent(textarea, previewPane);
                    });

                    previewPane.addEventListener('scroll', () => {
                        if (!syncScroll) return;
                        const now = Date.now();
                        if (now - lastScrollTime.markdown < 50) return;
                        lastScrollTime.preview = now;
                        syncScrollPercent(previewPane, textarea);

            // ============================================================
            // LIVE MODE — Typora-like inline rendering
