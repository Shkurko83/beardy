                const preRect = pre.getBoundingClientRect();

                const line = pre.querySelector('.hljs-ln-line');
                const code = pre.querySelector('code');
                const anchorRoot = line || code;
                const textNode = getFirstTextNodeInElement(anchorRoot);

                let top = parseFloat(preStyle.paddingTop) || 0;
                let left = parseFloat(preStyle.paddingLeft) || 0;

                if (textNode) {
                    const range = document.createRange();
                    try {
                        range.setStart(textNode, 0);
                        range.setEnd(textNode, 0);
                        const caretRect = range.getBoundingClientRect();
                        top = Math.max(0, Math.round(caretRect.top - preRect.top));
                        left = Math.max(0, Math.round(caretRect.left - preRect.left));
                    } catch (err) {
                        /* keep padding fallback */
                    }
                }

                const columnOffset = measureCodeColumnOffset(pre);
                if (columnOffset != null) {
                    left = columnOffset;
                }

                return {
                    top,
                    left,
                    right: parseFloat(preStyle.paddingRight) || 0,
                    bottom: parseFloat(preStyle.paddingBottom) || 0,
                };
            }

            function getCodeFenceOffsetFromPoint(pre, clientX, clientY) {
                let range = null;
                if (document.caretRangeFromPoint) {
                    range = document.caretRangeFromPoint(clientX, clientY);
                } else if (document.caretPositionFromPoint) {
                    const pos = document.caretPositionFromPoint(clientX, clientY);
                    if (pos) {
                        range = document.createRange();
                        range.setStart(pos.offsetNode, pos.offset);
                        range.collapse(true);
                    }
                }
                if (!range || !pre.contains(range.startContainer)) {
                    return getTextOffsetFromPoint(pre, clientX, clientY);
                }

                const lineEl = (range.startContainer.nodeType === Node.TEXT_NODE
                    ? range.startContainer.parentElement
                    : range.startContainer)?.closest?.('.hljs-ln-line');
                if (lineEl && pre.contains(lineEl)) {
                    const rows = [...pre.querySelectorAll('.hljs-ln-line')];
                    const rowIndex = rows.indexOf(lineEl);
                    if (rowIndex >= 0) {
                        let offset = 0;
                        for (let i = 0; i < rowIndex; i++) {
                            offset += (rows[i].textContent || '').length + 1;
                        }
                        const lineRange = document.createRange();
                        lineRange.selectNodeContents(lineEl);
                        lineRange.setEnd(range.startContainer, range.startOffset);
                        offset += lineRange.toString().length;
                        return offset;
                    }
                }

                return getTextOffsetFromPoint(pre, clientX, clientY);
            }

            function positionCodeFenceEditOverlay(editArea, highlightPre, wrap) {
                if (!editArea || !highlightPre || !wrap) return;

                editArea.style.top = `${highlightPre.offsetTop}px`;
                editArea.style.left = `${highlightPre.offsetLeft}px`;
                editArea.style.width = `${highlightPre.offsetWidth}px`;
                syncCodeFenceStackHeights(editArea, highlightPre);

                const insets = measureHighlightTextInsets(highlightPre);
                editArea.style.paddingTop = `${insets.top}px`;
                editArea.style.paddingLeft = `${insets.left}px`;
                editArea.style.paddingRight = `${insets.right}px`;
                editArea.style.paddingBottom = `${insets.bottom}px`;

                const fontLine = highlightPre.querySelector('.hljs-ln-line')
                    || highlightPre.querySelector('td.hljs-ln-code')
                    || highlightPre.querySelector('code');
                if (fontLine) {
                    const fs = window.getComputedStyle(fontLine);
                    editArea.style.fontFamily = fs.fontFamily;
                    editArea.style.fontSize = fs.fontSize;
                    editArea.style.lineHeight = fs.lineHeight;
                    editArea.style.letterSpacing = fs.letterSpacing;
                    editArea.style.fontWeight = fs.fontWeight;
                    editArea.style.fontVariantLigatures = fs.fontVariantLigatures;
                    editArea.style.fontFeatureSettings = fs.fontFeatureSettings;
                    editArea.style.tabSize = fs.tabSize || '4';
                }
            }

            function detachCodeFenceEditListeners(block) {
                clearCodeFenceHighlightTimer();
                detachSpecialBlockEditListeners(block);

                const wrap = block?._codeFenceEditWrap;
                const pre = block?._codeFenceEditPre;
                if (pre) {
                    pre.removeAttribute('contenteditable');
                    pre.removeAttribute('spellcheck');
                }
                if (!wrap) return;

                delete block._codeFenceEditWrap;
                delete block._codeFenceEditPre;
                delete block._codeFenceHighlightPre;
                delete block._codeFenceHighlightCode;
                delete block._codeFenceLang;
                if (block._codeFenceResizeObs) {
                    block._codeFenceResizeObs.disconnect();
                    delete block._codeFenceResizeObs;
                }
                if (block._codeFenceScrollHandler && pre) {
                    pre.removeEventListener('scroll', block._codeFenceScrollHandler);
                    delete block._codeFenceScrollHandler;
                }
            }

            function looksLikeMarkdownProse(text) {
                return /(\*\*|__|~~|^\s{0,3}[-*+]\s|^\s{0,3}\d+\.\s|\[[^\]]+\]\([^)]+\))/.test(text || '');
            }

            function detectCodeLanguage(code) {
                const sample = (code || '').trim();
                if (!sample || !window.hljs) return '';
                if (typeof hljs.highlightAuto === 'function') {
                    try {
                        const result = hljs.highlightAuto(sample);
                        if (result.language && result.relevance >= 4) {
                            return result.language;
                        }
                    } catch (e) {
                        console.warn('hljs.highlightAuto failed', e);
                    }
                }
                return '';
            }

            function escapeCodeFenceHTML(text) {
                return (text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            function setupCodeFenceBlock(el, block, index, readOnly) {
                let { lang, inner } = parseCodeFenceSource(block.source);

                if (!lang && inner.trim() && !readOnly && !looksLikeMarkdownProse(inner)) {
                    const detected = detectCodeLanguage(inner);
                    if (detected) {
                        lang = detected;
                        block.source = buildCodeFenceSource(lang, inner);
                    }
                }

                const wrap = document.createElement('div');
                wrap.className = 'code-fence-wrap';

                const displayLang = lang || 'auto';

                if (readOnly) {
                    const langBar = document.createElement('div');
                    langBar.className = 'code-fence-lang-bar';
                    const langLabel = document.createElement('span');
                    langLabel.className = 'code-fence-lang-label';
                    langLabel.textContent = 'Language:';
                    langBar.appendChild(langLabel);
                    const langText = document.createElement('span');
                    langText.textContent = displayLang === 'auto' ? 'auto' : displayLang;
                    langBar.appendChild(langText);
                    wrap.appendChild(langBar);
                } else {
                    appendCodeFenceLangBar(wrap, block, index, lang);
                }

                const pre = document.createElement('pre');
                pre.className = 'hljs';
                const code = document.createElement('code');
                if (lang) {
                    code.className = `language-${lang}`;
                    code.setAttribute('data-language', lang);
                }

                if (!inner.trim()) {
                    pre.classList.add('is-empty');
                    const hint = document.createElement('div');
                    hint.className = 'code-fence-placeholder';
                    hint.textContent = readOnly ? '' : 'Click to edit code…';
                    pre.appendChild(hint);
                } else {
                    code.textContent = inner;
                    pre.appendChild(code);
                }

                wrap.appendChild(pre);

                el.innerHTML = '';
                el.appendChild(wrap);

                if (!readOnly) {
                    const openForEdit = (e) => {
                        if (e.target.closest('.code-fence-lang-bar')) return;
                        if (activeBlockIndex === index) return;
                        e.preventDefault();
                        const caretOffset = getCodeFenceOffsetFromPoint(pre, e.clientX, e.clientY);
                        activateCodeFenceBlock(index, { caretOffset });
                    };
                    wrap.addEventListener('mousedown', openForEdit);
                    pre.addEventListener('mousedown', openForEdit);
                }

                highlightCodeBlocks(el);
            }

            function appendCodeFenceLangBar(wrap, block, index, lang) {
                const langBar = document.createElement('div');
                langBar.className = 'code-fence-lang-bar';

                const langLabel = document.createElement('span');
                langLabel.className = 'code-fence-lang-label';
                langLabel.textContent = 'Language:';
                langBar.appendChild(langLabel);

                const select = document.createElement('select');
                select.className = 'code-fence-lang-select';
                select.title = 'Code language';

                const autoOpt = document.createElement('option');
                autoOpt.value = '';
                autoOpt.textContent = lang ? `auto (${lang})` : 'auto-detect';
                select.appendChild(autoOpt);

                const plainOpt = document.createElement('option');
                plainOpt.value = 'plaintext';
                plainOpt.textContent = 'Plain Text';
                select.appendChild(plainOpt);

                listHighlightLanguages().forEach((name) => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    select.appendChild(opt);
                });

                select.value = lang || '';
                select.addEventListener('mousedown', (e) => e.stopPropagation());
                select.addEventListener('change', () => {
                    block._codeFenceLang = select.value;
                    const highlightPre = block._codeFenceEditPre
                        || block._codeFenceHighlightPre
                        || block.el.querySelector('.code-fence-wrap pre.hljs');
                    if (highlightPre && block._codeFenceEditWrap?.classList.contains('is-editing')) {
                        block._codeFenceLang = select.value;
                        clearCodeFenceHighlightTimer();
                        refreshCodeFenceLiveHighlight(block, highlightPre);
                        return;
                    }
                    if (!block.el.querySelector('.code-fence-wrap.is-editing')) {
                        const parsed = parseCodeFenceSource(block.source);
                        block.source = buildCodeFenceSource(select.value, parsed.inner);
                        setupCodeFenceBlock(block.el, block, index, false);
                        highlightCodeBlocks(block.el);
                        syncLiveContentToModel();
                    }
                });
                langBar.appendChild(select);
                langBar.addEventListener('mousedown', (e) => e.stopPropagation());
                wrap.appendChild(langBar);
                return select;
            }

            function activateCodeFenceBlock(index, options = {}) {
                if (activeBlockIndex === index) return;

                if (activeBlockIndex !== -1) {
                    deactivateCurrentBlock();
                }

                activeBlockIndex = index;
                const block = liveBlocks[index];
                const { lang, inner } = parseCodeFenceSource(block.source);
                block._codeFenceLang = lang;
                const initialCaret = options.caretOffset;

                block.el.className = 'live-block is-rendered';
                block.el.removeAttribute('contenteditable');
                block.el.onblur = null;
                block.el.onkeydown = null;

                let wrap = block.el.querySelector('.code-fence-wrap');
                if (!wrap) {
                    setupCodeFenceBlock(block.el, block, index, false);
                    wrap = block.el.querySelector('.code-fence-wrap');
                }
                if (!wrap) return;

                const highlightPre = wrap.querySelector('pre.hljs');
                if (!highlightPre) return;

                wrap.querySelector('.code-fence-edit-stack')?.remove();
                wrap.querySelector('.code-fence-edit-row')?.remove();

                wrap.classList.add('is-editing');

                const codeText = readCodeFenceInner(highlightPre) || inner;
                highlightPre.querySelector('.code-fence-placeholder')?.remove();
                highlightPre.classList.toggle('is-empty', !codeText.trim());

                let code = highlightPre.querySelector('code');
                if (!code) {
                    code = document.createElement('code');
                }
                paintCodeFenceHighlight(highlightPre, code, lang, codeText);

                highlightPre.setAttribute('contenteditable', 'true');
                highlightPre.setAttribute('spellcheck', 'false');
                attachPlainTextTyping(highlightPre);

                block._codeFenceEditPre = highlightPre;
                block._codeFenceEditWrap = wrap;
                block._codeFenceHighlightPre = highlightPre;

                const onCodeFenceInput = () => {
                    const currentLang = block._codeFenceLang != null
                        ? block._codeFenceLang
                        : lang;
                    block.source = buildCodeFenceSource(
                        currentLang,
                        getTextFromContentEditable(highlightPre)
                    );
                    scheduleCodeFenceLiveHighlight(block, highlightPre);
                };

                attachSpecialBlockEditHandlers(block, index, wrap, highlightPre, onCodeFenceInput);

                requestAnimationFrame(() => {
                    highlightPre.focus();
                    let pos = codeText.length;
                    if (initialCaret != null && initialCaret >= 0) {
                        pos = Math.min(initialCaret, codeText.length);
                    }
                    placeCaretAtTextOffset(highlightPre, pos);
                });
            }

            function buildMathBlockSource(inner) {
                const cleaned = (inner || '').trim();
                if (!cleaned) return '$$';
                if (!cleaned.includes('\n')) return `$$${cleaned}$$`;
                return `$$\n${cleaned}\n$$`;
            }

            function parseMathInnerFromText(text) {
                const trimmed = (text || '').trim();
                if (trimmed.startsWith('$$') && trimmed.endsWith('$$') && trimmed.length > 4) {
                    return trimmed.slice(2, -2).trim();
                }
                return trimmed;
            }

            function blockToMarkdownSource(block) {
                if (!block) return '';
                if (block.type === 'math') return buildMathBlockSource(block.source);
                return block.source || '';
            }

            function blockMarkdownLength(block) {
                return blockToMarkdownSource(block).length;
            }

            let mermaidCurrentTheme = null;
            let mermaidLivePreviewTimer = null;

            function getMermaidThemeName() {
                return document.body.classList.contains('dark') ? 'dark' : 'default';
            }

            function ensureMermaidInitialized() {
                if (typeof mermaid === 'undefined') return false;
                const theme = getMermaidThemeName();
                if (mermaidCurrentTheme !== theme) {
                    mermaid.initialize({
                        startOnLoad: false,
                        securityLevel: 'strict',
                        theme,
                        fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
                    });
                    mermaidCurrentTheme = theme;
                }
                return true;
            }

            function resetMermaidTheme() {
                mermaidCurrentTheme = null;
            }

            function isElementVisibleForLayout(el) {
                if (!el || !el.isConnected) return false;
                let node = el;
                while (node && node !== document.body) {
                    const style = window.getComputedStyle(node);
                    if (style.display === 'none' || style.visibility === 'hidden') {
                        return false;
                    }
                    node = node.parentElement;
                }
                const rect = el.getBoundingClientRect();
                return rect.width > 2 && rect.height > 2;
            }

            function getActiveMermaidRoots() {
                const liveEditor = document.getElementById('live-editor');
                const preview = document.getElementById('preview-content');
                if (document.body.classList.contains('mode-live')) {
                    return liveEditor ? [liveEditor] : [];
                }
                if (document.body.classList.contains('mode-preview')
                    || document.body.classList.contains('mode-split')) {
                    return preview ? [preview] : [];
                }
                return [];
            }

            function prepareMermaidNodeForRender(node) {
                if (!node) return false;
                let src = node.getAttribute('data-mermaid-source');
                if (!src || !src.trim()) {
                    const text = (node.textContent || '').trim();
                    if (text && !text.includes('<svg') && !text.includes('dmermaid')) {
                        src = text;
                        node.setAttribute('data-mermaid-source', src);
                    }
                }
                if (!src || !src.trim()) return false;
                node.innerHTML = '';
                node.textContent = src;
                node.classList.add('mermaid');
                node.classList.remove('is-empty');
                node.removeAttribute('data-mermaid-rendering');
                node.removeAttribute('data-processed');
                node.setAttribute('data-mermaid-pending', '1');
                return true;
            }

            /** Перерисовать все диаграммы после смены светлой/тёмной темы приложения. */
            function rethemeAllMermaidInApp() {
                resetMermaidTheme();
                const roots = getActiveMermaidRoots();
                let hasDiagrams = false;
                roots.forEach((root) => {
                    root.querySelectorAll('.mermaid-diagram').forEach((node) => {
                        if (prepareMermaidNodeForRender(node)) hasDiagrams = true;
                    });
                });
                if (!hasDiagrams) return;
                scheduleMermaidRenderAfterLayout(roots);
            }

            function scheduleMermaidRenderAfterLayout(roots, attempt = 0) {
                const visible = (roots || getActiveMermaidRoots()).filter(isElementVisibleForLayout);
                if (!visible.length) {
                    if (attempt < 8) {
                        requestAnimationFrame(() => scheduleMermaidRenderAfterLayout(roots, attempt + 1));
                    }
                    return;
                }
                visible.forEach((root) => scheduleMermaidRender(root));
            }

            const mermaidContainersScheduled = new Set();
            let mermaidGlobalRenderFrame = null;

            function scheduleMermaidRender(container) {
                if (!container) return;
                mermaidContainersScheduled.add(container);
                if (mermaidGlobalRenderFrame != null) {
                    cancelAnimationFrame(mermaidGlobalRenderFrame);
                }
                mermaidGlobalRenderFrame = requestAnimationFrame(() => {
                    mermaidGlobalRenderFrame = null;
                    const containers = Array.from(mermaidContainersScheduled);
                    mermaidContainersScheduled.clear();
                    renderMermaidInContainers(containers);
                });
            }

            async function renderMermaidInContainers(containers, retryAttempt = 0) {
                if (!containers.length || !ensureMermaidInitialized()) return;

                const visibleContainers = containers.filter(isElementVisibleForLayout);
                if (!visibleContainers.length) {
                    if (retryAttempt < 8) {
                        requestAnimationFrame(() => renderMermaidInContainers(containers, retryAttempt + 1));
                    }
                    return;
                }

                let needsLayoutRetry = false;

                for (const container of visibleContainers) {
                    const nodes = [];
                    container.querySelectorAll('.mermaid-diagram[data-mermaid-pending]').forEach((node) => {
                        if (node.hasAttribute('data-mermaid-rendering')) return;
                        if (!isElementVisibleForLayout(node)) return;
                        prepareMermaidNodeForRender(node);
                        nodes.push(node);
                    });
                    if (!nodes.length) continue;

                    nodes.forEach((node) => node.setAttribute('data-mermaid-rendering', '1'));

                    try {
                        await mermaid.run({ nodes, suppressErrors: false });
                        nodes.forEach((node) => {
                            node.removeAttribute('data-mermaid-pending');
                            node.removeAttribute('data-mermaid-rendering');
                            const src = node.getAttribute('data-mermaid-source');
                            if (src) node.setAttribute('data-mermaid-source', src);
                        });
                    } catch (err) {
                        console.warn('Mermaid render failed:', err);
                        const msg = err.message || String(err);
                        const layoutError = /getBoundingClientRect|suitable point/i.test(msg);
                        if (layoutError && retryAttempt < 3) {
                            needsLayoutRetry = true;
                            nodes.forEach((node) => {
                                node.removeAttribute('data-mermaid-rendering');
                                node.setAttribute('data-mermaid-pending', '1');
                            });
                            continue;
                        }
                        nodes.forEach((node) => {
                            node.removeAttribute('data-mermaid-pending');
                            node.removeAttribute('data-mermaid-rendering');
                            const src = node.getAttribute('data-mermaid-source') || '';
                            node.innerHTML = `<pre class="mermaid-error">${escapeInlineText(msg)}</pre>`;
                            if (src) node.setAttribute('data-mermaid-source', src);
                        });
                    }
                }

                if (needsLayoutRetry) {
                    await new Promise((r) => setTimeout(r, 100));
                    await renderMermaidInContainers(visibleContainers, retryAttempt + 1);
                }
            }

            function isLikelyDisplayMathLine(line) {
                const t = (line || '').trim();
                if (!t) return false;
                if (t === '$$' || (t.startsWith('$$') && t.endsWith('$$'))) return true;
                return /^\\[a-zA-Z@]/.test(t);
            }

            function collectDisplayMathBlock(rawLines, startIndex) {
                const mathLines = [];
                let i = startIndex;
                while (i < rawLines.length) {
                    const t = rawLines[i].trim();
                    if (t === '') break;
                    if (t === '$$') {
                        i++;
                        while (i < rawLines.length && rawLines[i].trim() !== '$$') {
                            mathLines.push(rawLines[i]);
                            i++;
                        }
                        if (i < rawLines.length) i++;
                        break;
                    }
                    if (t.startsWith('$$') && t.endsWith('$$') && t.length > 4) {
                        mathLines.push(t.slice(2, -2).trim());
                        i++;
                        continue;
                    }
                    if (!isLikelyDisplayMathLine(rawLines[i])) break;
                    mathLines.push(rawLines[i]);
                    i++;
                }
                return { latex: mathLines.join('\n'), nextIndex: i };
            }

            async function renderMermaidInContainer(container) {
                if (!container) return;
                await renderMermaidInContainers([container]);
            }

            function detachSpecialBlockEditListeners(block) {
                const wrap = block?._specialEditWrap;
                const pre = block?._specialEditPre;
                if (wrap && block._specialFocusOut) {
                    wrap.removeEventListener('focusout', block._specialFocusOut);
                }
                if (wrap && block._specialKeyDown) {
                    wrap.removeEventListener('keydown', block._specialKeyDown);
                }
                if (pre && block._specialInput) {
                    pre.removeEventListener('input', block._specialInput);
                }
                if (pre && block._specialBlur) {
                    pre.removeEventListener('blur', block._specialBlur);
                }
                delete block._specialEditWrap;
                delete block._specialEditPre;
                delete block._specialFocusOut;
                delete block._specialKeyDown;
                delete block._specialInput;
                delete block._specialBlur;
            }

            function attachSpecialBlockEditHandlers(block, index, wrap, pre, onInput) {
                const tryFinishEdit = () => {
                    if (activeBlockIndex === index) {
                        deactivateCurrentBlock();
                    }
                };

                const onFocusOut = (e) => {
                    const next = e.relatedTarget;
                    if (next && wrap.contains(next)) return;
                    tryFinishEdit();
                };
                block._specialFocusOut = onFocusOut;
                wrap.addEventListener('focusout', onFocusOut);

                const onBlur = () => {
                    requestAnimationFrame(() => {
                        if (activeBlockIndex !== index) return;
                        const active = document.activeElement;
                        if (active && wrap.contains(active)) return;
                        tryFinishEdit();
                    });
                };
                block._specialBlur = onBlur;
                pre.addEventListener('blur', onBlur);

                if (onInput) {
                    const onInputHandler = () => onInput(block, pre);
                    block._specialInput = onInputHandler;
                    pre.addEventListener('input', onInputHandler);
                }

                const onKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        e.preventDefault();
                        deactivateCurrentBlock();
                        return;
                    }
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        document.execCommand('insertText', false, '    ');
                        return;
                    }

                    const currentOffset = getCaretOffsetInEditable(pre);
                    const textLength = getTextFromContentEditable(pre).length;

                    if (e.key === 'ArrowUp' && currentOffset === 0 && index > 0) {
                        e.preventDefault();
                        deactivateCurrentBlock();
                        activateBlockAtOffset(index - 1, blockMarkdownLength(liveBlocks[index - 1]));
                        return;
                    }

                    if (e.key === 'ArrowDown' && currentOffset === textLength && index < liveBlocks.length - 1) {
                        e.preventDefault();
                        deactivateCurrentBlock();
                        activateBlockAtOffset(index + 1, 0);
                    }
                };
                block._specialKeyDown = onKeyDown;
                wrap.addEventListener('keydown', onKeyDown);
            }

            function refreshMathBlockDisplay(display, inner, readOnly) {
                if (!display) return;
                if (!inner.trim()) {
                    display.classList.add('is-empty');
                    display.innerHTML = `<div class="math-placeholder">${readOnly ? '' : 'Click to edit formula…'}</div>`;
                } else {
                    display.classList.remove('is-empty');
                    display.innerHTML = renderMathBlock(inner);
                }
            }

            function refreshMermaidBlockDisplay(diagram, inner, readOnly) {
                if (!diagram) return;
                const src = (inner || '').trim();
                if (!src) {
                    diagram.classList.add('is-empty');
                    diagram.removeAttribute('data-mermaid-pending');
                    diagram.removeAttribute('data-mermaid-source');
                    diagram.innerHTML = `<div class="mermaid-placeholder">${readOnly ? '' : 'Click to edit diagram…'}</div>`;
                    return;
                }
                diagram.classList.remove('is-empty');
                diagram.setAttribute('data-mermaid-source', src);
                diagram.textContent = src;
                diagram.setAttribute('data-mermaid-pending', '1');
            }

            function updateMathLivePreview(block, pre) {
                const wrap = block._specialEditWrap || block.el.querySelector('.math-block-wrap');
                const display = wrap?.querySelector('.math-block-display');
                const latex = parseMathInnerFromText(pre.textContent || '');
                refreshMathBlockDisplay(display, latex, false);
            }

            function updateMermaidLivePreview(block, pre) {
                const wrap = block._specialEditWrap || block.el.querySelector('.mermaid-block-wrap');
                const diagram = wrap?.querySelector('.mermaid-diagram');
                const inner = (pre.textContent || '').trim();
                refreshMermaidBlockDisplay(diagram, inner, false);
                if (!inner) return;
                clearTimeout(mermaidLivePreviewTimer);
                mermaidLivePreviewTimer = setTimeout(() => {
                    if (wrap) scheduleMermaidRenderAfterLayout([wrap]);
                }, 350);
            }

            function setupMathBlock(el, block, index, readOnly) {
                const inner = parseMathInnerFromText(block.source);
                block.source = inner;

                const wrap = document.createElement('div');
                wrap.className = 'math-block-wrap';

                const editorPane = document.createElement('div');
                editorPane.className = 'special-block-editor';

                const bar = document.createElement('div');
                bar.className = 'math-block-bar';
                bar.innerHTML = '<span>Formula (LaTeX)</span>';
                editorPane.appendChild(bar);

                const pre = document.createElement('pre');
                pre.className = 'math-edit-area';
                if (!readOnly) {
                    pre.setAttribute('contenteditable', 'true');
                    pre.setAttribute('spellcheck', 'false');
                    attachPlainTextTyping(pre);
                }
                editorPane.appendChild(pre);

                const previewPane = document.createElement('div');
                previewPane.className = 'special-block-preview';

                const display = document.createElement('div');
                display.className = 'math-block-display';
                previewPane.appendChild(display);

                wrap.appendChild(editorPane);
                wrap.appendChild(previewPane);

                refreshMathBlockDisplay(display, inner, readOnly);

                el.innerHTML = '';
                el.appendChild(wrap);

                if (!readOnly) {
                    previewPane.addEventListener('mousedown', (e) => {
                        if (activeBlockIndex === index) return;
                        e.preventDefault();
                        activateMathBlock(index);
                    });
                }
            }

            function activateMathBlock(index) {
                if (activeBlockIndex === index) return;
                if (activeBlockIndex !== -1) deactivateCurrentBlock();

                activeBlockIndex = index;
                const block = liveBlocks[index];

                let wrap = block.el.querySelector('.math-block-wrap');
                if (!wrap) {
                    setupMathBlock(block.el, block, index, false);
                    wrap = block.el.querySelector('.math-block-wrap');
                }

                const inner = parseMathInnerFromText(block.source);
                const pre = wrap.querySelector('.math-edit-area');
                pre.textContent = inner;

                block.el.className = 'live-block is-rendered';
                block.el.removeAttribute('contenteditable');
                block.el.onblur = null;
                block.el.onkeydown = null;

                wrap.classList.add('is-editing');
                block._specialEditWrap = wrap;
                block._specialEditPre = pre;

                attachSpecialBlockEditHandlers(block, index, wrap, pre, updateMathLivePreview);
                updateMathLivePreview(block, pre);

                requestAnimationFrame(() => {
                    pre.focus();
                    placeCaretAtEnd(pre);
                });
            }

            function setupMermaidBlock(el, block, index, readOnly) {
                const { inner } = parseCodeFenceSource(block.source);

                const wrap = document.createElement('div');
                wrap.className = 'mermaid-block-wrap';

                const editorPane = document.createElement('div');
                editorPane.className = 'special-block-editor';

                const bar = document.createElement('div');
                bar.className = 'mermaid-block-bar';
                bar.innerHTML = '<span>Mermaid diagram</span>';
                editorPane.appendChild(bar);

                const pre = document.createElement('pre');
                pre.className = 'mermaid-edit-area';
                if (!readOnly) {
                    pre.setAttribute('contenteditable', 'true');
                    pre.setAttribute('spellcheck', 'false');
                    attachPlainTextTyping(pre);
                }
                editorPane.appendChild(pre);

                const previewPane = document.createElement('div');
                previewPane.className = 'special-block-preview';

                const diagram = document.createElement('div');
                diagram.className = 'mermaid-diagram';
                previewPane.appendChild(diagram);

                wrap.appendChild(editorPane);
                wrap.appendChild(previewPane);

                refreshMermaidBlockDisplay(diagram, inner, readOnly);

                el.innerHTML = '';
                el.appendChild(wrap);

                if (!readOnly) {
                    previewPane.addEventListener('mousedown', (e) => {
                        if (activeBlockIndex === index) return;
                        e.preventDefault();
                        activateMermaidBlock(index);
                    });
                }

                if (inner.trim()) {
                    scheduleMermaidRenderAfterLayout([wrap]);
                }
            }

            function activateMermaidBlock(index) {
                if (activeBlockIndex === index) return;
                if (activeBlockIndex !== -1) deactivateCurrentBlock();

                activeBlockIndex = index;
                const block = liveBlocks[index];

                let wrap = block.el.querySelector('.mermaid-block-wrap');
                if (!wrap) {
                    setupMermaidBlock(block.el, block, index, false);
                    wrap = block.el.querySelector('.mermaid-block-wrap');
                }

                const { inner } = parseCodeFenceSource(block.source);
                const pre = wrap.querySelector('.mermaid-edit-area');
                pre.textContent = inner;

                block.el.className = 'live-block is-rendered';
                block.el.removeAttribute('contenteditable');
                block.el.onblur = null;
                block.el.onkeydown = null;

                wrap.classList.add('is-editing');
                block._specialEditWrap = wrap;
                block._specialEditPre = pre;

                attachSpecialBlockEditHandlers(block, index, wrap, pre, updateMermaidLivePreview);
                updateMermaidLivePreview(block, pre);

                requestAnimationFrame(() => {
                    pre.focus();
                    placeCaretAtEnd(pre);
                });
            }

            function activateCodeBlockAtCursor() {
                if (!isLiveActive() || !liveBlocks.length) return;

                const pos = textarea.selectionStart;
                let offset = 0;
                for (let i = 0; i < liveBlocks.length; i++) {
                    const blockEnd = offset + blockMarkdownLength(liveBlocks[i]);
                    if (pos <= blockEnd) {
                        const type = liveBlocks[i].type;
                        if (type === 'code-fence') activateCodeFenceBlock(i);
                        else if (type === 'math') activateMathBlock(i);
                        else if (type === 'mermaid') activateMermaidBlock(i);
                        return;
                    }
                    offset = blockEnd + 1;
                }
            }

            function renderTableHTMLFromRows(rows, alignments) {
                if (!rows.length) return '';

                const colCount = Math.max(1, rows[0]?.length || 1);

                let html = `<div class="md-table-scroll"><table class="md-table" data-columns="${colCount}" style="--md-table-columns:${colCount}"><thead><tr>`;
                rows[0].forEach((cell, colIndex) => {
                    html += `<th${tableCellAlignAttr(alignments, colIndex)}>${renderInline(cell)}</th>`;
                });
                html += '</tr></thead>';

                if (rows.length > 1) {
                    html += '<tbody>';
                    for (let i = 1; i < rows.length; i++) {
                        html += '<tr>';
                        rows[i].forEach((cell, colIndex) => {
                            html += `<td${tableCellAlignAttr(alignments, colIndex)}>${renderInline(cell)}</td>`;
                        });
                        html += '</tr>';
                    }
                    html += '</tbody>';
                }

                html += '</table></div>';
                return html;
            }

            function readTableCellText(cell) {
                const text = (cell.textContent || '')
                    .replace(/\u00a0/g, ' ')
                    .replace(/\u200b/g, '');
                return text.trim();
            }

            function setTableCellContent(cell, cellText, alignments, colIndex) {
                const align = alignments?.[colIndex] || 'left';
                cell.style.textAlign = align;
                if (!cellText || !cellText.trim()) {
                    cell.innerHTML = '&nbsp;';
                } else {
                    cell.innerHTML = renderInline(cellText);
                }
            }

            function isTableCellVisuallyEmpty(cell) {
                return readTableCellText(cell) === '';
            }

            function syncTableBlockFromDOM(index) {
                const block = liveBlocks[index];
                if (!block || block.type !== 'table') return;
                const table = block.el.querySelector('table.md-table');
                if (!table) return;
                const rows = [];
                table.querySelectorAll('tr').forEach((tr) => {
                    const cells = [];
                    tr.querySelectorAll('th, td').forEach((cell) => {
                        cells.push(readTableCellText(cell));
                    });
                    if (cells.length) rows.push(cells);
                });
                block.source = tableRowsToMarkdown(rows);
                syncLiveContentToModel();
            }

            const scheduleTableSync = debounce((index) => {
                syncTableBlockFromDOM(index);
            }, 200);

            function setupTableBlock(el, block, index, readOnly) {
                const { rows, alignments } = parseGFMTableSource(block.source);
                const table = document.createElement('table');
                table.className = 'md-table';
                const thead = document.createElement('thead');
                const tbody = document.createElement('tbody');

                rows.forEach((row, rowIndex) => {
                    const tr = document.createElement('tr');
                    row.forEach((cellText, colIndex) => {
                        const cell = document.createElement(rowIndex === 0 ? 'th' : 'td');
                        setTableCellContent(cell, cellText, alignments, colIndex);
                        if (!readOnly) {
                            cell.contentEditable = 'true';
                            cell.addEventListener('focus', () => {
                                lastLiveInteraction = { blockIndex: index, offsetInBlock: null };
                                if (isTableCellVisuallyEmpty(cell)) {
                                    cell.textContent = '';
                                }
                            });
                            cell.addEventListener('blur', () => {
                                if (isTableCellVisuallyEmpty(cell)) {
                                    setTableCellContent(cell, '');
                                }
                            });
                        }
                        tr.appendChild(cell);
                    });
                    if (rowIndex === 0) {
                        thead.appendChild(tr);
                    } else {
                        tbody.appendChild(tr);
                    }
                });

                if (thead.childElementCount) table.appendChild(thead);
                if (tbody.childElementCount) table.appendChild(tbody);

                applyTableColumnCount(table, rows);

                el.innerHTML = '';
                const scroll = document.createElement('div');
                scroll.className = 'md-table-scroll';
                scroll.appendChild(table);
                el.appendChild(scroll);
                el.classList.add('live-block-table');

                if (readOnly) return;

                table.addEventListener('mousedown', (e) => e.stopPropagation());
                table.addEventListener('input', () => scheduleTableSync(index));

                table.addEventListener('keydown', (e) => {
                    const cell = e.target.closest('th, td');
                    if (!cell) return;
                    const allCells = [...table.querySelectorAll('th, td')];
                    const cellIndex = allCells.indexOf(cell);
                    const colCount = table.rows[0]?.cells.length || 1;

                    if (e.key === 'Tab') {
                        e.preventDefault();
                        const nextIndex = e.shiftKey ? cellIndex - 1 : cellIndex + 1;
                        if (allCells[nextIndex]) {
                            allCells[nextIndex].focus();
                        }
                        return;
                    }

                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        const rowIndex = Math.floor(cellIndex / colCount);
                        const colIndex = cellIndex % colCount;
                        const nextRow = table.rows[rowIndex + 1];
                        if (nextRow?.cells[colIndex]) {
                            nextRow.cells[colIndex].focus();
                        }
                    }
                });
            }

            // ============================================================
            // MARKDOWN LISTS (Typora-like)
            // ============================================================

            function parseListLine(line) {
                const task = (line || '').match(/^(\s*)[-*+]\s+\[([ xX])\]\s*(.*)$/);
                if (task) {
                    return {
                        kind: 'task',
                        indent: task[1],
                        checked: task[2].toLowerCase() === 'x',
                        content: task[3],
                    };
                }
                const ordered = (line || '').match(/^(\s*)(\d+)\.\s+(.*)$/);
                if (ordered) {
                    return {
                        kind: 'ordered',
                        indent: ordered[1],
                        number: parseInt(ordered[2], 10),
                        content: ordered[3],
                    };
                }
                const bullet = (line || '').match(/^(\s*)[-*+]\s+(.*)$/);
                if (bullet) {
                    return {
                        kind: 'bullet',
                        indent: bullet[1],
                        content: bullet[2],
                    };
                }
                return null;
            }

            function formatListLine(item, lineIndex) {
                const indent = item.indent || '';
                if (item.kind === 'task') {
                    const mark = item.checked ? 'x' : ' ';
                    return `${indent}- [${mark}] ${item.content || ''}`;
                }
                if (item.kind === 'ordered') {
                    const n = item.number ?? (lineIndex + 1);
                    return `${indent}${n}. ${item.content || ''}`;
                }
                return `${indent}- ${item.content || ''}`;
            }

            function markerLength(item, lineIndex) {
                return formatListLine({ ...item, content: '' }, lineIndex).length;
            }

            function enterListItemSourceEdit(body, item, itemIndex, blockIndex, caretOffsetInContent) {
                if (!body || body.dataset.sourceEdit === '1') return;
                const line = formatListLine(item, itemIndex);
                body.dataset.sourceEdit = '1';
                body.textContent = line;
                const li = body.closest('li');
                if (li) li.classList.add('is-source-edit');

                const markerLen = markerLength(item, itemIndex);
                let caret = markerLen + Math.max(0, caretOffsetInContent ?? 0);
                caret = Math.min(caret, line.length);
                requestAnimationFrame(() => {
                    body.focus();
                    placeCaretAtTextOffset(body, caret);
                });
            }

            let listSourceEditFinishing = false;

            function finishActiveListSourceEdit(exceptBody) {
                const body = document.querySelector('.list-item-body[data-source-edit="1"]');
                if (!body || body === exceptBody) return;
                const blockIndex = parseInt(body.dataset.listBlockIndex, 10);
                const itemIndex = parseInt(body.dataset.listItemIndex, 10);
                if (Number.isNaN(blockIndex) || Number.isNaN(itemIndex)) return;
                finishListItemSourceEdit(body, blockIndex, itemIndex);
            }

            function finishListItemSourceEdit(body, blockIndex, itemIndex) {
                if (!body || body.dataset.sourceEdit !== '1' || listSourceEditFinishing) return;
                const block = liveBlocks[blockIndex];
                if (!block || block.type !== 'list') return;

                listSourceEditFinishing = true;
                body.dataset.sourceEdit = '0';
                body.closest('li')?.classList.remove('is-source-edit');

                const fullText = (body.textContent || '').replace(/\u00a0/g, ' ');
                const lines = block.source.split('\n');
                lines[itemIndex] = fullText;
                block.source = lines.join('\n');

                setupListBlock(block.el, block, blockIndex, false);
                syncLiveContentToModel();
                listSourceEditFinishing = false;
            }

            function syncListSourceLineFromBody(blockIndex, itemIndex, body) {
                const block = liveBlocks[blockIndex];
                if (!block || block.type !== 'list') return;
                const lines = block.source.split('\n');
                lines[itemIndex] = (body.textContent || '').replace(/\u00a0/g, ' ');
                block.source = lines.join('\n');
                currentContent = liveBlocks.map((b) => blockToMarkdownSource(b)).join('\n');
                textarea.value = currentContent;
            }

            function listIndentDepth(indent) {
                const normalized = (indent || '').replace(/\t/g, '    ');
                return Math.floor(normalized.length / 2);
            }

            function listIndentString(depth) {
                return '  '.repeat(Math.max(0, depth));
            }

            function createListItemElement(item, itemIndex, block, blockIndex, readOnly, listKind) {
                const li = document.createElement('li');
                const isTask = listKind === 'task';
                const row = isTask ? document.createElement('div') : li;

                if (isTask) {
                    row.className = 'task-list-item-main';
                }

                if (isTask) {
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.checked = !!item.checked;
                    if (!readOnly) {
                        cb.addEventListener('mousedown', (ev) => ev.stopPropagation());
                        cb.addEventListener('change', () => {
                            syncListBlockFromDOM(blockIndex);
                        });
                    } else {
                        cb.disabled = true;
                    }
                    row.appendChild(cb);
                }

                const body = document.createElement('span');
                body.className = 'list-item-body';
                body.dataset.listBlockIndex = String(blockIndex);
                body.dataset.listItemIndex = String(itemIndex);
                if (item.content.trim()) {
                    body.innerHTML = renderInline(item.content);
                } else if (!readOnly) {
                    body.innerHTML = '<br>';
                }

                if (!readOnly) {
                    body.contentEditable = 'true';
                    attachPlainTextTyping(body);
                    body.addEventListener('mousedown', (ev) => ev.stopPropagation());
                    body.addEventListener('focus', () => {
                        if (listSourceEditFinishing || body.dataset.sourceEdit === '1') return;
                        const block = liveBlocks[blockIndex];
                        if (!block || block.type !== 'list') return;
                        const lines = block.source.split('\n');
                        const parsed = parseListLine(lines[itemIndex]);
                        if (!parsed) return;
                        let contentOffset = 0;
                        const sel = window.getSelection();
                        if (sel && sel.rangeCount && body.contains(sel.anchorNode)) {
                            contentOffset = getCaretOffsetInEditable(body);
                        }
                        enterListItemSourceEdit(body, parsed, itemIndex, blockIndex, contentOffset);
                    });
                    body.addEventListener('blur', () => {
                        if (body.dataset.sourceEdit !== '1') return;
                        requestAnimationFrame(() => {
                            if (body.dataset.sourceEdit !== '1') return;
                            if (document.activeElement === body) return;
                            finishListItemSourceEdit(body, blockIndex, itemIndex);
                        });
                    });
                    body.addEventListener('input', () => {
                        if (body.dataset.sourceEdit === '1') {
                            syncListSourceLineFromBody(blockIndex, itemIndex, body);
                            return;
                        }
                        scheduleListSync(blockIndex);
                    });
                    body.addEventListener('keydown', (ev) => {
                        if (body.dataset.sourceEdit !== '1' && ev.key === 'Backspace') {
                            const offset = getCaretOffsetInEditable(body);
                            if (offset === 0) {
                                const block = liveBlocks[blockIndex];
                                const lines = block?.source?.split('\n') || [];
                                const parsed = parseListLine(lines[itemIndex]);
                                if (parsed) {
                                    ev.preventDefault();
                                    enterListItemSourceEdit(body, parsed, itemIndex, blockIndex, 0);
                                    return;
                                }
                            }
                        }
                        if (body.dataset.sourceEdit === '1' && ev.key === 'Backspace') {
                            const fullText = (body.textContent || '').replace(/\u00a0/g, ' ');
                            const parsed = parseListLine(fullText);
                            const offset = getCaretOffsetInEditable(body);
                            if (parsed && offset <= markerLength(parsed, itemIndex) && !(parsed.content || '').length) {
                                ev.preventDefault();
                                const block = liveBlocks[blockIndex];
                                const lines = block.source.split('\n');
                                lines.splice(itemIndex, 1);
                                block.source = lines.join('\n');
                                body.dataset.sourceEdit = '0';
                                body.closest('li')?.classList.remove('is-source-edit');
                                const parts = liveBlocks.map((b, i) => (i === blockIndex ? blockToMarkdownSource(block) : blockToMarkdownSource(b)));
                                let focusBlockIndex = blockIndex;
                                let focusItemIndex = Math.max(0, itemIndex - 1);
                                let focusCaret = 9999;
                                if (block.source.trim() === '') {
                                    parts.splice(blockIndex, 0, '');
                                    focusBlockIndex = blockIndex + 1;
                                    focusItemIndex = 0;
                                    focusCaret = 0;
                                } else if (itemIndex > 0) {
                                    const prev = parseListLine(block.source.split('\n')[focusItemIndex]);
                                    focusCaret = prev ? (prev.content || '').length : 0;
                                } else {
                                    focusBlockIndex = blockIndex;
                                    focusItemIndex = 0;
                                    focusCaret = 0;
                                }
                                rebuildLiveDocumentAndFocus(parts, focusBlockIndex);
                                if (block.source.trim() !== '') {
                                    focusLiveListItemAfterRebuild(blockIndex, focusItemIndex, focusCaret);
                                }
                                syncLiveContentToModel();
                                return;
                            }
                        }
                        handleLiveListItemKeydown(ev, blockIndex, itemIndex, body);
                    });
                }

                row.appendChild(body);

                if (isTask) {
                    li.appendChild(row);
                }

                return li;
            }

            function listTagForKind(kind) {
                return kind === 'ordered' ? 'ol' : 'ul';
            }

            function buildNestedListElement(items, defaultListKind, block, blockIndex, readOnly) {
                const rootKind = defaultListKind || items[0]?.kind || 'bullet';
                const root = document.createElement(listTagForKind(rootKind));
                if (rootKind === 'task') root.className = 'task-list';

                const stack = [{ depth: 0, listEl: root, kind: rootKind }];

                items.forEach((item, itemIndex) => {
                    const depth = listIndentDepth(item.indent);
                    const itemKind = item.kind || rootKind;

                    while (stack.length > 1 && stack[stack.length - 1].depth > depth) {
                        stack.pop();
                    }

                    while (stack[stack.length - 1].depth < depth) {
                        const parent = stack[stack.length - 1];
                        let parentLi = parent.listEl.lastElementChild;
                        if (!parentLi) {
                            parentLi = createListItemElement(
                                { kind: itemKind, indent: listIndentString(parent.depth), content: '', checked: false, number: 1 },
                                itemIndex,
                                block,
                                blockIndex,
                                readOnly,
                                itemKind
                            );
                            parent.listEl.appendChild(parentLi);
                        }
                        const nested = document.createElement(listTagForKind(itemKind));
                        if (itemKind === 'task') nested.className = 'task-list';
                        parentLi.appendChild(nested);
                        stack.push({
                            depth: stack[stack.length - 1].depth + 1,
                            listEl: nested,
                            kind: itemKind,
                        });
                    }

                    const li = createListItemElement(item, itemIndex, block, blockIndex, readOnly, itemKind);
                    stack[stack.length - 1].listEl.appendChild(li);
                });

                return root;
            }

            function flattenListItemElements(listRoot) {
                const flat = [];
                function walk(listEl) {
                    [...listEl.children].forEach((li) => {
                        if (li.tagName !== 'LI') return;
                        flat.push(li);
                        const nested = li.querySelector(':scope > ul, :scope > ol');
                        if (nested) walk(nested);
                    });
                }
                walk(listRoot);
                return flat;
            }

            function serializeListElementToLines(listEl) {
                const lines = [];

                function walk(listEl, depth) {
                    const isOrdered = listEl.tagName === 'OL';
                    let order = 1;

                    [...listEl.children].forEach((li) => {
                        if (li.tagName !== 'LI') return;

                        const body = li.querySelector(':scope > .list-item-body, :scope > .task-list-item-main .list-item-body');
                        const checkbox = li.querySelector(':scope > .task-list-item-main input[type="checkbox"], :scope > input[type="checkbox"]');
                        const content = (body?.textContent || '').replace(/\u00a0/g, ' ');
                        const indent = listIndentString(depth);
                        const kind = checkbox ? 'task' : (isOrdered ? 'ordered' : 'bullet');

                        lines.push(formatListLine({
                            kind,
                            indent,
                            content,
                            checked: checkbox ? checkbox.checked : false,
                            number: order,
                        }, order - 1));

                        if (isOrdered) order += 1;

                        const nested = li.querySelector(':scope > ul, :scope > ol');
                        if (nested) walk(nested, depth + 1);
                    });
                }

                walk(listEl, 0);
                return lines;
            }

            function getLineRangeForSelection(ta) {
                const start = ta.selectionStart;
                const end = ta.selectionEnd;
                const rangeStart = ta.value.lastIndexOf('\n', Math.max(0, start - 1)) + 1;
                let rangeEnd;
                if (start === end) {
                    const lineEnd = ta.value.indexOf('\n', start);
                    rangeEnd = lineEnd === -1 ? ta.value.length : lineEnd;
                } else {
                    rangeEnd = ta.value.indexOf('\n', end);
                    if (rangeEnd === -1) rangeEnd = ta.value.length;
                }
                return { rangeStart, rangeEnd };
            }

            function toggleMarkdownList(kind) {
                const live = isLiveActive();
                if (live) syncLiveCaretToTextarea();
                const ta = textarea;
                if (!live) ta.focus();

                const { rangeStart, rangeEnd } = getLineRangeForSelection(ta);
                const selectedText = ta.value.slice(rangeStart, rangeEnd);
                const lines = selectedText.split('\n');

                const parsedLines = lines.map((line) => ({ line, parsed: parseListLine(line) }));
                const allMatchKind = parsedLines.length > 0
                    && parsedLines.every(({ parsed }) => parsed && parsed.kind === kind);

                const hasNonEmptyLine = parsedLines.some(({ line }) => line.trim() !== '');
                let orderedIndex = 0;
                const newLines = parsedLines.map(({ line, parsed }) => {
                    if (allMatchKind && parsed) {
                        return parsed.indent + parsed.content;
                    }
                    // Пустая строка: только разделитель между абзацами в многострочном выделении
                    if (line.trim() === '' && !parsed && parsedLines.length > 1 && hasNonEmptyLine) {
                        return line;
                    }
                    const indent = parsed?.indent || '';
                    const content = parsed ? parsed.content : line.trim();
                    const number = kind === 'ordered' ? (++orderedIndex) : 1;
                    return formatListLine({
                        kind,
                        indent,
                        content,
                        checked: false,
                        number,
                    }, number - 1);
                });

                const replacement = newLines.join('\n');
                ta.setRangeText(replacement, rangeStart, rangeEnd, 'end');

                if (ta.selectionStart === ta.selectionEnd) {
                    const first = parseListLine(newLines[0]);
                    if (first) {
                        const pos = rangeStart + markerLength(first, 0);
                        ta.setSelectionRange(pos, pos);
                    }
                }

                rememberTextareaSelection();

                const caretPos = ta.selectionStart;
                if (live) {
                    currentContent = ta.value;
                    scheduleLiveRebuild.cancel();
                    initLiveEditor(ta.value);
                    scheduleContentSync(ta.value);
                    const blockIdx = blockIndexAtTextareaOffset(caretPos);
                    if (liveBlocks[blockIdx]?.type === 'list') {
                        focusLiveListItemAfterRebuild(blockIdx, 0, 0);
                    }
                } else {
                    ta.dispatchEvent(new Event('input'));
                }
            }

            function handleListKeydown(e) {
                if (e.key !== 'Enter' || e.shiftKey || e.metaKey || e.ctrlKey || e.altKey) return false;

                const ta = textarea;
                const pos = ta.selectionStart;
                if (pos !== ta.selectionEnd) return false;

                const lineStart = ta.value.lastIndexOf('\n', pos - 1) + 1;
                const lineEnd = ta.value.indexOf('\n', pos);
                const lineEndPos = lineEnd === -1 ? ta.value.length : lineEnd;
                const line = ta.value.slice(lineStart, lineEndPos);
                const parsed = parseListLine(line);
                if (!parsed) return false;

                const prefixLen = markerLength(parsed, 0);
                const cursorInLine = pos - lineStart;
                const contentStart = prefixLen;
                const textBefore = line.slice(contentStart, cursorInLine);
                const textAfter = line.slice(cursorInLine);

                if (parsed.content.trim() === '' && cursorInLine >= contentStart) {
                    e.preventDefault();
                    const emptyLine = parsed.indent;
                    ta.setRangeText(emptyLine + '\n', lineStart, lineEndPos, 'end');
                    const newPos = lineStart + emptyLine.length + 1;
                    ta.setSelectionRange(newPos, newPos);
                    rememberTextareaSelection();
                    ta.dispatchEvent(new Event('input'));
                    if (isLiveActive()) initLiveEditor(ta.value);
                    return true;
                }

                e.preventDefault();
                const currentLine = formatListLine({ ...parsed, content: textBefore }, parsed.number);
                const nextNumber = parsed.kind === 'ordered'
                    ? (parsed.number || 1) + 1
                    : 1;
                const nextLine = formatListLine({
                    kind: parsed.kind,
                    indent: parsed.indent,
                    content: textAfter,
                    checked: false,
                    number: nextNumber,
                }, nextNumber - 1);

                ta.setRangeText(currentLine + '\n' + nextLine, lineStart, lineEndPos, 'end');
                const newPos = lineStart + currentLine.length + 1 + markerLength({
                    kind: parsed.kind,
                    indent: parsed.indent,
                    checked: false,
                    number: nextNumber,
                }, nextNumber - 1);
                ta.setSelectionRange(newPos, newPos);
                rememberTextareaSelection();
                ta.dispatchEvent(new Event('input'));
                if (isLiveActive()) initLiveEditor(ta.value);
                return true;
            }

            function syncListBlockFromDOM(index) {
                const block = liveBlocks[index];
                if (!block || block.type !== 'list') return;

                const listEl = block.el.querySelector('ul, ol');
                if (!listEl) return;

                block.source = serializeListElementToLines(listEl).join('\n');
                syncLiveContentToModel();
            }

            const scheduleListSync = debounce((index) => {
                syncListBlockFromDOM(index);
            }, 200);

            function blockIndexAtTextareaOffset(offset) {
                let cursor = 0;
                for (let i = 0; i < liveBlocks.length; i++) {
                    const source = liveBlocks[i]?.source ?? '';
                    const blockEnd = cursor + source.length;
                    if (offset <= blockEnd) return i;
                    cursor = blockEnd + 1;
                }
                return Math.max(liveBlocks.length - 1, 0);
            }

            function focusLiveListItemAfterRebuild(blockIndex, itemIndex, caretOffset) {
                const placeCaret = () => {
                    const block = liveBlocks[blockIndex];
                    if (!block?.el || block.type !== 'list') return false;

                    const listRoot = block.el.querySelector('ul, ol');
                    if (!listRoot) return false;

                    const flatItems = flattenListItemElements(listRoot);
                    const li = flatItems[itemIndex];
                    if (!li) return false;

                    const body = li.querySelector('.list-item-body');
                    if (!body) return false;

                    if (body.innerHTML === '<br>' || body.textContent === '\u00a0') {
                        body.textContent = '';
                    }

                    body.focus();
                    placeCaretAtTextOffset(body, caretOffset ?? 0);
                    lastLiveInteraction = { blockIndex, offsetInBlock: null };
                    return true;
                };

                requestAnimationFrame(() => {
                    if (placeCaret()) return;
                    requestAnimationFrame(placeCaret);
                });
            }

            function rebuildLiveDocumentAndFocus(parts, focusBlockIndex) {
                applyLiveDocumentParts(parts, focusBlockIndex, 0);
            }

            function handleLiveListItemKeydown(e, blockIndex, itemIndex, bodyEl) {
                if (e.key !== 'Enter' || e.shiftKey) return;
                e.preventDefault();

                const block = liveBlocks[blockIndex];
                if (!block || block.type !== 'list') return;

                const lines = block.source.split('\n');
                const sel = window.getSelection();
                if (!sel || sel.rangeCount === 0) return;

                const range = sel.getRangeAt(0);
                const pre = document.createRange();
                pre.selectNodeContents(bodyEl);
                pre.setEnd(range.endContainer, range.endOffset);
                const offsetInBody = pre.toString().length;

                if (bodyEl.dataset.sourceEdit === '1') {
                    const fullText = (bodyEl.textContent || '').replace(/\u00a0/g, ' ');
                    const parsed = parseListLine(fullText);
                    if (!parsed) return;

                    const markerLen = markerLength(parsed, itemIndex);
                    const content = parsed.content || '';
                    const contentOffset = Math.max(0, Math.min(offsetInBody - markerLen, content.length));

                    if (content.trim() === '' && contentOffset <= 0) {
                        lines.splice(itemIndex, 1);
                        block.source = lines.join('\n');
                        bodyEl.dataset.sourceEdit = '0';
                        bodyEl.closest('li')?.classList.remove('is-source-edit');
                        const parts = liveBlocks.map((b, i) => (i === blockIndex ? blockToMarkdownSource(block) : blockToMarkdownSource(b)));
                        let focusBlockIndex = blockIndex;
                        if (block.source.trim() === '') {
                            parts.splice(blockIndex, 0, '');
                            focusBlockIndex = blockIndex + 1;
                        }
                        rebuildLiveDocumentAndFocus(parts, focusBlockIndex);
                        return;
                    }

                    const before = content.slice(0, contentOffset);
                    const after = content.slice(contentOffset);
                    const newItemIndex = itemIndex + 1;

                    lines[itemIndex] = formatListLine({ ...parsed, content: before }, parsed.number);
                    const nextNumber = parsed.kind === 'ordered'
                        ? (parsed.number || itemIndex + 1) + 1
                        : itemIndex + 2;
                    lines.splice(newItemIndex, 0, formatListLine({
                        kind: parsed.kind,
                        indent: parsed.indent,
                        content: after,
                        checked: false,
                        number: nextNumber,
                    }, newItemIndex));

                    block.source = lines.join('\n');
                    const parts = liveBlocks.map((b, i) => (i === blockIndex ? blockToMarkdownSource(block) : blockToMarkdownSource(b)));
                    const newText = parts.join('\n');
                    currentContent = newText;
                    textarea.value = newText;
                    scheduleLiveRebuild.cancel();
                    initLiveEditor(newText);
                    scheduleContentSync(newText);
                    focusLiveListItemAfterRebuild(blockIndex, newItemIndex, 0);
                    return;
                }

                const parsed = parseListLine(lines[itemIndex]);
                if (!parsed) return;

                const text = (bodyEl.textContent || '').replace(/\u00a0/g, ' ');

                if (text.trim() === '') {
                    lines.splice(itemIndex, 1);
                    block.source = lines.join('\n');

                    const parts = [];
                    let focusBlockIndex = blockIndex;

                    for (let i = 0; i < liveBlocks.length; i++) {
                        if (i !== blockIndex) {
                            parts.push(blockToMarkdownSource(liveBlocks[i]));
                            continue;
                        }
                        if (block.source.trim() === '') {
                            parts.push('');
                            focusBlockIndex = parts.length - 1;
                        } else {
                            parts.push(block.source);
                            parts.push('');
                            focusBlockIndex = blockIndex + 1;
                        }
                    }

                    rebuildLiveDocumentAndFocus(parts, focusBlockIndex);
                    return;
                }

                const before = text.slice(0, offsetInBody);
                const after = text.slice(offsetInBody);
                const newItemIndex = itemIndex + 1;

                lines[itemIndex] = formatListLine({ ...parsed, content: before }, parsed.number);
                const nextNumber = parsed.kind === 'ordered'
                    ? (parsed.number || itemIndex + 1) + 1
                    : itemIndex + 2;
                lines.splice(newItemIndex, 0, formatListLine({
                    kind: parsed.kind,
                    indent: parsed.indent,
                    content: after,
                    checked: false,
                    number: nextNumber,
                }, newItemIndex));

                block.source = lines.join('\n');
                const parts = liveBlocks.map((b, i) => (i === blockIndex ? blockToMarkdownSource(block) : blockToMarkdownSource(b)));
                const newText = parts.join('\n');
                currentContent = newText;
                textarea.value = newText;
                scheduleLiveRebuild.cancel();
                initLiveEditor(newText);
                scheduleContentSync(newText);
                focusLiveListItemAfterRebuild(blockIndex, newItemIndex, 0);
            }

            function setupListBlock(el, block, index, readOnly) {
                const lines = block.source.split('\n');
                const items = lines.map((line, i) => parseListLine(line)).filter(Boolean);
                if (!items.length) {
                    el.innerHTML = '<br>';
                    return;
                }

                const listKind = block.listKind || items[0].kind;
                const list = buildNestedListElement(items, listKind, block, index, readOnly);

                el.innerHTML = '';
                el.appendChild(list);
            }

            const HTML_BLOCK_CONTAINER_TAGS = new Set([
                'details', 'div', 'section', 'article', 'aside', 'header', 'footer',
                'figure', 'main', 'nav', 'center',
            ]);

            const HTML_ALLOWED_TAGS = new Set([
                ...HTML_BLOCK_CONTAINER_TAGS,
                'summary', 'figcaption', 'span', 'p', 'br', 'hr', 'mark', 'sub', 'sup',
                'kbd', 'abbr', 'strong', 'em', 'del', 'code', 'ul', 'ol', 'li', 'a', 'img',
            ]);

            function isAllowedHTMLTag(tag) {
                const m = (tag || '').match(/^<\/?([a-z][a-z0-9]*)\b/i);
                if (!m) return false;
                if (!HTML_ALLOWED_TAGS.has(m[1].toLowerCase())) return false;
                return !/javascript:|on\w+\s*=/i.test(tag);
            }

            function sanitizeHTMLTag(tag) {
                if (!isAllowedHTMLTag(tag)) {
                    return (tag || '')
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                }
                if ((tag || '').match(/^<img\b/i)) {
                    return tag.replace(/\ssrc=(["'])(.*?)\1/i, (_, quote, src) => {
                        return ` src=${quote}${resolveImageSrc(src)}${quote}`;
