<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
            <link id="highlight-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
                <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    body {
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        height: 100vh;
                        overflow: hidden;
                        background: #fff;
                        color: #24292e;
                    }
                    body.dark {
                        background: #0d1117;
                        color: #c9d1d9;
                    }
                    
                    #swap-button {
                        position: absolute;
                        top: 2px;
                        left: 50%;
                        transform: translateX(-50%);
                        z-index: 1000;
                        background: #fff;
                        border: 1px solid #d0d7de;
                        border-radius: 6px;
                        padding: 6px 10px;
                        cursor: pointer;
                        font-size: 14px;
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                        transition: all 0.2s;
                        pointer-events: auto;
                    }
                    body.dark #swap-button {
                        background: #21262d;
                        border-color: #30363d;
                        color: #c9d1d9;
                    }
                    #swap-button:hover {
                        background: #f6f8fa;
                        border-color: #b0b7be;
                        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
                    }
                    body.dark #swap-button:hover {
                        background: #30363d;
                        border-color: #484f58;
                    }
                    
                    #editor-container {
                        display: flex;
                        width: 100vw;
                        height: 100vh;
                        position: relative;
                        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                        
                    }
                    
                    #editor-container.swapped {
                        flex-direction: row-reverse;
                    }
                    
                    .editor-pane {
                        flex: 1 1 0;
                        min-width: 0;
                        height: 100%;
                        overflow: auto;
                        position: relative;
                        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                    }
                    
                    /* Border для markdown-панели когда она слева */
                    #markdown-pane {
                        width: 50% !important;
                        padding: 0;
                        border: 1px solid gray;
                    }
                    
                    body.dark #markdown-pane {
                        border-right-color: #30363d;
                    }
                    
                    #preview-pane {
                        width: 50% !important;
                        box-sizing: border-box;
                        border: 1px solid gray;
                    }
                    
                    /* Режимы отображения */
                    body.mode-edit #live-editor { display: none; }
                    body.mode-edit #editor-container { display: flex; }
                    body.mode-edit #markdown-pane {
                        display: block;
                        width: 100% !important;
                        border-right: none;
                        border-left: none;
                    }
                    body.mode-edit #preview-pane { display: none; }
                    body.mode-edit #swap-button { display: none; }

                    body.mode-preview #live-editor { display: none; }
                    body.mode-preview #editor-container { display: flex; }
                    body.mode-preview #markdown-pane { display: none; }
                    body.mode-preview #preview-pane {
                        display: block;
                        width: 100% !important;
                        border-left: none;
                        border-right: none;
                    }
                    body.mode-preview #swap-button { display: none; }

                    body.mode-split #live-editor { display: none; }
                    body.mode-split #editor-container { display: flex; }
                    body.mode-split #markdown-pane {
                        display: block;
                        width: 50% !important;
                    }
                    body.mode-split #preview-pane {
                        display: block;
                        width: 50% !important;
                    }

                    body.mode-live #live-editor { display: block; }
                    body.mode-live #editor-container { display: none; }
                    body.mode-live #markdown-pane { display: none; }
                    body.mode-live #preview-pane { display: none; }
                    body.mode-live #swap-button { display: none; }

                    
                    /* Стили превью */
                    #preview-content {
                        line-height: 1.6;
                        font-size: 16px;
                        padding: 40px 20px;
                    }
                    #preview-content h1 { font-size: 2em; margin: 0.67em 0; }
                    #preview-content h2 { font-size: 1.6em; margin: 0.75em 0; }
                    #preview-content h3 { font-size: 1.3em; margin: 0.83em 0; }
                    #preview-content code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: #f6f8fa;
                        padding: 2px 6px;
                        border-radius: 3px;
                        color: #cf222e;
                    }
                    body.dark #preview-content code {
                        background: #161b22;
                        color: #ff7b72;
                    }
                    /* Инлайн код (не в блоках) */
                    #preview-content :not(pre) > code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: #f6f8fa;
                        padding: 2px 6px;
                        border-radius: 3px;
                        color: #cf222e;
                    }
                    body.dark #preview-content :not(pre) > code {
                        background: #161b22;
                        color: #ff7b72;
                    }
                    
                    /* Блоки кода - используем стили highlight.js */
                    #preview-content pre {
                        border-radius: 6px;
                        overflow: auto;
                        margin: 1em 0;
                        padding: 16px;
                    }
                    #preview-content pre code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: transparent !important;
                        padding: 0;
                    }
                    #preview-content table {
                        border-collapse: collapse;
                        margin: 1em 0;
                        width: 100%;
                    }
                    #preview-content th,
                    #preview-content td {
                        padding: 6px 13px;
                        border: 1px solid #d0d7de;
                    }
                    body.dark #preview-content th,
                    body.dark #preview-content td {
                        border-color: #30363d;
                    }
                    #preview-content thead {
                        background: #f6f8fa;
                    }
                    body.dark #preview-content thead {
                        background: #161b22;
                    }
                    #preview-content blockquote {
                        margin: 0;
                        padding-left: 1em;
                        border-left: 4px solid #d0d7de;
                        color: #57606a;
                    }
                    #preview-content ul,
                    #preview-content ol {
                        padding-left: 2em;
                        margin: 0.5em 0;
                    }
                    #preview-content li {
                        margin: 0.25em 0;
                    }
                    #preview-content hr {
                        border: none;
                        border-top: 1px solid #d0d7de;
                        margin: 2em 0;
                    }
                    body.dark #preview-content hr {
                        border-top-color: #30363d;
                    }
                    body.dark #preview-content blockquote {
                        border-left-color: #30363d;
                        color: #8b949e;
                    }
                    
                    /* === LIVE MODE === */
                    #live-editor {
                        display: none;
                        width: 100%;
                        height: 100%;
                        overflow-y: auto;
                        padding: 40px 80px;
                        box-sizing: border-box;
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        font-size: 16px;
                        line-height: 1.7;
                        outline: none;
                    }
                    
                    body.mode-live #live-editor { display: block; }
                    body.mode-live #markdown-pane { display: none; }
                    body.mode-live #preview-pane { display: none; }
                    body.mode-live #swap-button { display: none; }
                    
                    /* Блоки в live-режиме */
                    .live-block {
                        min-height: 1.7em;
                        padding: 2px 0;
                        outline: none;
                        border-radius: 3px;
                        transition: background 0.1s;
                        white-space: pre-wrap;
                        word-break: break-word;
                        cursor: text;
                    }
                    .live-block:focus { outline: none; }
                    
                    /* Активный блок — показываем исходник */
                    .live-block.is-source {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        font-size: 14px;
                        color: inherit;
                        background: rgba(0,0,0,0.03);
                        border-radius: 4px;
                        padding: 2px 6px;
                    }
                    body.dark .live-block.is-source {
                        background: rgba(255,255,255,0.05);
                    }
                    
                    /* Рендеренные блоки */
                    .live-block.is-rendered { font-family: inherit; }
                    
                    /* Заголовки */
                    .live-block[data-type="h1"] { font-size: 2em; font-weight: 700; margin: 0.4em 0 0.2em; }
                    .live-block[data-type="h2"] { font-size: 1.6em; font-weight: 700; margin: 0.4em 0 0.2em; }
                    .live-block[data-type="h3"] { font-size: 1.3em; font-weight: 600; margin: 0.3em 0 0.2em; }
                    .live-block[data-type="h4"] { font-size: 1.1em; font-weight: 600; margin: 0.3em 0 0.1em; }
                    .live-block[data-type="h5"] { font-size: 1em; font-weight: 600; margin: 0.2em 0 0.1em; }
                    .live-block[data-type="h6"] { font-size: 0.9em; font-weight: 600; margin: 0.2em 0 0.1em; color: #57606a; }
                    body.dark .live-block[data-type="h6"] { color: #8b949e; }
                    
                    /* Цитата */
                    .live-block[data-type="blockquote"] {
                        border-left: 4px solid #d0d7de;
                        padding-left: 1em;
                        color: #57606a;
                        margin: 0.3em 0;
                    }
                    body.dark .live-block[data-type="blockquote"] {
                        border-left-color: #30363d;
                        color: #8b949e;
                    }
                    
                    /* Горизонтальная линия */
                    .live-block[data-type="hr"] {
                        border: none;
                        border-top: 2px solid #d0d7de;
                        margin: 1em 0;
                        height: 2px;
                    }
                    body.dark .live-block[data-type="hr"] { border-top-color: #30363d; }
                    
                    /* Код блок */
                    .live-block[data-type="code-fence"] {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        font-size: 13px;
                        background: #f6f8fa;
                        border-radius: 6px;
                        padding: 12px 16px;
                        margin: 0.5em 0;
                        color: #24292e;
                        white-space: pre;
                    }
                    body.dark .live-block[data-type="code-fence"] {
                        background: #161b22;
                        color: #c9d1d9;
                    }
                    
                    /* Параграф */
                    .live-block[data-type="p"] { margin: 0.1em 0; }
                    
                    /* Inline стили внутри rendered блоков */
                    .live-block.is-rendered strong { font-weight: 700; }
                    .live-block.is-rendered em { font-style: italic; }
                    .live-block.is-rendered code {
                        font-family: 'SF Mono', Monaco, monospace;
                        background: #f6f8fa;
                        padding: 2px 5px;
                        border-radius: 3px;
                        font-size: 0.88em;
                        color: #cf222e;
                    }
                    body.dark .live-block.is-rendered code {
                        background: #161b22;
                        color: #ff7b72;
                    }
                    .live-block.is-rendered a { color: #0969da; text-decoration: underline; }
                    body.dark .live-block.is-rendered a { color: #58a6ff; }
                    .live-block.is-rendered del { text-decoration: line-through; color: #57606a; }
                    
                    /* Курсор в live-mode */
                    #live-editor:focus-within .live-block.is-source { caret-color: currentColor; }
                </style>
    </head>
    <body class="mode-split">
        
        <!-- Live mode editor -->
        <div id="live-editor" tabindex="0"></div>
        
        <div id="editor-container">
            <button id="swap-button" title="Поменять панели местами">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M2 4h12M2 12h12M4 2L2 4l2 2M12 10l2 2-2 2"/>
                </svg>
            </button>
            <div class="editor-pane" id="markdown-pane">
                <textarea id="markdown-textarea" style="
                width: 100%; height: 100%; border: none; outline: none;
                font-family: 'SF Mono', Monaco, monospace; font-size: 14px;
                padding: 40px 60px; background: transparent;
                resize: none; color: inherit; line-height: 1.6;
            "></textarea>
            </div>
            <div class="editor-pane" id="preview-pane">
                <div id="preview-content"></div>
            </div>
        </div>
        
        <!-- marked.js -->
        <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.min.js"></script>
        
        <script>
            console.log('🎉 Загрузка скрипта');
            
            let isSyncing = false;
            let currentContent = '';
            let isInitialized = false;
            let syncScroll = true;
            let isSwapped = false;
            let isLiveMode = false;
            let lastScrollTime = { markdown: 0, preview: 0 };
            let scrollDebounce = null;
            
            
            const textarea = document.getElementById('markdown-textarea');
            const preview = document.getElementById('preview-content');
            const markdownPane = document.getElementById('markdown-pane');
            const previewPane = document.getElementById('preview-pane');
            const editorContainer = document.getElementById('editor-container');
            const swapButton = document.getElementById('swap-button');
            
            // Проверка наличия элементов
            console.log('🔍 Проверка элементов:');
            console.log('markdownPane:', markdownPane);
            console.log('previewPane:', previewPane);
            console.log('syncScroll:', syncScroll);
            
            marked.setOptions({
                breaks: true,
                gfm: true,
                langPrefix: 'language-'
            });
            
            
            
            function renderPreview(text) {
                try {
                    const html = marked.parse(text || '');
                    preview.innerHTML = html;
                    
                    // Сопоставляем каждый блок preview с диапазоном строк исходника
                    const lines = text.split('\n');
                    const blocks = Array.from(preview.children); // прямые дети
                    let lineIndex = 0;
                    
                    for (let block of blocks) {
                        let linesCount = 1;
                        const tag = block.tagName.toLowerCase();
                        
                        if (tag === 'pre') {
                            // Блок кода занимает столько строк, сколько внутри pre + 2 (```)
                            const codeLines = block.textContent.split('\n').length;
                            linesCount = codeLines + 2;
                        } else if (tag === 'hr' || /^h[1-6]$/.test(tag) || tag === 'blockquote') {
                            linesCount = 1;
                        } else {
                            // Параграф или пустая строка
                            linesCount = 1;
                        }
                        
                        block.dataset.sourceLineStart = lineIndex;
                        block.dataset.sourceLineEnd = lineIndex + linesCount - 1;
                        lineIndex += linesCount;
                    }

                    // Highlight.js
                    if (window.hljs) {
                        preview.querySelectorAll('pre code').forEach((block) => {
                            const classes = block.className.match(/language-(\w+)/);
                            if (classes && classes[1]) {
                                block.setAttribute('data-language', classes[1]);
                            }
                            block.parentElement.classList.add('hljs');
                            hljs.highlightElement(block);
                        });
                    }
                } catch (e) {
                    console.error('❌ Ошибка парсинга Markdown:', e);
                    preview.textContent = text;
                }
            }
            
            window.cmEditor = {
                updateContent(text) {
                    if (isSyncing) return;
                    currentContent = text;
                    textarea.value = text;
                    renderPreview(text);
                    if (isLiveMode) {
                        initLiveEditor(text);
                    }
                },

                setTheme(isDark) {
                    if (isDark) {
                        document.body.classList.add('dark');
                        textarea.style.backgroundColor = '#0d1117';
                        textarea.style.color = '#c9d1d9';
                    } else {
                        document.body.classList.remove('dark');
                        textarea.style.backgroundColor = 'transparent';
                        textarea.style.color = 'inherit';
                    }
                },

                setViewMode(mode) {
                    const modeDebug = document.getElementById("mode-debug");
                    if (modeDebug) {
                        modeDebug.textContent = `MODE: ${mode}`;
                    }

                    isLiveMode = (mode === 'live');

                    document.body.className = document.body.className
                        .replace(/mode-\w+/g, '')
                        .trim();

                    document.body.classList.add(`mode-${mode}`);

                    if (mode === 'live') {
                        initLiveEditor(currentContent);
                    }
                },

                setSyncScroll(enabled) {
                    syncScroll = enabled;
                },

                setSwapped(swapped) {
                    isSwapped = swapped;
                    if (swapped) {
                        editorContainer.classList.add('swapped');
                    } else {
                        editorContainer.classList.remove('swapped');
                    }
                },

                setPreviewTheme(themeName, themeCSS) {
                    let oldStyle = document.getElementById('custom-theme-style');
                    if (oldStyle) oldStyle.remove();

                    const style = document.createElement('style');
                    style.id = 'custom-theme-style';
                    style.textContent = themeCSS;
                    document.head.appendChild(style);

                    renderPreview(currentContent);
                },

                setCodeBlockTheme(themeName, cdnURL) {
                    let oldLink = document.getElementById('highlight-theme');
                    if (oldLink) oldLink.remove();

                    const link = document.createElement('link');
                    link.id = 'highlight-theme';
                    link.rel = 'stylesheet';
                    link.href = cdnURL;
                    link.onload = () => renderPreview(currentContent);
                    document.head.appendChild(link);
                },
                
                insertFormatting(prefix, suffix) {
                    const ta = textarea;
                    const start = ta.selectionStart;
                    const end = ta.selectionEnd;
                    const selected = ta.value.substring(start, end);
                    const replacement = prefix + (selected || 'text') + suffix;
                    ta.setRangeText(replacement, start, end, 'end');
                    ta.dispatchEvent(new Event('input'));
                    // Если не было выделения — ставим курсор между prefix и suffix
                    if (start === end) {
                        const pos = start + prefix.length + (selected || 'text').length;
                        ta.setSelectionRange(start + prefix.length, pos);
                    }
                    ta.focus();
                },

                insertAtLineStart(prefix) {
                    const ta = textarea;
                    const start = ta.selectionStart;
                    const lineStart = ta.value.lastIndexOf('\n', start - 1) + 1;
                    ta.setRangeText(prefix, lineStart, lineStart, 'end');
                    ta.dispatchEvent(new Event('input'));
                    ta.focus();
                },

                insertText(text) {
                    const ta = textarea;
                    const start = ta.selectionStart;
                    const end = ta.selectionEnd;
                    ta.setRangeText(text, start, end, 'end');
                    ta.dispatchEvent(new Event('input'));
                    ta.focus();
                },


                getContent() {
                    return currentContent;
                }
                
            };
            
            window.initializeEditor = function(initialText = '', isDark = false) {
                console.log('🚀 Инициализация редактора...');

                window.cmEditor.setTheme(isDark);
                currentContent = initialText;
                textarea.value = initialText;
                renderPreview(initialText);

                if (!isInitialized) {
                    textarea.addEventListener('input', () => {
                        if (isSyncing) return;
                        const text = textarea.value;
                        currentContent = text;
                        renderPreview(text);

                        if (window.webkit?.messageHandlers?.contentChanged) {
                            window.webkit.messageHandlers.contentChanged.postMessage(text);
                        }

                        if (isLiveMode) {
                            initLiveEditor(text);
                        }
                    });

                    swapButton.addEventListener('click', () => {
                        isSwapped = !isSwapped;
                        window.cmEditor.setSwapped(isSwapped);

                        if (window.webkit?.messageHandlers?.swapPanes) {
                            window.webkit.messageHandlers.swapPanes.postMessage(isSwapped);
                        }
                    });
                    
                    // ===== SCROLL SYNC (процентная синхронизация) =====
                    let isInternalScroll = false;

                    function syncScrollPercent(source, target) {
                        if (isInternalScroll) return;
                        isInternalScroll = true;

                        const maxScrollSource = source.scrollHeight - source.clientHeight;
                        const maxScrollTarget = target.scrollHeight - target.clientHeight;

                        if (maxScrollSource <= 0 || maxScrollTarget <= 0) {
                            isInternalScroll = false;
                            return;
                        }

                        const scrollPercent = source.scrollTop / maxScrollSource;
                        target.scrollTop = scrollPercent * maxScrollTarget;

                        setTimeout(() => { isInternalScroll = false; }, 20);
                    }

                    textarea.addEventListener('scroll', () => {
                        if (!syncScroll) return;
                        const now = Date.now();
                        if (now - lastScrollTime.preview < 50) return;
                        lastScrollTime.markdown = now;
                        syncScrollPercent(textarea, previewPane);
                    });

                    previewPane.addEventListener('scroll', () => {
                        if (!syncScroll) return;
                        const now = Date.now();
                        if (now - lastScrollTime.markdown < 50) return;
                        lastScrollTime.preview = now;
                        syncScrollPercent(previewPane, textarea);
                    });

                    window.addEventListener('resize', () => {
                        if (syncScroll && document.body.classList.contains('mode-split')) {
                            syncScrollPercent(textarea, previewPane);
                        }
                    });

                    console.log('✅ Синхронизация скролла включена');
                    isInitialized = true;
                }

                console.log('✅ Редактор инициализирован');
            };

            // ============================================================
            // LIVE MODE — Typora-like inline rendering
            // ============================================================

            const liveEditor = document.getElementById('live-editor');
            let liveBlocks = [];
            let activeBlockIndex = -1;
            let liveContent = '';
            // isLiveMode уже объявлена глобально

            function parseMarkdownBlocks(text) {
                const rawLines = (text || '').split('\n');
                const blocks = [];
                let i = 0;

                while (i < rawLines.length) {
                    const line = rawLines[i];

                    if (line.trim() === '') {
                        blocks.push({ type: 'empty', source: '' });
                        i++;
                        continue;
                    }

                    if (line.trim().startsWith('```')) {
                        let fenceLines = [line];
                        i++;
                        while (i < rawLines.length && !rawLines[i].trim().startsWith('```')) {
                            fenceLines.push(rawLines[i]);
                            i++;
                        }
                        if (i < rawLines.length) {
                            fenceLines.push(rawLines[i]);
                            i++;
                        }
                        blocks.push({ type: 'code-fence', source: fenceLines.join('\n') });
                        continue;
                    }

                    const hMatch = line.match(/^(#{1,6})\s+(.+)/);
                    if (hMatch) {
                        blocks.push({ type: `h${hMatch[1].length}`, source: line });
                        i++;
                        continue;
                    }

                    if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(line.trim())) {
                        blocks.push({ type: 'hr', source: line });
                        i++;
                        continue;
                    }

                    if (line.startsWith('>')) {
                        blocks.push({ type: 'blockquote', source: line });
                        i++;
                        continue;
                    }

                    blocks.push({ type: 'p', source: line });
                    i++;
                }

                return blocks;
            }

            function detectBlockFromSource(source) {
                const text = source || '';

                if (text.trim() === '') {
                    return { type: 'empty', source: '' };
                }

                if (text.trim().startsWith('```')) {
                    return { type: 'code-fence', source: text };
                }

                const hMatch = text.match(/^(#{1,6})\s+(.+)/);
                if (hMatch) {
                    return { type: `h${hMatch[1].length}`, source: text };
                }

                if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(text.trim())) {
                    return { type: 'hr', source: text };
                }

                if (text.startsWith('>')) {
                    return { type: 'blockquote', source: text };
                }

                return { type: 'p', source: text };
            }

            function renderInline(text) {
                let s = (text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');

                s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
                s = s.replace(/\*(?!\*)(.+?)\*(?!\*)/g, '<em>$1</em>');
                s = s.replace(/_(?!_)(.+?)_(?!_)/g, '<em>$1</em>');
                s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');
                s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

                return s;
            }

            function renderBlock(block) {
                if (block.type === 'empty') return '<br>';
                if (block.type === 'hr') return '';

                if (block.type === 'code-fence') {
                    const lines = block.source.split('\n');
                    const inner = lines.slice(1, lines.length - 1).join('\n');
                    return inner
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                }

                if (block.type.startsWith('h')) {
                    const textMatch = block.source.match(/^#{1,6}\s+(.+)/);
                    return textMatch ? renderInline(textMatch[1]) : renderInline(block.source);
                }

                if (block.type === 'blockquote') {
                    const inner = block.source.replace(/^>\s?/, '');
                    return renderInline(inner);
                }

                return renderInline(block.source);
            }

            function createBlockEl(block, index) {
                const el = document.createElement('div');
                el.className = 'live-block is-rendered';
                el.setAttribute('data-type', block.type);
                el.setAttribute('data-index', index);

                if (block.type === 'empty') {
                    el.innerHTML = '<br>';
                    el.style.minHeight = '1.2em';
                } else if (block.type === 'hr') {
                    el.innerHTML = '';
                } else {
                    el.innerHTML = renderBlock(block);
                }

                el.addEventListener('mousedown', (e) => {
                    if (activeBlockIndex === index) return;

                    const textOffset = getTextOffsetFromPoint(el, e.clientX, e.clientY);
                    e.preventDefault();
                    activateBlock(index, textOffset);
                });

                return el;
            }

            function initLiveEditor(text) {
                liveEditor.innerHTML = '';
                liveBlocks = [];
                activeBlockIndex = -1;
                liveContent = text || '';

                const blocks = parseMarkdownBlocks(liveContent);

                blocks.forEach((block, index) => {
                    const el = createBlockEl(block, index);
                    const item = {
                        type: block.type,
                        source: block.source,
                        el
                    };
                    liveBlocks.push(item);
                    liveEditor.appendChild(el);
                });
            }

            function placeCaretAtEnd(el) {
                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(el);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }

            function getTextOffsetFromPoint(container, clientX, clientY) {
                let range = null;

                if (document.caretRangeFromPoint) {
                    range = document.caretRangeFromPoint(clientX, clientY);
                } else if (document.caretPositionFromPoint) {
                    const pos = document.caretPositionFromPoint(clientX, clientY);
                    if (pos) {
                        range = document.createRange();
                        range.setStart(pos.offsetNode, pos.offset);
                        range.collapse(true);
                    }
                }

                if (!range) return null;
                if (!container.contains(range.startContainer)) return null;

                const preRange = document.createRange();
                preRange.selectNodeContents(container);
                preRange.setEnd(range.startContainer, range.startOffset);

                return preRange.toString().length;
            }

            function placeCaretAtTextOffset(container, offset) {
                container.focus();

                const selection = window.getSelection();
                const range = document.createRange();

                let current = 0;
                let found = false;

                function walk(node) {
                    if (found) return;

                    if (node.nodeType === Node.TEXT_NODE) {
                        const len = node.textContent.length;
                        if (offset <= current + len) {
                            range.setStart(node, Math.max(0, offset - current));
                            range.collapse(true);
                            found = true;
                            return;
                        }
                        current += len;
                        return;
                    }

                    for (const child of node.childNodes) {
                        walk(child);
                        if (found) return;
                    }
                }

                walk(container);

                if (!found) {
                    range.selectNodeContents(container);
                    range.collapse(false);
                }

                selection.removeAllRanges();
                selection.addRange(range);
            }

            function getCaretOffsetWithin(element) {
                const sel = window.getSelection();
                if (!sel || sel.rangeCount === 0) return 0;

                const range = sel.getRangeAt(0);
                if (!element.contains(range.startContainer)) return 0;

                const preRange = document.createRange();
                preRange.selectNodeContents(element);
                preRange.setEnd(range.startContainer, range.startOffset);

                return preRange.toString().length;
            }

            function activateBlockAtOffset(index, offset) {
                activateBlock(index, null);

                requestAnimationFrame(() => {
                    const block = liveBlocks[index];
                    if (block && block.el) {
                        placeCaretAtTextOffset(block.el, offset);
                    }
                });
            }

            function activateBlock(index, clickTextOffset = null) {
                if (activeBlockIndex === index) return;

                if (activeBlockIndex !== -1) {
                    deactivateCurrentBlock();
                }

                activeBlockIndex = index;
                const block = liveBlocks[index];

                block.el.className = 'live-block is-source';
                block.el.setAttribute('contenteditable', 'true');
                block.el.textContent = block.source;
                block.el.focus();

                requestAnimationFrame(() => {
                    if (clickTextOffset !== null) {
                        placeCaretAtTextOffset(block.el, clickTextOffset);
                    } else {
                        placeCaretAtEnd(block.el);
                    }
                });

                block.el.onblur = () => {
                    if (activeBlockIndex === index) {
                        deactivateCurrentBlock();
                    }
                };
                block.el.onkeydown = (e) => {
                    const currentOffset = getCaretOffsetWithin(block.el);
                    const textLength = block.el.textContent.length;

                    if (e.key === 'ArrowUp' && currentOffset === 0 && index > 0) {
                        e.preventDefault();
                        deactivateCurrentBlock();
                        activateBlockAtOffset(index - 1, liveBlocks[index - 1].source.length);
                        return;
                    }

                    if (e.key === 'ArrowDown' && currentOffset === textLength && index < liveBlocks.length - 1) {
                        e.preventDefault();
                        deactivateCurrentBlock();
                        activateBlockAtOffset(index + 1, 0);
                        return;
                    }
                };
            }

            function deactivateCurrentBlock() {
                if (activeBlockIndex < 0 || activeBlockIndex >= liveBlocks.length) return;

                const block = liveBlocks[activeBlockIndex];
                const updatedSource = block.el.textContent || '';
                const updatedBlock = detectBlockFromSource(updatedSource);

                block.source = updatedBlock.source;
                block.type = updatedBlock.type;
                block.el.setAttribute('data-type', block.type);

                block.el.className = 'live-block is-rendered';
                block.el.removeAttribute('contenteditable');

                if (block.type === 'empty') {
                    block.el.innerHTML = '<br>';
                    block.el.style.minHeight = '1.2em';
                } else if (block.type === 'hr') {
                    block.el.innerHTML = '';
                } else {
                    block.el.innerHTML = renderBlock(block);
                }

                activeBlockIndex = -1;
                syncLiveContentToModel();
            }

            function syncLiveContentToModel() {
                currentContent = liveBlocks.map(block => block.source).join('\n');

                console.log('🟢 syncLiveContentToModel called');
                console.log('🟢 currentContent length:', currentContent.length);
                console.log('🟢 currentContent preview:', currentContent.slice(0, 120));

                textarea.value = currentContent;
                renderPreview(currentContent);

                if (window.webkit?.messageHandlers?.contentChanged) {
                    console.log('🟢 sending contentChanged to Swift');
                    window.webkit.messageHandlers.contentChanged.postMessage(currentContent);
                } else {
                    console.log('🔴 contentChanged handler missing');
                }
            }


        </script>
    </body>
</html>
