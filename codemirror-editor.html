<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
            <link id="highlight-theme" rel="stylesheet" href="HighlightJS/styles/github-dark.min.css">
                <link rel="stylesheet" href="KaTeX/katex.min.css">
                <script src="HighlightJS/highlight.min.js"></script>
                <script src="HighlightJS/highlightjs-line-numbers.min.js"></script>
                <script src="KaTeX/katex.min.js"></script>
                <script src="Mermaid/mermaid.min.js"></script>
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    body {
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        height: 100vh;
                        overflow: hidden;
                        background: #fff;
                        color: #24292e;
                    }
                    body.dark {
                        background: #0d1117;
                        color: #c9d1d9;
                    }
                    
                    #swap-button {
                        position: absolute;
                        top: 2px;
                        left: 50%;
                        transform: translateX(-50%);
                        z-index: 1000;
                        background: #fff;
                        border: 1px solid #d0d7de;
                        border-radius: 6px;
                        padding: 6px 10px;
                        cursor: pointer;
                        font-size: 14px;
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                        transition: all 0.2s;
                        pointer-events: auto;
                    }
                    body.dark #swap-button {
                        background: #21262d;
                        border-color: #30363d;
                        color: #c9d1d9;
                    }
                    #swap-button:hover {
                        background: #f6f8fa;
                        border-color: #b0b7be;
                        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
                    }
                    body.dark #swap-button:hover {
                        background: #30363d;
                        border-color: #484f58;
                    }
                    
                    #editor-container {
                        display: flex;
                        width: 100vw;
                        height: 100vh;
                        position: relative;
                    }
                    
                    #editor-container.swapped {
                        flex-direction: row-reverse;
                    }
                    
                    .editor-pane {
                        flex: 1 1 0;
                        min-width: 0;
                        height: 100%;
                        overflow: hidden;
                        position: relative;
                    }
                    
                    /* Border для markdown-панели когда она слева */
                    #markdown-pane {
                        width: 50% !important;
                        padding: 0;
                        border: 1px solid gray;
                    }
                    
                    body.dark #markdown-pane {
                        border-right-color: #30363d;
                    }
                    
                    #preview-pane {
                        width: 50% !important;
                        box-sizing: border-box;
                        border: 1px solid gray;
                    }
                    
                    /* Режимы отображения */
                    body.mode-edit #live-editor { display: none; }
                    body.mode-edit #editor-container { display: flex; }
                    body.mode-edit #markdown-pane {
                        display: block;
                        width: 100% !important;
                        height: 100%;
                        border-right: none;
                        border-left: none;
                    }
                    body.mode-edit #preview-pane { display: none; }
                    body.mode-edit #swap-button { display: none; }

                    body.mode-preview #live-editor { display: none; }
                    body.mode-preview #editor-container { display: flex; }
                    body.mode-preview #markdown-pane { display: none; }
                    body.mode-preview #preview-pane {
                        display: block;
                        width: 100% !important;
                        border-left: none;
                        border-right: none;
                        overflow-x: hidden;
                        overflow-y: auto;
                    }
                    body.mode-preview #swap-button { display: none; }

                    body.mode-split #live-editor { display: none; }
                    body.mode-split #editor-container { display: flex; }
                    body.mode-split #markdown-pane {
                        display: block;
                        width: 50% !important;
                        height: 100%;
                    }
                    body.mode-split #preview-pane {
                        display: block;
                        width: 50% !important;
                        overflow-x: hidden;
                        overflow-y: auto;
                    }

                    body.mode-live #live-editor { display: block; }
                    body.mode-live #editor-container { display: none; }
                    body.mode-live #markdown-pane { display: none; }
                    body.mode-live #preview-pane { display: none; }
                    body.mode-live #swap-button { display: none; }

                    body.editor-focus-mode #editor-container {
                        box-shadow: inset 0 40px 60px -40px rgba(0,0,0,0.18), inset 0 -40px 60px -40px rgba(0,0,0,0.18);
                    }
                    body.editor-focus-mode.focus-dim-lines #markdown-textarea {
                        opacity: 0.92;
                    }
                    body.editor-focus-mode.focus-dim-lines #preview-content,
                    body.editor-focus-mode.focus-dim-lines #live-editor {
                        opacity: 0.96;
                    }

                    .markdown-editor-wrap {
                        width: 100%;
                        height: 100%;
                        min-height: 0;
                        overflow-x: hidden;
                        overflow-y: auto;
                    }
                    .markdown-editor-body {
                        position: relative;
                        width: 100%;
                        min-height: 100%;
                        box-sizing: border-box;
                    }
                    :root {
                        --editor-font-family: 'SF Mono', Menlo, Monaco, monospace;
                        --editor-font-size: 14px;
                        --editor-line-height: 22.4px;
                        --editor-tab-size: 4;
                    }
                    .editor-source-metrics {
                        font-family: var(--editor-font-family);
                        font-size: var(--editor-font-size);
                        line-height: var(--editor-line-height);
                        tab-size: var(--editor-tab-size);
                        -moz-tab-size: var(--editor-tab-size);
                    }
                    #markdown-textarea {
                        display: block;
                        width: 100%;
                        min-height: 100%;
                        height: auto;
                        overflow: hidden;
                        resize: none;
                        box-sizing: border-box;
                        padding: 40px 60px;
                        white-space: pre-wrap;
                        word-wrap: break-word;
                        overflow-wrap: break-word;
                        position: relative;
                        z-index: 2;
                    }
                    #markdown-spell-overlay {
                        display: none;
                        position: absolute;
                        top: 0;
                        left: 0;
                        width: 100%;
                        min-height: 100%;
                        margin: 0;
                        border: none;
                        box-sizing: border-box;
                        padding: 40px 60px;
                        white-space: pre-wrap;
                        word-wrap: break-word;
                        overflow-wrap: break-word;
                        pointer-events: none;
                        z-index: 3;
                        color: transparent;
                        overflow: visible;
                        background: transparent;
                    }
                    body.editor-line-numbers #markdown-spell-overlay {
                        padding-left: calc(var(--editor-gutter-width, 2.75rem) + 60px);
                    }
                    #markdown-spell-overlay .spell-err {
                        color: transparent;
                        -webkit-text-fill-color: transparent;
                        border-bottom: 2px dotted #ff3b30;
                        border-radius: 0;
                    }
                    body.dark #markdown-spell-overlay .spell-err {
                        border-bottom-color: #ff6961;
                    }
                    #markdown-find-overlay {
                        display: none;
                        position: absolute;
                        top: 0;
                        left: 0;
                        width: 100%;
                        min-height: 100%;
                        margin: 0;
                        border: none;
                        box-sizing: border-box;
                        padding: 40px 60px;
                        white-space: pre-wrap;
                        word-wrap: break-word;
                        overflow-wrap: break-word;
                        pointer-events: none;
                        z-index: 4;
                        color: transparent;
                        overflow: visible;
                        background: transparent;
                    }
                    body.editor-line-numbers #markdown-find-overlay {
                        padding-left: calc(var(--editor-gutter-width, 2.75rem) + 60px);
                    }
                    #markdown-find-overlay .find-hit {
                        color: transparent;
                        -webkit-text-fill-color: transparent;
                        background: rgba(255, 214, 10, 0.45);
                        border-radius: 2px;
                    }
                    #markdown-find-overlay .find-hit-current {
                        color: transparent;
                        -webkit-text-fill-color: transparent;
                        background: rgba(255, 149, 0, 0.72);
                        border-radius: 2px;
                        box-shadow: 0 0 0 1px rgba(255, 149, 0, 0.9);
                    }
                    body.dark #markdown-find-overlay .find-hit {
                        background: rgba(255, 214, 10, 0.35);
                    }
                    body.dark #markdown-find-overlay .find-hit-current {
                        background: rgba(255, 159, 10, 0.55);
                    }
                    mark.find-hit,
                    mark.find-hit-current {
                        background: rgba(255, 214, 10, 0.45);
                        color: inherit;
                        padding: 0;
                        border-radius: 2px;
                    }
                    mark.find-hit-current {
                        background: rgba(255, 149, 0, 0.72);
                        box-shadow: 0 0 0 1px rgba(255, 149, 0, 0.9);
                    }
                    body.dark mark.find-hit {
                        background: rgba(255, 214, 10, 0.35);
                    }
                    body.dark mark.find-hit-current {
                        background: rgba(255, 159, 10, 0.55);
                    }
                    .live-block.find-flash {
                        outline: 2px solid rgba(255, 149, 0, 0.85);
                        outline-offset: 2px;
                        border-radius: 4px;
                    }
                    body.editor-line-numbers #markdown-textarea {
                        padding-left: calc(var(--editor-gutter-width, 2.75rem) + 60px);
                    }
                    #markdown-line-gutter {
                        display: none;
                        position: absolute;
                        top: 0;
                        left: 0;
                        z-index: 5;
                        overflow: hidden;
                        box-sizing: border-box;
                        text-align: right;
                        color: rgba(128, 128, 128, 0.75);
                        user-select: none;
                        pointer-events: none;
                        width: var(--editor-gutter-width, 2.75rem);
                    }
                    body.editor-line-numbers #markdown-line-gutter {
                        display: block;
                    }
                    #markdown-line-gutter .gutter-inner {
                        box-sizing: border-box;
                    }
                    #markdown-line-gutter .gutter-inner,
                    #markdown-line-gutter .gutter-line {
                        font-family: var(--editor-font-family);
                        font-size: var(--editor-font-size);
                        line-height: var(--editor-line-height);
                        tab-size: var(--editor-tab-size);
                        -moz-tab-size: var(--editor-tab-size);
                    }
                    #markdown-line-gutter .gutter-line {
                        box-sizing: border-box;
                        display: block;
                        margin: 0;
                        padding: 0 4px 0 2px;
                        overflow: hidden;
                        text-align: right;
                        white-space: nowrap;
                        pointer-events: none;
                    }
                    body.highlight-current-line #markdown-line-gutter .gutter-line.is-current {
                        color: #007aff;
                        background: rgba(0, 122, 255, 0.12);
                        border-radius: 3px;
                    }

                    /* Стили превью */
                    #preview-content {
                        line-height: 1.7;
                        font-size: 16px;
                        padding: 40px 80px;
                        box-sizing: border-box;
                    }
                    #preview-content .live-block-table { cursor: default; }
                    .live-block.live-block-table {
                        white-space: normal;
                        max-width: 100%;
                    }
                    .md-table-scroll {
                        display: block;
                        max-width: 100%;
                        overflow-x: auto;
                        overflow-y: hidden;
                        margin: 0.5em 0;
                        -webkit-overflow-scrolling: touch;
                        scrollbar-width: thin;
                    }
                    body.dark .md-table-scroll {
                        scrollbar-color: #484f58 transparent;
                    }
                    .md-table {
                        border-collapse: collapse;
                        width: max-content;
                        min-width: max(
                            100%,
                            calc(var(--md-table-columns, 1) * var(--md-table-cell-min, 88px))
                        );
                        margin: 0;
                        table-layout: auto;
                    }
                    .md-table th,
                    .md-table td {
                        border: 1px solid #8b949e;
                        padding: 8px 12px;
                        min-width: var(--md-table-cell-min, 88px);
                        max-width: 360px;
                        min-height: 2.25em;
                        vertical-align: top;
                        box-sizing: border-box;
                        line-height: 1.5;
                        word-wrap: break-word;
                        overflow-wrap: anywhere;
                    }
                    body.dark .md-table th,
                    body.dark .md-table td {
                        border-color: #6e7681;
                    }
                    .md-table th {
                        background: #f0f3f6;
                        font-weight: 600;
                    }
                    .md-table td {
                        background: #ffffff;
                    }
                    body.dark .md-table th {
                        background: #21262d;
                    }
                    body.dark .md-table td {
                        background: #161b22;
                    }
                    .live-block-table [contenteditable="true"] {
                        cursor: text;
                        outline: none;
                        display: table-cell;
                    }
                    .live-block-table [contenteditable="true"]:focus {
                        box-shadow: inset 0 0 0 2px rgba(9, 105, 218, 0.45);
                    }
                    body.dark .live-block-table [contenteditable="true"]:focus {
                        box-shadow: inset 0 0 0 2px rgba(56, 139, 253, 0.55);
                    }
                    #preview-content h1 { font-size: 2em; margin: 0.67em 0; }
                    #preview-content h2 { font-size: 1.6em; margin: 0.75em 0; }
                    #preview-content h3 { font-size: 1.3em; margin: 0.83em 0; }
                    #preview-content code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: #f6f8fa;
                        padding: 2px 6px;
                        border-radius: 3px;
                        color: #cf222e;
                    }
                    body.dark #preview-content code {
                        background: #161b22;
                        color: #ff7b72;
                    }
                    /* Инлайн код (не в блоках) */
                    #preview-content :not(pre) > code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: #f6f8fa;
                        padding: 2px 6px;
                        border-radius: 3px;
                        color: #cf222e;
                    }
                    body.dark #preview-content :not(pre) > code {
                        background: #161b22;
                        color: #ff7b72;
                    }
                    
                    /* Блоки кода - используем стили highlight.js */
                    #preview-content pre {
                        border-radius: 8px;
                        overflow: auto;
                        margin: 1em 0;
                        padding: 0;
                    }
                    #preview-content pre code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: transparent !important;
                        background-color: transparent !important;
                        padding: 0;
                        display: block;
                    }

                    /* Code blocks: single background, no zebra striping */
                    #preview-content pre.hljs,
                    #live-editor pre.hljs {
                        background-color: var(--md-code-bg, #f6f8fa) !important;
                        border: 1px solid var(--md-border, #d0d7de);
                        padding: 14px 16px !important;
                    }
                    #preview-content pre.hljs code,
                    #live-editor pre.hljs code,
                    #preview-content pre.hljs code *,
                    #live-editor pre.hljs code *,
                    #preview-content pre.hljs .hljs,
                    #live-editor pre.hljs .hljs {
                        background: transparent !important;
                        background-color: transparent !important;
                    }
                    #preview-content .hljs-ln,
                    #live-editor .hljs-ln,
                    #preview-content .hljs-ln tr,
                    #live-editor .hljs-ln tr,
                    #preview-content .hljs-ln td,
                    #live-editor .hljs-ln td {
                        background: transparent !important;
                    }
                    #preview-content table:not(.md-table):not(.hljs-ln) {
                        border-collapse: collapse;
                        margin: 1em 0;
                        width: 100%;
                    }
                    #preview-content table:not(.md-table):not(.hljs-ln) th,
                    #preview-content table:not(.md-table):not(.hljs-ln) td {
                        padding: 6px 13px;
                        border: 1px solid #8b949e;
                    }
                    body.dark #preview-content table:not(.md-table):not(.hljs-ln) th,
                    body.dark #preview-content table:not(.md-table):not(.hljs-ln) td {
                        border-color: #6e7681;
                    }
                    #preview-content table:not(.md-table):not(.hljs-ln) thead {
                        background: #f6f8fa;
                    }
                    body.dark #preview-content table:not(.md-table):not(.hljs-ln) thead {
                        background: #161b22;
                    }
                    #preview-content blockquote {
                        margin: 0;
                        padding-left: 1em;
                        border-left: 4px solid var(--md-divider, #8c959f);
                        color: var(--md-secondary, #57606a);
                    }
                    #preview-content ul,
                    #preview-content ol {
                        padding-left: 2em;
                        margin: 0.5em 0;
                    }
                    #preview-content li {
                        margin: 0.25em 0;
                    }
                    #preview-content hr {
                        border: none;
                        border-top: 1px solid var(--md-divider, #8c959f);
                        margin: 2em 0;
                    }
                    body.dark #preview-content hr {
                        border-top-color: var(--md-divider, #8b949e);
                    }
                    body.dark #preview-content blockquote {
                        border-left-color: var(--md-divider, #8b949e);
                        color: #8b949e;
                    }
                    
                    /* === LIVE MODE === */
                    #live-editor {
                        display: none;
                        width: 100%;
                        height: 100%;
                        overflow-y: auto;
                        padding: 40px 80px;
                        box-sizing: border-box;
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        font-size: 16px;
                        line-height: 1.7;
                        outline: none;
                    }
                    
                    body.mode-live #live-editor { display: block; }
                    body.mode-live #markdown-pane { display: none; }
                    body.mode-live #preview-pane { display: none; }
                    body.mode-live #swap-button { display: none; }
                    
                    /* Блоки в live-режиме */
                    .live-block {
                        min-height: 1.7em;
                        padding: 2px 0;
                        outline: none;
                        border-radius: 3px;
                        transition: background 0.1s;
                        white-space: pre-wrap;
                        word-break: break-word;
                        cursor: text;
                    }
                    
                    .live-block::after {
                        content: "";
                        display: table;
                        clear: both;
                    }

                    .live-block img {
                        max-width: 100%;
                        height: auto;
                    }
                    
                    .live-block:focus { outline: none; }
                    
                    /* Активный блок — показываем исходник */
                    .live-block.is-source {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        font-size: 14px;
                        color: inherit;
                        background: rgba(0,0,0,0.03);
                        border-radius: 4px;
                        padding: 2px 6px;
                    }
                    body.dark .live-block.is-source {
                        background: rgba(255,255,255,0.05);
                    }
                    
                    /* Рендеренные блоки */
                    .live-block.is-rendered { font-family: inherit; }
                    
                    /* Заголовки */
                    .live-block[data-type="h1"] { font-size: 2em; font-weight: 700; margin: 0.4em 0 0.2em; }
                    .live-block[data-type="h2"] { font-size: 1.6em; font-weight: 700; margin: 0.4em 0 0.2em; }
                    .live-block[data-type="h3"] { font-size: 1.3em; font-weight: 600; margin: 0.3em 0 0.2em; }
                    .live-block[data-type="h4"] { font-size: 1.1em; font-weight: 600; margin: 0.3em 0 0.1em; }
                    .live-block[data-type="h5"] { font-size: 1em; font-weight: 600; margin: 0.2em 0 0.1em; }
                    .live-block[data-type="h6"] { font-size: 0.9em; font-weight: 600; margin: 0.2em 0 0.1em; color: #57606a; }
                    body.dark .live-block[data-type="h6"] { color: #8b949e; }
                    
                    /* Цитата */
                    .live-block[data-type="blockquote"] {
                        border-left: 4px solid var(--md-divider, #8c959f);
                        padding-left: 1em;
                        color: #57606a;
                        margin: 0.3em 0;
                    }
                    body.dark .live-block[data-type="blockquote"] {
                        border-left-color: var(--md-divider, #8b949e);
                        color: #8b949e;
                    }
                    .live-block[data-type="blockquote"] .bq-nested {
                        border-left: 3px solid var(--md-divider, #8c959f);
                        padding-left: 1em;
                        margin: 0.35em 0;
                        color: inherit;
                    }
                    body.dark .live-block[data-type="blockquote"] .bq-nested {
                        border-left-color: var(--md-divider, #8b949e);
                    }
                    .live-block[data-type="blockquote"] ul,
                    .live-block[data-type="blockquote"] ol {
                        margin: 0.35em 0;
                        padding-left: 1.5em;
                    }

                    .live-block[data-type="html"] details {
                        margin: 0.5em 0;
                        padding: 0.35em 0.85em;
                        border: 1px solid #d0d7de;
                        border-radius: 6px;
                    }
                    body.dark .live-block[data-type="html"] details {
                        border-color: #30363d;
                    }
                    .live-block[data-type="html"] summary {
                        cursor: pointer;
                        font-weight: 600;
                        margin-bottom: 0.35em;
                    }
                    .live-block[data-type="html"] div[align="center"] {
                        text-align: center;
                    }
                    .live-block[data-type="html"] p {
                        margin: 0.35em 0;
                    }
                    .live-block[data-type="html"] {
                        white-space: normal;
                        cursor: default;
                    }

                    .live-block[data-type="math"],
                    .math-display {
                        margin: 0.75em 0;
                        overflow-x: auto;
                        overflow-y: hidden;
                        text-align: center;
                    }
                    .math-display > .katex-display {
                        margin: 0;
                    }
                    .math-inline .katex {
                        font-size: 1.05em;
                    }
                    .math-fallback {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        font-size: 0.9em;
                        padding: 0.5em;
                        background: rgba(0, 0, 0, 0.04);
                        border-radius: 4px;
                        overflow-x: auto;
                    }
                    body.dark .math-fallback {
                        background: rgba(255, 255, 255, 0.06);
                    }

                    .live-block[data-type="math"],
                    .live-block[data-type="mermaid"] {
                        cursor: default;
                    }
                    .math-block-wrap,
                    .mermaid-block-wrap {
                        border: 1px solid #d0d7de;
                        border-radius: 8px;
                        overflow: hidden;
                        background: #f6f8fa;
                    }
                    body.dark .math-block-wrap,
                    body.dark .mermaid-block-wrap {
                        border-color: #30363d;
                        background: #161b22;
                    }
                    .math-block-bar,
                    .mermaid-block-bar {
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        padding: 6px 12px;
                        border-bottom: 1px solid #d0d7de;
                        font-size: 12px;
                        color: #57606a;
                        background: #f6f8fa;
                    }
                    body.dark .math-block-bar,
                    body.dark .mermaid-block-bar {
                        border-bottom-color: #30363d;
                        color: #8b949e;
                        background: #161b22;
                    }
                    .math-block-display,
                    .mermaid-diagram {
                        padding: 16px;
                        min-height: 48px;
                        overflow-x: auto;
                    }
                    #live-editor .special-block-preview,
                    #preview-content .special-block-preview {
                        display: flex;
                        justify-content: center;
                        width: 100%;
                    }
                    #live-editor .math-block-display,
                    #preview-content .math-block-display {
                        width: 100%;
                        text-align: center;
                    }
                    #live-editor .mermaid-diagram,
                    #preview-content .mermaid-diagram {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        width: 100%;
                        text-align: center;
                    }
                    #live-editor .mermaid-diagram > *,
                    #preview-content .mermaid-diagram > * {
                        margin-left: auto;
                        margin-right: auto;
                    }
                    .math-block-display.is-empty,
                    .mermaid-diagram.is-empty {
                        min-height: 64px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                    }
                    .math-placeholder,
                    .mermaid-placeholder {
                        color: #8b949e;
                        font-size: 13px;
                        font-style: italic;
                    }
                    .mermaid-diagram svg {
                        max-width: 100%;
                        height: auto;
                    }
                    .mermaid-error {
                        color: #cf222e;
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        font-size: 12px;

        <script>
            console.log('🎉 Загрузка скрипта');
            
            let isSyncing = false;
            let isApplyingHistory = false;
            let currentContent = '';
            let isInitialized = false;
            let syncScroll = true;
            let editorPrefs = {
                fontFamily: 'SF Mono',
                fontSize: 14,
                lineHeight: 1.6,
                showLineNumbers: false,
                highlightCurrentLine: true,
                indentSize: 4,
                useSpacesForTabs: true

            let typingPrefs = {
                spellCheckEnabled: true,
                grammarCheckEnabled: true,
                autoCapitalizationEnabled: false,
                typographicPunctuation: false,

            function debounce(fn, ms) {
                let timer;
                const debounced = function(...args) {
                    clearTimeout(timer);
                    timer = setTimeout(() => fn(...args), ms);
                };
                debounced.flush = function(...args) {
                    clearTimeout(timer);
                    fn(...args);
                };
                debounced.cancel = function() {
                    clearTimeout(timer);
                };
                return debounced;
            }

            const SMART_DOUBLE_QUOTES = /[\u201C\u201D\u201E\u201F\u2033\u2036\u00AB\u00BB]/g;
            const SMART_SINGLE_QUOTES = /[\u2018\u2019\u201A\u201B\u2032\u2035]/g;
            const SMART_DASHES = /[\u2013\u2014]/g;

            function shouldNormalizeTypography() {
                return !typingPrefs.typographicPunctuation;
            }

            function normalizeTypography(text) {
                if (!shouldNormalizeTypography()) {
                    return String(text || '');
                }
                return String(text || '')
                    .replace(SMART_DOUBLE_QUOTES, '"')
                    .replace(SMART_SINGLE_QUOTES, "'")
                    .replace(SMART_DASHES, '--');
            }

            function applyTypingPreferences() {
                const targets = [
                    document.getElementById('markdown-textarea'),
                    document.getElementById('live-editor')
                ];
                targets.forEach(configurePlainTextTyping);
            }

            function configurePlainTextTyping(el) {
                if (!el) return;
                el.setAttribute('autocorrect', 'off');
                el.setAttribute('autocomplete', 'off');
                el.setAttribute(
                    'autocapitalize',
                    typingPrefs.autoCapitalizationEnabled ? 'sentences' : 'off'

                el.setAttribute('data-gramm', 'false');
                el.setAttribute('data-gramm_editor', 'false');
                el.setAttribute('data-enable-grammarly', 'false');
            }

            function escapeSpellOverlayText(text) {
                return String(text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            function getMarkdownTextarea() {
                return document.getElementById('markdown-textarea');
            }

            function syncSpellOverlayGeometry() {
                const overlay = document.getElementById('markdown-spell-overlay');
                const ta = getMarkdownTextarea();
                if (!overlay || !ta) return;

                const computed = window.getComputedStyle(ta);
                overlay.style.width = ta.offsetWidth + 'px';
                overlay.style.minHeight = ta.offsetHeight + 'px';
                overlay.style.top = ta.offsetTop + 'px';
                overlay.style.left = ta.offsetLeft + 'px';
                overlay.style.font = computed.font;
                overlay.style.letterSpacing = computed.letterSpacing;
                overlay.style.wordSpacing = computed.wordSpacing;
                overlay.style.tabSize = computed.tabSize || '';
                overlay.style.textAlign = computed.textAlign;
                overlay.style.wordBreak = computed.wordBreak;
                overlay.style.overflowWrap = computed.overflowWrap;
            }

            function syncFindOverlayGeometry() {
                const overlay = document.getElementById('markdown-find-overlay');
                const ta = getMarkdownTextarea();
                if (!overlay || !ta) return;

                const computed = window.getComputedStyle(ta);
                overlay.style.width = ta.offsetWidth + 'px';
                overlay.style.minHeight = ta.offsetHeight + 'px';
                overlay.style.top = ta.offsetTop + 'px';
                overlay.style.left = ta.offsetLeft + 'px';
                overlay.style.font = computed.font;
                overlay.style.letterSpacing = computed.letterSpacing;
                overlay.style.wordSpacing = computed.wordSpacing;
                overlay.style.tabSize = computed.tabSize || '';
                overlay.style.textAlign = computed.textAlign;
                overlay.style.wordBreak = computed.wordBreak;
                overlay.style.overflowWrap = computed.overflowWrap;
            }

            function syncSpellOverlayHeight() {
                syncSpellOverlayGeometry();
                syncFindOverlayGeometry();
            }

            function renderSpellCheckOverlay() {
                const overlay = document.getElementById('markdown-spell-overlay');
                const ta = getMarkdownTextarea();
                if (!overlay || !ta) return;

                if (!typingPrefs.spellCheckEnabled || !spellCheckRanges.length) {
                    overlay.innerHTML = '';
                    overlay.style.display = 'none';
                    return;
                }

                const mode = document.body.className.match(/mode-(\w+)/)?.[1] || 'edit';
                if (mode !== 'edit' && mode !== 'split') {
                    overlay.innerHTML = '';
                    overlay.style.display = 'none';
                    return;
                }

                const text = ta.value;
                const sorted = [...spellCheckRanges]
                    .filter((range) => range
                        && Number.isFinite(range.from)
                        && Number.isFinite(range.to)
                        && range.from >= 0
                        && range.to > range.from
                        && range.to <= text.length)
                    .sort((a, b) => a.from - b.from);

                if (!sorted.length) {
                    overlay.innerHTML = '';
                    overlay.style.display = 'none';
                    return;
                }

                let html = '';
                let last = 0;
                for (const range of sorted) {
                    if (range.from < last) continue;
                    html += escapeSpellOverlayText(text.slice(last, range.from));
                    html += '<span class="spell-err">';
                    html += escapeSpellOverlayText(text.slice(range.from, range.to));
                    html += '</span>';
                    last = range.to;
                }
                html += escapeSpellOverlayText(text.slice(last));

                overlay.innerHTML = html;
                overlay.style.display = 'block';
                syncSpellOverlayGeometry();
            }

            function refreshSpellCheckFromNative() {
                const ta = getMarkdownTextarea();

                const start = el.selectionStart ?? 0;

            function smartDoubleQuote(before) {
                let opens = 0;
                for (const c of before) {
                    if (c === '"' || c === '\u201C' || c === '\u201E') opens++;
                    if (c === '\u201D' || c === '\u201F') opens = Math.max(0, opens - 1);
                }
                return opens > 0 ? '\u201D' : '\u201C';
            }

            function smartSingleQuote(before) {
                if (/[a-zA-Z0-9]$/.test(before)) return '\u2019';
                let opens = 0;
                for (const c of before) {
                    if (c === "'" || c === '\u2018' || c === '\u201A') opens++;
                    if (c === '\u2019' || c === '\u201B') opens = Math.max(0, opens - 1);
                }
                return opens > 0 ? '\u2019' : '\u2018';
            }

            function isDoubleQuoteChar(char) {
                return char === '"' || char === '\u201C' || char === '\u201D' || char === '\u201E' || char === '\u201F';
            }

            function isSingleQuoteChar(char) {
                return char === "'" || char === '\u2018' || char === '\u2019' || char === '\u201A' || char === '\u201B';
            }

            function typographicReplacementForTextarea(sel, char) {
                if (!typingPrefs.typographicPunctuation) return null;
                const { start, end, collapsed, before } = sel;
                if (!collapsed) return null;

                if (char === '-' && before.endsWith('-')) {
                    return { start: start - 1, end: start, text: '\u2014' };
                }
                if (isDoubleQuoteChar(char)) {
                    return { start, end, text: smartDoubleQuote(before) };
                }
                if (isSingleQuoteChar(char)) {
                    return { start, end, text: smartSingleQuote(before) };
                }
                if (char === '.' && before.endsWith('..')) {
                    return { start: start - 2, end: start, text: '\u2026' };
                }
                return null;
            }

            function getContentEditableContext(el) {
                const sel = window.getSelection();
                if (!sel || sel.rangeCount === 0) return null;
                const range = sel.getRangeAt(0);
                if (!el.contains(range.commonAncestorContainer)) return null;

                const beforeRange = range.cloneRange();
                beforeRange.selectNodeContents(el);
                beforeRange.setEnd(range.startContainer, range.startOffset);
                const before = beforeRange.toString();

                return {
                    before,
                    collapsed: sel.isCollapsed,
                    range,
                    sel
                };
            }

            function replaceContentEditableRange(ctx, text) {
                const { range, sel } = ctx;
                range.deleteContents();
                range.insertNode(document.createTextNode(text));
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }

            function handleTypingBeforeInput(el, e) {
                if (e.inputType !== 'insertText' || !e.data) return false;

                const data = e.data;

                if (el.tagName === 'TEXTAREA') {
                    const sel = getTextareaSelection(el);

                    if (shouldAutoCapitalizeLetter(sel.before, data, sel.collapsed)) {
                        e.preventDefault();
                        isNormalizingQuotes = true;
                        try {
                            replaceTextareaRange(el, sel.start, sel.end, data.toUpperCase());
                        } finally {
                            isNormalizingQuotes = false;
                        }
                        return true;
                    }

                    const typo = typographicReplacementForTextarea(sel, data);
                    if (typo) {
                        e.preventDefault();
                        isNormalizingQuotes = true;
                        try {
                            replaceTextareaRange(el, typo.start, typo.end, typo.text);
                        } finally {
                            isNormalizingQuotes = false;
                        }
                        return true;
                    }

                    if (handleMarkdownAutoInsertBeforeInput(el, e, sel, data)) {
                        return true;
                    }

                    if (!shouldNormalizeTypography()) return false;

                    const normalized = normalizeTypography(data);
                    if (normalized === data) return false;

                    e.preventDefault();
                    isNormalizingQuotes = true;
                    try {
                        replaceTextareaRange(el, sel.start, sel.end, normalized);
                    } finally {
                        isNormalizingQuotes = false;
                    }
                    return true;
                }

                if (!el.isContentEditable) return false;

                const ctx = getContentEditableContext(el);
                if (!ctx) return false;

                if (shouldAutoCapitalizeLetter(ctx.before, data, ctx.collapsed)) {
                    e.preventDefault();
                    isNormalizingQuotes = true;
                    try {
                        replaceContentEditableRange(ctx, data.toUpperCase());
                        dispatchEditorInput(el);
                    } finally {
                        isNormalizingQuotes = false;
                    }
                    return true;
                }

                if (typingPrefs.typographicPunctuation) {
                    if (isDoubleQuoteChar(data)) {
                        const text = smartDoubleQuote(ctx.before);
                        e.preventDefault();
                        isNormalizingQuotes = true;
                        try {
                            replaceContentEditableRange(ctx, text);
                            dispatchEditorInput(el);
                        } finally {
                            isNormalizingQuotes = false;
                        }
                        return true;
                    }
                    if (isSingleQuoteChar(data)) {
                        const text = smartSingleQuote(ctx.before);
                        e.preventDefault();
                        isNormalizingQuotes = true;
                        try {
                            replaceContentEditableRange(ctx, text);
                            dispatchEditorInput(el);
                        } finally {
                            isNormalizingQuotes = false;
                        }
                        return true;
                    }
                    return false;
                }

                const normalized = normalizeTypography(data);
                if (normalized === data) return false;

                e.preventDefault();
                isNormalizingQuotes = true;
                try {
                    replaceContentEditableRange(ctx, normalized);
                    dispatchEditorInput(el);
                } finally {
                    isNormalizingQuotes = false;
                }
                return true;
            }

            function insertPlainTextAtSelection(el, text) {
                if (el.isContentEditable) {
                    const sel = window.getSelection();
                    if (!sel || sel.rangeCount === 0) return false;
                    const range = sel.getRangeAt(0);
                    if (!el.contains(range.commonAncestorContainer)) return false;
                    range.deleteContents();
                    range.insertNode(document.createTextNode(text));
                    range.collapse(false);
                    sel.removeAllRanges();
                    sel.addRange(range);
                    return true;
                }
                if (typeof el.setRangeText === 'function' && el.selectionStart != null) {
                    const start = el.selectionStart;
                    const end = el.selectionEnd ?? start;
                    el.setRangeText(text, start, end, 'end');
                    return true;
                }
                return false;
            }

            function isPlainURL(text) {
                const value = String(text || '').trim();
                return /^https?:\/\/\S+$/i.test(value) || /^mailto:\S+$/i.test(value);
            }

            function getAutoPairDefinitions() {
                const pairs = [];
                if (typingPrefs.autoPairBrackets) {
                    pairs.push(['(', ')'], ['[', ']'], ['{', '}']);
                }
                if (typingPrefs.autoPairQuotes) {
                    pairs.push(['`', '`']);
                    if (!typingPrefs.typographicPunctuation) {
                        pairs.push(['"', '"'], ["'", "'"]);
                    }
                }
                return pairs;
            }

            function canAutoWrapMarkdownDelimiter(before, after) {
                if (after && after[0] && !/[\s,.;:!?)}\]]/.test(after[0])) return false;
                if (!before.length) return true;
                return /[\s([{'"`>]/.test(before.charAt(before.length - 1));
            }

            function handleMarkdownAutoInsertBeforeInput(el, e, sel, data) {
                if (el.tagName !== 'TEXTAREA') return false;
                if (e.inputType !== 'insertText' || !data || data.length !== 1) return false;

                const { start, end, collapsed, before, after } = sel;

                if (typingPrefs.autoCloseMarkdown && collapsed) {
                    if (data === '*' && before.endsWith('*') && !before.endsWith('**') && !before.endsWith('\\*')) {
                        e.preventDefault();
                        isNormalizingQuotes = true;
                        try {
                            replaceTextareaRange(el, start - 1, start, '**');
                            el.setSelectionRange(start - 1, start - 1);
                        } finally {
                            isNormalizingQuotes = false;
                        }
                        return true;
                    }
                    if (data === '*' && canAutoWrapMarkdownDelimiter(before, after) && !before.endsWith('*')) {
                        e.preventDefault();
                        isNormalizingQuotes = true;
                        try {
                            replaceTextareaRange(el, start, end, '**');
                            el.setSelectionRange(start + 1, start + 1);
                        } finally {
                            isNormalizingQuotes = false;
                        }
                        return true;
                    }
                    if (data === '~' && before.endsWith('~') && !before.endsWith('~~') && !before.endsWith('\\~')) {
                        e.preventDefault();
                        isNormalizingQuotes = true;
                        try {
                            replaceTextareaRange(el, start - 1, start, '~~');
                            el.setSelectionRange(start - 1, start - 1);
                        } finally {
                            isNormalizingQuotes = false;
                        }
                        return true;
                    }
                    if (data === '~' && canAutoWrapMarkdownDelimiter(before, after) && !before.endsWith('~')) {
                        e.preventDefault();
                        isNormalizingQuotes = true;
                        try {
                            replaceTextareaRange(el, start, end, '~~');
                            el.setSelectionRange(start + 1, start + 1);
                        } finally {
                            isNormalizingQuotes = false;
                        }
                        return true;
                    }
                }

                for (const [open, close] of getAutoPairDefinitions()) {
                    if (data === open) {
                        e.preventDefault();
                        isNormalizingQuotes = true;
                        try {
                            replaceTextareaRange(el, start, end, open + close);
                            el.setSelectionRange(start + 1, start + 1);
                        } finally {
                            isNormalizingQuotes = false;
                        }
                        return true;
                    }
                    if (data === close && collapsed && after.startsWith(close)) {
                        e.preventDefault();
                        el.setSelectionRange(start + 1, start + 1);
                        return true;
                    }
                }

                return false;
            }

            function handleMarkdownAutoPairKeydown(e) {
                const ta = textarea;
                if (!ta || document.activeElement !== ta) return false;
                if (e.metaKey || e.ctrlKey || e.altKey) return false;

                const start = ta.selectionStart ?? 0;
                const end = ta.selectionEnd ?? start;

                const closers = [];
                for (const [, close] of getAutoPairDefinitions()) {
                    if (!closers.includes(close)) closers.push(close);
                }

                if (e.key.length === 1 && closers.includes(e.key) && start === end && ta.value[start] === e.key) {
                    e.preventDefault();
                    ta.setSelectionRange(start + 1, start + 1);
                    return true;
                }

                if (e.key === 'Backspace' && start === end && start > 0) {
                    for (const [open, close] of getAutoPairDefinitions()) {
                        if (ta.value[start - 1] === open && ta.value[start] === close) {
                            e.preventDefault();
                            isNormalizingQuotes = true;
                            try {
                                ta.value = ta.value.slice(0, start - 1) + ta.value.slice(start + 1);
                                ta.setSelectionRange(start - 1, start - 1);
                                dispatchEditorInput(ta);
                            } finally {
                                isNormalizingQuotes = false;
                            }
                            return true;
                        }
                    }
                }

                return false;
            }

            function handleSmartPasteURLsTextarea(el, e, url) {
                e.preventDefault();
                const start = el.selectionStart ?? 0;
                const end = el.selectionEnd ?? start;
                const selected = el.value.slice(start, end);
                const label = selected.trim() ? selected : url;
                const insertion = `[${label}](${url})`;
                isNormalizingQuotes = true;
                try {
                    replaceTextareaRange(el, start, end, insertion);
                } finally {
                    isNormalizingQuotes = false;
                }
                return true;
            }

            function handleEditorPaste(el, e) {
                const raw = e.clipboardData?.getData('text/plain');
                if (raw == null) return false;

                if (typingPrefs.smartPasteURLs && el.tagName === 'TEXTAREA') {
                    const trimmed = raw.trim();
                    if (isPlainURL(trimmed) && handleSmartPasteURLsTextarea(el, e, trimmed)) {
                        return true;
                    }
                }

                if (!shouldNormalizeTypography()) return false;
                const normalized = normalizeTypography(raw);
                if (normalized === raw) return false;

                e.preventDefault();
                isNormalizingQuotes = true;
                try {
                    insertPlainTextAtSelection(el, normalized);
                    dispatchEditorInput(el);
                } finally {
                    isNormalizingQuotes = false;
                }
                return true;
            }

            function fixStraightQuoteAtCursor(el) {
                const start = el.selectionStart ?? 0;
                const end = el.selectionEnd ?? start;
                if (start !== end || start < 1) return false;

                const value = el.value;
                const charBefore = value.charAt(start - 1);
                if (charBefore !== '"' && charBefore !== "'") return false;

                const before = value.slice(0, start - 1);
                const expected = charBefore === '"'
                    ? smartDoubleQuote(before)
                    : smartSingleQuote(before);
                if (expected === charBefore) return false;

                isNormalizingQuotes = true;
                try {
                    el.value = before + expected + value.slice(start);
                    el.setSelectionRange(start, start);
                    dispatchEditorInput(el);
                    return true;
                } finally {
                    isNormalizingQuotes = false;
                }
            }

            function attachPlainTextTyping(el) {
                if (!el || el.dataset.plainTextTyping === 'true') return;
                el.dataset.plainTextTyping = 'true';
                configurePlainTextTyping(el);

                const isTextarea = el.tagName === 'TEXTAREA';

                el.addEventListener('beforeinput', (e) => {
                    if (isNormalizingQuotes || isApplyingHistory || e.isComposing) return;
                    handleTypingBeforeInput(el, e);
                }, true);

                el.addEventListener('paste', (e) => {
                    if (isNormalizingQuotes || isApplyingHistory) return;
                    handleEditorPaste(el, e);
                });

                if (isTextarea) {
                    el.addEventListener('input', () => {
                        if (isNormalizingQuotes || isApplyingHistory || isSyncing) return;

                        if (typingPrefs.typographicPunctuation) {
                            fixStraightQuoteAtCursor(el);
                            return;
                        }

                        if (!shouldNormalizeTypography()) return;
                        const start = el.selectionStart ?? 0;
                        const end = el.selectionEnd ?? start;
                        const value = el.value;
                        const normalized = normalizeTypography(value);
                        if (normalized === value) return;
                        isNormalizingQuotes = true;
                        try {
                            const before = value.slice(0, start);
                            const fixedBefore = normalizeTypography(before);
                            const delta = fixedBefore.length - before.length;
                            el.value = normalized;
                            const nextStart = Math.max(0, start + delta);
                            const nextEnd = Math.max(0, end + delta);
                            el.setSelectionRange(nextStart, nextEnd);
                        } finally {
                            isNormalizingQuotes = false;
                        }
                    });
                }
            }

            function isPreviewActive() {
                return document.body.classList.contains('mode-split')
                    || document.body.classList.contains('mode-preview');
            }

            function isLiveActive() {
                return document.body.classList.contains('mode-live');
            }

            function updateCodeBlockChromeStyle(bg, border) {
                if (bg) currentCodeBlockBg = bg;
                if (border) currentCodeBlockBorder = border;
                document.documentElement.style.setProperty('--md-code-bg', currentCodeBlockBg);
                document.documentElement.style.setProperty('--md-code-border', currentCodeBlockBorder);

                let el = document.getElementById('code-block-chrome-style');
                if (!el) {
                    el = document.createElement('style');
                    el.id = 'code-block-chrome-style';
                    document.head.appendChild(el);
                }
                el.textContent = `
                    #preview-content pre.hljs,
                    #live-editor pre.hljs {
                        background-color: ${currentCodeBlockBg} !important;
                        border-color: ${currentCodeBlockBorder} !important;
                    }
                    #preview-content pre.hljs code,
                    #preview-content pre.hljs .hljs,
                    #preview-content pre.hljs code *,
                    #live-editor pre.hljs code,
                    #live-editor pre.hljs .hljs,
                    #live-editor pre.hljs code * {
                        background: transparent !important;
                        background-color: transparent !important;
                    }
                `;
            }

            function applyCodeBlockChrome(container) {
                if (!container) return;
                container.querySelectorAll('.code-fence-wrap').forEach((wrap) => {
                    wrap.style.setProperty('background-color', currentCodeBlockBg, 'important');
                    wrap.style.setProperty('border-color', currentCodeBlockBorder, 'important');
                });
                container.querySelectorAll('pre.hljs').forEach((pre) => {
                    const wrap = pre.closest('.code-fence-wrap');
                    if (wrap) {
                        pre.style.setProperty('background-color', 'transparent', 'important');
                        pre.style.setProperty('border-color', 'transparent', 'important');
                    } else {
                        pre.style.setProperty('background-color', currentCodeBlockBg, 'important');
                        pre.style.setProperty('border-color', currentCodeBlockBorder, 'important');
                    }
                    pre.querySelectorAll('code, .hljs, span').forEach((node) => {
                        node.style.setProperty('background', 'transparent', 'important');
                        node.style.setProperty('background-color', 'transparent', 'important');
                    });
                });
            }

            const schedulePreviewRender = debounce(() => {
                if (!isPreviewActive()) return;
                const text = textarea?.value ?? currentContent ?? '';
                renderPreview(text, { preserveScroll: true });
            }, 280);

            const scheduleLiveRebuild = debounce((text) => {
                if (isLiveActive()) {
                    initLiveEditor(text);
                }
            }, 320);

            const scheduleContentSync = debounce((text) => {
                if (isApplyingHistory) return;
                if (window.webkit?.messageHandlers?.contentChanged) {
                    isSyncing = true;
                    window.webkit.messageHandlers.contentChanged.postMessage(text);
                    setTimeout(() => { isSyncing = false; }, 400);
                }
            }, 180);

            function flushAllPendingLiveEdits() {
                if (!isLiveActive()) {
                    flushPendingEditorUpdates();
                    return;
                }
                finishActiveListSourceEdit(null);
                liveBlocks.forEach((block, index) => {
                    if (block.type === 'list') syncListBlockFromDOM(index);
                });
                if (activeBlockIndex >= 0) {
                    deactivateCurrentBlock();
                } else if (liveBlocks.length) {
                    syncLiveContentToModel();
                }
                scheduleContentSync.flush(currentContent);
            }

            function getEditorSnapshotForUndo() {
                flushAllPendingLiveEdits();
                scheduleContentSync.cancel();
                return textarea.value || currentContent || '';
            }

            function handleGlobalUndoRedoKeydown(e) {
                const key = (e.key || '').toLowerCase();
                if (!(e.metaKey || e.ctrlKey) || key !== 'z') return;
                if (!window.webkit?.messageHandlers?.editorUndoRedo) return;

                e.preventDefault();
                e.stopPropagation();

                const snapshot = getEditorSnapshotForUndo();
                const action = e.shiftKey ? 'redo' : 'undo';
                window.webkit.messageHandlers.editorUndoRedo.postMessage({ action, snapshot });
            }

            function flushPendingEditorUpdates() {
                const text = textarea.value;
                schedulePreviewRender.flush();
                if (isLiveActive()) {
                    scheduleLiveRebuild.cancel();
                } else {
                    scheduleLiveRebuild.flush(text);
                }
                scheduleContentSync.flush(text);
            }

            let documentScrollPercent = 0;
            let scrollAnchorRestoreBlocked = false;
            let scrollRestoreToken = 0;
            let lockedScrollAnchor = null;
            let pendingAppearanceMerge = null;
            let pendingAppearanceAnchor = null;
            let pendingAppearanceRaf = 0;

            function getLiveScrollElement() {
                return document.getElementById('live-editor');
            }

            function getScrollMetrics(el) {
                if (!el) return { top: 0, max: 0, percent: 0 };
                const max = Math.max(0, el.scrollHeight - el.clientHeight);
                const top = el.scrollTop;
                const percent = max > 0 ? top / max : 0;
                return { top, max, percent };
            }

            function getActiveScrollElement() {
                if (document.body.classList.contains('mode-live')) {
                    return getLiveScrollElement();
                }
                if (document.body.classList.contains('mode-preview')) {
                    return previewPane || preview;
                }
                return markdownEditorScroll;
            }

            function updateDocumentScrollAnchorFromActive() {
                if (scrollAnchorRestoreBlocked || lockedScrollAnchor) return;
                const active = getActiveScrollElement();
                if (!active) return;
                documentScrollPercent = getScrollMetrics(active).percent;
            }

            function captureDocumentScrollAnchor() {
                if (lockedScrollAnchor) {
                    return { percent: lockedScrollAnchor.percent, top: lockedScrollAnchor.top };
                }
                updateDocumentScrollAnchorFromActive();
                const active = getActiveScrollElement();
                const metrics = active ? getScrollMetrics(active) : { percent: documentScrollPercent, top: 0 };
                documentScrollPercent = metrics.percent;
                return { percent: documentScrollPercent, top: metrics.top };
            }

            function lockScrollAnchor(anchor) {
                lockedScrollAnchor = {
                    percent: anchor?.percent ?? documentScrollPercent ?? 0,
                    top: anchor?.top ?? 0,
                };
            }

            function unlockScrollAnchor() {
                lockedScrollAnchor = null;
            }

            function applyScrollPercentToElement(el, percent) {
                if (!el) return;
                const max = Math.max(0, el.scrollHeight - el.clientHeight);
                el.scrollTop = Math.round(percent * max);
            }

            function restoreDocumentScrollAnchor(anchor, options = {}) {
                const percent = anchor?.percent ?? documentScrollPercent ?? 0;
                const fallbackTop = anchor?.top ?? 0;
                documentScrollPercent = percent;

                const apply = () => {
                    scrollAnchorRestoreBlocked = true;
                    if (document.body.classList.contains('mode-split')) {
                        restoreSplitScrollFromRatio(percent);
                    } else {
                        applyScrollPercentToElement(markdownEditorScroll, percent);
                        applyScrollPercentToElement(previewPane, percent);
                    }
                    applyScrollPercentToElement(getLiveScrollElement(), percent);
                    if (fallbackTop > 0) {
                        const active = getActiveScrollElement();
                        if (active && active.scrollTop < 4 && getScrollMetrics(active).max > 0) {
                            active.scrollTop = fallbackTop;
                        }
                    }
                    requestAnimationFrame(() => {
                        scrollAnchorRestoreBlocked = false;
                    });
                };

                apply();

                requestAnimationFrame(() => {
                    apply();
                    if (options.persistent) {
                        requestAnimationFrame(apply);
                    }
                });

                if (!options.persistent) return;

                const token = ++scrollRestoreToken;
                [50, 120, 250, 400, 600, 800, 1200].forEach((delay) => {
                    setTimeout(() => {
                        if (token !== scrollRestoreToken) return;
                        apply();
                    }, delay);
                });
            }

            function captureScrollState() {
                const anchor = captureDocumentScrollAnchor();
                return {
                    percent: anchor.percent,
                    markdown: markdownEditorScroll ? markdownEditorScroll.scrollTop : 0,
                    preview: previewPane ? previewPane.scrollTop : 0,
                    live: getLiveScrollElement()?.scrollTop ?? 0,
                    textarea: markdownEditorScroll ? markdownEditorScroll.scrollTop : 0,
                };
            }

            function restoreScrollState(state, options = {}) {
                if (!state) return;
                if (typeof state.percent === 'number') {
                    restoreDocumentScrollAnchor(state, options);
                    return;
                }
                restoreDocumentScrollAnchor({ percent: documentScrollPercent }, options);
            }

            function refreshCodeBlockChromeOnly() {
                applyCodeBlockChrome(preview);
                if (liveEditor) applyCodeBlockChrome(liveEditor);
            }

            function swapHighlightThemeStylesheet(url, onReady) {
                const done = typeof onReady === 'function' ? onReady : () => {};
                if (!url) {
                    done();
                    return;
                }

                const existing = document.getElementById('highlight-theme');
                const normalizedTarget = String(url).split('?')[0];
                const normalizedCurrent = existing ? String(existing.href).split('?')[0] : '';
                if (existing && normalizedCurrent === normalizedTarget) {
                    done();
                    return;
                }

                if (loadedCodeThemeURLs.has(url) && existing) {
                    existing.href = url;
                    loadedCodeThemeURLs.add(url);
                    done();
                    return;
                }

                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = url;
                const finish = () => {
                    loadedCodeThemeURLs.add(url);
                    if (existing && existing.parentNode) existing.remove();
                    link.id = 'highlight-theme';
                    done();
                };
                link.onload = finish;
                link.onerror = finish;
                document.head.appendChild(link);
            }

            function finishAppearanceThemeUpdate(anchor, options = {}) {
                refreshCodeBlockChromeOnly();
                if (options.rehighlight) {
                    rehighlightCodeBlocks();
                }
                restoreDocumentScrollAnchor(anchor, { persistent: true });
                unlockScrollAnchor();
            }

            function mergeAppearanceOptions(base, next) {
                return Object.assign({}, base || {}, next || {});
            }

            function runApplyAppearanceNow(options, anchor) {
                lockScrollAnchor(anchor);
                let needsRehighlight = false;

                if (typeof options.isDark === 'boolean') {
                    const nextDark = !!options.isDark;
                    const wasDark = document.body.classList.contains('dark');
                    document.body.classList.toggle('dark', nextDark);
                    [textarea, markdownPane, previewPane, liveEditor || document.getElementById('live-editor')].forEach((el) => {
                        if (!el) return;
                        el.style.backgroundColor = 'transparent';
                        el.style.color = 'inherit';
                    });
                    if (nextDark !== wasDark) {
                        rethemeAllMermaidInApp(anchor, { skipRestore: true });
                    }
                }

                if (options.themeCSS) {
                    updateCustomThemeCSS(options.themeCSS);
                }

                if (options.codeBlockBg) {
                    updateCodeBlockChromeStyle(options.codeBlockBg, options.codeBlockBorder);
                }

                if (options.showLineNumbers !== undefined) {
                    const next = !!options.showLineNumbers;
                    if (next !== showCodeLineNumbers) {
                        needsRehighlight = true;
                    }
                    showCodeLineNumbers = next;
                }

                if (options.focusActive !== undefined) {
                    window.cmEditor.setFocusMode(
                        options.focusActive,
                        options.focusDimLines,
                        options.focusHideToolbar
                    );
                }

                const finish = () => {
                    finishAppearanceThemeUpdate(anchor, { rehighlight: needsRehighlight });
                };

            const LINK_REF_DEF_RE = /^\s*\[([^\]]+)\]:\s*(?:<([^>]+)>|(\S+))(?:\s+(?:"([^"]*)"|'([^']*)'))?\s*$/;

            function isLinkReferenceDefinitionLine(line) {

            function parseReferenceDefRemainder(remainder) {

                if (!trimmed) return null;
                const angle = trimmed.match(/^<([^>]+)>(?:\s+(?:"([^"]*)"|'([^']*)'))?$/);
                if (angle) {
                    return { url: angle[1].trim(), title: (angle[2] || angle[3] || '').trim() };

                const plain = trimmed.match(/^(\S+)(?:\s+(?:"([^"]*)"|'([^']*)'))?$/);
                if (plain) {
                    return { url: plain[1], title: (plain[2] || plain[3] || '').trim() };

            function consumeReferenceDefinitionLines(lines, startIndex) {
                const line = lines[startIndex];
                const m = line.match(/^\s*\[([^\]]+)\]:\s*(.*)$/);
                if (!m) return null;

                const id = m[1].trim().toLowerCase();
                const first = parseReferenceDefRemainder(m[2]);
                if (first?.url) {
                    return { consumed: 1, id, url: first.url, title: first.title || '' };
                }

                const chunks = [];
                if (m[2].trim()) chunks.push(m[2].trim());

                let consumed = 1;
                let j = startIndex + 1;
                while (j < lines.length) {
                    const cont = lines[j];
                    if (cont.trim() === '') {
                        consumed = j - startIndex + (chunks.length ? 1 : 0);
                        if (!chunks.length) consumed = j - startIndex + 1;
                        break;
                    }
                    if (/^\s*\[[^\]]+\]:/.test(cont)) break;

                    const joinedBefore = chunks.join(' ');
                    if (chunks.length && joinedBefore && !/^\s+/.test(cont)) {
                        const maybeUrl = parseReferenceDefRemainder(cont.trim());
                        if (maybeUrl?.url) {
                            chunks.push(cont.trim());
                            consumed = j - startIndex + 1;
                            j++;
                            break;
                        }
                        break;
                    }

                    chunks.push(cont.trim());
                    const parsed = parseReferenceDefRemainder(chunks.join(' '));
                    if (parsed?.url) {
                        consumed = j - startIndex + 1;
                        return { consumed, id, url: parsed.url, title: parsed.title || '' };
                    }
                    j++;
                    consumed = j - startIndex;
                }

                const finalParsed = parseReferenceDefRemainder(chunks.join(' '));
                if (finalParsed?.url) {
                    return { consumed, id, url: finalParsed.url, title: finalParsed.title || '' };
                }

            function applyLinkReferenceEntry(refs, entry) {

                while (i < lines.length) {

            function getOutlineSourceText() {

                        i++;

                            level: hMatch[1].length,
                            title: hMatch[2].trim(),

            function findRenderedHeadingByLineNumber(root, lineNumber) {

            // ============================================================
            // LIVE MODE — Typora-like inline rendering
            // ============================================================

            let liveBlocks = [];
