<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
            <link id="highlight-theme" rel="stylesheet" href="HighlightJS/styles/github-dark.min.css">
                <link rel="stylesheet" href="KaTeX/katex.min.css">
                <script src="HighlightJS/highlight.min.js"></script>
                <script src="HighlightJS/highlightjs-line-numbers.min.js"></script>
                <script src="KaTeX/katex.min.js"></script>
                <script src="Mermaid/mermaid.min.js"></script>
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    body {
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        height: 100vh;
                        overflow: hidden;
                        background: #fff;
                        color: #24292e;
                    }
                    body.dark {
                        background: #0d1117;
                        color: #c9d1d9;
                    }
                    
                    #swap-button {
                        position: absolute;
                        top: 2px;
                        left: 50%;
                        transform: translateX(-50%);
                        z-index: 1000;
                        background: #fff;
                        border: 1px solid #d0d7de;
                        border-radius: 6px;
                        padding: 6px 10px;
                        cursor: pointer;
                        font-size: 14px;
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                        transition: all 0.2s;
                        pointer-events: auto;
                    }
                    body.dark #swap-button {
                        background: #21262d;
                        border-color: #30363d;
                        color: #c9d1d9;
                    }
                    #swap-button:hover {
                        background: #f6f8fa;
                        border-color: #b0b7be;
                        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
                    }
                    body.dark #swap-button:hover {
                        background: #30363d;
                        border-color: #484f58;
                    }
                    
                    #editor-container {
                        display: flex;
                        width: 100vw;
                        height: 100vh;
                        position: relative;
                    }
                    
                    #editor-container.swapped {
                        flex-direction: row-reverse;
                    }
                    
                    .editor-pane {
                        flex: 1 1 0;
                        min-width: 0;
                        height: 100%;
                        overflow: auto;
                        position: relative;
                    }
                    
                    /* Border для markdown-панели когда она слева */
                    #markdown-pane {
                        width: 50% !important;
                        padding: 0;
                        border: 1px solid gray;
                    }
                    
                    body.dark #markdown-pane {
                        border-right-color: #30363d;
                    }
                    
                    #preview-pane {
                        width: 50% !important;
                        box-sizing: border-box;
                        border: 1px solid gray;
                    }
                    
                    /* Режимы отображения */
                    body.mode-edit #live-editor { display: none; }
                    body.mode-edit #editor-container { display: flex; }
                    body.mode-edit #markdown-pane {
                        display: block;
                        width: 100% !important;
                        border-right: none;
                        border-left: none;
                    }
                    body.mode-edit #preview-pane { display: none; }
                    body.mode-edit #swap-button { display: none; }

                    body.mode-preview #live-editor { display: none; }
                    body.mode-preview #editor-container { display: flex; }
                    body.mode-preview #markdown-pane { display: none; }
                    body.mode-preview #preview-pane {
                        display: block;
                        width: 100% !important;
                        border-left: none;
                        border-right: none;
                    }
                    body.mode-preview #swap-button { display: none; }

                    body.mode-split #live-editor { display: none; }
                    body.mode-split #editor-container { display: flex; }
                    body.mode-split #markdown-pane {
                        display: block;
                        width: 50% !important;
                    }
                    body.mode-split #preview-pane {
                        display: block;
                        width: 50% !important;
                    }

                    body.mode-live #live-editor { display: block; }
                    body.mode-live #editor-container { display: none; }
                    body.mode-live #markdown-pane { display: none; }
                    body.mode-live #preview-pane { display: none; }
                    body.mode-live #swap-button { display: none; }

                    body.editor-focus-mode #editor-container {
                        box-shadow: inset 0 40px 60px -40px rgba(0,0,0,0.18), inset 0 -40px 60px -40px rgba(0,0,0,0.18);
                    }
                    body.editor-focus-mode.focus-dim-lines #markdown-textarea {
                        opacity: 0.92;
                    }
                    body.editor-focus-mode.focus-dim-lines #preview-content,
                    body.editor-focus-mode.focus-dim-lines #live-editor {
                        opacity: 0.96;
                    }

                    /* Стили превью */
                    #preview-content {
                        line-height: 1.7;
                        font-size: 16px;
                        padding: 40px 80px;
                        box-sizing: border-box;
                    }
                    #preview-content .live-block-table { cursor: default; }
                    .live-block.live-block-table {
                        white-space: normal;
                        max-width: 100%;
                    }
                    .md-table-scroll {
                        display: block;
                        max-width: 100%;
                        overflow-x: auto;
                        overflow-y: hidden;
                        margin: 0.5em 0;
                        -webkit-overflow-scrolling: touch;
                        scrollbar-width: thin;
                    }
                    body.dark .md-table-scroll {
                        scrollbar-color: #484f58 transparent;
                    }
                    .md-table {
                        border-collapse: collapse;
                        width: max-content;
                        min-width: max(
                            100%,
                            calc(var(--md-table-columns, 1) * var(--md-table-cell-min, 88px))
                        );
                        margin: 0;
                        table-layout: auto;
                    }
                    .md-table th,
                    .md-table td {
                        border: 1px solid #8b949e;
                        padding: 8px 12px;
                        min-width: var(--md-table-cell-min, 88px);
                        max-width: 360px;
                        min-height: 2.25em;
                        vertical-align: top;
                        box-sizing: border-box;
                        line-height: 1.5;
                        word-wrap: break-word;
                        overflow-wrap: anywhere;
                    }
                    body.dark .md-table th,
                    body.dark .md-table td {
                        border-color: #6e7681;
                    }
                    .md-table th {
                        background: #f0f3f6;
                        font-weight: 600;
                    }
                    .md-table td {
                        background: #ffffff;
                    }
                    body.dark .md-table th {
                        background: #21262d;
                    }
                    body.dark .md-table td {
                        background: #161b22;
                    }
                    .live-block-table [contenteditable="true"] {
                        cursor: text;
                        outline: none;
                        display: table-cell;
                    }
                    .live-block-table [contenteditable="true"]:focus {
                        box-shadow: inset 0 0 0 2px rgba(9, 105, 218, 0.45);
                    }
                    body.dark .live-block-table [contenteditable="true"]:focus {
                        box-shadow: inset 0 0 0 2px rgba(56, 139, 253, 0.55);
                    }
                    #preview-content h1 { font-size: 2em; margin: 0.67em 0; }
                    #preview-content h2 { font-size: 1.6em; margin: 0.75em 0; }
                    #preview-content h3 { font-size: 1.3em; margin: 0.83em 0; }
                    #preview-content code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: #f6f8fa;
                        padding: 2px 6px;
                        border-radius: 3px;
                        color: #cf222e;
                    }
                    body.dark #preview-content code {
                        background: #161b22;
                        color: #ff7b72;
                    }
                    /* Инлайн код (не в блоках) */
                    #preview-content :not(pre) > code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: #f6f8fa;
                        padding: 2px 6px;
                        border-radius: 3px;
                        color: #cf222e;
                    }
                    body.dark #preview-content :not(pre) > code {
                        background: #161b22;
                        color: #ff7b72;
                    }
                    
                    /* Блоки кода - используем стили highlight.js */
                    #preview-content pre {
                        border-radius: 8px;
                        overflow: auto;
                        margin: 1em 0;
                        padding: 0;
                    }
                    #preview-content pre code {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        background: transparent !important;
                        background-color: transparent !important;
                        padding: 0;
                        display: block;
                    }

                    /* Code blocks: single background, no zebra striping */
                    #preview-content pre.hljs,
                    #live-editor pre.hljs {
                        background-color: var(--md-code-bg, #f6f8fa) !important;
                        border: 1px solid var(--md-border, #d0d7de);
                        padding: 14px 16px !important;
                    }
                    #preview-content pre.hljs code,
                    #live-editor pre.hljs code,
                    #preview-content pre.hljs code *,
                    #live-editor pre.hljs code *,
                    #preview-content pre.hljs .hljs,
                    #live-editor pre.hljs .hljs {
                        background: transparent !important;
                        background-color: transparent !important;
                    }
                    #preview-content .hljs-ln,
                    #live-editor .hljs-ln,
                    #preview-content .hljs-ln tr,
                    #live-editor .hljs-ln tr,
                    #preview-content .hljs-ln td,
                    #live-editor .hljs-ln td {
                        background: transparent !important;
                    }
                    #preview-content table:not(.md-table):not(.hljs-ln) {
                        border-collapse: collapse;
                        margin: 1em 0;
                        width: 100%;
                    }
                    #preview-content table:not(.md-table):not(.hljs-ln) th,
                    #preview-content table:not(.md-table):not(.hljs-ln) td {
                        padding: 6px 13px;
                        border: 1px solid #8b949e;
                    }
                    body.dark #preview-content table:not(.md-table):not(.hljs-ln) th,
                    body.dark #preview-content table:not(.md-table):not(.hljs-ln) td {
                        border-color: #6e7681;
                    }
                    #preview-content table:not(.md-table):not(.hljs-ln) thead {
                        background: #f6f8fa;
                    }
                    body.dark #preview-content table:not(.md-table):not(.hljs-ln) thead {
                        background: #161b22;
                    }
                    #preview-content blockquote {
                        margin: 0;
                        padding-left: 1em;
                        border-left: 4px solid #d0d7de;
                        color: #57606a;
                    }
                    #preview-content ul,
                    #preview-content ol {
                        padding-left: 2em;
                        margin: 0.5em 0;
                    }
                    #preview-content li {
                        margin: 0.25em 0;
                    }
                    #preview-content hr {
                        border: none;
                        border-top: 1px solid #d0d7de;
                        margin: 2em 0;
                    }
                    body.dark #preview-content hr {
                        border-top-color: #30363d;
                    }
                    body.dark #preview-content blockquote {
                        border-left-color: #30363d;
                        color: #8b949e;
                    }
                    
                    /* === LIVE MODE === */
                    #live-editor {
                        display: none;
                        width: 100%;
                        height: 100%;
                        overflow-y: auto;
                        padding: 40px 80px;
                        box-sizing: border-box;
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        font-size: 16px;
                        line-height: 1.7;
                        outline: none;
                    }
                    
                    body.mode-live #live-editor { display: block; }
                    body.mode-live #markdown-pane { display: none; }
                    body.mode-live #preview-pane { display: none; }
                    body.mode-live #swap-button { display: none; }
                    
                    /* Блоки в live-режиме */
                    .live-block {
                        min-height: 1.7em;
                        padding: 2px 0;
                        outline: none;
                        border-radius: 3px;
                        transition: background 0.1s;
                        white-space: pre-wrap;
                        word-break: break-word;
                        cursor: text;
                    }
                    
                    .live-block::after {
                        content: "";
                        display: table;
                        clear: both;
                    }

                    .live-block img {
                        max-width: 100%;
                        height: auto;
                    }
                    
                    .live-block:focus { outline: none; }
                    
                    /* Активный блок — показываем исходник */
                    .live-block.is-source {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        font-size: 14px;
                        color: inherit;
                        background: rgba(0,0,0,0.03);
                        border-radius: 4px;
                        padding: 2px 6px;
                    }
                    body.dark .live-block.is-source {
                        background: rgba(255,255,255,0.05);
                    }
                    
                    /* Рендеренные блоки */
                    .live-block.is-rendered { font-family: inherit; }
                    
                    /* Заголовки */
                    .live-block[data-type="h1"] { font-size: 2em; font-weight: 700; margin: 0.4em 0 0.2em; }
                    .live-block[data-type="h2"] { font-size: 1.6em; font-weight: 700; margin: 0.4em 0 0.2em; }
                    .live-block[data-type="h3"] { font-size: 1.3em; font-weight: 600; margin: 0.3em 0 0.2em; }
                    .live-block[data-type="h4"] { font-size: 1.1em; font-weight: 600; margin: 0.3em 0 0.1em; }
                    .live-block[data-type="h5"] { font-size: 1em; font-weight: 600; margin: 0.2em 0 0.1em; }
                    .live-block[data-type="h6"] { font-size: 0.9em; font-weight: 600; margin: 0.2em 0 0.1em; color: #57606a; }
                    body.dark .live-block[data-type="h6"] { color: #8b949e; }
                    
                    /* Цитата */
                    .live-block[data-type="blockquote"] {
                        border-left: 4px solid #d0d7de;
                        padding-left: 1em;
                        color: #57606a;
                        margin: 0.3em 0;
                    }
                    body.dark .live-block[data-type="blockquote"] {
                        border-left-color: #30363d;
                        color: #8b949e;
                    }
                    .live-block[data-type="blockquote"] .bq-nested {
                        border-left: 3px solid #d0d7de;
                        padding-left: 1em;
                        margin: 0.35em 0;
                        color: inherit;
                    }
                    body.dark .live-block[data-type="blockquote"] .bq-nested {
                        border-left-color: #484f58;
                    }
                    .live-block[data-type="blockquote"] ul,
                    .live-block[data-type="blockquote"] ol {
                        margin: 0.35em 0;
                        padding-left: 1.5em;
                    }

                    .live-block[data-type="html"] details {
                        margin: 0.5em 0;
                        padding: 0.35em 0.85em;
                        border: 1px solid #d0d7de;
                        border-radius: 6px;
                    }
                    body.dark .live-block[data-type="html"] details {
                        border-color: #30363d;
                    }
                    .live-block[data-type="html"] summary {
                        cursor: pointer;
                        font-weight: 600;
                        margin-bottom: 0.35em;
                    }
                    .live-block[data-type="html"] div[align="center"] {
                        text-align: center;
                    }
                    .live-block[data-type="html"] p {
                        margin: 0.35em 0;
                    }
                    .live-block[data-type="html"] {
                        white-space: normal;
                        cursor: default;
                    }

                    .live-block[data-type="math"],
                    .math-display {
                        margin: 0.75em 0;
                        overflow-x: auto;
                        overflow-y: hidden;
                        text-align: center;
                    }
                    .math-display > .katex-display {
                        margin: 0;
                    }
                    .math-inline .katex {
                        font-size: 1.05em;
                    }
                    .math-fallback {
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        font-size: 0.9em;
                        padding: 0.5em;
                        background: rgba(0, 0, 0, 0.04);
                        border-radius: 4px;
                        overflow-x: auto;
                    }
                    body.dark .math-fallback {
                        background: rgba(255, 255, 255, 0.06);
                    }

                    .live-block[data-type="math"],
                    .live-block[data-type="mermaid"] {
                        cursor: default;
                    }
                    .math-block-wrap,
                    .mermaid-block-wrap {
                        border: 1px solid #d0d7de;
                        border-radius: 8px;
                        overflow: hidden;
                        background: #f6f8fa;
                    }
                    body.dark .math-block-wrap,
                    body.dark .mermaid-block-wrap {
                        border-color: #30363d;
                        background: #161b22;
                    }
                    .math-block-bar,
                    .mermaid-block-bar {
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        padding: 6px 12px;
                        border-bottom: 1px solid #d0d7de;
                        font-size: 12px;
                        color: #57606a;
                        background: #f6f8fa;
                    }
                    body.dark .math-block-bar,
                    body.dark .mermaid-block-bar {
                        border-bottom-color: #30363d;
                        color: #8b949e;
                        background: #161b22;
                    }
                    .math-block-display,
                    .mermaid-diagram {
                        padding: 16px;
                        min-height: 48px;
                        overflow-x: auto;
                    }
                    #live-editor .special-block-preview,
                    #preview-content .special-block-preview {
                        display: flex;
                        justify-content: center;
                        width: 100%;
                    }
                    #live-editor .math-block-display,
                    #preview-content .math-block-display {
                        width: 100%;
                        text-align: center;
                    }
                    #live-editor .mermaid-diagram,
                    #preview-content .mermaid-diagram {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        width: 100%;
                        text-align: center;
                    }
                    #live-editor .mermaid-diagram > *,
                    #preview-content .mermaid-diagram > * {
                        margin-left: auto;
                        margin-right: auto;
                    }
                    .math-block-display.is-empty,
                    .mermaid-diagram.is-empty {
                        min-height: 64px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                    }
                    .math-placeholder,
                    .mermaid-placeholder {
                        color: #8b949e;
                        font-size: 13px;
                        font-style: italic;
                    }
                    .mermaid-diagram svg {
                        max-width: 100%;
                        height: auto;
                    }
                    .mermaid-error {
                        color: #cf222e;
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        font-size: 12px;
                        white-space: pre-wrap;
                    }
                    body.dark .mermaid-error { color: #f85149; }
                    .special-block-editor {
                        display: none;
                        border-bottom: 1px solid #d0d7de;
                    }
                    body.dark .special-block-editor {
                        border-bottom-color: #30363d;
                    }
                    .math-block-wrap.is-editing .special-block-editor,
                    .mermaid-block-wrap.is-editing .special-block-editor {
                        display: block;
                    }
                    .special-block-preview {
                        background: transparent;
                    }
                    .math-edit-area,
                    .mermaid-edit-area,
                    #live-editor pre.math-edit-area,
                    #live-editor pre.mermaid-edit-area {
                        display: block;
                        margin: 0;
                        padding: 12px 14px;
                        min-height: 72px;
                        max-height: 280px;
                        overflow-y: auto;
                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                        font-size: 13px;
                        line-height: 1.5;
                        white-space: pre-wrap;
                        word-break: break-word;
                        border: none !important;
                        outline: none !important;
                        box-shadow: none !important;
                        border-radius: 0 !important;
                        background: transparent !important;
                        color: inherit;
                        -webkit-user-modify: read-write-plaintext-only;
                    }
                    .math-edit-area:focus,
                    .mermaid-edit-area:focus,
                    #live-editor pre.math-edit-area:focus,
                    #live-editor pre.mermaid-edit-area:focus {
                        border: none !important;
                        outline: none !important;
                        box-shadow: none !important;
                    }
                    .math-block-wrap.is-editing,
                    .mermaid-block-wrap.is-editing {
                        box-shadow: none;
                    }
                    .live-block:has(.math-block-wrap.is-editing),
                    .live-block:has(.mermaid-block-wrap.is-editing) {
                        padding: 0 !important;
                        background: transparent !important;
                        border-radius: 0;
                    }
                    .live-block[data-type="math"]:focus,
                    .live-block[data-type="mermaid"]:focus {
                        outline: none;
                    }
                    
                    /* Горизонтальная линия */
                    .live-block[data-type="hr"] {
                        border: none;
                        border-top: 2px solid #d0d7de;
                        margin: 1em 0;
                        height: 2px;
                    }
                    body.dark .live-block[data-type="hr"] { border-top-color: #30363d; }
                    
                    /* Код блок — одна рамка через .code-fence-wrap */
                    .live-block[data-type="code-fence"] {
                        margin: 0.5em 0;
                        padding: 0;
                        background: transparent;
                        white-space: normal;
                    }
                    .code-fence-wrap {
                        border-radius: 8px;
                        overflow: hidden;
                        border: 1px solid var(--md-code-border, #d0d7de);
                        background-color: var(--md-code-bg, #f6f8fa);
                    }
                    .code-fence-lang-bar {
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        padding: 5px 12px;
                        border-bottom: 1px solid var(--md-code-border, #d0d7de);
                        background: rgba(0, 0, 0, 0.04);
                        font-size: 12px;
                        line-height: 1.2;
                    }
                    body.dark .code-fence-lang-bar {
                        background: rgba(255, 255, 255, 0.05);
                    }
                    .code-fence-lang-label {
                        color: #57606a;
                        font-weight: 500;
                        white-space: nowrap;
                    }
                    body.dark .code-fence-lang-label {
                        color: #8b949e;
                    }
                    .code-fence-lang-select {
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        font-size: 12px;
                        padding: 2px 6px;
                        border: 1px solid #d0d7de;
                        border-radius: 4px;
                        background: #ffffff;
                        color: inherit;
                        cursor: pointer;
                        min-width: 140px;
                        max-width: 100%;
                    }
                    body.dark .code-fence-lang-select {
                        background: #0d1117;
                        border-color: #30363d;
                        color: #c9d1d9;
                    }
                    .code-fence-wrap pre.hljs {
                        border: none !important;
                        border-radius: 0 !important;
                        margin: 0 !important;
                        background-color: transparent !important;
                        padding: 12px 14px !important;
                        min-height: 4.5em;
                        cursor: text;
                    }
                    .code-fence-wrap pre.hljs.has-line-numbers {
                        padding: 8px 0 !important;
                    }
                    .code-fence-wrap pre.hljs.has-line-numbers > code {
                        display: block;
                        padding: 0 !important;
                        margin: 0 !important;
                    }
                    .code-fence-wrap pre.hljs.is-empty {
                        display: flex;
                        align-items: flex-start;
                    }
                    .code-fence-placeholder {
                        color: #6a737d;
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        font-size: 13px;
                        font-style: italic;
                        line-height: 1.5;
                        user-select: none;
                        pointer-events: none;
                    }
                    body.dark .code-fence-placeholder {
                        color: #8b949e;
                    }
                    .live-block:has(.code-fence-wrap.is-editing) {
                        padding: 0 !important;
                        background: transparent !important;
                        border-radius: 0;
                    }
                    .code-fence-wrap.is-editing {
                        border: 1px solid var(--md-code-border, #d0d7de);
                    }
                    .code-fence-wrap.is-editing pre.hljs {
                        outline: none !important;
                        box-shadow: none !important;
                        cursor: text;
                    }
                    .code-fence-wrap.is-editing pre.hljs:focus {
                        outline: none !important;
                        box-shadow: none !important;
                    }
                    /* Нумерация строк highlight.js — сохраняем table-layout (не display:block на .hljs-ln-line!) */
                    #preview-content table.hljs-ln,
                    #live-editor table.hljs-ln {
                        display: table !important;
                        border-collapse: collapse;
                        width: 100%;
                        margin: 0;
                        border: none !important;
                        table-layout: auto;
                    }
                    #preview-content table.hljs-ln tbody,

    <body class="mode-edit">

        <div id="live-editor" tabindex="0"></div>
        
        <div id="editor-container">

                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
