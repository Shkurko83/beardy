            const liveEditor = document.getElementById('live-editor');
            let liveBlocks = [];
            let activeBlockIndex = -1;
            let liveContent = '';
            let lastLiveInteraction = { blockIndex: 0, offsetInBlock: null };
            let liveCaretTrackingAttached = false;
            // isLiveMode уже объявлена глобально

            function computeTextareaOffsetForLiveBlock(blockIndex, offsetInBlock) {
                let offset = 0;
                for (let i = 0; i < blockIndex; i++) {
                    offset += (liveBlocks[i]?.source || '').length + 1;
                }
                const source = liveBlocks[blockIndex]?.source || '';
                const safeOffset = offsetInBlock === null
                    ? source.length
                    : Math.max(0, Math.min(offsetInBlock, source.length));
                return offset + safeOffset;
            }

            function syncLiveCaretToTextarea() {
                if (!isLiveActive()) {
                    syncLiveToTextarea();
                    return;
                }

                if (activeBlockIndex >= 0) {
                    deactivateCurrentBlock();
                }

                syncLiveToTextarea();

                const blockIndex = Math.min(
                    Math.max(lastLiveInteraction.blockIndex, 0),
                    Math.max(liveBlocks.length - 1, 0)
                );
                const pos = computeTextareaOffsetForLiveBlock(
                    blockIndex,
                    lastLiveInteraction.offsetInBlock
                );

                textarea.setSelectionRange(pos, pos);
                lastTextareaSelection = { start: pos, end: pos };
            }

            function attachLiveCaretTracking() {
                if (!liveEditor || liveCaretTrackingAttached) return;
                liveCaretTrackingAttached = true;

                liveEditor.addEventListener('mousedown', (e) => {
                    if (!isLiveActive()) return;
                    const blockEl = e.target.closest('.live-block');
                    if (!blockEl) return;

                    const blockIndex = parseInt(blockEl.getAttribute('data-index'), 10);
                    if (Number.isNaN(blockIndex)) return;

                    const cell = e.target.closest('td, th');
                    if (cell) {
                        lastLiveInteraction = { blockIndex, offsetInBlock: null };
                        return;
                    }

                    let offsetInBlock = null;
                    if (blockEl.classList.contains('is-source')) {
                        offsetInBlock = getTextOffsetFromPoint(blockEl, e.clientX, e.clientY);
                    } else {
                        const pointOffset = getTextOffsetFromPoint(blockEl, e.clientX, e.clientY);
                        offsetInBlock = pointOffset === null ? null : pointOffset;
                    }

                    lastLiveInteraction = { blockIndex, offsetInBlock };
                }, true);

                liveEditor.addEventListener('focusin', (e) => {
                    if (!isLiveActive()) return;
                    const blockEl = e.target.closest('.live-block');
                    if (!blockEl) return;
                    const blockIndex = parseInt(blockEl.getAttribute('data-index'), 10);
                    if (Number.isNaN(blockIndex)) return;
                    lastLiveInteraction = { blockIndex, offsetInBlock: null };
                }, true);
            }

            function isGFMTableRow(line) {
                const t = (line || '').trim();
                return t.startsWith('|') && t.includes('|', 1);
            }

            function isGFMTableSeparator(line) {
                const t = (line || '').trim();
                if (!t.startsWith('|')) return false;
                // Строки вида "| | |" без дефисов — это пустые ячейки, не разделитель.
                if (!/-/.test(t)) return false;

                let inner = t;
                if (inner.startsWith('|')) inner = inner.slice(1);
                if (inner.endsWith('|')) inner = inner.slice(0, -1);

                const cells = inner.split('|').map((cell) => cell.trim());
                if (!cells.length) return false;

                return cells.every((cell) => cell === '' || /^:?-{1,}:?$/.test(cell));
            }

            function lineStartOffsetInText(text, lineIndex) {
                const lines = text.split('\n');
                let offset = 0;
                for (let i = 0; i < lineIndex; i++) {
                    offset += lines[i].length + 1;
                }
                return offset;
            }

            function findTableContextAtOffset(text, offset) {
                const lines = text.split('\n');
                let char = 0;
                let currentLineIndex = -1;

                for (let i = 0; i < lines.length; i++) {
                    const lineEnd = char + lines[i].length;
                    if (offset >= char && offset <= lineEnd) {
                        currentLineIndex = i;
                        break;
                    }
                    char = lineEnd + 1;
                }

                if (currentLineIndex < 0 || !isGFMTableRow(lines[currentLineIndex])) {
                    return null;
                }

                let tableStartLine = currentLineIndex;
                let tableEndLine = currentLineIndex;
                while (tableStartLine > 0 && isGFMTableRow(lines[tableStartLine - 1])) {
                    tableStartLine--;
                }
                while (tableEndLine < lines.length - 1 && isGFMTableRow(lines[tableEndLine + 1])) {
                    tableEndLine++;
                }

                const tableLines = lines.slice(tableStartLine, tableEndLine + 1);
                const tableStart = lineStartOffsetInText(text, tableStartLine);
                const lineStart = lineStartOffsetInText(text, currentLineIndex);

                return {
                    lines,
                    tableStartLine,
                    tableEndLine,
                    tableLines,
                    tableStart,
                    currentLineIndex,
                    line: lines[currentLineIndex],
                    lineStart,
                };
            }

            function cellRangesInTableLine(line, lineStartOffset) {
                const ranges = [];
                let pipe = line.indexOf('|');
                while (pipe !== -1) {
                    const nextPipe = line.indexOf('|', pipe + 1);
                    if (nextPipe === -1) break;
                    let innerStart = pipe + 1;
                    let innerEnd = nextPipe;
                    while (innerStart < innerEnd && /\s/.test(line[innerStart])) innerStart++;
                    while (innerEnd > innerStart && /\s/.test(line[innerEnd - 1])) innerEnd--;
                    ranges.push({
                        start: lineStartOffset + innerStart,
                        end: lineStartOffset + innerEnd,
                    });
                    pipe = nextPipe;
                }
                return ranges;
            }

            function currentCellIndexForOffset(cells, offset) {
                for (let i = 0; i < cells.length; i++) {
                    if (offset >= cells[i].start && offset <= cells[i].end) return i;
                }
                for (let i = cells.length - 1; i >= 0; i--) {
                    if (offset > cells[i].start) return i;
                }
                return 0;
            }

            function moveTextareaTableCell(textarea, forward) {
                const text = textarea.value;
                const offset = textarea.selectionStart;
                const ctx = findTableContextAtOffset(text, offset);
                if (!ctx) return false;

                const cells = cellRangesInTableLine(ctx.line, ctx.lineStart);
                if (!cells.length) return false;

                let cellIndex = currentCellIndexForOffset(cells, offset);
                cellIndex += forward ? 1 : -1;

                if (cellIndex >= 0 && cellIndex < cells.length) {
                    textarea.setSelectionRange(cells[cellIndex].start, cells[cellIndex].end);
                    return true;
                }

                const deltaLine = forward ? 1 : -1;
                let nextLine = ctx.currentLineIndex + deltaLine;
                while (nextLine >= ctx.tableStartLine && nextLine <= ctx.tableEndLine) {
                    const nextLineText = ctx.lines[nextLine];
                    if (isGFMTableSeparator(nextLineText)) {
                        nextLine += deltaLine;
                        continue;
                    }
                    const nextLineStart = lineStartOffsetInText(text, nextLine);
                    const nextCells = cellRangesInTableLine(nextLineText, nextLineStart);
                    if (!nextCells.length) {
                        nextLine += deltaLine;
                        continue;
                    }
                    const targetIndex = forward ? 0 : nextCells.length - 1;
                    const target = nextCells[targetIndex];
                    textarea.setSelectionRange(target.start, target.end);
                    return true;
                }

                return false;
            }

            function moveTextareaTableRow(textarea, down) {
                const text = textarea.value;
                const offset = textarea.selectionStart;
                const ctx = findTableContextAtOffset(text, offset);
                if (!ctx) return false;

                const cells = cellRangesInTableLine(ctx.line, ctx.lineStart);
                if (!cells.length) return false;

                const cellIndex = currentCellIndexForOffset(cells, offset);
                const deltaLine = down ? 1 : -1;
                let nextLine = ctx.currentLineIndex + deltaLine;

                while (nextLine >= ctx.tableStartLine && nextLine <= ctx.tableEndLine) {
                    const nextLineText = ctx.lines[nextLine];
                    if (isGFMTableSeparator(nextLineText)) {
                        nextLine += deltaLine;
                        continue;
                    }
                    const nextLineStart = lineStartOffsetInText(text, nextLine);
                    const nextCells = cellRangesInTableLine(nextLineText, nextLineStart);
                    if (nextCells.length) {
                        const target = nextCells[Math.min(cellIndex, nextCells.length - 1)];
                        textarea.setSelectionRange(target.start, target.end);
                        return true;
                    }
                    nextLine += deltaLine;
                }

                return false;
            }

            function handleEditModeTableKeydown(e) {
                if (isLiveActive()) return false;

                const offset = textarea.selectionStart;
                const ctx = findTableContextAtOffset(textarea.value, offset);
                if (!ctx) return false;

                if (e.key === 'Tab') {
                    e.preventDefault();
                    moveTextareaTableCell(textarea, !e.shiftKey);
                    return true;
                }

                if (e.key === 'Enter' && !e.shiftKey && !e.metaKey && !e.ctrlKey && !e.altKey) {
                    e.preventDefault();
                    moveTextareaTableRow(textarea, true);
                    return true;
                }

                if (e.key === 'ArrowUp' && e.altKey) {
                    e.preventDefault();
                    moveTextareaTableRow(textarea, false);
                    return true;
                }

                if (e.key === 'ArrowDown' && e.altKey) {
                    e.preventDefault();
                    moveTextareaTableRow(textarea, true);
                    return true;
                }

                return false;
            }

            function parseGFMTableSource(source) {
                const rows = [];
                for (const line of (source || '').split('\n')) {
                    const trimmed = line.trim();
                    if (!trimmed || isGFMTableSeparator(trimmed)) continue;
                    let inner = trimmed;
                    if (inner.startsWith('|')) inner = inner.slice(1);
                    if (inner.endsWith('|')) inner = inner.slice(0, -1);
                    rows.push(inner.split('|').map(cell => cell.trim()));
                }
                return rows;
            }

            function tableRowsToMarkdown(rows) {
                if (!rows.length) return '';
                const colCount = Math.max(1, ...rows.map(row => row.length));
                const normalize = (row) => {
                    const copy = [...row];
                    while (copy.length < colCount) copy.push('');
                    return copy;
                };
                let md = `| ${normalize(rows[0]).join(' | ')} |\n`;
                md += `| ${Array(colCount).fill('---').join(' | ')} |\n`;
                for (let i = 1; i < rows.length; i++) {
                    md += `| ${normalize(rows[i]).join(' | ')} |\n`;
                }
                return md.trimEnd();
            }

            function escapeTableCellHTML(cell) {
                const trimmed = (cell || '').trim();
                if (!trimmed) return '&nbsp;';
                return trimmed
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            function applyTableColumnCount(table, rows) {
                const colCount = Math.max(1, rows[0]?.length || 1);
                table.style.setProperty('--md-table-columns', String(colCount));
                table.dataset.columns = String(colCount);
            }

            const CODE_LANG_FALLBACK = [
                'plaintext', 'javascript', 'typescript', 'python', 'swift', 'bash', 'shell',
                'json', 'html', 'xml', 'css', 'sql', 'rust', 'go', 'java', 'c', 'cpp',
                'csharp', 'kotlin', 'ruby', 'php', 'yaml', 'markdown'
            ];

            function listHighlightLanguages() {
                if (window.hljs && typeof hljs.listLanguages === 'function') {
                    return hljs.listLanguages().sort();
                }
                return CODE_LANG_FALLBACK;
            }

            function parseCodeFenceSource(source) {
                const lines = (source || '').split('\n');
                const open = lines[0] || '```';
                const langMatch = open.match(/^```([\w-]*)/);
                const lang = langMatch ? (langMatch[1] || '').trim().toLowerCase() : '';
                let inner = '';
                if (lines.length > 2) {
                    inner = lines.slice(1, lines.length - 1).join('\n');
                } else if (lines.length === 2) {
                    inner = lines[1] === '```' ? '' : lines[1];
                }
                return { lang, inner };
            }

            function buildCodeFenceSource(lang, inner) {
                const fenceLang = (lang || '').trim().toLowerCase();
                const open = fenceLang ? `\`\`\`${fenceLang}` : '```';
                return `${open}\n${inner || ''}\n\`\`\``;
            }

            function detectCodeLanguage(code) {
                const sample = (code || '').trim();
                if (!sample || !window.hljs) return '';
                if (typeof hljs.highlightAuto === 'function') {
                    try {
                        const result = hljs.highlightAuto(sample);
                        if (result.language && result.relevance >= 4) {
                            return result.language;
                        }
                    } catch (e) {
                        console.warn('hljs.highlightAuto failed', e);
                    }
                }
                return '';
            }

            function escapeCodeFenceHTML(text) {
                return (text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            function setupCodeFenceBlock(el, block, index, readOnly) {
                let { lang, inner } = parseCodeFenceSource(block.source);

                if (!lang && inner.trim() && !readOnly) {
                    const detected = detectCodeLanguage(inner);
                    if (detected) {
                        lang = detected;
                        block.source = buildCodeFenceSource(lang, inner);
                    }
                }

                const wrap = document.createElement('div');
                wrap.className = 'code-fence-wrap';

                const langBar = document.createElement('div');
                langBar.className = 'code-fence-lang-bar';

                const langLabel = document.createElement('span');
                langLabel.className = 'code-fence-lang-label';
                langLabel.textContent = 'Language:';
                langBar.appendChild(langLabel);

                const displayLang = lang || 'auto';

                if (readOnly) {
                    const langText = document.createElement('span');
                    langText.textContent = displayLang === 'auto' ? 'auto' : displayLang;
                    langBar.appendChild(langText);
                } else {
                    const select = document.createElement('select');
                    select.className = 'code-fence-lang-select';
                    select.title = 'Code language';

                    const autoOpt = document.createElement('option');
                    autoOpt.value = '';
                    autoOpt.textContent = lang ? `auto (${lang})` : 'auto-detect';
                    select.appendChild(autoOpt);

                    const plainOpt = document.createElement('option');
                    plainOpt.value = 'plaintext';
                    plainOpt.textContent = 'Plain Text';
                    select.appendChild(plainOpt);

                    listHighlightLanguages().forEach((name) => {
                        const opt = document.createElement('option');
                        opt.value = name;
                        opt.textContent = name;
                        select.appendChild(opt);
                    });

                    select.value = lang || '';
                    select.addEventListener('change', () => {
                        const chosen = select.value;
                        const parsed = parseCodeFenceSource(block.source);
                        block.source = buildCodeFenceSource(chosen, parsed.inner);
                        setupCodeFenceBlock(el, block, index, false);
                        highlightCodeBlocks(el);
                        syncLiveContentToModel();
                    });
                    langBar.appendChild(select);
                }

                wrap.appendChild(langBar);

                const pre = document.createElement('pre');
                pre.className = 'hljs';
                const code = document.createElement('code');
                if (lang) {
                    code.className = `language-${lang}`;
                    code.setAttribute('data-language', lang);
                }

                if (!inner.trim()) {
                    pre.classList.add('is-empty');
                    const hint = document.createElement('div');
                    hint.className = 'code-fence-placeholder';
                    hint.textContent = readOnly ? '' : 'Click to edit code…';
                    pre.appendChild(hint);
                } else {
                    code.textContent = inner;
                    pre.appendChild(code);
                }

                wrap.appendChild(pre);

                el.innerHTML = '';
                el.appendChild(wrap);

                if (!readOnly) {
                    langBar.addEventListener('mousedown', (e) => e.stopPropagation());
                    const openForEdit = (e) => {
                        if (e.target.closest('.code-fence-lang-bar')) return;
                        if (activeBlockIndex === index) return;
                        e.preventDefault();
                        activateBlock(index, null);
                    };
                    wrap.addEventListener('mousedown', openForEdit);
                    pre.addEventListener('mousedown', openForEdit);
                }
            }

            function activateCodeBlockAtCursor() {
                if (!isLiveActive() || !liveBlocks.length) return;

                const pos = textarea.selectionStart;
                let offset = 0;
                for (let i = 0; i < liveBlocks.length; i++) {
                    const source = liveBlocks[i].source || '';
                    const blockEnd = offset + source.length;
                    if (pos <= blockEnd) {
                        if (liveBlocks[i].type === 'code-fence') {
                            activateBlock(i, null);
                        }
                        return;
                    }
                    offset = blockEnd + 1;
                }
            }

            function renderTableHTMLFromRows(rows) {
                if (!rows.length) return '';

                const colCount = Math.max(1, rows[0]?.length || 1);

                let html = `<div class="md-table-scroll"><table class="md-table" data-columns="${colCount}" style="--md-table-columns:${colCount}"><thead><tr>`;
                rows[0].forEach((cell) => {
                    html += `<th>${escapeTableCellHTML(cell)}</th>`;
                });
                html += '</tr></thead>';

                if (rows.length > 1) {
                    html += '<tbody>';
                    for (let i = 1; i < rows.length; i++) {
                        html += '<tr>';
                        rows[i].forEach((cell) => {
                            html += `<td>${escapeTableCellHTML(cell)}</td>`;
                        });
                        html += '</tr>';
                    }
                    html += '</tbody>';
                }

                html += '</table></div>';
                return html;
            }

            function readTableCellText(cell) {
                const text = (cell.textContent || '')
                    .replace(/\u00a0/g, ' ')
                    .replace(/\u200b/g, '');
                return text.trim();
            }

            function setTableCellContent(cell, cellText) {
                if (!cellText || !cellText.trim()) {
                    cell.textContent = '\u00a0';
                } else {
                    cell.textContent = cellText;
                }
            }

            function isTableCellVisuallyEmpty(cell) {
                return readTableCellText(cell) === '';
            }

            function syncTableBlockFromDOM(index) {
                const block = liveBlocks[index];
                if (!block || block.type !== 'table') return;
                const table = block.el.querySelector('table.md-table');
                if (!table) return;
                const rows = [];
                table.querySelectorAll('tr').forEach((tr) => {
                    const cells = [];
                    tr.querySelectorAll('th, td').forEach((cell) => {
                        cells.push(readTableCellText(cell));
                    });
                    if (cells.length) rows.push(cells);
                });
                block.source = tableRowsToMarkdown(rows);
                syncLiveContentToModel();
            }

            const scheduleTableSync = debounce((index) => {
                syncTableBlockFromDOM(index);
            }, 200);

            function setupTableBlock(el, block, index, readOnly) {
                const rows = parseGFMTableSource(block.source);
                const table = document.createElement('table');
                table.className = 'md-table';
                const thead = document.createElement('thead');
                const tbody = document.createElement('tbody');

                rows.forEach((row, rowIndex) => {
                    const tr = document.createElement('tr');
                    row.forEach((cellText) => {
                        const cell = document.createElement(rowIndex === 0 ? 'th' : 'td');
                        setTableCellContent(cell, cellText);
                        if (!readOnly) {
                            cell.contentEditable = 'true';
                            cell.addEventListener('focus', () => {
                                lastLiveInteraction = { blockIndex: index, offsetInBlock: null };
                                if (isTableCellVisuallyEmpty(cell)) {
                                    cell.textContent = '';
                                }
                            });
                            cell.addEventListener('blur', () => {
                                if (isTableCellVisuallyEmpty(cell)) {
                                    setTableCellContent(cell, '');
                                }
                            });
                        }
                        tr.appendChild(cell);
                    });
                    if (rowIndex === 0) {
                        thead.appendChild(tr);
                    } else {
                        tbody.appendChild(tr);
                    }
                });

                if (thead.childElementCount) table.appendChild(thead);
                if (tbody.childElementCount) table.appendChild(tbody);

                applyTableColumnCount(table, rows);

                el.innerHTML = '';
                const scroll = document.createElement('div');
                scroll.className = 'md-table-scroll';
                scroll.appendChild(table);
                el.appendChild(scroll);
                el.classList.add('live-block-table');

                if (readOnly) return;

                table.addEventListener('mousedown', (e) => e.stopPropagation());
                table.addEventListener('input', () => scheduleTableSync(index));

                table.addEventListener('keydown', (e) => {
                    const cell = e.target.closest('th, td');
                    if (!cell) return;
                    const allCells = [...table.querySelectorAll('th, td')];
                    const cellIndex = allCells.indexOf(cell);
                    const colCount = table.rows[0]?.cells.length || 1;

                    if (e.key === 'Tab') {
                        e.preventDefault();
                        const nextIndex = e.shiftKey ? cellIndex - 1 : cellIndex + 1;
                        if (allCells[nextIndex]) {
                            allCells[nextIndex].focus();
                        }
                        return;
                    }

                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        const rowIndex = Math.floor(cellIndex / colCount);
                        const colIndex = cellIndex % colCount;
                        const nextRow = table.rows[rowIndex + 1];
                        if (nextRow?.cells[colIndex]) {
                            nextRow.cells[colIndex].focus();
                        }
                    }
                });
            }

            // ============================================================
            // MARKDOWN LISTS (Typora-like)
            // ============================================================

            function parseListLine(line) {
                const task = (line || '').match(/^(\s*)[-*+]\s+\[([ xX])\]\s*(.*)$/);
                if (task) {
                    return {
                        kind: 'task',
                        indent: task[1],
                        checked: task[2].toLowerCase() === 'x',
                        content: task[3],
                    };
                }
                const ordered = (line || '').match(/^(\s*)(\d+)\.\s+(.*)$/);
                if (ordered) {
                    return {
                        kind: 'ordered',
                        indent: ordered[1],
                        number: parseInt(ordered[2], 10),
                        content: ordered[3],
                    };
                }
                const bullet = (line || '').match(/^(\s*)[-*+]\s+(.*)$/);
                if (bullet) {
                    return {
                        kind: 'bullet',
                        indent: bullet[1],
                        content: bullet[2],
                    };
                }
                return null;
            }

            function formatListLine(item, lineIndex) {
                const indent = item.indent || '';
                if (item.kind === 'task') {
                    const mark = item.checked ? 'x' : ' ';
                    return `${indent}- [${mark}] ${item.content || ''}`;
                }
                if (item.kind === 'ordered') {
                    const n = item.number ?? (lineIndex + 1);
                    return `${indent}${n}. ${item.content || ''}`;
                }
                return `${indent}- ${item.content || ''}`;
            }

            function markerLength(item, lineIndex) {
                return formatListLine({ ...item, content: '' }, lineIndex).length;
            }

            function getLineRangeForSelection(ta) {
                const start = ta.selectionStart;
                const end = ta.selectionEnd;
                const rangeStart = ta.value.lastIndexOf('\n', Math.max(0, start - 1)) + 1;
                let rangeEnd;
                if (start === end) {
                    const lineEnd = ta.value.indexOf('\n', start);
                    rangeEnd = lineEnd === -1 ? ta.value.length : lineEnd;
                } else {
                    rangeEnd = ta.value.indexOf('\n', end);
                    if (rangeEnd === -1) rangeEnd = ta.value.length;
                }
                return { rangeStart, rangeEnd };
            }

            function toggleMarkdownList(kind) {
                const live = isLiveActive();
                if (live) syncLiveCaretToTextarea();
                const ta = textarea;
                if (!live) ta.focus();

                const { rangeStart, rangeEnd } = getLineRangeForSelection(ta);
                const selectedText = ta.value.slice(rangeStart, rangeEnd);
                const lines = selectedText.split('\n');

                const parsedLines = lines.map((line) => ({ line, parsed: parseListLine(line) }));
                const allMatchKind = parsedLines.length > 0
                    && parsedLines.every(({ parsed }) => parsed && parsed.kind === kind);

                const hasNonEmptyLine = parsedLines.some(({ line }) => line.trim() !== '');
                let orderedIndex = 0;
                const newLines = parsedLines.map(({ line, parsed }) => {
                    if (allMatchKind && parsed) {
                        return parsed.indent + parsed.content;
                    }
                    // Пустая строка: только разделитель между абзацами в многострочном выделении
                    if (line.trim() === '' && !parsed && parsedLines.length > 1 && hasNonEmptyLine) {
                        return line;
                    }
                    const indent = parsed?.indent || '';
                    const content = parsed ? parsed.content : line.trim();
                    const number = kind === 'ordered' ? (++orderedIndex) : 1;
                    return formatListLine({
                        kind,
                        indent,
                        content,
                        checked: false,
                        number,
                    }, number - 1);
                });

                const replacement = newLines.join('\n');
                ta.setRangeText(replacement, rangeStart, rangeEnd, 'end');

                if (ta.selectionStart === ta.selectionEnd) {
                    const first = parseListLine(newLines[0]);
                    if (first) {
                        const pos = rangeStart + markerLength(first, 0);
                        ta.setSelectionRange(pos, pos);
                    }
                }

                rememberTextareaSelection();

                const caretPos = ta.selectionStart;
                if (live) {
                    currentContent = ta.value;
                    scheduleLiveRebuild.cancel();
                    initLiveEditor(ta.value);
                    scheduleContentSync(ta.value);
                    const blockIdx = blockIndexAtTextareaOffset(caretPos);
                    if (liveBlocks[blockIdx]?.type === 'list') {
                        focusLiveListItemAfterRebuild(blockIdx, 0, 0);
                    }
                } else {
                    ta.dispatchEvent(new Event('input'));
                }
            }

            function handleListKeydown(e) {
                if (e.key !== 'Enter' || e.shiftKey || e.metaKey || e.ctrlKey || e.altKey) return false;

                const ta = textarea;
                const pos = ta.selectionStart;
                if (pos !== ta.selectionEnd) return false;

                const lineStart = ta.value.lastIndexOf('\n', pos - 1) + 1;
                const lineEnd = ta.value.indexOf('\n', pos);
                const lineEndPos = lineEnd === -1 ? ta.value.length : lineEnd;
                const line = ta.value.slice(lineStart, lineEndPos);
                const parsed = parseListLine(line);
                if (!parsed) return false;

                const prefixLen = markerLength(parsed, 0);
                const cursorInLine = pos - lineStart;
                const contentStart = prefixLen;
                const textBefore = line.slice(contentStart, cursorInLine);
                const textAfter = line.slice(cursorInLine);

                if (parsed.content.trim() === '' && cursorInLine >= contentStart) {
                    e.preventDefault();
                    const emptyLine = parsed.indent;
                    ta.setRangeText(emptyLine + '\n', lineStart, lineEndPos, 'end');
                    const newPos = lineStart + emptyLine.length + 1;
                    ta.setSelectionRange(newPos, newPos);
                    rememberTextareaSelection();
                    ta.dispatchEvent(new Event('input'));
                    if (isLiveActive()) initLiveEditor(ta.value);
                    return true;
                }

                e.preventDefault();
                const currentLine = formatListLine({ ...parsed, content: textBefore }, parsed.number);
                const nextNumber = parsed.kind === 'ordered'
                    ? (parsed.number || 1) + 1
                    : 1;
                const nextLine = formatListLine({
                    kind: parsed.kind,
                    indent: parsed.indent,
                    content: textAfter,
                    checked: false,
                    number: nextNumber,
                }, nextNumber - 1);

                ta.setRangeText(currentLine + '\n' + nextLine, lineStart, lineEndPos, 'end');
                const newPos = lineStart + currentLine.length + 1 + markerLength({
                    kind: parsed.kind,
                    indent: parsed.indent,
                    checked: false,
                    number: nextNumber,
                }, nextNumber - 1);
                ta.setSelectionRange(newPos, newPos);
                rememberTextareaSelection();
                ta.dispatchEvent(new Event('input'));
                if (isLiveActive()) initLiveEditor(ta.value);
                return true;
            }

            function syncListBlockFromDOM(index) {
                const block = liveBlocks[index];
                if (!block || block.type !== 'list') return;

                const lines = block.source.split('\n');
                const listEl = block.el.querySelector('ul, ol');
                if (!listEl) return;

                const lis = [...listEl.querySelectorAll(':scope > li')];
                const newLines = lis.map((li, itemIndex) => {
                    const base = parseListLine(lines[itemIndex]) || {
                        kind: block.listKind,
                        indent: '',
                        checked: false,
                        number: itemIndex + 1,
                    };
                    const body = li.querySelector('.list-item-body');
                    const content = (body?.textContent || '').replace(/\u00a0/g, ' ');
                    const checkbox = li.querySelector('input[type="checkbox"]');
                    return formatListLine({
                        kind: base.kind,
                        indent: base.indent,
                        content,
                        checked: checkbox ? checkbox.checked : base.checked,
                        number: base.number,
                    }, itemIndex);
                });

                block.source = newLines.join('\n');
                syncLiveContentToModel();
            }

            const scheduleListSync = debounce((index) => {
                syncListBlockFromDOM(index);
            }, 200);

            function blockIndexAtTextareaOffset(offset) {
                let cursor = 0;
                for (let i = 0; i < liveBlocks.length; i++) {
                    const source = liveBlocks[i]?.source ?? '';
                    const blockEnd = cursor + source.length;
                    if (offset <= blockEnd) return i;
                    cursor = blockEnd + 1;
                }
                return Math.max(liveBlocks.length - 1, 0);
            }

            function focusLiveListItemAfterRebuild(blockIndex, itemIndex, caretOffset) {
                const placeCaret = () => {
                    const block = liveBlocks[blockIndex];
                    if (!block?.el || block.type !== 'list') return false;

                    const listRoot = block.el.querySelector('ul, ol');
                    if (!listRoot) return false;

                    const li = listRoot.querySelectorAll(':scope > li')[itemIndex];
                    if (!li) return false;

                    const body = li.querySelector('.list-item-body');
                    if (!body) return false;

                    if (body.innerHTML === '<br>' || body.textContent === '\u00a0') {
                        body.textContent = '';
                    }

                    body.focus();
                    placeCaretAtTextOffset(body, caretOffset ?? 0);
                    lastLiveInteraction = { blockIndex, offsetInBlock: null };
                    return true;
                };

                requestAnimationFrame(() => {
                    if (placeCaret()) return;
                    requestAnimationFrame(placeCaret);
                });
            }

            function rebuildLiveDocumentAndFocus(parts, focusBlockIndex) {
                applyLiveDocumentParts(parts, focusBlockIndex, 0);
            }

            function handleLiveListItemKeydown(e, blockIndex, itemIndex, bodyEl) {
                if (e.key !== 'Enter' || e.shiftKey) return;
                e.preventDefault();

                const block = liveBlocks[blockIndex];
                if (!block || block.type !== 'list') return;

                const lines = block.source.split('\n');
                const parsed = parseListLine(lines[itemIndex]);
                if (!parsed) return;

                const text = (bodyEl.textContent || '').replace(/\u00a0/g, ' ');
                const sel = window.getSelection();
                if (!sel || sel.rangeCount === 0) return;

                const range = sel.getRangeAt(0);
                const pre = document.createRange();
                pre.selectNodeContents(bodyEl);
                pre.setEnd(range.endContainer, range.endOffset);
                const offset = pre.toString().length;

                if (text.trim() === '') {
                    lines.splice(itemIndex, 1);
                    block.source = lines.join('\n');

                    const parts = [];
                    let focusBlockIndex = blockIndex;

                    for (let i = 0; i < liveBlocks.length; i++) {
                        if (i !== blockIndex) {
                            parts.push(liveBlocks[i].source);
                            continue;
                        }
                        if (block.source.trim() === '') {
                            parts.push('');
                            focusBlockIndex = parts.length - 1;
                        } else {
                            parts.push(block.source);
                            parts.push('');
                            focusBlockIndex = blockIndex + 1;
                        }
                    }

                    rebuildLiveDocumentAndFocus(parts, focusBlockIndex);
                    return;
                }

                const before = text.slice(0, offset);
                const after = text.slice(offset);
                const newItemIndex = itemIndex + 1;

                lines[itemIndex] = formatListLine({ ...parsed, content: before }, parsed.number);
                const nextNumber = parsed.kind === 'ordered'
                    ? (parsed.number || itemIndex + 1) + 1
                    : itemIndex + 2;
                lines.splice(newItemIndex, 0, formatListLine({
                    kind: parsed.kind,
                    indent: parsed.indent,
                    content: after,
                    checked: false,
                    number: nextNumber,
                }, newItemIndex));

                block.source = lines.join('\n');
                const parts = liveBlocks.map((b, i) => (i === blockIndex ? block.source : b.source));
                const newText = parts.join('\n');
                currentContent = newText;
                textarea.value = newText;
                scheduleLiveRebuild.cancel();
                initLiveEditor(newText);
                scheduleContentSync(newText);
                focusLiveListItemAfterRebuild(blockIndex, newItemIndex, 0);
            }

            function setupListBlock(el, block, index, readOnly) {
                const lines = block.source.split('\n');
                const items = lines.map((line, i) => parseListLine(line)).filter(Boolean);
                if (!items.length) {
                    el.innerHTML = '<br>';
                    return;
                }

                const listKind = block.listKind || items[0].kind;
                const isOrdered = listKind === 'ordered';
                const isTask = listKind === 'task';
                const list = document.createElement(isOrdered ? 'ol' : 'ul');
                if (isTask) list.className = 'task-list';

                items.forEach((item, itemIndex) => {
                    const li = document.createElement('li');

                    if (isTask) {
                        const cb = document.createElement('input');
                        cb.type = 'checkbox';
                        cb.checked = !!item.checked;
                        if (!readOnly) {
                            cb.addEventListener('mousedown', (ev) => ev.stopPropagation());
                            cb.addEventListener('change', () => {
                                const srcLines = block.source.split('\n');
                                const p = parseListLine(srcLines[itemIndex]);
                                if (!p) return;
                                p.checked = cb.checked;
                                srcLines[itemIndex] = formatListLine(p, itemIndex);
                                block.source = srcLines.join('\n');
                                syncLiveContentToModel();
                            });
                        } else {
                            cb.disabled = true;
                        }
                        li.appendChild(cb);
                    }

                    const body = document.createElement('span');
                    body.className = 'list-item-body';
                    if (item.content.trim()) {
                        body.innerHTML = renderInline(item.content);
                    } else if (!readOnly) {
                        body.innerHTML = '<br>';
                    }

                    if (!readOnly) {
                        body.contentEditable = 'true';
                        body.addEventListener('mousedown', (ev) => ev.stopPropagation());
                        body.addEventListener('input', () => scheduleListSync(index));
                        body.addEventListener('keydown', (ev) => {
                            handleLiveListItemKeydown(ev, index, itemIndex, body);
                        });
                    }

                    li.appendChild(body);
                    list.appendChild(li);
                });

                el.innerHTML = '';
                el.appendChild(list);
            }

            function parseMarkdownBlocks(text) {
                const rawLines = (text || '').split('\n');
                const blocks = [];
                let i = 0;

                while (i < rawLines.length) {
                    const line = rawLines[i];

                    if (line.trim() === '') {
                        blocks.push({ type: 'empty', source: '' });
                        i++;
                        continue;
                    }

                    const listParsed = parseListLine(line);
                    if (listParsed) {
                        const listLines = [line];
                        const listKind = listParsed.kind;
                        i++;
                        while (i < rawLines.length) {
                            const next = parseListLine(rawLines[i]);
                            if (!next || next.kind !== listKind) break;
                            listLines.push(rawLines[i]);
                            i++;
                        }
                        blocks.push({
                            type: 'list',
                            listKind,
                            source: listLines.join('\n'),
                        });
                        continue;
                    }

                    if (line.trim().startsWith('```')) {
                        let fenceLines = [line];
                        i++;
                        while (i < rawLines.length && !rawLines[i].trim().startsWith('```')) {
                            fenceLines.push(rawLines[i]);
                            i++;
                        }
                        if (i < rawLines.length) {
                            fenceLines.push(rawLines[i]);
                            i++;
                        }
                        blocks.push({ type: 'code-fence', source: fenceLines.join('\n') });
                        continue;
                    }

                    const hMatch = line.match(/^(#{1,6})\s+(.+)/);
                    if (hMatch) {
                        blocks.push({ type: `h${hMatch[1].length}`, source: line });
                        i++;
                        continue;
                    }

                    if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(line.trim())) {
                        blocks.push({ type: 'hr', source: line });
                        i++;
                        continue;
                    }

                    if (line.startsWith('>')) {
                        const quoteLines = [line];
                        i++;
                        while (i < rawLines.length && rawLines[i].startsWith('>')) {
                            quoteLines.push(rawLines[i]);
                            i++;
                        }
                        blocks.push({ type: 'blockquote', source: quoteLines.join('\n') });
                        continue;
                    }

                    if (isGFMTableRow(line)) {
                        const tableLines = [];
                        while (i < rawLines.length && isGFMTableRow(rawLines[i])) {
                            tableLines.push(rawLines[i]);
                            i++;
                        }
                        blocks.push({ type: 'table', source: tableLines.join('\n') });
                        continue;
                    }

                    const trimmed = line.trim();
                    if (/^<img\s/i.test(trimmed) || /^!\[[^\]]*\]\([^)]+\)/.test(trimmed)) {
                        blocks.push({ type: 'image', source: line });
                        i++;
                        continue;
                    }

                    blocks.push({ type: 'p', source: line });
                    i++;
                }

                return blocks;
            }

            function detectBlockFromSource(source) {
                const text = source || '';

                if (text.trim() === '') {
                    return { type: 'empty', source: '' };
                }

                if (text.trim().startsWith('```')) {
                    return { type: 'code-fence', source: text };
                }

                const hMatch = text.match(/^(#{1,6})\s+(.+)/);
                if (hMatch) {
                    return { type: `h${hMatch[1].length}`, source: text };
                }

                if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(text.trim())) {
                    return { type: 'hr', source: text };
                }

                if (text.startsWith('>')) {
                    return { type: 'blockquote', source: text };
                }

                const firstLine = text.split('\n')[0] || '';
                if (isGFMTableRow(firstLine)) {
                    return { type: 'table', source: text };
                }

                const trimmed = text.trim();
                if (/^<img\s/i.test(trimmed) || /^!\[[^\]]*\]\([^)]+\)/.test(trimmed)) {
                    return { type: 'image', source: text };
                }

                const firstListLine = text.split('\n')[0] || '';
                const listInfo = parseListLine(firstListLine);
                if (listInfo) {
                    return { type: 'list', listKind: listInfo.kind, source: text };
                }

                return { type: 'p', source: text };
            }

            function renderInline(text) {
                const imgPlaceholders = [];
                const mdImgPlaceholders = [];

                let s = (text || '').replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) => {
                    mdImgPlaceholders.push(buildResolvedImageTag(alt, src));
                    return `\x00MDIMG${mdImgPlaceholders.length - 1}\x00`;
                });

                s = s.replace(/<img\s[^>]*>/gi, (match) => {
                    const resolved = match.replace(/\ssrc=(["'])(.*?)\1/i, (_, quote, src) => {
                        return ` src=${quote}${resolveImageSrc(src)}${quote}`;
                    });
                    imgPlaceholders.push(resolved);
                    return `\x00IMG${imgPlaceholders.length - 1}\x00`;
                });

                s = s
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');

                s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
                s = s.replace(/\*(?!\*)(.+?)\*(?!\*)/g, '<em>$1</em>');
                s = s.replace(/_(?!_)(.+?)_(?!_)/g, '<em>$1</em>');
                s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');
                s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

                s = s.replace(/\x00MDIMG(\d+)\x00/g, (_, i) => mdImgPlaceholders[+i]);
                s = s.replace(/\x00IMG(\d+)\x00/g, (_, i) => imgPlaceholders[+i]);

                return s;
            }


            function renderBlock(block) {
                if (block.type === 'empty') return '<br>';
                if (block.type === 'hr') return '';

                if (block.type === 'image') {
                    const trimmed = block.source.trim();
                    if (trimmed.startsWith('<img')) {
                        return trimmed.replace(/\ssrc=(["'])(.*?)\1/i, (_, quote, src) => {
                            return ` src=${quote}${resolveImageSrc(src)}${quote}`;
                        });
                    }
                    return renderInline(trimmed);
                }

                if (block.type === 'code-fence') {
                    return '';
                }

                if (block.type === 'table') {
                    const rows = parseGFMTableSource(block.source);
                    return renderTableHTMLFromRows(rows);
                }

                if (block.type === 'list') {
                    return '';
                }

                if (block.type.startsWith('h')) {
                    const textMatch = block.source.match(/^#{1,6}\s+(.+)/);
                    return textMatch ? renderInline(textMatch[1]) : renderInline(block.source);
                }

                if (block.type === 'blockquote') {
                    return block.source.split('\n').map((line) => {
                        const inner = line.replace(/^>\s?/, '');
                        return renderInline(inner);
                    }).join('<br>');
                }

                return renderInline(block.source);
            }

            function createBlockEl(block, index, options = {}) {
                const readOnly = !!options.readOnly;
                const el = document.createElement('div');
                el.className = 'live-block is-rendered';
                el.setAttribute('data-type', block.type);
                el.setAttribute('data-index', index);

                if (block.type === 'empty') {
                    el.innerHTML = '<br>';
                    el.style.minHeight = '1.2em';
                } else if (block.type === 'hr') {
                    el.innerHTML = '';
                } else if (block.type === 'table') {
                    setupTableBlock(el, block, index, readOnly);
                } else if (block.type === 'code-fence') {
                    setupCodeFenceBlock(el, block, index, readOnly);
                } else if (block.type === 'list') {
                    setupListBlock(el, block, index, readOnly);
                } else {
                    el.innerHTML = renderBlock(block);
                }

                if (!readOnly && block.type !== 'table' && block.type !== 'code-fence' && block.type !== 'list') {
                    el.addEventListener('mousedown', (e) => {
                        if (activeBlockIndex === index) return;

                        const textOffset = getTextOffsetFromPoint(el, e.clientX, e.clientY);
                        e.preventDefault();
                        activateBlock(index, textOffset);
                    });
                }

                return el;
            }

            function initLiveEditor(text) {
                liveEditor.innerHTML = '';
                liveBlocks = [];
                activeBlockIndex = -1;
                liveContent = normalizeMarkdownImages(text || '');

                const blocks = parseMarkdownBlocks(liveContent);

                blocks.forEach((block, index) => {
                    const el = createBlockEl(block, index, { readOnly: false });
                    const item = {
                        type: block.type,
                        source: block.source,
                        el
                    };
                    liveBlocks.push(item);
                    liveEditor.appendChild(el);
                });

                highlightCodeBlocks(liveEditor);
                rewriteImagesInContainer(liveEditor);

                lastLiveInteraction = {
                    blockIndex: Math.max(liveBlocks.length - 1, 0),
                    offsetInBlock: null
                };
                attachLiveCaretTracking();
            }

            function placeCaretAtEnd(el) {
                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(el);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }

            function getTextOffsetFromPoint(container, clientX, clientY) {
                let range = null;

                if (document.caretRangeFromPoint) {
                    range = document.caretRangeFromPoint(clientX, clientY);
                } else if (document.caretPositionFromPoint) {
                    const pos = document.caretPositionFromPoint(clientX, clientY);
                    if (pos) {
                        range = document.createRange();
                        range.setStart(pos.offsetNode, pos.offset);
                        range.collapse(true);
                    }
                }

                if (!range) return null;
                if (!container.contains(range.startContainer)) return null;

                const preRange = document.createRange();
                preRange.selectNodeContents(container);
                preRange.setEnd(range.startContainer, range.startOffset);

                return preRange.toString().length;
            }

            function placeCaretAtTextOffset(container, offset) {
                container.focus();

                const selection = window.getSelection();
                const range = document.createRange();

                let current = 0;
                let found = false;

                function walk(node) {
                    if (found) return;

                    if (node.nodeType === Node.TEXT_NODE) {
                        const len = node.textContent.length;
                        if (offset <= current + len) {
                            range.setStart(node, Math.max(0, offset - current));
                            range.collapse(true);
                            found = true;
                            return;
                        }
                        current += len;
                        return;
                    }

                    for (const child of node.childNodes) {
                        walk(child);
                        if (found) return;
                    }
                }

                walk(container);

                if (!found) {
                    range.selectNodeContents(container);
                    range.collapse(false);
                }

                selection.removeAllRanges();
                selection.addRange(range);
            }

            function getCaretOffsetWithin(element) {
                return getCaretOffsetInEditable(element);
            }

            function getTextFromContentEditable(el) {
                if (!el) return '';
                const text = el.innerText ?? el.textContent ?? '';
                return text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            }

            function getCaretOffsetInEditable(el) {
                const sel = window.getSelection();
                if (!sel || sel.rangeCount === 0) return 0;

                const range = sel.getRangeAt(0);
                if (!el.contains(range.startContainer)) return 0;

                const pre = document.createRange();
                pre.selectNodeContents(el);
                pre.setEnd(range.startContainer, range.startOffset);
                const temp = document.createElement('div');
                temp.appendChild(pre.cloneContents());
                return getTextFromContentEditable(temp).length;
            }

            function canSplitBlockOnEnter(type) {
                return type === 'p'
                    || type === 'empty'
                    || /^h[1-6]$/.test(type);
            }

            function isLiveTextBlockType(type) {
                return canSplitBlockOnEnter(type) || type === 'blockquote';
            }

            function normalizeBlockquoteSource(text) {
                return (text || '').split('\n').map((line) => {
                    if (/^>\s?/.test(line)) return line;
                    if (line.trim() === '') return '>';
                    return `> ${line}`;
                }).join('\n');
            }

            function removeLiveBlockAt(blockIndex, focusBlockIndex, focusOffset) {
                const parts = [];
                for (let i = 0; i < liveBlocks.length; i++) {
                    if (i !== blockIndex) parts.push(liveBlocks[i].source);
                }
                if (!parts.length) parts.push('');
                applyLiveDocumentParts(parts, focusBlockIndex, focusOffset);
            }

            function applyLiveDocumentParts(parts, focusBlockIndex, focusOffset = 0) {
                activeBlockIndex = -1;
                const newText = parts.join('\n');
                currentContent = newText;
                textarea.value = newText;
                scheduleLiveRebuild.cancel();
                initLiveEditor(newText);
                scheduleContentSync(newText);

                let resolvedOffset = focusOffset;
                if (focusOffset === 'end') {
                    const idx = Math.min(Math.max(focusBlockIndex, 0), parts.length - 1);
                    resolvedOffset = (parts[idx] ?? '').length;
                }

                const focus = () => {
                    const block = liveBlocks[focusBlockIndex];
                    if (!block?.el) return false;
                    if (block.type === 'empty' || isLiveTextBlockType(block.type)) {
                        activateBlock(focusBlockIndex, resolvedOffset);
                        lastLiveInteraction = { blockIndex: focusBlockIndex, offsetInBlock: resolvedOffset };
                        return true;
                    }
                    return false;
                };

                requestAnimationFrame(() => {
                    if (focus()) return;
                    requestAnimationFrame(focus);
                });
            }

            function handleLiveBlockEnter(e, blockIndex) {
                if (e.key !== 'Enter' || e.shiftKey || e.metaKey || e.ctrlKey || e.altKey) return false;

                const block = liveBlocks[blockIndex];
                if (!block?.el || !canSplitBlockOnEnter(block.type)) return false;

                e.preventDefault();

                const text = getTextFromContentEditable(block.el);
                const offset = getCaretOffsetInEditable(block.el);
                const before = text.slice(0, offset);
                const after = text.slice(offset);

                const parts = [];
                for (let i = 0; i < liveBlocks.length; i++) {
                    if (i !== blockIndex) {
                        parts.push(liveBlocks[i].source);
                        continue;
                    }
                    parts.push(before);
                    parts.push(after);
                }

                applyLiveDocumentParts(parts, blockIndex + 1, 0);
                return true;
            }

            function handleLiveBlockquoteEnter(e, blockIndex) {
                if (e.key !== 'Enter' || e.shiftKey || e.metaKey || e.ctrlKey || e.altKey) return false;

                const block = liveBlocks[blockIndex];
                if (!block?.el || block.type !== 'blockquote') return false;

                e.preventDefault();

                const text = getTextFromContentEditable(block.el);
                const offset = getCaretOffsetInEditable(block.el);
                const insert = '\n> ';
                const newText = text.slice(0, offset) + insert + text.slice(offset);
                block.el.textContent = newText;
                block.source = newText;
                placeCaretAtTextOffset(block.el, offset + insert.length);
                return true;
            }

            function handleLiveBlockBackspaceDelete(e, blockIndex) {
                if (e.key !== 'Backspace' && e.key !== 'Delete') return false;
                if (e.metaKey || e.ctrlKey || e.altKey) return false;

                const block = liveBlocks[blockIndex];
                if (!block?.el || !canSplitBlockOnEnter(block.type)) return false;

                const text = getTextFromContentEditable(block.el);
                const isBlank = text.trim() === '' || block.type === 'empty';

                if (e.key === 'Backspace' && isBlank) {
                    if (blockIndex === 0) {
                        e.preventDefault();
                        return true;
                    }
                    e.preventDefault();
                    removeLiveBlockAt(blockIndex, blockIndex - 1, 'end');
                    return true;
                }

                if (e.key === 'Delete' && isBlank) {
                    e.preventDefault();
                    if (liveBlocks.length <= 1) return true;
                    const focusIndex = blockIndex < liveBlocks.length - 1 ? blockIndex : blockIndex - 1;
                    removeLiveBlockAt(blockIndex, focusIndex, 0);
                    return true;
                }

                return false;
            }

            function activateBlockAtOffset(index, offset) {
                activateBlock(index, null);

                requestAnimationFrame(() => {
                    const block = liveBlocks[index];
                    if (block && block.el) {
                        placeCaretAtTextOffset(block.el, offset);
                    }
                });
            }

            function activateBlock(index, clickTextOffset = null) {
                if (activeBlockIndex === index) return;

                if (activeBlockIndex !== -1) {
                    deactivateCurrentBlock();
                }

                activeBlockIndex = index;
                const block = liveBlocks[index];

                block.el.className = 'live-block is-source';
                block.el.setAttribute('contenteditable', 'true');
                block.el.textContent = block.source;
                block.el.focus();

                requestAnimationFrame(() => {
                    if (clickTextOffset !== null) {
                        placeCaretAtTextOffset(block.el, clickTextOffset);
                    } else {
                        placeCaretAtEnd(block.el);
                    }
                });

                block.el.onblur = () => {
                    if (activeBlockIndex === index) {
                        deactivateCurrentBlock();
                    }
                };
                block.el.onkeydown = (e) => {
                    if (handleLiveBlockquoteEnter(e, index)) return;
                    if (handleLiveBlockEnter(e, index)) return;
                    if (handleLiveBlockBackspaceDelete(e, index)) return;

                    const currentOffset = getCaretOffsetWithin(block.el);
                    const textLength = getTextFromContentEditable(block.el).length;

                    if (e.key === 'ArrowUp' && currentOffset === 0 && index > 0) {
                        e.preventDefault();
                        deactivateCurrentBlock();
                        activateBlockAtOffset(index - 1, liveBlocks[index - 1].source.length);
                        return;
                    }

                    if (e.key === 'ArrowDown' && currentOffset === textLength && index < liveBlocks.length - 1) {
                        e.preventDefault();
                        deactivateCurrentBlock();
                        activateBlockAtOffset(index + 1, 0);
                        return;
                    }
                };
            }

            function deactivateCurrentBlock() {
                if (activeBlockIndex < 0 || activeBlockIndex >= liveBlocks.length) return;

                const block = liveBlocks[activeBlockIndex];
                let updatedSource = getTextFromContentEditable(block.el);

                if (block.type === 'blockquote') {
                    updatedSource = normalizeBlockquoteSource(updatedSource);
                }

                if (updatedSource.includes('\n') && canSplitBlockOnEnter(block.type)) {
                    const lines = updatedSource.split('\n');
                    const parts = [];
                    for (let i = 0; i < liveBlocks.length; i++) {
                        if (i !== activeBlockIndex) {
                            parts.push(liveBlocks[i].source);
                        } else {
                            lines.forEach((line) => parts.push(line));
                        }
                    }
                    const newText = parts.join('\n');
                    currentContent = newText;
                    textarea.value = newText;
                    scheduleLiveRebuild.cancel();
                    initLiveEditor(newText);
                    scheduleContentSync(newText);
                    activeBlockIndex = -1;
                    highlightCodeBlocks(liveEditor);
                    rewriteImagesInContainer(liveEditor);
                    return;
                }

                const updatedBlock = detectBlockFromSource(updatedSource);

                block.source = block.type === 'blockquote'
                    ? normalizeBlockquoteSource(updatedBlock.source)
                    : updatedBlock.source;
                block.type = updatedBlock.type;
                block.el.setAttribute('data-type', block.type);

                block.el.className = 'live-block is-rendered';
                block.el.removeAttribute('contenteditable');

                if (block.type === 'empty') {
                    block.el.innerHTML = '<br>';
                    block.el.style.minHeight = '1.2em';
                } else if (block.type === 'hr') {
                    block.el.innerHTML = '';
                } else if (block.type === 'table') {
                    setupTableBlock(block.el, block, activeBlockIndex, false);
                } else if (block.type === 'code-fence') {
                    setupCodeFenceBlock(block.el, block, activeBlockIndex, false);
                } else if (block.type === 'list') {
                    setupListBlock(block.el, block, activeBlockIndex, false);
                } else {
                    block.el.innerHTML = renderBlock(block);
                }

                activeBlockIndex = -1;
                syncLiveContentToModel();
                highlightCodeBlocks(liveEditor);
                rewriteImagesInContainer(liveEditor);
            }

            function syncLiveContentToModel() {
                currentContent = liveBlocks.map(block => block.source).join('\n');
                textarea.value = currentContent;
                schedulePreviewRender(currentContent);
                scheduleContentSync(currentContent);
            }


        </script>
    </body>
</html>
