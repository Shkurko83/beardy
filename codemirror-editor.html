            let liveCaretTrackingAttached = false;
            // isLiveMode уже объявлена глобально

            function computeTextareaOffsetForLiveBlock(blockIndex, offsetInBlock) {
                let offset = 0;
                for (let i = 0; i < blockIndex; i++) {
                    offset += (liveBlocks[i]?.source || '').length + 1;
                }
                const source = liveBlocks[blockIndex]?.source || '';
                const safeOffset = offsetInBlock === null
                    ? source.length
                    : Math.max(0, Math.min(offsetInBlock, source.length));
                return offset + safeOffset;
            }

            function lineOffsetInBlockSource(block, lineIndex) {
                const lines = (block?.source || '').split('\n');
                let off = 0;
                for (let i = 0; i < lineIndex && i < lines.length; i++) {
                    off += lines[i].length + 1;
                }
                return off;
            }

            function plainLenFromMarkdownSource(markdown, blockType) {
                const div = document.createElement('div');
                if (!markdown) return 0;
                if (blockType === 'blockquote') {
                    div.innerHTML = renderBlockquoteHTML(markdown);
                } else if (typeof blockType === 'string' && /^h[1-6]$/.test(blockType)) {
                    const m = markdown.match(/^#{1,6}\s+/);
                    const rest = m ? markdown.slice(m[0].length) : markdown;
                    div.innerHTML = renderInline(rest);
                } else {
                    div.innerHTML = renderInline(markdown);
                }
                return getTextFromContentEditable(div).length;
            }

            function mapPlainOffsetToSource(markdown, plainOffset, blockType) {
                if (plainOffset <= 0) return 0;
                let lo = 0;
                let hi = markdown.length;
                while (lo < hi) {
                    const mid = Math.ceil((lo + hi) / 2);
                    const len = plainLenFromMarkdownSource(markdown.slice(0, mid), blockType);
                    if (len <= plainOffset) lo = mid;
                    else hi = mid - 1;
                }
                return lo;
            }

            function getOffsetInElementPlain(rootEl, targetNode, targetOffset) {
                if (!rootEl || !targetNode) return 0;
                const range = document.createRange();
                try {
                    range.setStart(rootEl, 0);
                    range.setEnd(targetNode, targetOffset);
                } catch (err) {

                }
                const temp = document.createElement('div');
                temp.appendChild(range.cloneContents());
                return getTextFromContentEditable(temp).length;
            }

            function resolveListBodyPoint(body, node, nodeOffset) {
                const blockIndex = parseInt(body.dataset.listBlockIndex, 10);
                const itemIndex = parseInt(body.dataset.listItemIndex, 10);
                const block = liveBlocks[blockIndex];
                if (!block || Number.isNaN(blockIndex) || Number.isNaN(itemIndex)) return null;

                const plainOff = getOffsetInElementPlain(body, node, nodeOffset);
                const lineStart = lineOffsetInBlockSource(block, itemIndex);
                const lineText = (block.source.split('\n')[itemIndex] || '');

                if (body.dataset.sourceEdit === '1') {
                    return {
                        blockIndex,
                        offset: lineStart + Math.min(plainOff, lineText.length),
                    };
                }

                const parsed = parseListLine(lineText);
                if (!parsed) return { blockIndex, offset: lineStart };
                const markerLen = markerLength(parsed, itemIndex);
                const contentOff = mapPlainOffsetToSource(parsed.content || '', plainOff, 'p');
                return { blockIndex, offset: lineStart + markerLen + contentOff };
            }

            function resolveLiveSelectionPoint(node, nodeOffset) {
                if (!node) return null;

                const listBody = (node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement)
                    ?.closest?.('.list-item-body');
                if (listBody) return resolveListBodyPoint(listBody, node, nodeOffset);

                const blockEl = (node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement)
                    ?.closest?.('.live-block');
                if (!blockEl) return null;

                const blockIndex = parseInt(blockEl.getAttribute('data-index'), 10);
                if (Number.isNaN(blockIndex)) return null;
                const block = liveBlocks[blockIndex];
                if (!block) return null;

                if (block.type === 'code-fence' || block.type === 'math' || block.type === 'mermaid' || block.type === 'table') {
                    const plainOff = getOffsetInElementPlain(blockEl, node, nodeOffset);
                    return { blockIndex, offset: Math.min(plainOff, block.source.length) };
                }

                const plainOff = getOffsetInElementPlain(blockEl, node, nodeOffset);
                if (blockEl.classList.contains('is-source')) {
                    return { blockIndex, offset: Math.min(plainOff, block.source.length) };
                }

                return { blockIndex, offset: mapPlainOffsetToSource(block.source, plainOff, block.type) };
            }

            function findPlainTextRangeInTextarea(plain) {
                if (!plain) return null;
                const text = textarea.value;
                const idx = text.indexOf(plain);
                if (idx < 0) return null;
                return { start: idx, end: idx + plain.length };
            }

            function captureLiveDocumentSelection() {
                if (!isLiveActive() || !liveEditor) return;

                const sel = window.getSelection();
                if (!sel || !sel.rangeCount) return;

                const anchorInLive = sel.anchorNode && liveEditor.contains(sel.anchorNode);
                const focusInLive = sel.focusNode && liveEditor.contains(sel.focusNode);
                if (!anchorInLive && !focusInLive) return;

                if (sel.isCollapsed) {
                    const pt = resolveLiveSelectionPoint(sel.anchorNode, sel.anchorOffset);
                    if (!pt) return;
                    const pos = computeTextareaOffsetForLiveBlock(pt.blockIndex, pt.offset);
                    lastLiveDocumentSelection = { start: pos, end: pos };
                    return;
                }

                const anchor = resolveLiveSelectionPoint(sel.anchorNode, sel.anchorOffset);
                const focus = resolveLiveSelectionPoint(sel.focusNode, sel.focusOffset);
                if (anchor && focus) {
                    let start = computeTextareaOffsetForLiveBlock(anchor.blockIndex, anchor.offset);
                    let end = computeTextareaOffsetForLiveBlock(focus.blockIndex, focus.offset);
                    if (start > end) {
                        const tmp = start;
                        start = end;
                        end = tmp;
                    }
                    lastLiveDocumentSelection = { start, end };
                    return;
                }

                const plain = sel.toString();
                const found = findPlainTextRangeInTextarea(plain);
                if (found) lastLiveDocumentSelection = found;
            }

            function syncLiveSelectionToTextarea() {
                if (!isLiveActive()) return;

                finishActiveListSourceEdit(null);

                if (activeBlockIndex >= 0) {
                    deactivateCurrentBlock();
                }

                syncLiveToTextarea();

                const sel = window.getSelection();
                const selPlain = sel?.toString?.() || '';

                if (!sel || !sel.rangeCount || sel.isCollapsed) {
                    if (lastLiveDocumentSelection.start !== lastLiveDocumentSelection.end) {
                        textarea.setSelectionRange(
                            lastLiveDocumentSelection.start,
                            lastLiveDocumentSelection.end
                        );
                        lastTextareaSelection = { ...lastLiveDocumentSelection };
                        return;
                    }
                    const blockIndex = Math.min(
                        Math.max(lastLiveInteraction.blockIndex, 0),
                        Math.max(liveBlocks.length - 1, 0)
                    );
                    const pos = computeTextareaOffsetForLiveBlock(
                        blockIndex,
                        lastLiveInteraction.offsetInBlock
                    );
                    textarea.setSelectionRange(pos, pos);
                    lastTextareaSelection = { start: pos, end: pos };
                    return;
                }

                const anchor = resolveLiveSelectionPoint(sel.anchorNode, sel.anchorOffset);
                const focus = resolveLiveSelectionPoint(sel.focusNode, sel.focusOffset);
                if (!anchor || !focus) {
                    const found = findPlainTextRangeInTextarea(selPlain);
                    if (found) {
                        textarea.setSelectionRange(found.start, found.end);
                        lastTextareaSelection = { ...found };
                        lastLiveDocumentSelection = { ...found };
                        return;
                    }
                    if (lastLiveDocumentSelection.start !== lastLiveDocumentSelection.end) {
                        textarea.setSelectionRange(
                            lastLiveDocumentSelection.start,
                            lastLiveDocumentSelection.end
                        );
                        lastTextareaSelection = { ...lastLiveDocumentSelection };
                        return;

                    syncLiveCaretToTextarea();
                    return;

                let start = computeTextareaOffsetForLiveBlock(anchor.blockIndex, anchor.offset);
                let end = computeTextareaOffsetForLiveBlock(focus.blockIndex, focus.offset);
                if (start > end) {
                    const tmp = start;
                    start = end;
                    end = tmp;
                }

                textarea.setSelectionRange(start, end);
                lastTextareaSelection = { start, end };
                lastLiveDocumentSelection = { start, end };
            }

            function getTextareaSelectionRange() {
                const ta = textarea;
                let start = ta.selectionStart;
                let end = ta.selectionEnd;
                if (start === end) {
                    if (isLiveActive() && lastLiveDocumentSelection.start !== lastLiveDocumentSelection.end) {
                        start = lastLiveDocumentSelection.start;
                        end = lastLiveDocumentSelection.end;
                    } else if (lastTextareaSelection.start !== lastTextareaSelection.end) {
                        start = lastTextareaSelection.start;
                        end = lastTextareaSelection.end;
                    }
                }
                return { start, end };
            }

            function insertMarkdownCodeFenceAtSelection() {
                const live = isLiveActive();
                if (live) {
                    captureLiveDocumentSelection();
                    syncLiveSelectionToTextarea();
                } else {
                    rememberTextareaSelection();
                }

                const ta = textarea;
                ta.focus();

                const { start, end } = getTextareaSelectionRange();
                const before = ta.value.slice(0, start);
                const after = ta.value.slice(end);
                const selected = ta.value.slice(start, end);

                const fenceBody = selected.length > 0
                    ? `\`\`\`\n${selected}\n\`\`\``
                    : '```\n\n```';

                let prefix = '';
                let suffix = '';
                if (before.length > 0 && !before.endsWith('\n')) prefix = '\n';
                if (after.length > 0 && !after.startsWith('\n')) suffix = '\n';

                const insert = prefix + fenceBody + suffix;
                ta.setRangeText(insert, start, end, 'end');

                const fenceInnerStart = start + prefix.length + 4;
                const caretPos = selected.length > 0
                    ? fenceInnerStart + selected.length
                    : fenceInnerStart;

                lastTextareaSelection = { start: caretPos, end: caretPos };
                ta.setSelectionRange(caretPos, caretPos);

                if (live) {

                    initLiveEditor(ta.value);
                    scheduleContentSync(ta.value);

            function syncLiveCaretToTextarea() {

                syncLiveToTextarea();

                const blockIndex = Math.min(
                    Math.max(lastLiveInteraction.blockIndex, 0),
                    Math.max(liveBlocks.length - 1, 0)

                const pos = computeTextareaOffsetForLiveBlock(
                    blockIndex,
                    lastLiveInteraction.offsetInBlock

                textarea.setSelectionRange(pos, pos);
                lastTextareaSelection = { start: pos, end: pos };

            function attachLiveCaretTracking() {

                    if (!isLiveActive()) return;

                    finishActiveListSourceEdit(listBody || null);
                    const blockEl = e.target.closest('.live-block');
                    if (!blockEl) return;

                    const blockIndex = parseInt(blockEl.getAttribute('data-index'), 10);
                    if (Number.isNaN(blockIndex)) return;

                    const cell = e.target.closest('td, th');
                    if (cell) {
                        lastLiveInteraction = { blockIndex, offsetInBlock: null };

                    let offsetInBlock = null;

                    if (!blockEl) return;
                    const blockIndex = parseInt(blockEl.getAttribute('data-index'), 10);
                    if (Number.isNaN(blockIndex)) return;
                    lastLiveInteraction = { blockIndex, offsetInBlock: null };
                }, true);

            function isGFMTableRow(line) {
                const t = (line || '').trim();
                return t.startsWith('|') && t.includes('|', 1);
            }

            function isGFMTableSeparator(line) {
                const t = (line || '').trim();
                if (!t.startsWith('|')) return false;
                // Строки вида "| | |" без дефисов — это пустые ячейки, не разделитель.
                if (!/-/.test(t)) return false;

                let inner = t;
                if (inner.startsWith('|')) inner = inner.slice(1);
                if (inner.endsWith('|')) inner = inner.slice(0, -1);

                const cells = inner.split('|').map((cell) => cell.trim());
                if (!cells.length) return false;

                return cells.every((cell) => cell === '' || /^:?-{1,}:?$/.test(cell));
            }

            function lineStartOffsetInText(text, lineIndex) {
                const lines = text.split('\n');
                let offset = 0;
                for (let i = 0; i < lineIndex; i++) {
                    offset += lines[i].length + 1;
                }
                return offset;
            }

            function findTableContextAtOffset(text, offset) {
                const lines = text.split('\n');
                let char = 0;
                let currentLineIndex = -1;

                for (let i = 0; i < lines.length; i++) {
                    const lineEnd = char + lines[i].length;
                    if (offset >= char && offset <= lineEnd) {
                        currentLineIndex = i;
                        break;
                    }
                    char = lineEnd + 1;
                }

                if (currentLineIndex < 0 || !isGFMTableRow(lines[currentLineIndex])) {
                    return null;
                }

                let tableStartLine = currentLineIndex;
                let tableEndLine = currentLineIndex;
                while (tableStartLine > 0 && isGFMTableRow(lines[tableStartLine - 1])) {
                    tableStartLine--;
                }
                while (tableEndLine < lines.length - 1 && isGFMTableRow(lines[tableEndLine + 1])) {
                    tableEndLine++;
                }

                const tableLines = lines.slice(tableStartLine, tableEndLine + 1);
                const tableStart = lineStartOffsetInText(text, tableStartLine);
                const lineStart = lineStartOffsetInText(text, currentLineIndex);

                return {
                    lines,
                    tableStartLine,
                    tableEndLine,
                    tableLines,
                    tableStart,
                    currentLineIndex,
                    line: lines[currentLineIndex],
                    lineStart,
                };
            }

            function cellRangesInTableLine(line, lineStartOffset) {
                const ranges = [];
                let pipe = line.indexOf('|');
                while (pipe !== -1) {
                    const nextPipe = line.indexOf('|', pipe + 1);
                    if (nextPipe === -1) break;
                    let innerStart = pipe + 1;
                    let innerEnd = nextPipe;
                    while (innerStart < innerEnd && /\s/.test(line[innerStart])) innerStart++;
                    while (innerEnd > innerStart && /\s/.test(line[innerEnd - 1])) innerEnd--;
                    ranges.push({
                        start: lineStartOffset + innerStart,
                        end: lineStartOffset + innerEnd,
                    });
                    pipe = nextPipe;
                }
                return ranges;
            }

            function currentCellIndexForOffset(cells, offset) {
                for (let i = 0; i < cells.length; i++) {
                    if (offset >= cells[i].start && offset <= cells[i].end) return i;
                }
                for (let i = cells.length - 1; i >= 0; i--) {
                    if (offset > cells[i].start) return i;
                }
                return 0;
            }

            function moveTextareaTableCell(textarea, forward) {
                const text = textarea.value;
                const offset = textarea.selectionStart;
                const ctx = findTableContextAtOffset(text, offset);
                if (!ctx) return false;

                const cells = cellRangesInTableLine(ctx.line, ctx.lineStart);
                if (!cells.length) return false;

                let cellIndex = currentCellIndexForOffset(cells, offset);
                cellIndex += forward ? 1 : -1;

                if (cellIndex >= 0 && cellIndex < cells.length) {
                    textarea.setSelectionRange(cells[cellIndex].start, cells[cellIndex].end);
                    return true;
                }

                const deltaLine = forward ? 1 : -1;
                let nextLine = ctx.currentLineIndex + deltaLine;
                while (nextLine >= ctx.tableStartLine && nextLine <= ctx.tableEndLine) {
                    const nextLineText = ctx.lines[nextLine];
                    if (isGFMTableSeparator(nextLineText)) {
                        nextLine += deltaLine;
                        continue;
                    }
                    const nextLineStart = lineStartOffsetInText(text, nextLine);
                    const nextCells = cellRangesInTableLine(nextLineText, nextLineStart);
                    if (!nextCells.length) {
                        nextLine += deltaLine;
                        continue;
                    }
                    const targetIndex = forward ? 0 : nextCells.length - 1;
                    const target = nextCells[targetIndex];
                    textarea.setSelectionRange(target.start, target.end);
                    return true;
                }

                return false;
            }

            function moveTextareaTableRow(textarea, down) {
                const text = textarea.value;
                const offset = textarea.selectionStart;
                const ctx = findTableContextAtOffset(text, offset);
                if (!ctx) return false;

                const cells = cellRangesInTableLine(ctx.line, ctx.lineStart);
                if (!cells.length) return false;

                const cellIndex = currentCellIndexForOffset(cells, offset);
                const deltaLine = down ? 1 : -1;
                let nextLine = ctx.currentLineIndex + deltaLine;

                while (nextLine >= ctx.tableStartLine && nextLine <= ctx.tableEndLine) {
                    const nextLineText = ctx.lines[nextLine];
                    if (isGFMTableSeparator(nextLineText)) {
                        nextLine += deltaLine;
                        continue;
                    }
                    const nextLineStart = lineStartOffsetInText(text, nextLine);
                    const nextCells = cellRangesInTableLine(nextLineText, nextLineStart);
                    if (nextCells.length) {
                        const target = nextCells[Math.min(cellIndex, nextCells.length - 1)];
                        textarea.setSelectionRange(target.start, target.end);
                        return true;
                    }
                    nextLine += deltaLine;
                }

                return false;
            }

            function handleEditModeTableKeydown(e) {
                if (isLiveActive()) return false;

                const offset = textarea.selectionStart;
                const ctx = findTableContextAtOffset(textarea.value, offset);
                if (!ctx) return false;

                if (e.key === 'Tab') {
                    e.preventDefault();
                    moveTextareaTableCell(textarea, !e.shiftKey);
                    return true;
                }

                if (e.key === 'Enter' && !e.shiftKey && !e.metaKey && !e.ctrlKey && !e.altKey) {
                    e.preventDefault();
                    moveTextareaTableRow(textarea, true);
                    return true;
                }

                if (e.key === 'ArrowUp' && e.altKey) {
                    e.preventDefault();
                    moveTextareaTableRow(textarea, false);
                    return true;
                }

                if (e.key === 'ArrowDown' && e.altKey) {
                    e.preventDefault();
                    moveTextareaTableRow(textarea, true);
                    return true;
                }

                return false;
            }

            function parseGFMTableAlignmentCell(cell) {
                const c = (cell || '').trim();
                if (!/^:?-{1,}:?$/.test(c)) return 'left';
                const left = c.startsWith(':');
                const right = c.endsWith(':');
                if (left && right) return 'center';
                if (right) return 'right';
                return 'left';
            }

            function parseGFMTableSource(source) {
                const rows = [];
                let alignments = null;
                for (const line of (source || '').split('\n')) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;
                    if (isGFMTableSeparator(trimmed)) {
                        let inner = trimmed;
                        if (inner.startsWith('|')) inner = inner.slice(1);
                        if (inner.endsWith('|')) inner = inner.slice(0, -1);
                        alignments = inner.split('|').map((cell) => parseGFMTableAlignmentCell(cell.trim()));
                        continue;
                    }
                    if (!trimmed.startsWith('|')) continue;
                    let inner = trimmed;
                    if (inner.startsWith('|')) inner = inner.slice(1);
                    if (inner.endsWith('|')) inner = inner.slice(0, -1);
                    rows.push(inner.split('|').map((cell) => cell.trim()));
                }
                return { rows, alignments };
            }

            function tableCellAlignAttr(alignments, colIndex) {
                const align = alignments?.[colIndex] || 'left';
                return ` style="text-align:${align}"`;
            }

            function tableRowsToMarkdown(rows) {
                if (!rows.length) return '';
                const colCount = Math.max(1, ...rows.map(row => row.length));
                const normalize = (row) => {
                    const copy = [...row];
                    while (copy.length < colCount) copy.push('');
                    return copy;
                };
                let md = `| ${normalize(rows[0]).join(' | ')} |\n`;
                md += `| ${Array(colCount).fill('---').join(' | ')} |\n`;
                for (let i = 1; i < rows.length; i++) {
                    md += `| ${normalize(rows[i]).join(' | ')} |\n`;
                }
                return md.trimEnd();
            }

            function applyTableColumnCount(table, rows) {
                const colCount = Math.max(1, rows[0]?.length || 1);
                table.style.setProperty('--md-table-columns', String(colCount));
                table.dataset.columns = String(colCount);
            }

            const CODE_LANG_FALLBACK = [
                'plaintext', 'javascript', 'typescript', 'python', 'swift', 'bash', 'shell',
                'json', 'html', 'xml', 'css', 'sql', 'rust', 'go', 'java', 'c', 'cpp',
                'csharp', 'kotlin', 'ruby', 'php', 'yaml', 'markdown'
            ];

            function listHighlightLanguages() {
                if (window.hljs && typeof hljs.listLanguages === 'function') {
                    return hljs.listLanguages().sort();
                }
                return CODE_LANG_FALLBACK;
            }

            function parseCodeFenceSource(source) {
                const lines = (source || '').split('\n');
                const open = lines[0] || '```';
                const langMatch = open.match(/^```([\w-]*)/);
                const lang = langMatch ? (langMatch[1] || '').trim().toLowerCase() : '';
                let inner = '';
                if (lines.length > 2) {
                    inner = lines.slice(1, lines.length - 1).join('\n');
                } else if (lines.length === 2) {
                    inner = lines[1] === '```' ? '' : lines[1];
                }
                inner = dedentUniformLeadingWhitespace(inner);
                return { lang, inner };
            }

            function buildCodeFenceSource(lang, inner) {
                const fenceLang = (lang || '').trim().toLowerCase();
                const open = fenceLang ? `\`\`\`${fenceLang}` : '```';
                const cleaned = dedentUniformLeadingWhitespace(inner || '');
                return `${open}\n${cleaned}\n\`\`\``;
            }

            function measureLeadingWhitespace(line) {
                const m = (line || '').match(/^(\s*)/);
                if (!m) return 0;
                return [...m[1]].reduce((n, ch) => n + (ch === '\t' ? 4 : 1), 0);
            }

            function stripLeadingWhitespaceColumns(line, columns) {
                let remaining = columns;
                let index = 0;
                while (remaining > 0 && index < line.length) {
                    if (line[index] === '\t') {
                        remaining -= 4;
                        index++;
                    } else if (line[index] === ' ') {
                        remaining--;
                        index++;
                    } else {
                        break;
                    }
                }
                return line.slice(index);
            }

            /** Убирает одинаковый «левый мусор» (часто после бага сохранения с номерами строк). */
            function dedentUniformLeadingWhitespace(text) {
                if (!text) return '';
                const lines = text.replace(/\r\n/g, '\n').split('\n');
                const nonEmpty = lines.filter((line) => line.trim().length > 0);
                if (nonEmpty.length === 0) return text.replace(/\r\n/g, '\n');

                const indents = nonEmpty.map(measureLeadingWhitespace);
                const minIndent = Math.min(...indents);
                if (minIndent < 4) return text.replace(/\r\n/g, '\n');
                if (!indents.every((n) => n === minIndent)) return text.replace(/\r\n/g, '\n');

                return lines.map((line) => {
                    if (!line.trim()) return line;
                    return stripLeadingWhitespaceColumns(line, minIndent);
                }).join('\n');
            }

            function normalizeCodeFenceBlockSource(source) {
                const parsed = parseCodeFenceSource(source);
                const cleaned = dedentUniformLeadingWhitespace(parsed.inner);
                if (cleaned === parsed.inner) return source;
                return buildCodeFenceSource(parsed.lang, cleaned);
            }

            function readCodeFenceInner(preEl) {
                if (!preEl) return '';
                let text;
                if (preEl.classList.contains('code-fence-edit-input')
                    || preEl.classList.contains('code-fence-edit-area')) {
                    const raw = preEl.value != null ? preEl.value : (preEl.textContent || '');
                    text = raw
                        .replace(/\u00a0/g, ' ')
                        .replace(/\r\n/g, '\n')
                        .replace(/\r/g, '\n');
                } else if (preEl.isContentEditable
                    || preEl.getAttribute('contenteditable') === 'true') {
                    text = getTextFromContentEditable(preEl);
                } else {
                    const code = preEl.querySelector('code');
                    text = extractCodeText(preEl, code || preEl);
                }
                return dedentUniformLeadingWhitespace(text);
            }

            let codeFenceHighlightTimer = null;

            function clearCodeFenceHighlightTimer() {
                if (codeFenceHighlightTimer) {
                    clearTimeout(codeFenceHighlightTimer);
                    codeFenceHighlightTimer = null;
                }
            }

            function refreshCodeFenceLiveHighlight(block, pre) {
                if (!pre || !block) return;

                const offset = getCaretOffsetInEditable(pre);
                const text = getTextFromContentEditable(pre);
                const lang = block._codeFenceLang != null
                    ? block._codeFenceLang
                    : parseCodeFenceSource(block.source).lang;

                block.source = buildCodeFenceSource(lang, text);

                pre.querySelector('.code-fence-placeholder')?.remove();
                pre.classList.toggle('is-empty', !text.trim());

                let code = pre.querySelector('code');
                if (!code) {
                    code = document.createElement('code');
                }

                paintCodeFenceHighlight(pre, code, lang, text);

                pre.setAttribute('contenteditable', 'true');
                pre.setAttribute('spellcheck', 'false');
                attachPlainTextTyping(pre);

                requestAnimationFrame(() => {
                    placeCaretAtTextOffset(pre, offset);
                });
            }

            function scheduleCodeFenceLiveHighlight(block, pre) {
                clearCodeFenceHighlightTimer();
                codeFenceHighlightTimer = setTimeout(() => {
                    codeFenceHighlightTimer = null;
                    refreshCodeFenceLiveHighlight(block, pre);
                }, 100);
            }

            function softUpdateCodeFenceHighlight(preEl, lang, text) {
                const raw = (text || '')
                    .replace(/\u00a0/g, ' ')
                    .replace(/\r\n/g, '\n')
                    .replace(/\r/g, '\n');
                const codeEl = preEl?.querySelector('code');
                if (!codeEl || !window.hljs) return false;

                const lineEls = [...preEl.querySelectorAll('.hljs-ln-line')];
                if (lineEls.length) {
                    const lines = raw.split('\n');
                    if (lineEls.length !== lines.length) return false;
                    lineEls.forEach((lineEl, i) => {
                        lineEl.textContent = lines[i];
                    });
                    return true;
                }

                codeEl.textContent = raw;
                codeEl.removeAttribute('data-highlighted');
                if (lang) {
                    codeEl.className = `language-${lang}`;
                    codeEl.setAttribute('data-language', lang);
                }

                try {
                    hljs.highlightElement(codeEl);
                } catch (e) {
                    console.warn('hljs.highlightElement failed', e);
                    return false;
                }
                return true;
            }

            function syncCodeFenceStackHeights(editArea, highlightPre) {
                const contentHeight = Math.max(
                    highlightPre.scrollHeight,
                    editArea.scrollHeight,
                    highlightPre.offsetHeight,
                    72
                );
                highlightPre.style.minHeight = `${contentHeight}px`;
                editArea.style.height = `${contentHeight}px`;
            }

            function paintCodeFenceHighlight(preEl, codeEl, lang, text) {
                const raw = (text || '')
                    .replace(/\u00a0/g, ' ')
                    .replace(/\r\n/g, '\n')
                    .replace(/\r/g, '\n');

                preEl.innerHTML = '';
                preEl.className = 'hljs';
                codeEl.textContent = raw;
                codeEl.removeAttribute('data-highlighted');

                if (lang) {
                    codeEl.className = `language-${lang}`;
                    codeEl.setAttribute('data-language', lang);
                } else {
                    codeEl.className = '';
                    codeEl.removeAttribute('data-language');
                }

                preEl.appendChild(codeEl);
                preEl.classList.toggle('is-empty', !raw.trim());

                if (!raw.trim() || !window.hljs) return;

                try {
                    hljs.highlightElement(codeEl);
                } catch (e) {
                    console.warn('hljs.highlightElement failed', e);
                }

                preEl.classList.remove('has-line-numbers');
                const skipLineNumbers = preEl.closest('.code-fence-wrap.is-editing');
                if (showCodeLineNumbers && !skipLineNumbers && typeof hljs.lineNumbersBlock === 'function') {
                    try {
                        hljs.lineNumbersBlock(codeEl, { singleLine: true });
                        preEl.classList.add('has-line-numbers');
                    } catch (e) {
                        console.warn('lineNumbersBlock failed', e);
                    }
                }
            }

            function getFirstTextNodeInElement(el) {
                if (!el) return null;
                const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
                return walker.nextNode();
            }

            function measureCodeColumnOffset(pre) {
                const codeCell = pre.querySelector('td.hljs-ln-code');
                if (!codeCell) return null;
                const preRect = pre.getBoundingClientRect();
                const textNode = getFirstTextNodeInElement(codeCell.querySelector('.hljs-ln-line') || codeCell);
                if (textNode) {
                    const range = document.createRange();
                    try {
                        range.setStart(textNode, 0);
                        range.setEnd(textNode, 0);
                        const caretRect = range.getBoundingClientRect();
                        return Math.max(0, Math.round(caretRect.left - preRect.left));
                    } catch (err) {
                        /* fall through */
                    }
                }
                return Math.max(0, Math.round(codeCell.getBoundingClientRect().left - preRect.left));
            }

            function measureHighlightTextInsets(pre) {
                const preStyle = window.getComputedStyle(pre);
                const preRect = pre.getBoundingClientRect();

                const line = pre.querySelector('.hljs-ln-line');
                const code = pre.querySelector('code');
                const anchorRoot = line || code;
                const textNode = getFirstTextNodeInElement(anchorRoot);

                let top = parseFloat(preStyle.paddingTop) || 0;
                let left = parseFloat(preStyle.paddingLeft) || 0;

                if (textNode) {
                    const range = document.createRange();
                    try {
                        range.setStart(textNode, 0);
                        range.setEnd(textNode, 0);
                        const caretRect = range.getBoundingClientRect();
                        top = Math.max(0, Math.round(caretRect.top - preRect.top));
                        left = Math.max(0, Math.round(caretRect.left - preRect.left));
                    } catch (err) {
                        /* keep padding fallback */
                    }
                }

                const columnOffset = measureCodeColumnOffset(pre);
                if (columnOffset != null) {
                    left = columnOffset;
                }

                return {
                    top,
                    left,
                    right: parseFloat(preStyle.paddingRight) || 0,
                    bottom: parseFloat(preStyle.paddingBottom) || 0,
                };
            }

            function getCodeFenceOffsetFromPoint(pre, clientX, clientY) {
                let range = null;
                if (document.caretRangeFromPoint) {
                    range = document.caretRangeFromPoint(clientX, clientY);
                } else if (document.caretPositionFromPoint) {
                    const pos = document.caretPositionFromPoint(clientX, clientY);
                    if (pos) {
                        range = document.createRange();
                        range.setStart(pos.offsetNode, pos.offset);
                        range.collapse(true);
                    }
                }
                if (!range || !pre.contains(range.startContainer)) {
                    return getTextOffsetFromPoint(pre, clientX, clientY);
                }

                const lineEl = (range.startContainer.nodeType === Node.TEXT_NODE
                    ? range.startContainer.parentElement
                    : range.startContainer)?.closest?.('.hljs-ln-line');
                if (lineEl && pre.contains(lineEl)) {
                    const rows = [...pre.querySelectorAll('.hljs-ln-line')];
                    const rowIndex = rows.indexOf(lineEl);
                    if (rowIndex >= 0) {
                        let offset = 0;
                        for (let i = 0; i < rowIndex; i++) {
                            offset += (rows[i].textContent || '').length + 1;
                        }
                        const lineRange = document.createRange();
                        lineRange.selectNodeContents(lineEl);
                        lineRange.setEnd(range.startContainer, range.startOffset);
                        offset += lineRange.toString().length;
                        return offset;
                    }
                }

                return getTextOffsetFromPoint(pre, clientX, clientY);
            }

            function positionCodeFenceEditOverlay(editArea, highlightPre, wrap) {
                if (!editArea || !highlightPre || !wrap) return;

                editArea.style.top = `${highlightPre.offsetTop}px`;
                editArea.style.left = `${highlightPre.offsetLeft}px`;
                editArea.style.width = `${highlightPre.offsetWidth}px`;
                syncCodeFenceStackHeights(editArea, highlightPre);

                const insets = measureHighlightTextInsets(highlightPre);
                editArea.style.paddingTop = `${insets.top}px`;
                editArea.style.paddingLeft = `${insets.left}px`;
                editArea.style.paddingRight = `${insets.right}px`;
                editArea.style.paddingBottom = `${insets.bottom}px`;

                const fontLine = highlightPre.querySelector('.hljs-ln-line')
                    || highlightPre.querySelector('td.hljs-ln-code')
                    || highlightPre.querySelector('code');
                if (fontLine) {
                    const fs = window.getComputedStyle(fontLine);
                    editArea.style.fontFamily = fs.fontFamily;
                    editArea.style.fontSize = fs.fontSize;
                    editArea.style.lineHeight = fs.lineHeight;
                    editArea.style.letterSpacing = fs.letterSpacing;
                    editArea.style.fontWeight = fs.fontWeight;
                    editArea.style.fontVariantLigatures = fs.fontVariantLigatures;
                    editArea.style.fontFeatureSettings = fs.fontFeatureSettings;
                    editArea.style.tabSize = fs.tabSize || '4';
                }
            }

            function detachCodeFenceEditListeners(block) {
                clearCodeFenceHighlightTimer();
                detachSpecialBlockEditListeners(block);

                const wrap = block?._codeFenceEditWrap;
                const pre = block?._codeFenceEditPre;
                if (pre) {
                    pre.removeAttribute('contenteditable');
                    pre.removeAttribute('spellcheck');
                }
                if (!wrap) return;

                delete block._codeFenceEditWrap;
                delete block._codeFenceEditPre;
                delete block._codeFenceHighlightPre;
                delete block._codeFenceHighlightCode;
                delete block._codeFenceLang;
                if (block._codeFenceResizeObs) {
                    block._codeFenceResizeObs.disconnect();
                    delete block._codeFenceResizeObs;
                }
                if (block._codeFenceScrollHandler && pre) {
                    pre.removeEventListener('scroll', block._codeFenceScrollHandler);
                    delete block._codeFenceScrollHandler;
                }
            }

            function looksLikeMarkdownProse(text) {
                return /(\*\*|__|~~|^\s{0,3}[-*+]\s|^\s{0,3}\d+\.\s|\[[^\]]+\]\([^)]+\))/.test(text || '');
            }

            function detectCodeLanguage(code) {
                const sample = (code || '').trim();
                if (!sample || !window.hljs) return '';
                if (typeof hljs.highlightAuto === 'function') {
                    try {
                        const result = hljs.highlightAuto(sample);
                        if (result.language && result.relevance >= 4) {
                            return result.language;
                        }
                    } catch (e) {
                        console.warn('hljs.highlightAuto failed', e);
                    }
                }
                return '';
            }

            function escapeCodeFenceHTML(text) {
                return (text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            function setupCodeFenceBlock(el, block, index, readOnly) {
                let { lang, inner } = parseCodeFenceSource(block.source);

                if (!lang && inner.trim() && !readOnly && !looksLikeMarkdownProse(inner)) {
                    const detected = detectCodeLanguage(inner);
                    if (detected) {
                        lang = detected;
                        block.source = buildCodeFenceSource(lang, inner);
                    }
                }

                const wrap = document.createElement('div');
                wrap.className = 'code-fence-wrap';

                const displayLang = lang || 'auto';

                if (readOnly) {
                    const langBar = document.createElement('div');
                    langBar.className = 'code-fence-lang-bar';
                    const langLabel = document.createElement('span');
                    langLabel.className = 'code-fence-lang-label';
                    langLabel.textContent = 'Language:';
                    langBar.appendChild(langLabel);
                    const langText = document.createElement('span');
                    langText.textContent = displayLang === 'auto' ? 'auto' : displayLang;
                    langBar.appendChild(langText);
                    wrap.appendChild(langBar);
                } else {
                    appendCodeFenceLangBar(wrap, block, index, lang);
                }

                const pre = document.createElement('pre');
                pre.className = 'hljs';
                const code = document.createElement('code');
                if (lang) {
                    code.className = `language-${lang}`;
                    code.setAttribute('data-language', lang);
                }

                if (!inner.trim()) {
                    pre.classList.add('is-empty');
                    const hint = document.createElement('div');
                    hint.className = 'code-fence-placeholder';
                    hint.textContent = readOnly ? '' : 'Click to edit code…';
                    pre.appendChild(hint);
                } else {
                    code.textContent = inner;
                    pre.appendChild(code);
                }

                wrap.appendChild(pre);

                el.innerHTML = '';
                el.appendChild(wrap);

                if (!readOnly) {
                    const openForEdit = (e) => {
                        if (e.target.closest('.code-fence-lang-bar')) return;
                        if (activeBlockIndex === index) return;
                        e.preventDefault();
                        const caretOffset = getCodeFenceOffsetFromPoint(pre, e.clientX, e.clientY);
                        activateCodeFenceBlock(index, { caretOffset });
                    };
                    wrap.addEventListener('mousedown', openForEdit);
                    pre.addEventListener('mousedown', openForEdit);
                }

                highlightCodeBlocks(el);
            }

            function appendCodeFenceLangBar(wrap, block, index, lang) {
                const langBar = document.createElement('div');
                langBar.className = 'code-fence-lang-bar';

                const langLabel = document.createElement('span');
                langLabel.className = 'code-fence-lang-label';
                langLabel.textContent = 'Language:';
                langBar.appendChild(langLabel);

                const select = document.createElement('select');
                select.className = 'code-fence-lang-select';
                select.title = 'Code language';

                const autoOpt = document.createElement('option');
                autoOpt.value = '';
                autoOpt.textContent = lang ? `auto (${lang})` : 'auto-detect';
                select.appendChild(autoOpt);

                const plainOpt = document.createElement('option');
                plainOpt.value = 'plaintext';
                plainOpt.textContent = 'Plain Text';
                select.appendChild(plainOpt);

                listHighlightLanguages().forEach((name) => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    select.appendChild(opt);
                });

                select.value = lang || '';
                select.addEventListener('mousedown', (e) => e.stopPropagation());
                select.addEventListener('change', () => {
                    block._codeFenceLang = select.value;
                    const highlightPre = block._codeFenceEditPre
                        || block._codeFenceHighlightPre
                        || block.el.querySelector('.code-fence-wrap pre.hljs');
                    if (highlightPre && block._codeFenceEditWrap?.classList.contains('is-editing')) {
                        block._codeFenceLang = select.value;
                        clearCodeFenceHighlightTimer();
                        refreshCodeFenceLiveHighlight(block, highlightPre);
                        return;
                    }
                    if (!block.el.querySelector('.code-fence-wrap.is-editing')) {
                        const parsed = parseCodeFenceSource(block.source);
                        block.source = buildCodeFenceSource(select.value, parsed.inner);
                        setupCodeFenceBlock(block.el, block, index, false);
                        highlightCodeBlocks(block.el);
                        syncLiveContentToModel();
                    }
                });
                langBar.appendChild(select);
                langBar.addEventListener('mousedown', (e) => e.stopPropagation());
                wrap.appendChild(langBar);
                return select;
            }

            function activateCodeFenceBlock(index, options = {}) {
                if (activeBlockIndex === index) return;

                if (activeBlockIndex !== -1) {
                    deactivateCurrentBlock();
                }

                activeBlockIndex = index;
                const block = liveBlocks[index];
                const { lang, inner } = parseCodeFenceSource(block.source);
                block._codeFenceLang = lang;
                const initialCaret = options.caretOffset;

                block.el.className = 'live-block is-rendered';
                block.el.removeAttribute('contenteditable');
                block.el.onblur = null;
                block.el.onkeydown = null;

                let wrap = block.el.querySelector('.code-fence-wrap');
                if (!wrap) {
                    setupCodeFenceBlock(block.el, block, index, false);
                    wrap = block.el.querySelector('.code-fence-wrap');
                }
                if (!wrap) return;

                const highlightPre = wrap.querySelector('pre.hljs');
                if (!highlightPre) return;

                wrap.querySelector('.code-fence-edit-stack')?.remove();
                wrap.querySelector('.code-fence-edit-row')?.remove();

                wrap.classList.add('is-editing');

                const codeText = readCodeFenceInner(highlightPre) || inner;
                highlightPre.querySelector('.code-fence-placeholder')?.remove();
                highlightPre.classList.toggle('is-empty', !codeText.trim());

                let code = highlightPre.querySelector('code');
                if (!code) {
                    code = document.createElement('code');
                }
                paintCodeFenceHighlight(highlightPre, code, lang, codeText);

                highlightPre.setAttribute('contenteditable', 'true');
                highlightPre.setAttribute('spellcheck', 'false');
                attachPlainTextTyping(highlightPre);

                block._codeFenceEditPre = highlightPre;
                block._codeFenceEditWrap = wrap;
                block._codeFenceHighlightPre = highlightPre;

                const onCodeFenceInput = () => {
                    const currentLang = block._codeFenceLang != null
                        ? block._codeFenceLang
                        : lang;
                    block.source = buildCodeFenceSource(
                        currentLang,
                        getTextFromContentEditable(highlightPre)
                    );
                    scheduleCodeFenceLiveHighlight(block, highlightPre);
                };

                attachSpecialBlockEditHandlers(block, index, wrap, highlightPre, onCodeFenceInput);

                requestAnimationFrame(() => {
                    highlightPre.focus();
                    let pos = codeText.length;
                    if (initialCaret != null && initialCaret >= 0) {
                        pos = Math.min(initialCaret, codeText.length);
                    }
                    placeCaretAtTextOffset(highlightPre, pos);
                });
            }

            function buildMathBlockSource(inner) {
                const cleaned = (inner || '').trim();
                if (!cleaned) return '$$';
                if (!cleaned.includes('\n')) return `$$${cleaned}$$`;
                return `$$\n${cleaned}\n$$`;
            }

            function parseMathInnerFromText(text) {
                const trimmed = (text || '').trim();
                if (trimmed.startsWith('$$') && trimmed.endsWith('$$') && trimmed.length > 4) {
                    return trimmed.slice(2, -2).trim();
                }
                return trimmed;
            }

            function blockToMarkdownSource(block) {
                if (!block) return '';
                if (block.type === 'math') return buildMathBlockSource(block.source);
                return block.source || '';
            }

            function blockMarkdownLength(block) {
                return blockToMarkdownSource(block).length;
            }

            let mermaidCurrentTheme = null;
            let mermaidLivePreviewTimer = null;

            function getMermaidThemeName() {
                return document.body.classList.contains('dark') ? 'dark' : 'default';
            }

            function ensureMermaidInitialized() {
                if (typeof mermaid === 'undefined') return false;
                const theme = getMermaidThemeName();
                if (mermaidCurrentTheme !== theme) {
                    mermaid.initialize({
                        startOnLoad: false,
                        securityLevel: 'strict',
                        theme,
                        fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
                    });
                    mermaidCurrentTheme = theme;
                }
                return true;
            }

            function resetMermaidTheme() {
                mermaidCurrentTheme = null;
            }

            function isElementVisibleForLayout(el) {
                if (!el || !el.isConnected) return false;
                if (document.body.classList.contains('pdf-export-mode')) {
                    return true;
                }
                let node = el;
                while (node && node !== document.body) {
                    const style = window.getComputedStyle(node);
                    if (style.display === 'none' || style.visibility === 'hidden') {
                        return false;
                    }
                    node = node.parentElement;
                }
                const rect = el.getBoundingClientRect();
                return rect.width > 2 && rect.height > 2;
            }

            function getActiveMermaidRoots() {
                const liveEditor = document.getElementById('live-editor');
                const preview = document.getElementById('preview-content');
                if (document.body.classList.contains('mode-live')) {
                    return liveEditor ? [liveEditor] : [];
                }
                if (document.body.classList.contains('mode-preview')
                    || document.body.classList.contains('mode-split')) {
                    return preview ? [preview] : [];
                }
                return [];
            }

            function prepareMermaidNodeForRender(node) {
                if (!node) return false;
                let src = node.getAttribute('data-mermaid-source');
                if (!src || !src.trim()) {
                    const text = (node.textContent || '').trim();
                    if (text && !text.includes('<svg') && !text.includes('dmermaid')) {
                        src = text;
                        node.setAttribute('data-mermaid-source', src);
                    }
                }
                if (!src || !src.trim()) return false;
                node.innerHTML = '';
                node.textContent = src;
                node.classList.add('mermaid');
                node.classList.remove('is-empty');
                node.removeAttribute('data-mermaid-rendering');
                node.removeAttribute('data-processed');
                node.setAttribute('data-mermaid-pending', '1');
                return true;
            }

            /** Перерисовать все диаграммы после смены светлой/тёмной темы приложения. */
            function rethemeAllMermaidInApp(scrollAnchor, options = {}) {
                const anchor = scrollAnchor || captureDocumentScrollAnchor();
                resetMermaidTheme();
                const roots = getActiveMermaidRoots();
                let hasDiagrams = false;
                roots.forEach((root) => {
                    root.querySelectorAll('.mermaid-diagram').forEach((node) => {
                        if (prepareMermaidNodeForRender(node)) hasDiagrams = true;
                    });
                });
                if (!hasDiagrams) {
                    if (!options.skipRestore) {
                        restoreDocumentScrollAnchor(anchor, { persistent: true });
                    }
                    return;
                }
                scheduleMermaidRenderAfterLayout(roots);
                if (!options.skipRestore) {
                    restoreDocumentScrollAnchor(anchor, { persistent: true });
                }
            }

            function scheduleMermaidRenderAfterLayout(roots, attempt = 0) {
                const visible = (roots || getActiveMermaidRoots()).filter(isElementVisibleForLayout);
                if (!visible.length) {
                    if (attempt < 8) {
                        requestAnimationFrame(() => scheduleMermaidRenderAfterLayout(roots, attempt + 1));
                    }
                    return;
                }
                visible.forEach((root) => scheduleMermaidRender(root));
            }

            const mermaidContainersScheduled = new Set();
            let mermaidGlobalRenderFrame = null;

            function scheduleMermaidRender(container) {
                if (!container) return;
                mermaidContainersScheduled.add(container);
                if (mermaidGlobalRenderFrame != null) {
                    cancelAnimationFrame(mermaidGlobalRenderFrame);
                }
                mermaidGlobalRenderFrame = requestAnimationFrame(() => {
                    mermaidGlobalRenderFrame = null;
                    const containers = Array.from(mermaidContainersScheduled);
                    mermaidContainersScheduled.clear();
                    renderMermaidInContainers(containers);
                });
            }

            async function renderMermaidInContainers(containers, retryAttempt = 0) {
                if (!containers.length || !ensureMermaidInitialized()) return;

                const visibleContainers = containers.filter(isElementVisibleForLayout);
                if (!visibleContainers.length) {
                    if (retryAttempt < 8) {
                        requestAnimationFrame(() => renderMermaidInContainers(containers, retryAttempt + 1));
                    }
                    return;
                }

                let needsLayoutRetry = false;

                for (const container of visibleContainers) {
                    const nodes = [];
                    container.querySelectorAll('.mermaid-diagram[data-mermaid-pending]').forEach((node) => {
                        if (node.hasAttribute('data-mermaid-rendering')) return;
                        if (!isElementVisibleForLayout(node)) return;
                        prepareMermaidNodeForRender(node);
                        nodes.push(node);
                    });
                    if (!nodes.length) continue;

                    nodes.forEach((node) => node.setAttribute('data-mermaid-rendering', '1'));

                    try {
                        await mermaid.run({ nodes, suppressErrors: false });
                        nodes.forEach((node) => {
                            node.removeAttribute('data-mermaid-pending');
                            node.removeAttribute('data-mermaid-rendering');
                            const src = node.getAttribute('data-mermaid-source');
                            if (src) node.setAttribute('data-mermaid-source', src);
                        });
                    } catch (err) {
                        console.warn('Mermaid render failed:', err);
                        const msg = err.message || String(err);
                        const layoutError = /getBoundingClientRect|suitable point/i.test(msg);
                        if (layoutError && retryAttempt < 3) {
                            needsLayoutRetry = true;
                            nodes.forEach((node) => {
                                node.removeAttribute('data-mermaid-rendering');
                                node.setAttribute('data-mermaid-pending', '1');
                            });
                            continue;
                        }
                        nodes.forEach((node) => {
                            node.removeAttribute('data-mermaid-pending');
                            node.removeAttribute('data-mermaid-rendering');
                            const src = node.getAttribute('data-mermaid-source') || '';
                            node.innerHTML = `<pre class="mermaid-error">${escapeInlineText(msg)}</pre>`;
                            if (src) node.setAttribute('data-mermaid-source', src);
                        });
                    }
                }

                if (needsLayoutRetry) {
                    await new Promise((r) => setTimeout(r, 100));
                    await renderMermaidInContainers(visibleContainers, retryAttempt + 1);
                }
            }

            function isLikelyDisplayMathLine(line) {
                const t = (line || '').trim();
                if (!t) return false;
                if (t === '$$' || (t.startsWith('$$') && t.endsWith('$$'))) return true;
                return /^\\[a-zA-Z@]/.test(t);
            }

            function collectDisplayMathBlock(rawLines, startIndex) {
                const mathLines = [];
                let i = startIndex;
                while (i < rawLines.length) {
                    const t = rawLines[i].trim();
                    if (t === '') break;
                    if (t === '$$') {
                        i++;
                        while (i < rawLines.length && rawLines[i].trim() !== '$$') {
                            mathLines.push(rawLines[i]);
                            i++;
                        }
                        if (i < rawLines.length) i++;
                        break;
                    }
                    if (t.startsWith('$$') && t.endsWith('$$') && t.length > 4) {
                        mathLines.push(t.slice(2, -2).trim());
                        i++;
                        continue;
                    }
                    if (!isLikelyDisplayMathLine(rawLines[i])) break;
                    mathLines.push(rawLines[i]);
                    i++;
                }
                return { latex: mathLines.join('\n'), nextIndex: i };
            }

            async function renderMermaidInContainer(container) {
                if (!container) return;
                await renderMermaidInContainers([container]);
            }

            function detachSpecialBlockEditListeners(block) {
                const wrap = block?._specialEditWrap;
                const pre = block?._specialEditPre;
                if (wrap && block._specialFocusOut) {
                    wrap.removeEventListener('focusout', block._specialFocusOut);
                }
                if (wrap && block._specialKeyDown) {
                    wrap.removeEventListener('keydown', block._specialKeyDown);
                }
                if (pre && block._specialInput) {
                    pre.removeEventListener('input', block._specialInput);
                }
                if (pre && block._specialBlur) {
                    pre.removeEventListener('blur', block._specialBlur);
                }
                delete block._specialEditWrap;
                delete block._specialEditPre;
                delete block._specialFocusOut;
                delete block._specialKeyDown;
                delete block._specialInput;
                delete block._specialBlur;
            }

            function attachSpecialBlockEditHandlers(block, index, wrap, pre, onInput) {
                const tryFinishEdit = () => {
                    if (activeBlockIndex === index) {
                        deactivateCurrentBlock();
                    }
                };

                const onFocusOut = (e) => {
                    const next = e.relatedTarget;
                    if (next && wrap.contains(next)) return;
                    tryFinishEdit();
                };
                block._specialFocusOut = onFocusOut;
                wrap.addEventListener('focusout', onFocusOut);

                const onBlur = () => {
                    requestAnimationFrame(() => {
                        if (activeBlockIndex !== index) return;
                        const active = document.activeElement;
                        if (active && wrap.contains(active)) return;
                        tryFinishEdit();
                    });
                };
                block._specialBlur = onBlur;
                pre.addEventListener('blur', onBlur);

                if (onInput) {
                    const onInputHandler = () => onInput(block, pre);
                    block._specialInput = onInputHandler;
                    pre.addEventListener('input', onInputHandler);
                }

                const onKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        e.preventDefault();
                        deactivateCurrentBlock();
                        return;
                    }
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        document.execCommand('insertText', false, '    ');
                        return;
                    }

                    const currentOffset = getCaretOffsetInEditable(pre);
                    const textLength = getTextFromContentEditable(pre).length;

                    if (e.key === 'ArrowUp' && currentOffset === 0 && index > 0) {
                        e.preventDefault();
                        deactivateCurrentBlock();
                        activateBlockAtOffset(index - 1, blockMarkdownLength(liveBlocks[index - 1]));
                        return;
                    }

                    if (e.key === 'ArrowDown' && currentOffset === textLength && index < liveBlocks.length - 1) {
                        e.preventDefault();
                        deactivateCurrentBlock();
                        activateBlockAtOffset(index + 1, 0);
                    }
                };
                block._specialKeyDown = onKeyDown;
                wrap.addEventListener('keydown', onKeyDown);
            }

            function refreshMathBlockDisplay(display, inner, readOnly) {
                if (!display) return;
                if (!inner.trim()) {
                    display.classList.add('is-empty');
                    display.innerHTML = `<div class="math-placeholder">${readOnly ? '' : 'Click to edit formula…'}</div>`;
                } else {
                    display.classList.remove('is-empty');
                    display.innerHTML = renderMathBlock(inner);
                }
            }

            function refreshMermaidBlockDisplay(diagram, inner, readOnly) {
                if (!diagram) return;
                const src = (inner || '').trim();
                if (!src) {
                    diagram.classList.add('is-empty');
                    diagram.removeAttribute('data-mermaid-pending');
                    diagram.removeAttribute('data-mermaid-source');
                    diagram.innerHTML = `<div class="mermaid-placeholder">${readOnly ? '' : 'Click to edit diagram…'}</div>`;
                    return;
                }
                diagram.classList.remove('is-empty');
                diagram.setAttribute('data-mermaid-source', src);
                diagram.textContent = src;
                diagram.setAttribute('data-mermaid-pending', '1');
            }

            function updateMathLivePreview(block, pre) {
                const wrap = block._specialEditWrap || block.el.querySelector('.math-block-wrap');
                const display = wrap?.querySelector('.math-block-display');
                const latex = parseMathInnerFromText(pre.textContent || '');
                refreshMathBlockDisplay(display, latex, false);
            }

            function updateMermaidLivePreview(block, pre) {
                const wrap = block._specialEditWrap || block.el.querySelector('.mermaid-block-wrap');
                const diagram = wrap?.querySelector('.mermaid-diagram');
                const inner = (pre.textContent || '').trim();
                refreshMermaidBlockDisplay(diagram, inner, false);
                if (!inner) return;
                clearTimeout(mermaidLivePreviewTimer);
                mermaidLivePreviewTimer = setTimeout(() => {
                    if (wrap) scheduleMermaidRenderAfterLayout([wrap]);
                }, 350);
            }

            function setupMathBlock(el, block, index, readOnly) {
                const inner = parseMathInnerFromText(block.source);
                block.source = inner;

                const wrap = document.createElement('div');
                wrap.className = 'math-block-wrap';

                const editorPane = document.createElement('div');
                editorPane.className = 'special-block-editor';

                const bar = document.createElement('div');
                bar.className = 'math-block-bar';
                bar.innerHTML = '<span>Formula (LaTeX)</span>';
                editorPane.appendChild(bar);

                const pre = document.createElement('pre');
                pre.className = 'math-edit-area';
                if (!readOnly) {
                    pre.setAttribute('contenteditable', 'true');
                    pre.setAttribute('spellcheck', 'false');
                    attachPlainTextTyping(pre);
                }
                editorPane.appendChild(pre);

                const previewPane = document.createElement('div');
                previewPane.className = 'special-block-preview';

                const display = document.createElement('div');
                display.className = 'math-block-display';
                previewPane.appendChild(display);

                wrap.appendChild(editorPane);
                wrap.appendChild(previewPane);

                refreshMathBlockDisplay(display, inner, readOnly);

                el.innerHTML = '';
                el.appendChild(wrap);

                if (!readOnly) {
                    previewPane.addEventListener('mousedown', (e) => {
                        if (activeBlockIndex === index) return;
                        e.preventDefault();
                        activateMathBlock(index);
                    });
                }
            }

            function activateMathBlock(index) {
                if (activeBlockIndex === index) return;
                if (activeBlockIndex !== -1) deactivateCurrentBlock();

                activeBlockIndex = index;
                const block = liveBlocks[index];

                let wrap = block.el.querySelector('.math-block-wrap');
                if (!wrap) {
                    setupMathBlock(block.el, block, index, false);
                    wrap = block.el.querySelector('.math-block-wrap');
                }

                const inner = parseMathInnerFromText(block.source);
                const pre = wrap.querySelector('.math-edit-area');
                pre.textContent = inner;

                block.el.className = 'live-block is-rendered';
                block.el.removeAttribute('contenteditable');
                block.el.onblur = null;
                block.el.onkeydown = null;

                wrap.classList.add('is-editing');
                block._specialEditWrap = wrap;
                block._specialEditPre = pre;

                attachSpecialBlockEditHandlers(block, index, wrap, pre, updateMathLivePreview);
                updateMathLivePreview(block, pre);

                requestAnimationFrame(() => {
                    pre.focus();
                    placeCaretAtEnd(pre);
                });
            }

            function setupMermaidBlock(el, block, index, readOnly) {
                const { inner } = parseCodeFenceSource(block.source);

                const wrap = document.createElement('div');
                wrap.className = 'mermaid-block-wrap';

                const editorPane = document.createElement('div');
                editorPane.className = 'special-block-editor';

                const bar = document.createElement('div');
                bar.className = 'mermaid-block-bar';
                bar.innerHTML = '<span>Mermaid diagram</span>';
                editorPane.appendChild(bar);

                const pre = document.createElement('pre');
                pre.className = 'mermaid-edit-area';
                if (!readOnly) {
                    pre.setAttribute('contenteditable', 'true');
                    pre.setAttribute('spellcheck', 'false');
                    attachPlainTextTyping(pre);
                }
                editorPane.appendChild(pre);

                const previewPane = document.createElement('div');
                previewPane.className = 'special-block-preview';

                const diagram = document.createElement('div');
                diagram.className = 'mermaid-diagram';
                previewPane.appendChild(diagram);

                wrap.appendChild(editorPane);
                wrap.appendChild(previewPane);

                refreshMermaidBlockDisplay(diagram, inner, readOnly);

                el.innerHTML = '';
                el.appendChild(wrap);

                if (!readOnly) {
                    previewPane.addEventListener('mousedown', (e) => {
                        if (activeBlockIndex === index) return;
                        e.preventDefault();
                        activateMermaidBlock(index);
                    });
                }

                if (inner.trim()) {
                    scheduleMermaidRenderAfterLayout([wrap]);
                }
            }

            function activateMermaidBlock(index) {
                if (activeBlockIndex === index) return;
                if (activeBlockIndex !== -1) deactivateCurrentBlock();

                activeBlockIndex = index;
                const block = liveBlocks[index];

                let wrap = block.el.querySelector('.mermaid-block-wrap');
                if (!wrap) {
                    setupMermaidBlock(block.el, block, index, false);
                    wrap = block.el.querySelector('.mermaid-block-wrap');
                }

                const { inner } = parseCodeFenceSource(block.source);
                const pre = wrap.querySelector('.mermaid-edit-area');
                pre.textContent = inner;

                block.el.className = 'live-block is-rendered';
                block.el.removeAttribute('contenteditable');
                block.el.onblur = null;
                block.el.onkeydown = null;

                wrap.classList.add('is-editing');
                block._specialEditWrap = wrap;
                block._specialEditPre = pre;

                attachSpecialBlockEditHandlers(block, index, wrap, pre, updateMermaidLivePreview);
                updateMermaidLivePreview(block, pre);

                requestAnimationFrame(() => {
                    pre.focus();
                    placeCaretAtEnd(pre);
                });
            }

            function activateCodeBlockAtCursor() {
                if (!isLiveActive() || !liveBlocks.length) return;

                const pos = textarea.selectionStart;
                let offset = 0;
                for (let i = 0; i < liveBlocks.length; i++) {
                    const blockEnd = offset + blockMarkdownLength(liveBlocks[i]);
                    if (pos <= blockEnd) {
                        const type = liveBlocks[i].type;
                        if (type === 'code-fence') activateCodeFenceBlock(i);
                        else if (type === 'math') activateMathBlock(i);
                        else if (type === 'mermaid') activateMermaidBlock(i);
                        return;
                    }
                    offset = blockEnd + 1;
                }
            }

            function renderTableHTMLFromRows(rows, alignments) {
                if (!rows.length) return '';

                const colCount = Math.max(1, rows[0]?.length || 1);

                let html = `<div class="md-table-scroll"><table class="md-table" data-columns="${colCount}" style="--md-table-columns:${colCount}"><thead><tr>`;
                rows[0].forEach((cell, colIndex) => {
                    html += `<th${tableCellAlignAttr(alignments, colIndex)}>${renderInline(cell)}</th>`;
                });
                html += '</tr></thead>';

                if (rows.length > 1) {
                    html += '<tbody>';
                    for (let i = 1; i < rows.length; i++) {
                        html += '<tr>';
                        rows[i].forEach((cell, colIndex) => {
                            html += `<td${tableCellAlignAttr(alignments, colIndex)}>${renderInline(cell)}</td>`;
                        });
                        html += '</tr>';
                    }
                    html += '</tbody>';
                }

                html += '</table></div>';
                return html;
            }

            function readTableCellText(cell) {
                const text = (cell.textContent || '')
                    .replace(/\u00a0/g, ' ')
                    .replace(/\u200b/g, '');
                return text.trim();
            }

            function setTableCellContent(cell, cellText, alignments, colIndex) {
                const align = alignments?.[colIndex] || 'left';
                cell.style.textAlign = align;
                if (!cellText || !cellText.trim()) {
                    cell.innerHTML = '&nbsp;';
                } else {
                    cell.innerHTML = renderInline(cellText);
                }
            }

            function isTableCellVisuallyEmpty(cell) {
                return readTableCellText(cell) === '';
            }

            function syncTableBlockFromDOM(index) {
                const block = liveBlocks[index];
                if (!block || block.type !== 'table') return;
                const table = block.el.querySelector('table.md-table');
